<style>
:root{--panel:#fff;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f1f5f9;--accent:#4f46e5;--green:#059669;--greenbg:#ecfdf5;--shadow:0 12px 34px rgba(154,52,18,.12)}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:linear-gradient(180deg,#0c1929 0,#4f46e5 230px,#f8fafc 230px,#f8fafc 100%);min-height:100vh}
.wrap{max-width:1120px;margin:0 auto;padding:22px 18px 70px}header{color:#fff;padding:8px 2px 14px}
.htop{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}header h1{font-size:22px;margin:0 0 4px}header p{margin:0;color:#e0e7ff;font-size:13.5px}
.badgeN{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:12px;padding:10px 14px;text-align:center;min-width:120px}.badgeN b{font-size:22px;display:block}.badgeN span{font-size:11px;color:#e0e7ff;text-transform:uppercase}
.progress{height:6px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden;margin-top:10px;max-width:300px}.progress i{display:block;height:100%;background:linear-gradient(90deg,#fb923c,#fbbf24,#34d399);width:0;transition:width .3s}
.motibar{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.mchip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);border-radius:12px;padding:9px 12px;min-width:100px}.mchip b{display:block;font-size:16px}.mchip span{font-size:10.5px;color:#e0e7ff;text-transform:uppercase}
.cheer{margin-top:10px;font-size:13px;color:#e0e7ff;min-height:18px}
.toolbar{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;box-shadow:var(--shadow);margin-bottom:14px}
.grp{display:flex;flex-direction:column;gap:3px}.grp label{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;padding-left:2px}
select,.btn{font:inherit;font-size:13.5px;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:10px;padding:8px 11px;cursor:pointer}
.btn{display:inline-flex;align-items:center;gap:6px;font-weight:600}.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.btn.ghost{background:var(--soft)}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}.seg button{border:0;background:#fff;padding:8px 13px;font:inherit;font-size:13.5px;cursor:pointer;color:var(--muted);font-weight:600}.seg button.on{background:var(--accent);color:#fff}
.chk{display:inline-flex;align-items:center;gap:7px;font-size:13px;background:var(--soft);padding:8px 12px;border-radius:10px;cursor:pointer;border:1px solid var(--line);user-select:none}.chk input{accent-color:var(--accent)}.spacer{flex:1 1 auto}
.domain{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:10px 14px;box-shadow:var(--shadow);margin-bottom:14px}
.domain-head{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;border:0;background:transparent;padding:2px 0;cursor:pointer;font:inherit;color:inherit;text-align:left}
.domain-head h4{margin:0;font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
.domain-head .chev{font-size:12px;color:var(--muted);transition:transform .15s;font-weight:700}
.domain.collapsed .chev{transform:rotate(-90deg)}
.domain.collapsed .dgrid{display:none}
.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-top:10px}.ditem{background:var(--soft);border-radius:10px;padding:8px 10px;border:1px solid var(--line)}.ditem .dn{font-size:12px;font-weight:700;color:#4f46e5;margin-bottom:4px}.ditem .db{height:5px;background:#e0e7ff;border-radius:99px;overflow:hidden}.ditem .db i{display:block;height:100%;background:linear-gradient(90deg,#4f46e5,#fbbf24);width:0}.ditem .ds{font-size:10.5px;color:var(--muted);margin-top:3px}
.layout{display:grid;grid-template-columns:1fr;gap:16px}.layout.withlist{grid-template-columns:1fr 330px}@media(max-width:900px){.layout.withlist{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:26px;min-height:340px;display:flex;flex-direction:column}
.meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.pill{font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:999px;border:1px solid transparent;white-space:nowrap}
.pill.exam{background:#e0e7ff;color:#4f46e5;border-color:#e0e7ff}.pill.prob{background:var(--soft);color:var(--muted)}.pill.topic{background:#ecfeff;color:#0e7490;border-color:#a5f3fc}.pill.known{background:var(--greenbg);color:var(--green);border-color:#a7f3d0}
.q{font-size:17.5px;line-height:1.5;font-weight:600;margin:0 0 8px;white-space:pre-wrap}.qhint{color:var(--muted);font-size:12.5px;margin-bottom:18px}
.reveal-wrap{margin-top:auto}.answer{border-top:1px dashed var(--line);margin-top:18px;padding-top:18px}
.atype{display:inline-flex;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:999px;margin-bottom:12px;background:var(--greenbg);color:var(--green)}
.answer .txt{font-size:15.5px;line-height:1.62;color:#1f2937}.answer .txt p{margin:0 0 11px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;padding-top:18px;border-top:1px solid var(--line);align-items:center}
.nav{display:flex;gap:8px;align-items:center;margin-left:auto}.pos{font-size:13px;color:var(--muted);min-width:74px;text-align:center}
.big-reveal{width:100%;padding:14px;font-size:15px}
.listpanel{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:14px;max-height:640px;display:flex;flex-direction:column}
.listpanel h3{margin:2px 2px 10px;font-size:14px}.search{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:10px;font:inherit;font-size:13px;margin-bottom:10px}
.list{overflow:auto;display:flex;flex-direction:column;gap:4px}
.li{display:flex;gap:9px;align-items:flex-start;padding:9px 10px;border-radius:10px;cursor:pointer;border:1px solid transparent;font-size:12.5px}
.li:hover{background:var(--soft)}.li.cur{background:#e0e7ff;border-color:#e0e7ff}
.li .dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:0 0 auto;background:var(--green)}
.li .code{font-size:10.5px;color:var(--muted);font-weight:700;white-space:nowrap}.li .qt{color:#334155;flex:1}.li.done .qt{color:#94a3b8;text-decoration:line-through}.li .chk2{color:var(--green);font-weight:800}
.legend{font-size:11px;color:var(--muted);margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.empty{text-align:center;color:var(--muted);padding:40px 10px}.empty b{color:var(--ink);font-size:17px}
.kbd{font-size:11px;color:var(--muted);margin-top:14px;text-align:center}.kbd kbd{background:#fff;border:1px solid var(--line);border-bottom-width:2px;border-radius:6px;padding:1px 6px;font-family:inherit;font-size:11px}
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(16px);background:#4f46e5;color:#fff;padding:12px 18px;border-radius:999px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:200}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.home{position:fixed;bottom:18px;left:18px;z-index:60;display:inline-flex;align-items:center;gap:7px;background:#111827;color:#fff;text-decoration:none;font:600 13px/1 system-ui,sans-serif;padding:10px 14px;border-radius:999px}
</style>

<script>
const DATA = [{"exam":"Diciembre 2020","code":"2020-12","problema":"Pregunta 1 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"a) Un usuario solicita una página web que consta de texto y dos imágenes. Para obtener esa\npágina, el cliente envía un mensaje de solicitud y recibe tres mensajes de respuesta.","answer":"El tamaño de la ventana de recepción de TCP nunca varía mientras dura la conexión.","atype":"oficial","sources":[],"id":"redesexamen_202012_p1a"},{"exam":"Diciembre 2020","code":"2020-12","problema":"Pregunta 1 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) Dos páginas web diferentes (www.fing.edu.uy/index.html y www.fing.edu.uy/bedelia.html) se\npueden enviar a través de la misma conexión persistente.","answer":"Suponga que el host A está enviando al host B un archivo de gran tamaño a través de una\nconexión TCP. El número de bytes no reconocidos que A envía no puede exceder el tamaño\ndel buffer del receptor.","atype":"oficial","sources":[],"id":"redesexamen_202012_p1b"},{"exam":"Diciembre 2020","code":"2020-12","problema":"Pregunta 1 (c)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"c) Con las conexiones no persistentes entre un navegador y un servidor, un único segmento\nTCP puede transportar dos mensajes de solicitud HTTP distintos.","answer":"Suponga que el host A está enviando al host B un archivo de gran tamaño a través de una\nconexión TCP. Si el número de secuencia de un segmento en esta conexión es m, entonces el\nnúmero de secuencia del siguiente segmento será necesariamente m+1.","atype":"oficial","sources":[],"id":"redesexamen_202012_p1c"},{"exam":"Diciembre 2020","code":"2020-12","problema":"Pregunta 1 (d)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"d) La línea de cabecera Date: del mensaje de respuesta HTTP indica cuándo el objeto fue\nmodificado por última vez.\n\nV2\nConsidere un navegador web recién instalado en una computadora hogareña, que hace uso de\nun servidor DNS que sólo realiza consultas iterativas a otros servidores DNS y sin información\nen caché.\nSuponiendo que desde el navegador se visita el sitio www.fakaofo.tk, mencione, respetando la\nsecuencia temporal, los diferentes mensajes de DNS (indicando también tipos de registros\ncontenidos) que se observarían en un sniffer como Wireshark capturando el tráfico en la\ninterfaz de red del servidor DNS, hasta que se despliega el contenido del sitio web.\n\nV3\nSe pretende definir los registros de DNS asociados al dominio sumo.uy con el objetivo de\nconfigurar lo siguiente:\nservidor de correo del dominio - correo.sumo.uy - 100.50.20.30 y 2620:0:2e60::33\nservidor de nombres del dominio - ns1.sumo.uy - 100.50.20.40 y 2620:0:2e60::27\nservidor web atendiendo en el puerto TCP 80 (http) - www.sumo.uy - 100.50.20.50 y\n2620:0:2e60::15\nmail.sumo.uy - alias del servidor de correo\nhttp.sumo.uy - alias del servidor web “http”\nEscriba todos los registros de DNS necesarios para ello utilizando el formato (Nombre, Valor,\nTipo).\n\nV4\nDefina y explique el mecanismo por el cual la capa de transporte puede diferenciar los\nmensajes de los distintos procesos ejecutando en un mismo host. Explique las diferencias en\neste mecanismo entre un protocolo orientado a conexión y uno no orientado a conexión.\n\nV5\n                                           Página 1/6\n\n                                     Redes de Computadoras\nIndique si las siguientes afirmaciones son verdaderas o falsas, justificando adecuadamente en\ncada caso.","answer":"En TCP el único tipo de retroalimentación que recibe un emisor TCP es si un segmento llegó\ncorrectamente o no.\n\nV6\nConsidere el siguiente diagrama de una transmisión de datos por TCP entre un Host A y un\nHost B. El Host A tiene 1000 Bytes para transmitir, una ventana de transmisión de 800 Bytes y\npuede enviar segmentos con un máximo de 200 Bytes de datos.\nIndique el número de secuencia, el número de reconocimiento y la cantidad de bytes\ntransmitidos de los segmentos numerados del 1 al 10.","atype":"oficial","sources":[],"id":"redesexamen_202012_p1d"},{"exam":"Diciembre 2020","code":"2020-12","problema":"Pregunta 2 (a)","topic":"Capa de enlace","cat":"Capa de enlace","q":"a) Describa la información (mensajes) que recibe el nodo X al unirse a la red.\n\n                                           Página 2/6\n\n                                      Redes de Computadoras","answer":"Explique cuáles son las diferencias entre las tramas que se transmiten en el enlace troncal y\nlas que se trasmiten en los enlaces con los sistemas finales (hosts).","atype":"oficial","sources":[],"id":"redesexamen_202012_p2a"},{"exam":"Diciembre 2020","code":"2020-12","problema":"Pregunta 2 (b)","topic":"Capa de red","cat":"Capa de red","q":"b) Describa el algoritmo que deberá ejecutar X para calcular los caminos de menor costo a\ntodos los nodos de la red.\n\nV2\nConsidere la red de la figura donde se está ejecutando un algoritmo de Vector de Distancias y\nse agrega el nodo X y los dos enlaces punteados.\n\nConsiderando que cuando se agrega el nodo X el algoritmo de enrutamiento ya había\nconvergido en los demás nodos:","answer":"Con este escenario ¿es posible comunicar puestos de trabajo de distintas subredes?. En\ncaso positivo justifique su respuesta, en caso contrario proponga una solución para que las\nsubredes se puedan comunicar","atype":"oficial","sources":[],"id":"redesexamen_202012_p2b"},{"exam":"Febrero 2016","code":"2016-02","problema":"Pregunta 1 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) ¿Con que notación se representan las direcciones de capa 2 (MAC) y las de la capa 3 (IP)?","answer":"Las direcciones MAC son de tamaño 48 bits, y se representan en una secuencia de 6 pares de números\nhexadecimales separados por dos puntos (:). Un ejemplo es 1A:2F:BB:76:09:AD\n\nLas IP son en caso de IPv4 32 bits y se representan con cuatro cifras entre 0 y 255 (representación de un byte),\nseparados por punto (.). Un ejemplo es 200.36.12.25\n\nPor último IPv6 son direcciones con tamaño de 128 bits. Se representan en hexadecimal, agrupado de a 4 dígitos\ny separados por :. Un ejemplo es 2001:0db8:85a3:0000:0000:8a2e:0370:7334","atype":"oficial","sources":[],"id":"redesexamen_201602_p1a"},{"exam":"Febrero 2016","code":"2016-02","problema":"Pregunta 1 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"b) ¿Qué instituciones asignan los valores de las direcciones en ambos casos.?","answer":"La asignación de direcciones MAC es administrada por IEEE. Por lo tanto, los fabricantes compran porciones\ndel espacio de direcciones MAC (asegurando su unicidad). La dirección se compone de dos elementos, OUI\n(Organizationallly Unique Identifier) , que son los tres primeros octeto s(company_id) y los restantes 3 octetos\nadministrados por las compañía.\n\nLas direcciones IP para dispositivos conectados a Internet tiene la exigencia que ésta dirección IP debe ser única\npara toda la Red.\nLas direcciones son entregadas por bloques a los IPS que distribuyen entre sus clentes. Los bloques son\nadministrados por ICANN: Internet Corporation for Assigned Names and Numbers, que tiene entre otras\nexigencias reparto de direcciones, manejo del DNS y asignación de nombres de dominios. Además se encarga de\nresolver disputas.\n\nAsimismo hay organismos que se encargan de gestionar dichas asignaciones regionalmente. Estas\norganizaciones son Arin, Ripe, Apnic, Lacnic y Afrinic.","atype":"oficial","sources":[],"id":"redesexamen_201602_p1b"},{"exam":"Febrero 2016","code":"2016-02","problema":"Pregunta 1 (c)","topic":"Capa de red","cat":"Capa de red","q":"c) ¿Porqué se dice que las direcciones de capa 3 son jerárquicas?","answer":"Las direcciones de capa 3 se denominan jerárquicas, por tener en la dirección una componente que representa\nla subred a la que pertenece y otra que identifica el host dentro de la subred. Los primeros bits indican la subred y\nlos últimos indican el elemento en la subred.\n\nEl direccionamiento jeráquico permite ser más eficiente en la publicación de la información de ruteo, dado que\npermite agregar las redes y publicar menos información.\n\n                                                       Página 1/8\n\n                                              Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201602_p1c"},{"exam":"Febrero 2016","code":"2016-02","problema":"Pregunta 2","topic":"Capa de red","cat":"Capa de red","q":"¿Indique las características del grafo generado por el protocolo de Spanning Tree (STP) explicado en el curso y\nque función cumple?","answer":"Considerando el grafo de la red física, Protocolo Spanning-Tree (STP) construirá un grafo sin loops, por lo que en\ncada instante existirá un solo camino activo entre dos nodos, permitiendo que existan loops físicos pero no\nlógicos.\n\nDe ésta forma se logra que entre dos nodos exista solamente un camino habilitado.\n\nPara ésto se define un árbol a través del cual se alcanza a todos los nodos, y el árbol se “poda” de tal forma que\nalgunos puertos quedan bloqueados a la espera de algún cambio topológico y los restantes puertos están en\nestado forwarding.","atype":"oficial","sources":[],"id":"redesexamen_201602_p2"},{"exam":"Febrero 2016","code":"2016-02","problema":"Pregunta 3 (a)","topic":"Físico y métricas","cat":"Físico y métricas","q":"a) Calcule el tiempo para distribuir un archivo de tamaño L Bytes a N peers en una red cliente-servidor, asumiendo\nque el servidor tiene un ancho de banda de subida u s, y el cliente i tiene ancho de banda de subida ui y bajada di.","answer":"El servidor transmite N copias de L bytes, lo que tarda NL/u s segundos. Cada cliente tarda L/di segundos en\ndescargar. Por lo tanto, el tiempo de realizar las N transmisiones es:\n        max{NL/us, L/min(di)}","atype":"oficial","sources":[],"id":"redesexamen_201602_p3a"},{"exam":"Febrero 2016","code":"2016-02","problema":"Pregunta 3 (b)","topic":"Redes (general)","cat":"Redes (general)","q":"b) Repita lo anterior para una red P2P.","answer":"El servidor transmite al menos una copia completa, en L/u s segundos. El cliente i tarda L/di segundos en\ndescargar. En total, se deben descargar NL bytes, siendo la subida más rápida u s+Σui. Por lo tanto, el tiempo total\nes:\n        max{L/us, L/min(di), NL/(us+Σui)}","atype":"oficial","sources":[],"id":"redesexamen_201602_p3b"},{"exam":"Febrero 2016","code":"2016-02","problema":"Pregunta 4","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Describa el proceso de envío y recepción del correo electrónico, mencionando los protocolos que participan y\ndando sus características principales.","answer":"Los actores en un intercambio de correos son i) los mail user agents (MUA) y ii) mail servers. El usuario redacta el\ncorreo en su user agent, por ejemplo Eudora o Pine. Al seleccionar “Enviar”, el mensaje es entregado usando\nSMTP al servidor de correo configurado. Este servidor localizará al servidor destinatario del mensaje mediante\nconsultas DNS (buscando el registro MX adecuado), y le entrega el mensaje usando SMTP. Este paso puede\nrepetirse varias veces hasta llegar al servidor donde el usuario destino está registrado. El MUA destino accede a\nsu servidor configurado y descarga de allí los mensajes que le son dirigidos. Esto se hace con un protocolo como\nPOP3, IMAP o HTTP.\nSMTP es un protocolo de capa de aplicación que usa TCP y que tiene asignado el puerto 25. Es un protocolo de\ntexto que consisten en comandos originados en el emisor y dirigidos al receptor. Para transmitir datos binarios se\ncodifican como texto usando MIME.\nPOP3 es un protocolo simple para descargar mails de un servidor. Usa TCP en el puerto 110. Una sesión dura lo\nque tarda en autenticarse y descargar los mails pendientes, de haberlos. Los mensajes usualmente se eliminan\ndel servidor luego de descargados (al cerrarse la sesión).\nIMAP cumple el mismo rol que POP3, pero permite manipular los mails directamente en el servidor (marcar como\nleídos, gestionar carpetas, buscar, etc.). Está implementado sobre TCP en el puerto 143. La sesión puede\npermanecer abierta mientras el MUA esté conectado, y se usa para transferir datos, manipularlos en el servidor, y\npara notificar de la llegada de mensajes nuevos.\n\n                                                     Página 2/8\n\n                                              Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201602_p4"},{"exam":"Febrero 2016","code":"2016-02","problema":"Pregunta 5 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"a) Describa las diferencias entre Control de flujo y Control de congestión.","answer":"El control de flujo persigue que el emisor no transmita datos a una tasa de transmisión más alta de la que el\nreceptor puede procesar. El control de congestión, en cambio, se encarga de que el transmisor no lo haga a un\ntasa más alta que lo que los enrutadores intermedios puedan procesar.","atype":"oficial","sources":[],"id":"redesexamen_201602_p5a"},{"exam":"Febrero 2016","code":"2016-02","problema":"Pregunta 5 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"b) Describa el mecanismo que usa TCP para el control de flujo.","answer":"El lado receptor mantiene el parametro RcvWindow. Este parámetro es el espacio disponible en el buffer de\nrecepción, y se calcula como RcvBuffer-(LastByteRcvd-LastByteRead), o sea el tamaño del buffer de recepción\nmenos el número de bytes recibidos aun no entregados a la capa de aplicación. Este dato es transmitido en el\ncabezal TCP, y al llegar al transmisor (por ejemplo en un mensaje ACK) este lo usará para regular el número de\nbytes sin ACK transmitidos. De esta forma se asegura que el receptor tiene suficientes recursos para procesar los\ndatos pendientes.","atype":"oficial","sources":[],"id":"redesexamen_201602_p5b"},{"exam":"Diciembre 2018","code":"2018-12","problema":"Pregunta 1 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"a) Identifique los componentes del retardo en las redes de paquetes, y señale cuáles son los más\nsignificativos.","answer":"*Retardo de procesamiento en el nodo.\nEs el tiempo que tarda el nodo en procesar el mensaje. Por ejemplo chequeo de paridad (CRC), determinar enlace de salida\n(enrutamiento).\n*Retardo de cola\nTiempo de espera en colas del enlace de salida para trasmisión.\n*Retardo de trasmisión.\nEs el tiempo que tarda un paquete en ser transmitido por la interfaz del nodo. Sea R=ancho de banda del enlace (bps) y\nL=longitud del paquete (bits), el tiempo de envío =L/R.\n*Retardo de propagación.\nEs el tiempo que tarda un paquete en viajar por el medio desde que sale de la interfaz de origen hasta que llega a la interfaz\ndestino. Sea d = longitud del enlace físico y s = velocidad de propagación en el medio, el retardo de propagación = d/s.\n\nEn diversos escenarios los retardos más significativos pueden variar; en una LAN, con cables cortos y velocidades de\ntrasmisión superiores a 100Mbps, los retardos de trasmisión y propagación serán típicamente despreciables. En enlaces\nintercontinentales, por ejemplo satelitales, el retardo de propagación puede ser muy importante, en el orden de cientos de\nmilisegundos, y si la velocidad de trasmisión (ancho de banda) es baja, del orden de 64 Kbps, el retardo de trasmisión puede\nser influyente. Normalmente el retardo de procesamiento es despreciable, y el retardo de cola es variable y depende del tráfico\nde la red.","atype":"oficial","sources":[],"id":"redesexamen_201812_p1a"},{"exam":"Diciembre 2018","code":"2018-12","problema":"Pregunta 1 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) Cuando existe congestión en la red, ¿cual de estos componentes se ve mas afectado?.","answer":"El retardo de encolamiento depende del nivel de congestión del router ya que si se reciben mas datagramas por segundo de\nlos que se logra reenviar, la cola de espera crecerá y más tiempo deberá esperar un datagrama en ella hasta que sea\nreenviado.","atype":"oficial","sources":[],"id":"redesexamen_201812_p1b"},{"exam":"Diciembre 2018","code":"2018-12","problema":"Pregunta 2","topic":"Capa de red","cat":"Capa de red","q":"Explique que función cumple y como funciona el protocolo Address Resolution Protocol (ARP).","answer":"El protocolo ARP Address Resolution Protocol, permite determinar la dirección MAC del nodo que tiene configurada cierta\ndirección IP.\nCada nodo en la red (ya sea un host o un router) presenta una tabla ARP. Ésta tabla contiene registros con los siguientes\ncampos, IP address, MAC address y TTL (Time to live), para los nodos de su LAN.\n  < IP address; MAC address; TTL>\n                                                          Página 1/6\n\n                                                Redes de Computadoras\nEl TTL indica después de que tiempo es eliminado el registro.\nEjemplo de funcionamiento:\n    •    Cuando el equipo A desea enviar un datagrama al equipo B, y la dirección MAC de B no se encuentra en la tabla\n         ARP, debe realizar los siguientes pasos\n    •    Envía un ARP query conteniendo la dirección de B , y su dirección IP y MAC. Lo envía broadcast con la dirección\n         FF:FF:FF:FF:FF:FF, en el encabezado de ethernet. Este mensaje es recibido por todos los nodos de la LAN.\n    •    Cuando B recibe el paquete ARP query, lo contesta con un ARP reply al equipo A con su dirección MAC. Este\n         mensaje es enviado en forma unicast\n    •    El equipo A graba el par IP.MAC en la tabla ARP hasta que pase el TTL","atype":"oficial","sources":[],"id":"redesexamen_201812_p2"},{"exam":"Diciembre 2018","code":"2018-12","problema":"Pregunta 3 (a)","topic":"Capa de enlace","cat":"Capa de enlace","q":"a) Mencione y describa el protocolo de acceso múltiple que utiliza Ethernet.","answer":"Ethernet utiliza el protocolo de acceso múltiple CSMA/CD ( CSMA con detección de colisiones). La familia de protocolos\nCSMA/CD siguen dos reglas fundamentales:\nSondeo de portadora: cada nodo escucha el canal antes de transmitir. Si actualmente se está transmitiendo una trama de otro\nnodo por el canal, el nodo esperará un intervalo de tiempo aleatorio y luego volverá a sondear para ver si existe portadora en\nel canal. Si comprueba que el canal está inactivo, el nodo comenzará a transmitir su trama. En caso contrario, el nodo\nesperará otro intervalo aleatorio de tiempo y volverá a repetir este proceso.\nDetección de colisiones: un nodo que esté transmitiendo escuchará qué es lo que hay en el canal mientras dure la\ntransmisión. Si detecta que otro nodo está transmitiendo una trama que interfiere la suya, dejará de transmitir y empleará\nalgún tipo de protocolo para determinar cuándo debe volver a intentar transmitir de nuevo.","atype":"oficial","sources":[],"id":"redesexamen_201812_p3a"},{"exam":"Diciembre 2018","code":"2018-12","problema":"Pregunta 3 (b)","topic":"Capa de enlace","cat":"Capa de enlace","q":"b) ¿Qué algoritmo se ejecuta ante una colisión? Explique su funcionamiento.","answer":"Se utiliza el algoritmo de espera exponencial (exponential backoff).\nDespués de abortar la transmisión de una trama debido a una colisión el nodo transmisor entra en la fase de espera\nexponencial (exponential backoff). Específicamente, a la hora de transmitir una trama que ya ha experimentado n colisiones,\nel nodo selecciona un valor aleatorio para K del conjunto {0,1,2, . . . , 2^m – 1}, donde m = min(n,10). El nodo espera\nentonces K*512 periodos de bit (K veces el tiempo necesario para transmitir 512 bits) antes de intentar una nueva\ntransmisión.","atype":"oficial","sources":[],"id":"redesexamen_201812_p3b"},{"exam":"Diciembre 2018","code":"2018-12","problema":"Pregunta 4 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"a) Describa las características de las arquitecturas de Capa de Aplicación Cliente-Servidor y Peer-to-Peer.","answer":"Cliente-Servidor\nEn estas arquitecturas, típicamente las aplicaciones tienen dos componentes fundamentales: el cliente y el servidor.\nLos requerimientos de los clientes (hosts), a los que no se les requiere ser “always-on”, son servidos por servidores, estos sí\n“always-on”\nCliente: típicamente, quien inicia el contacto con el servidor, requiriendo servicios ofrecidos por él.\nServidor: quien provee el servicio demandado por el cliente.\nEn general, no hay comunicación directa entre clientes.\nEjemplo1 DNS (Servicio de resolución de nombres)\nEjemplo2 Web\n\nPeer-to-Peer\nEn este tipo de arquitecturas hay un uso mínimo (o nulo) de servidores dedicados.\nTodos los peers ofician de clientes y también de servidores, lo que le otorga a este tipo de arquitectura la propiedad de ser\naltamente escalable.\nLos peers “aparecen” y “desaparecen” de la red, por lo que, desde el rol de servidores, no cumplen con la propiedad de\n“always-on”, en comparación con el caso de la arquitectura Cliente-Servidor.\n                                                          Página 2/6\n\n                                                  Redes de Computadoras\nEstas arquitecturas aprovechan la capacidad de procesamiento y almacenamiento de los peers, así como el ancho de banda\nde sus conexiones a Internet, liberando de dichos requerimientos a los “servidores tradicionales”. Además de diferenciarse de\nla arquitectura Cliente-Servidor en cuanto al paradigma de funcionamiento, también se diferencia en cómo escalan, ya que en\neste caso la capacidad de crecimiento está autocontenida en los peers que participan de la misma. En el caso de la\narquitectura Cliente-Servidor, la demanda de crecimiento se concentra del lado del Servidor.\nEjemplo: Bit Torrent (transferencias de archivos).","atype":"oficial","sources":[],"id":"redesexamen_201812_p4a"},{"exam":"Diciembre 2018","code":"2018-12","problema":"Pregunta 4 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"b) Mencione un ejemplo de una arquitectura híbrida indicando las características de cada capa que posee.","answer":"La arquitectura híbrida presenta un modelo con una arquitectura donde un nodo, puede realizar una consulta a un servidor\npara saber donde están los otros nodos en la red. Una vez hecha la consulta, el nodo podrá establecer la conexión directa con\notro nodo para compartir su información. La aplicación P2P debe informar a este servidor, de su conexión y desconexión\npara mantener la integridad del servicio.","atype":"oficial","sources":[],"id":"redesexamen_201812_p4b"},{"exam":"Diciembre 2018","code":"2018-12","problema":"Pregunta 5 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"a) Explique el proceso de multipexación y demultiplexación realizado en la capa de transporte.","answer":"Proceso de multipexación – Refiere en la capa 4 a la unión de datos de múltiples aplicaciones (sockets) que envían,\nencapsulando cada dato con su respectivo cabezal en un segmento, y enviándolos todos juntos a la capa de red.\nProceso de demultiplexing – Refiere a la entrega de cada segmento en el receptor a la correcta aplicación (socket) que debe\nrecibirlos.","atype":"oficial","sources":[],"id":"redesexamen_201812_p5a"},{"exam":"Diciembre 2018","code":"2018-12","problema":"Pregunta 5 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) Para el caso de TCP y UDP indique que información utiliza para realizar la tarea.","answer":"En el caso de UDP se utiliza unicamente el puerto destino para decidir a que socket se deben enviar los datos del datagrama.\nEn el caso de TCP se utiliza la cuaterna <ip origen, puerto origen, ip destino, puerto destino> que identifica a cada conexión.\nEs decir que datos con igual ip destino y puerto destino pueden ser entregados a sockets distintos si la ip origen o el puerto\norigen son distintos.\n\n                                                         Página 3/6\n\n                                                                                Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201812_p5b"},{"exam":"Febrero 2019","code":"2019-02","problema":"Pregunta 1","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Considere el Chequeo de Redundancia Cíclica (CRC) utilizado en la capa de enlace Ethernet.\n      a)¿Qué función cumple? ¿Cómo está implementado?\n      b) TCP y UDP contienen un campo Checksum. Fundamente su necesidad dada la\n      existencia de CRC en Ethernet.","answer":"a) Permite la verificación de la correctitud de los datos recibidos por la red. Su\nimplementación se basa en el envío e un campo adicional que permite chequear que lo\nrecibido, no se ha modificado.\nLa metodología utilizada se basa en el cálculo del resto de una división de\npolinomios. Éste resto es enviado como campo adicional, y al recibir los datos se\nrealiza la división y se chequea que el resto coincida.\nLa certeza de ésta metodología es muy grande, y además se basa en la elección de\npolinomios que permitan detectar los errores más comunes ocurridos.\n\nb) El checksum de TCP y UDP, se implementa sobre los cabezales y datos (adicionando\nun pseudo­dato que contiene las IP origen y destino). Como puede verse la\ninformación presentada es redundante.\nEl justificativo puede fundamentarse en que el modelo de capas no tiene certeza de\nhaber utilizado en capa 2 Ethernet. Esto genera que no pueda asegurar que siempre se\nha implementado el CRC de los datos, sino simplemente para las conexiones end to end\nrealizadas sobre Ethernet.\nAdemás es importante aclarar que el objetivo de los CRC es diferente, dado que el de\ncapa 2 intenta verificar la transmisión entre dos nodos adyacentes, mientras que el\nde capa 4 entre dos nodos finales.","atype":"oficial","sources":[],"id":"redesexamen_201902_p1"},{"exam":"Febrero 2019","code":"2019-02","problema":"Pregunta 2","topic":"Capa de enlace","cat":"Capa de enlace","q":"Defina el concepto de Virtual Local Area Network (VLAN). Presente un ejemplo que demuestre\nsu utilidad. ¿Cómo se denomina y cómo funciona la interconexión de VLANs en switches\nseparados?","answer":"Una VLAN, es un método para crear redes lógicas independientes dentro de una misma\nred física. Varias VLAN pueden coexistir en un único conmutador físico o en una\núnica red física.\n\n                                                                   Página 1/10\n\n                                Redes de Computadoras\nDe esta forma, se puede disponer de varias VLANs dentro de un mismo switch. Podría\ndecirse que cada una de estas redes agrupa los equipos de un determinado segmento de\nred. Crear estas particiones tiene unas ventajas bastante claras a la hora de\nadministrar una red.\n\nPara la interconexión de VLANs en dos switches separados se utiliza un enlace TRUNK.\nEstos enlaces tienen la capacidad de transmitir la VLAN a la que pertenece el frame,\nagregando en el protocolo 802.1Q un campo para ser especificado. De ésta forma el\nintercambio de frames contiene la información para saber a que VLAN debe ser\ntransmitido el frame.\n\n                                     Página 2/10\n\n                                    Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201902_p2"},{"exam":"Febrero 2019","code":"2019-02","problema":"Pregunta 3","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"¿Qué función cumple el protocolo Dynamic Host Configuration Protocol (DHCP) en IPv4?\nDescriba en detalle los mensajes y cómo son usados por el protocolo, indicando cabeceras,\npayload y direcciones de red.","answer":"El protocolo DHCP, Dinamic Host Configuration Protocol, es una de las formas\ndisponibles para que un nodo conectado a una red IP obtenga una dirección IPv4 desde\nun servidor DHCP, el que gestiona un pool de direcciones IP a tales efectos.\nLas dos opciones para que a un nodo se le asigne una dirección IP son: que se\nconfigure estáticamente (“hardcoded”) en la propia configuración de red del nodo, o\nque la obtenga al unirse a la red, por ejemplo, mediante DHCP. Con este protocolo\nlogramos mayor flexibilidad en el uso del rango de direcciones IP disponibles para\nnumerar los nodos de una red, pudiendo reutilizarlas, especialmente en redes donde\nlos nodos no requieren estar siempre conectados y con la misma dirección IP, como\nsería el caso de los servidores. Adicionalmente, DHCP puede entregar más\ninformación, como por ejemplo, nombre y dirección IP de un servidor DNS.\n\nLos mensajes intercambiados son los siguientes:\n   •  El equipo cliente solicita la configuración enviando un mensaje de difusión de\n      tipo “DHCP DISCOVER”.\n   •  Cada servidor DHCP responde con un mensaje de tipo “DHCP OFFER” que contiene\n      una dirección IP y otras opciones de configuración. Este mensaje se envía al\n      cliente por unicast si es posible o por broadcast en otro caso (RFC 1531 ­\n      http://tools.ietf.org/html/rfc1531).\n   •  El cliente acepta los parámetros ofrecidos por alguno de los servidores\n      respondiendo con un mensaje de difusión de tipo “DHCP REQUEST” indicando en él\n      el identificador de servidor que ha elegido. El mensaje DHCPREQUEST debe ser\n      enviado a todos los servidores que recibieron el DHCPDISCOVER para que puedan\n      reutilizar la dirección que habían ofrecido. También se usa DHCPREQUEST para\n      extender en el tiempo la validez de una dirección IP.\n   •  El servidor elegido envía un mensaje de confirmación de tipo “DHCP ACK”\n      indicando que aprueba esa concesión y confirmando la configuración, así como\n      indicando el tiempo máximo en que la dirección IP es válida.\n\n                                         Página 3/10\n\n                                     Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201902_p3"},{"exam":"Febrero 2019","code":"2019-02","problema":"Pregunta 5","topic":"Capa de red","cat":"Capa de red","q":"a) Presente las diferencias del direccionamiento de IPv6 respecto al de IPv4.\n   b) Explique como es implementada la funcionalidad de ARP en IPv6. Para la descripción\n      deberá explicar qué protocolos están involucrados y los mensajes intercambiados,\n      indicando cabeceras, payload y direcciones de red.\n                                           Página 4/10\n\n                                   Redes de Computadoras","answer":"a)Las direcciones de red de IPv6 poseen 128 bits de longitud, mientras que las de\nIPv4 poseen 32 bits. La notación utilizada en IPv4 codifica los octetos en su\nrepresentación decimal, los agrupa de a 8 bits y los separa por puntos, mientras que\nla notación utilizada por IPv6 codifica los octetos en su representación hexadecimal\ny separa parejas de éstos con el carácter “:” eliminando ceros a la izquierda dentro\nde dichas parejas, así como bloques completos de ceros representados por “::”.\nLos tipos de direcciones soportados por IPv4 son Unicast (identifica una única\ninterfaz de red en la red), Multicast (identifica un grupo de interfases en la red)\ny Broadcast (identifica todas las interfases de una red). En IPv6 se soportan\nUnicast y Multicast, con la misma semántica; Broadcast se considera un caso\nparticular de Multicast (en el que todas las interfases de cierta red son miembros)\ny se agrega Anycast, donde se identifica una interfaz (cualquiera) de entre un grupo\nde éstas.\n\nb) El protocolo que implementa una funcionalidad equivalente al ARP en IPv6 es\nimplementado como parte del Neighbor Discovery Protocol (ND), que provee servicios\nadicionales a la simple resolución del mapeo IP→MAC. El equivalente a ARP es\nimplementado solamente con el intercambio de mensajes ND Solicitation y ND Response,\nequivalentes a ARP request y ARP Response.\nCada nodo en la red (ya sea un host o un router) presenta una tabla de vecinos\n(neighbors). Ésta tabla contiene registros con los siguientes campos: IP address,\nMAC address; interface y TTL (Time to live), para los nodos de su LAN.\n      < IP address; MAC address; Interface; TTL>\nEl TTL indica después de que tiempo es eliminado el registro. La Interface es\nnecesaria para las direcciones de tipo link­local, que al tener todas el mismo\nprefijo en todas las interfases, necesista de ésta para desambiguar la tabla.\nEjemplo de funcionamiento:\n  •    Cuando el equipo A desea enviar un datagrama al equipo B, y la dirección MAC\n       de B no se encuentra en la tabla de vecinos, debe realizar los siguientes\n       pasos\n  •    Envía un mensaje ICMPv6 de tipo Neighbor Solicitation, que en la cabecera IPv6\n       lleva las direcciones: propia en el origen y en el campo destino, la dirección\n       de múlticast de todos los nodos del segmento ff02::1 (siendo precisos,\n       ff02::1:ff concatenado con los 3 últimos bytes de la dirección que estamos\n       averiguando). A nivel de la cabecera Ethernet, se coloca como origen la\n       direccón MAC asociada a la dirección por donde se envía el paquete y la\n       dirección MAC correspondiente a la direccíon de multicast, (siendo precisos,\n       la MAC 33:33?: concatenado con los 3 últimos bytes de la IPv6 que estamos\n       averiguando). En el payload del mensaje ICMPv6 se coloca la dirección IPv6 que\n       estamos averiguado, así como, la MAC origen. Este mensaje es recibido por\n       todos los nodos de la LAN.\n  •    Cuando B recibe el paquete Neighbor Solicitation, lo contesta con un Neighbor\n      Advertisement, que en la cabecera IPv6 lleva las direciones IPv6 de ambos\n      equipos, en la cabecera Ethernet van las MAC correspondientes de ambos. El\n      Payload IPv6 es de tipo ICMPv6, indicando la TargetAddress igual a la IPv6\n      Origen. Este mensaje es enviado en forma unicast\nEl equipo A graba el par IP.MAC en la tabla ARP hasta que pase el TTL\n\n                                        Página 5/10\n\n                                            Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201902_p5"},{"exam":"Febrero 2021","code":"2021-02","problema":"Pregunta 1 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"V1\nUn técnico de una empresa recibe el siguiente reclamo de uno de sus clientes: “el portal web\nde vuestra empresa está caído”. Para diagnosticar la situación el técnico decide ejecutar en su\ncomputadora un ping basado en ICMP dirigido a la dirección IP del servidor web de la\nempresa, y en función de la respuesta, determinar si es correcta la afirmación del cliente, o no.\n\na) Analice la decisión del técnico y corríjala si corresponde.","answer":"La decisión del técnico de la empresa respecto a cómo probar el correcto funcionamiento del\nportal web no es correcta, pues a través de dicho comando intentará verificar la conectividad\nen Capa de Red, la que sea exitosa o no, nada se podrá concluir respecto al servicio: si es\nexitosa, ello no permite afirmar que el tráfico vinculado al servicio DNS con dicho servidor\npueda viajar entre el cliente y el servidor; si fracasa, las razones pueden ser diversas (por\nejemplo debido a que los mensajes ICMP asociados al comando PING, concretamente los\ntipos Echo y Echo Reply, estén filtrados, e igualmente es posible que el tráfico “DNS” se esté\ncursando correctamente por la red.\nUn análisis más adecuado de la situación debería involucrar analizar qué ocurre cuando se\nintercambia tráfico “DNS” (fundamentalmente vía UDP al puerto 53, pero también vía TCP al\nmismo puerto) con el servidor referido, e incluso también el tráfico de Capa de Transporte\nasociado (por defecto, aquel tráfico TCP que involucra el puerto 53). Para ello, diferentes\nacciones se pueden tomar:\n   • “Sniffear” el tráfico hacia/desde los puertos UDP 53 y TCP 53 del servidor.\n   • “Sniffear” el tráfico DNS hacia/desde el servidor.\n   • Generar tráfico hacia los puertos UDP 53 y TCP 53, y analizar las respuestas. Se puede\ncombinar con la primera.\n   • Generar consultas de DNS dirigidas al servidor, y analizar las respuestas. Se puede\ncombinar con la primera y la segunda.\n   • Utilizar herramientas de diagnóstico específicas del servicio en cuestión (dig, nslookup),\ngenerar diferentes tipos de consultas y analizar las respuestas. Se puede combinar con las 2\nprimeras.\n   • Considerar en todas las acciones anteriores desde dónde se generan las queries.\n   • De ser posible, analizar la situación del propio servidor: servicio DNS levantado,\nconectividad, estado de las consultas al servidor, registros disponibles, estado del cache, etc.","atype":"oficial","sources":[],"id":"redesexamen_202102_p1a"},{"exam":"Febrero 2021","code":"2021-02","problema":"Pregunta 1 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"V1\nUn técnico de una empresa recibe el siguiente reclamo de uno de sus clientes: “el portal web\nde vuestra empresa está caído”. Para diagnosticar la situación el técnico decide ejecutar en su\ncomputadora un ping basado en ICMP dirigido a la dirección IP del servidor web de la\nempresa, y en función de la respuesta, determinar si es correcta la afirmación del cliente, o no.\n\nb) ¿Se modifica su respuesta de la parte anterior si el ping está basado en UDP? Justifique.","answer":"No, no se modifica. Su esencia es la misma. Con dicha prueba (ICMP basado en UDP) nada\nse puede concluir respecto al funcionamiento del servidor DNS. La justificación a plasmar aquí\nes la misma que se incluyó en la parte a).","atype":"oficial","sources":[],"id":"redesexamen_202102_p1b"},{"exam":"Febrero 2021","code":"2021-02","problema":"Pregunta 2 (a)","topic":"Redes (general)","cat":"Redes (general)","q":"V1\nTeniendo en cuenta el escenario planteado en la figura y tomando a Ri como la velocidad del\nlink i responda las siguientes cuestiones:\n\na) ¿Cuál sería la tasa de transferencia media de cierto archivo del Servidor al Cliente?","answer":"Para ambos casos se pueden enviar hasta N paquetes sin ser reconocidos. Esta es la\ndefinición de ventana deslizante de estos protocolos.","atype":"oficial","sources":[],"id":"redesexamen_202102_p2a"},{"exam":"Febrero 2021","code":"2021-02","problema":"Pregunta 2 (b)","topic":"Físico y métricas","cat":"Físico y métricas","q":"V1\nTeniendo en cuenta el escenario planteado en la figura y tomando a Ri como la velocidad del\nlink i responda las siguientes cuestiones:\n\nb) Plantee un escenario para que el router introduzca un retardo de cola a los paquetes.","answer":"Si se considera un tamaño de ventana de 8 (como dice la letra), para ambos casos, el último\nidentificador reconocido es 1. Se espera el identificador con 2. El envío sin recibir\nreconocimiento son los números de secuencia 2, 3 ,4 ,5 ,6, 7, 0, 1\n\nSin embargo, como los números de secuencia disponibles son de 0 a 7, también son válidas\nrespuestas que tengan en cuenta esto y decidan usar una ventana mas chica.","atype":"oficial","sources":[],"id":"redesexamen_202102_p2b"},{"exam":"Febrero 2021","code":"2021-02","problema":"Pregunta 2 (c)","topic":"Capa de transporte","cat":"Capa de transporte","q":"V1\nTeniendo en cuenta el escenario planteado en la figura y tomando a Ri como la velocidad del\nlink i responda las siguientes cuestiones:\n\nc) Suponiendo que las colas del router son infinitas y conociendo la velocidad media a la\n         que llegan los paquetes a la cola ¿que se tiene que cumplir para que el retardo de cola\n\n                                           Página 2/17\n\n                                      Redes de Computadoras\n      tienda a infinito?","answer":"Para el protocolo Go-Back-N visto en el curso (donde no se almacenan en el buffer del\nreceptor los paquetes fuera de orden), se puede utilizar una ventana de tamaño k-1 paquetes\n(donde k es la cantidad de números de secuencia distintos). De esta forma se evita que el\nreceptor pueda confundir un paquete nuevo con una retransmisión en el caso de que se\npierdan todos los ACKs de una ventana. Por lo tanto, con 8 bits se puede representar entre 0 y\n255, por lo que k corresponde a 256 (diferentes valores posibles), entonces el tamaño de\nventana máximo es 255.\n\nPara SR se puede utilizar una ventana de tamaño parte_entera(k/2) paquetes (donde k es la\ncantidad de números de secuencia distintos). De esta forma se evita que en caso de perderse\ntodos los ACK de una transmisión, las ventanas del emisor y receptor se superpongan\nproduciendo que el receptor confunda un nuevo paquete con una retransmisión (dilema del\nreceptor). Por lo tanto, con 8 bits se puede representar entre 0 y 255, por lo que k corresponde\na 256 (diferentes valores posibles), entonces el tamaño de ventana máximo es 128.","atype":"oficial","sources":[],"id":"redesexamen_202102_p2c"},{"exam":"Febrero 2021","code":"2021-02","problema":"Pregunta 3 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"V1\nImagine que accede a su correo electrónico utilizando POP3.\n\na) Suponga que un cliente de correo POP desea descargar y luego eliminar los mensajes.\n      Complete la siguiente transacción entre el cliente y el servidor:\n                                           Página 4/17\n\n                                      Redes de Computadoras\n\n        C: list\n        S: 1 498\n        S: 2 912\n        S: .\n        C: retr 1\n        S: bla bla ...\n        S: ..........bla\n        S: .\n        ???","answer":"C:dele 1\nC:retr 2\nS:(blah blah …\nS:...........blah)\nS:.\nC:dele 2\nC:quit\nS:+OK POP3 server signing off","atype":"oficial","sources":[],"id":"redesexamen_202102_p3a"},{"exam":"Febrero 2021","code":"2021-02","problema":"Pregunta 3 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"V1\nImagine que accede a su correo electrónico utilizando POP3.\n\nb) Suponga que un cliente de correo POP desea descargar y guardar los mensajes.\n        Complete la siguiente transacción entre el cliente y el servidor:\n\n        C: list\n        S: 1 498\n        S: 2 912\n        S: .\n        C: retr 1\n        S: bla bla ...\n        S: ..........bla\n        S: .\n        ???","answer":"C:retr 2\nS:blah blah …\nS:...........blah\nS:.\nC:quit\nS:+OK POP3 server signing off","atype":"oficial","sources":[],"id":"redesexamen_202102_p3b"},{"exam":"Febrero 2021","code":"2021-02","problema":"Pregunta 3 (c)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"V1\nImagine que accede a su correo electrónico utilizando POP3.\n\nc) Suponga que luego de la transacción del apartado anterior el cliente se desconecta y\n        cinco minutos más tarde vuelve a acceder otra vez a POP. Suponga que en ese\n        intervalo de cinco minutos ha recibido un nuevo mensaje de correo que el cliente desea\n        recuperar. Proporcione una transcripción de esta segunda sesión de POP.","answer":"C: list\nS: 1 498\nS: 2 912\nS: 3 968\n                                           Página 5/17\n\n                                      Redes de Computadoras\nS: .\nC: retr 3\nS: bla bla ...\nS: ..........bla\nS: .\nC:quit\nS:+OK POP3 server signing off\n\nV2\nDada la jerarquía de DNS mostrada en la figura, y suponiendo que no existe información en el\ncache, indique, de forma detallada, todas las consultas realizadas por el DNS local para\nresolver el registro A del dominio gaia.umass.edu. El DNS local realiza las consultas de forma\niterativa.","atype":"oficial","sources":[],"id":"redesexamen_202102_p3c"},{"exam":"Febrero 2021","code":"2021-02","problema":"Pregunta 4 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"V1\nDada la máquina de estados de la figura, que representa un protocolo de transferencia\nconfiable, se pide:\n\na) Indique el comportamiento en caso de recibir un mensaje de datos corruptos y un mensaje\nde ACK/NACK corrupto.","answer":"Caso de mensaje de datos corrupto: el receptor envía un ACK del número de secuencia\nanterior.\nEn caso de mensaje ACK corrupto, el emisor no hace nada con el objetivo que se venza el\ntimer.","atype":"oficial","sources":[],"id":"redesexamen_202102_p4a"},{"exam":"Febrero 2021","code":"2021-02","problema":"Pregunta 4 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"V1\nDada la máquina de estados de la figura, que representa un protocolo de transferencia\nconfiable, se pide:\n\nb) Indique ventajas y desventajas del protocolo.","answer":"Página 10/17\n\n                                     Redes de Computadoras\nVentajas:\n  • Plantea una solución para un canal subyacente inseguro por pérdida de paquetes o\npaquetes corruptos.\n  • Introduce la idea del timer con un tiempo límite. El cuál debe ser calculado mediante\nprobabilidad de pérdida.\n\nDesventajas:\n  • Timers con límite de tiempo corto introducen duplicados de paquetes.\n  • Es un protocolo Stop-and-Wait. Es decir, mientras espera por paquetes ACK, no puede\nrecibir llamadas de la capa superior y por lo tanto no envía nuevos datos hasta asegurarse de\nque el paquete emitido llegó correctamente. No tiene buen rendimiento","atype":"oficial","sources":[],"id":"redesexamen_202102_p4b"},{"exam":"Febrero 2021","code":"2021-02","problema":"Pregunta 4 (c)","topic":"Capa de transporte","cat":"Capa de transporte","q":"V1\nDada la máquina de estados de la figura, que representa un protocolo de transferencia\nconfiable, se pide:\n\nc) ¿Este protocolo soporta pérdida de mensajes? Justifique\n                                           Página 6/17\n\n            Redes de Computadoras\n\nEMISOR:\n\nRECEPTOR:\n\n                 Página 7/17\n\n                                     Redes de Computadoras","answer":"Soporta, dado que en caso de pérdida de ACK, tiene un timer que implementa el reenvío el\ndato y el receptor lo reconocerá como ya recibido.","atype":"oficial","sources":[],"id":"redesexamen_202102_p4c"},{"exam":"Febrero 2021","code":"2021-02","problema":"Pregunta 5 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"V1\nSuponga una red que cuenta con tres sistemas autónomos AS1, AS2 y AS3 como se muestra\nen la figura.\n\na) Plantee un escenario donde se utilicen sesiones iBGP y eBGP.","answer":"function cliente ()\n  skt = socket.tcp()\n  skt = skt.connect('100.100.0.1', 8086)\n\n  act = '1!'\n  repeat\n    act, err = skt.send(act)\n  until act=='' or err=='closed'\n\n  If err==’closed’ then exit() end\n\n  buff = ''\n  repeat\n    r, err = skt.receive()\n    if not err then\n       buff = buff..r\n       l = buff.substr(1, 1).tonumber()\n       if buff.length()>=l+1 then\n          alerta = buff.substr(2, l+1)\n          desplegar_alerta(alerta)\n          buff = buff.substr(l+2, buff.length())\n                                                 Página 16/17\n\n                                       Redes de Computadoras\n      end\n   end\n until err=='closed'","atype":"oficial","sources":[],"id":"redesexamen_202102_p5a"},{"exam":"Febrero 2021","code":"2021-02","problema":"Pregunta 5 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"V1\nSuponga una red que cuenta con tres sistemas autónomos AS1, AS2 y AS3 como se muestra\nen la figura.\n\nb) De un ejemplo de selección de ruta donde el enrutamiento de la “papa caliente” decida\n        sobre dos rutas diferentes. Justifique.","answer":"clientes = set.new() -- almacenará los skts de los clientes activos\n\nfunction servidor ()\n  srv = socket.tcp()\n  srv.bind('100.100.0.1', 8086)\n  srv =srv.listen()\n\n while true do\n   skt = srv.accept()\n   new.thread(atiende_cliente, skt)\n end\n\nfunction atiende_cliente(skt)\n   msg = ''\n   repeat\n      r, err = skt.receive()\n      if err=='closed' then --cliente desconectó sin activarse\n         clientes.remove(skt)\n         return\n      end\n      msg=msg..r\n   until msg=='1!'          --activación completa\n   clientes.add(skt)\nend\n\nfunction nueva_alerta(s)\n   msg = chr(s.length()) .. s\n   for each cliente in clientes do --para cada cliente activo...\n    buff = msg\n    repeat                     --...enviamos todo msg\n       buff, err = cliente.send(buff)\n    until buff=='' or err=='closed'\n    if error=='closed' then\n       clientes.remove(cliente)\n    end\n   end\nend\n\n                                            Página 17/17","atype":"oficial","sources":[],"id":"redesexamen_202102_p5b"},{"exam":"Febrero 2021","code":"2021-02","problema":"Pregunta 5 (c)","topic":"Capa de transporte","cat":"Capa de transporte","q":"V1\nSuponga una red que cuenta con tres sistemas autónomos AS1, AS2 y AS3 como se muestra\nen la figura.\n\nc) Describa brevemente el funcionamiento de OSPF y compárelo con iBGP\nPara los ejemplos puede incluir la infraestructura que desee.","answer":"MAC origen     MAC destino IP origen      IP destino Desc\nMAC_PC_C FF:FF:FF:FF:FF:FF    --           --         ARP Req. se consulta MAC de 192.168.1.129\nMAC_R3_2 MAC_PC_C              --          --         ARP Resp. se responde MAC_R3_2\nMAC_PC_C MAC_R3_2           192.168.1.130 200.47.0.3 ICMP echo request\nMAC_R3_0 FF:FF:FF:FF:FF:FF    --           --          ARP Req. se consulta MAC de 192.168.1.197\nMAC_R1_1 MAC_R3_0              --          --         ARP Resp. se responde MAC_R1_1\nMAC_R3_0 MAC_R1_1          192.168.1.130 200.47.0.3       ICMP echo request\nMAC_R1_0 FF:FF:FF:FF:FF:FF --                 --         ARP Req. se consulta MAC de 200.47.0.3\nMAC_SERV MAC_R1_0            --                 --      ARP Resp. se responde MAC_SERV\nMAC_R1_0 MAC_SERV          200.47.0.1     200.47.0.3     ICMP echo request\n(observar que R1 hace NAT)\nMAC_SERV MAC_R1_0          200.47.0.3     200.47.0.1     ICMP echo reply\nMAC_R1_1 MAC_R3_0          200.47.0.3     192.168.1.130 ICMP echo reply\nMAC_R3_2 MAC_PC_C          200.47.0.3     192.168.1.130 ICMP echo reply\n\n                                          Parte 3 (30 puntos)\n\nSe desea implementar un sistema cliente-servidor para un servicio de mensajes de alerta en un\nlenguaje de alto nivel usando la API de sockets del curso. El servidor acepta conexiones TCP\nen la IP 100.100.0.1 en el puerto 8086.\nUn cliente al conectarse activará las alertas enviando el string “1!”, y luego no transmitirá más,\nsolo escuchará mensajes de alerta.\nUna vez establecida la conexión y activadas las alertas, el servidor enviará mensajes en el\nsiguiente formato:\nPrimero 1 byte indicando el largo de la alerta (llamémosle L), seguido de un string de L bytes\nconteniendo la alerta.\n\nSe pide:","atype":"oficial","sources":[],"id":"redesexamen_202102_p5c"},{"exam":"Julio 2021","code":"2021-07","problema":"Pregunta 1","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"V1\nSuponga que tiene una red con dos hosts A y B con direcciones IP IP_A e IP_B pero\n(debido a un error) ambos tienen la misma dirección MAC MAC_A. A y B pertenecen a\nla misma subred y están conectados a diferentes interfaces de un mismo conmutador\nde capa de enlace (switch).\nDescriba los problemas que pueden aparecer cuando los hosts A y B se conecten con otros\nhosts en la misma subred. Analice en particular la incidencia sobre las diferentes capas (2, 3 y\n4) y tenga en cuenta en su explicación el proceso de auto-aprendizaje (self-learning) de los\nconmutadores.","answer":"Cuando otro host quiera comunicarse con A (o B) ensamblará una trama con la dirección\nMAC_A y con IP_A (o IP_B). Dependiendo del estado de las tablas del switch (actualizadas\nmediante el auto-aprendizaje), el paquete será entregado a A o B, pero no a ambos (salvo en el\ncaso de borde cuando el switch no conoce a A o B inicialmente).\nPor consiguiente solamente uno de los hosts recibirá la trama, independientemente de si es el\ndestinatario de capa superior o no. La capacidad de auto-aprendizaje del switch hará que el\npuerto destino de la configuración cambie a lo largo del tiempo, en función de su\nimplementación y el tráfico generado desde A o B. Desde el punto de vista de capa 2, podrán\nhaber pérdidas de paquetes en ráfagas (considerando el emisor y receptor finales de la\ncomunicación).\nDesde el punto de vista de capa 3, los paquetes entregados correctamente serán procesados,\nmientras que los entregados al destinatario inválido, serán descartados, dado que en los\n\n                                   Redes de Computadoras\n\ncabezales de capa 3 las direcciones IP equivocadas serán descartadas y las esperadas serán\naceptadas. El clasificador de esta capa no confundirá tráfico. Desde el punto de vista de capa\n4, recibirá ráfagas de tráfico, y dependerá de éstas si es capaz de realizar su procesamiento o\nno. TCP podrá (o no) recuperarse en función del nivel de pérdidas, y UDP realizará su\nprocesamiento, dejando en manos de la aplicación la recuperación ante fallos.\n\nV2\na) ¿Para qué se utilizan las direcciones MAC? Describa el formato de las direcciones\nMAC de Ethernet, y escriba la dirección de broadcast.\nb) Suponga un switch de 8 puertos, con 8 hosts conectados directamente a él, formando una\nLAN. ¿Cuántos dominios de broadcast y cuantos de colisión existen en este escenario?\nJustifique.\nc) En el escenario anterior, suponga que un host envía un mensaje ARP Request. ¿Que hosts\nrecibirán el mismo?. ¿Cuántos responderán el mensaje?\n\nSOLUCION\na) Las direcciones de la capa de enlace se asignan a sus adaptadores (es decir, sus interfaces\nde red). En la mayoría de las redes LAN (incluyendo las redes Ethernet y las LAN inalámbricas\n802.11) la dirección MAC tiene 6 bytes de longitud, lo que nos da 248 posibles direcciones\nMAC. Suelen expresarse en notación hexadecimal, indicándose cada byte de la dirección\nmediante una pareja de números hexadecimales. La dirección de broadcast se escribe como\nFF:FF:FF:FF:FF:FF.\nb) Los switches trabajan en modo store and forward, generando un dominio de colisión para\ncada una de sus interfaces, de manera que tenemos entonces 8 en total para este escenario.\nEn cuanto a dominio de broadcast, solo tenemos uno, ya que una trama enviada a la dirección\nde destino de broadcast llegará a todos los host conectados a ese switch.\nc) El mensaje ARP Request es enviado a la dirección de broadcast MAC, de manera que por\ndefinición lo recibirán los 7 restantes host conectados a la red. Todos lo procesarán, pero solo\nuno de ellos responderá, el que tenga configurada la dirección IP por la que el origen consultó.","atype":"oficial","sources":[],"id":"redesexamen_202107_p1"},{"exam":"Julio 2021","code":"2021-07","problema":"Pregunta 2 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"V1\nEl protocolo TCP calcula un estimado del RTT (Round Trip Time) mediante la siguiente\nfórmula: RTT= (1-α) . RTTestimado + α . RTTmuestra.\n\n                                  Redes de Computadoras\n\na) Explique la razón por la que TCP necesita calcular un estimado del RTT.","answer":"Temporizador Se emplea para detectar el fin de temporización y retransmitir un\npaquete, posiblemente porque el paquete (o su mensaje ACK correspondiente) se ha\nperdido en el canal. Puesto que se puede producir un fin de temporización si un\npaquete está retardado pero no perdido (fin de temporización prematura), o si el\nreceptor ha recibido un paquete pero se ha perdido el correspondiente ACK del\nreceptor al emisor, puede ocurrir que el receptor reciba copias duplicadas de un\npaquete. Número de secuencia Se emplea para numerar secuencialmente los paquetes\nde datos que fluyen del emisor hacia el receptor. Los saltos en los números de\nsecuencia de los paquetes recibidos permiten al receptor detectar que se ha perdido un\npaquete. Los paquetes con números de secuencia duplicados permiten al receptor\ndetectar copias duplicadas de un paquete. Ventana El emisor puede estar restringido\npara enviar únicamente paquetes cuyo número de secuencia caiga dentro de un rango\ndeterminado. Permitiendo que se transmitan varios paquetes aunque no estén todavía\nreconocidos, se puede incrementar la tasa de utilización del emisor respecto al modo\nde operación de los protocolos de parada y espera. Veremos brevemente que el\ntamaño de la ventana se puede establecer basándose en la capacidad del receptor\npara recibir y almacenar en buffer los mensajes, o en el nivel de congestión de la red, o\nen ambos parámetros.","atype":"oficial","sources":[],"id":"redesexamen_202107_p2a"},{"exam":"Julio 2021","code":"2021-07","problema":"Pregunta 2 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"V1\nEl protocolo TCP calcula un estimado del RTT (Round Trip Time) mediante la siguiente\nfórmula: RTT= (1-α) . RTTestimado + α . RTTmuestra.\n\n                                  Redes de Computadoras\n\nb) Explique cada uno de los parámetros de la fórmula.","answer":"el tamaño de la ventana tiene que ser menor o igual que la mitad del tamaño del\nespacio de números de secuencia en los protocolos SR. Lo que motiva esa decisión es\nel dilema del receptor de los protocolos SR con ventanas demasiado grandes: ¿un\nnuevo paquete o una retransmisión?","atype":"oficial","sources":[],"id":"redesexamen_202107_p2b"},{"exam":"Julio 2021","code":"2021-07","problema":"Pregunta 3 (a)","topic":"Capa de enlace","cat":"Capa de enlace","q":"V1\n\na) Describa las principales funcionalidades del plano de control y el plano de datos de\nla capa de red.","answer":"En un algoritmo de estado de enlaces, la topología de la red y el coste de todos los enlaces\nson conocidos; es decir, están disponibles como entradas para el algoritmo LS mientras que en\nuno de vector de distancias solo necesita saber quienes son sus vecinos, los costos hacia ellos\ny sus vectores de distancia. Respecto a la información que se intercambia, los LS inundan con\nsu información local (vecinos, costos) mientras que los DV intercambian vectores de distancias.\nDados estos intercambios, los LS ejecutan algoritmos como el algoritmo de Dikjstra (que tiene\ncomo entrada la info de toda la red), mientras que uno DV se vale de las ecuaciones de\nBellman-Ford para calcular las rutas de costo mínimo. Finalmente, se puede comparar la\nvelocidad de convergencia de estos algoritmos. Un algoritmo de LS de O(n^2), requiere O(nE)\nmensajes (n nodos, E links) y puede tener oscilaciones, mientras que en un DV el tiempo de\nconvergencia varía y pueden contar con problemas como el de conteo a infinito.","atype":"oficial","sources":[],"id":"redesexamen_202107_p3a"},{"exam":"Julio 2021","code":"2021-07","problema":"Pregunta 3 (b)","topic":"Capa de red","cat":"Capa de red","q":"V1\n\nb) Considerando el protocolo OSPF, ¿Pertenece a alguno de estos planos? Justifique","answer":"Con el algoritmo de estado de enlaces, un router podría difundir un coste incorrecto para uno\nde sus enlaces conectados (pero no para los otros). Un nodo también podría corromper o\neliminar cualquier paquete recibido como parte de un mensaje de difusión LS. Pero, con el\nalgoritmo LS, un nodo solo calcula su propia tabla de reenvío, mientras que otros nodos\nrealizan cálculos similares por sí mismos. Esto significa que los cálculos de rutas son hasta\ncierto punto independientes en LS, proporcionando un mayor grado de robustez. Con el\n\n                                    Redes de Computadoras\n\nalgoritmo de vector de distancias, un nodo puede anunciar rutas de coste mínimo incorrectas a\nuno o a todos los destinos. En un sentido más general, observamos que, en cada iteración, los\ncálculos de un nodo con el algoritmo de vector de distancias se pasan a sus vecinos y luego,\nindirectamente, al vecino del vecino en la siguiente iteración. En este sentido, con el algoritmo\nde vector de distancias, un cálculo de nodo incorrecto puede difundirse a través de toda la red.","atype":"oficial","sources":[],"id":"redesexamen_202107_p3b"},{"exam":"Julio 2021","code":"2021-07","problema":"Pregunta 4","topic":"Capa de transporte","cat":"Capa de transporte","q":"V1\nConsidere la red de la figura.\n\nEl router permite configurarle reglas en su interfaz eth0 de manera de establecer qué paquetes\npueden entrar o salir del router a través de ella. Dichas reglas se pueden establecer\nespecificando condiciones a nivel de capa de red (direcciones IP origen y destino y, tipos y\nsubtipos de mensajes ICMP) y de capa de transporte (protocolos TCP y UDP y, puertos de\norigen y destino).\nLas reglas son de la siguiente forma (no es necesario configurar todos los campos):\nRegla entrante(saliente)/eth0\nIP origen:\nIP destino:\nTipo ICMP:\nSubtipo ICMP:\nProtocolo:\nPuerto/s origen:\nPuerto/s destino:\nEspecifique las reglas a configurar en la interfaz eth0 tanto para el tráfico entrante como para el\ntráfico saliente al router, de manera que se permita la ejecución del comando traceroute basado\nen UDP desde todo host de la red LAN dirigido a cualquier host en Internet. Cuando quiera\nespecificar la condición de “cualquiera” (IP o puerto) indíquelo con la palabra any.","answer":"Regla in/eth0\n\n                                   Redes de Computadoras\n\nIP origen: 150.200.100.0/24\nIP destino: any\nTipo ICMP: N/A\nSubtipo ICMP: N/A\nProtocolo: UDP\nPuerto/s origen: any “muy alto”\nPuerto/s destino: any “muy alto”\n\n“muy alto”: número de puerto que ofrece una muy alta probabilidad de que no\nresponda. Para fijar el concepto, mayor a 34000.\n\nReglas out/eth0\n\nIP origen: any\nIP destino: 150.200.100.0/24\nTipo ICMP: Time Exceeded (11)\nSubtipo ICMP: N/A\nProtocolo: N/A\nPuerto origen: N/A\nPuerto destino: N/A\n\nRegla out/eth0\n\nIP origen: any\nIP destino: 150.200.100.0/24\nTipo ICMP: Destination Unreachable (3)\nSubtipo ICMP: Port Unreachable (3)\nProtocolo: N/A\nPuerto origen: N/A\nPuerto destino: N/A\n\nV2\nConsidere la red de la figura.\n\n                                    Redes de Computadoras\n\nEl router permite configurarle reglas en su interfaz eth0 de manera de establecer qué paquetes\npueden entrar o salir del router a través de ella. Dichas reglas se pueden establecer\nespecificando condiciones a nivel de capa de red (direcciones IP origen y destino y, tipos y\nsubtipos de mensajes ICMP) y de capa de transporte (protocolos TCP y UDP y, puertos de\norigen y destino).\nLas reglas son de la siguiente forma (no es necesario configurar todos los campos):\nRegla entrante(saliente)/eth0\nIP origen:\nIP destino:\nTipo ICMP:\nSubtipo ICMP:\nProtocolo:\nPuerto/s origen:\nPuerto/s destino:\nEspecifique las reglas a configurar en la interfaz eth0 tanto para el tráfico entrante como para el\ntráfico saliente al router, de manera que se permita la ejecución del comando traceroute basado\nen ICMP desde todo host de la red LAN dirigido a cualquier host en Internet. Cuando quiera\nespecificar la condición de “cualquiera” (IP o puerto) indíquelo con la palabra any.\n\nSolución\n\nRegla in/eth0\n\nIP origen: 100.150.200.0/24\nIP destino: any\nTipo ICMP: Echo (8)\nSubtipo ICMP: N/A\nProtocolo: N/A\nPuerto/s origen: N/A\nPuerto/s destino: N/A\n\nReglas out/eth0\n\n                                Redes de Computadoras\n\nIP origen: any\nIP destino: 100.150.200.0/24\nTipo ICMP: Time Exceeded (11)\nSubtipo ICMP: N/A\nProtocolo: N/A\nPuerto origen: N/A\nPuerto destino: N/A\n\nRegla out/eth0\n\nIP origen: any\nIP destino: 100.150.200.0/24\nTipo ICMP: Echo Reply (0)\nSubtipo ICMP: N/A\nProtocolo: N/A\nPuerto origen: N/A\nPuerto destino: N/A","atype":"oficial","sources":[],"id":"redesexamen_202107_p4"},{"exam":"Julio 2021","code":"2021-07","problema":"Pregunta 5 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"V1\nSea el siguiente esquema de red:\n\n                                    Redes de Computadoras\n\na) Proponga direcciones IP para las interfaces Ethernet1/0 y Ethernet2/0 justificando su\nelección.","answer":"Los pasos seguidos para la obtener la URL solicitada tiene los siguientes pasos:\n    •  Obtención de la IP de www.b.com\n    •  Obtención del archivo video.mp4\n\nLa primera parte se resuelve de la siguiente forma:\nid   Protocolo      Host origen Host Destino observaciones\n     App.\n1    DNS            A1           Dns_local     Envia query de registro A de www.b.com\n2    DNS            Dns_local    Dns_root      Envia query de registro A de www.b.com\n3    DNS            Dns_root     Dns_local     Envia response de registro NS del TLD com (Dns_TLD)\n                                               con el correspondiente registro A\n4    DNS            Dns_local    Dns_TLD       Envia query de registro A de www.b.com\n5    DNS            Dns_TLD      Dns_local     Envia response de registro NS de autoritativo b.com\n\n                                       Redes de Computadoras\n\n                                                (Dns_b) con el correspondiente registro A\n\n6    DNS            Dns_local    Dns_b          Envia query de registro A www.b.com\n7    DNS            Dns_b        Dns_local      Envía response de registro A www.b.com (IP_wwwb)\n8    DNS            Dns_local    A1             Envía response de registro A www.b.com (IP_wwwb)\n\nAhora que contamos con la dirección IP de www.b.com, realizamos la solicitud del archivo video.mp4\n\nLa primera parte se resuelve de la siguiente forma:\nid   Protocolo      Host origen Host Destino observaciones\n     App.\n1    HTTP           A1           IP_wwwb        Envia solicitud de la página (previo existe conexión)\n                                                GET /video.mp4 HTTP/1.1\n                                                Además incluye parámetros como User-Agent, Host, etc\n2    HTTP           IP_wwwb      A1             Envia respuesta,\n                                                HTTP/1.1 200 OK\n                                                Content-Length: (tamaño archivo video.mp4)\n                                                se envía el contenido del archivo","atype":"oficial","sources":[],"id":"redesexamen_202107_p5a"},{"exam":"Julio 2021","code":"2021-07","problema":"Pregunta 5 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"V1\nSea el siguiente esquema de red:\n\n                                    Redes de Computadoras\n\nb) Indique la tabla de forwarding del router_ppal de forma que todos los equipos tengan acceso\na Internet. Explique cada entrada de la tabla.","answer":"Si la IP se encuentra en cache del servidorlocal, los pasos de la consulta DNS de parte a) numerados\ndel 2 al 7 no se realizan, dado que no debe realizar consulta para obtener la respuesta, porque ya tiene\nla respuesta.","atype":"oficial","sources":[],"id":"redesexamen_202107_p5b"},{"exam":"Diciembre 2021","code":"2021-12","problema":"Pregunta 1 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) Describa la arquitectura Cliente-Servidor, sus actores y sus principales características\n        ¿Quién es el actor que normalmente inicia las comunicaciones?","answer":"En una arquitectura cliente-servidor existe un host siempre activo, denominado servidor,\n      que da servicio a las solicitudes de muchos otros hosts, que son los clientes. Con la\n      arquitectura cliente-servidor, los clientes no se comunican directamente entre sí. Otra\n      característica de la arquitectura cliente-servidor es que el servidor tiene una dirección fija\n      y conocida, denominada dirección IP (de la que hablaremos enseguida). Puesto que el\n      servidor tiene una dirección fija y conocida, y siempre está activo, un cliente siempre\n      puede contactar con él enviando un paquete a su dirección IP.\n      La conexión siempre la inicia el cliente, ya que es el server el que tiene siempre una\n      dirección conocida y fija a la cual comunicarse, y no viceversa.","atype":"oficial","sources":[],"id":"redesexamen_202112_p1a"},{"exam":"Diciembre 2021","code":"2021-12","problema":"Pregunta 1 (b)","topic":"Redes (general)","cat":"Redes (general)","q":"b) Nombre y explique 2 desventajas respecto a la arquitectura P2P","answer":"Entre las desventajas mas destacadas tenemos: único punto de falla, la escalabilidad y\n      la performance (cuello de botella en el servidor).","atype":"oficial","sources":[],"id":"redesexamen_202112_p1b"},{"exam":"Diciembre 2021","code":"2021-12","problema":"Pregunta 1 (c)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"c) ¿Es posible utilizar DNS para mitigar alguna desventaja? Explique conceptualmente qué\n        utilizaría del DNS y ejemplifique, suponiendo que puede tener mas de un servidor y sus\n        servicio debe atender en pregunta1.redes.edu.uy.","answer":"El gran problema se da del lado del server, ya que ante situaciones de tráfico extremo se\n      convierte en el cuello de botella de la arquitectura. Para darle mayor robustez, podemos\n      tener mas servidores accesibles a través del FQDN pregunta1.redes.edu.uy. Lo que\n      utilizaremos es el tipo de RR CNAME, definiendo que servidorX.redes.edu.uy es un\n      CNAME de pregunta1.redes.edu.uy, y luego cada servidorX.redes.edu.uy será un RR\n      tipo A con su respectiva IP. Finalmente, dado que tendremos mas de un A relacionado a\n      pregunta1.redes.edu.uy el DNS hará un Round Robin entre las direcciones haciendo\n      que la carga se distribuya en todos los servidores y no solo en uno.","atype":"oficial","sources":[],"id":"redesexamen_202112_p1c"},{"exam":"Diciembre 2021","code":"2021-12","problema":"Pregunta 2 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"Considere un router (que no requiere el uso de NAT) con dos interfaces (eth0 y eth1). En una\nde ellas (eth0) se conecta una LAN y en la otra (eth1), el enlace WAN a Internet. Si se\n                                                                   Página 1/10\n\n                                     Redes de Computadoras\npretende configurar el router para permitir la ejecución sin restricciones de los comandos ping\ny traceroute desde cualquiera de las computadoras ubicadas en la red LAN:\n\na) Indique el detalle necesario (Protocolos, información de Capa de Enlace, de Capa de\n      Red, de Capa de Transporte y Carga Útil, según corresponda) del tráfico que habría que\n      permitir en la interfaz eth0 (discriminando por tráfico entrante y tráfico saliente a dicha\n      interfaz), para lograr el objetivo. Considere solamente los casos en que la ejecución de\n      los comandos generan resultados exitosos.","answer":"Para permitir el tráfico asociado al comando ping debemos tener presente que el mismo se\nimplementa mediante el protocolo ICMP.\nPara permitir el tráfico asociado al comando traceroute debemos tener presente que el mismo\nse puede implementar, según lo visto en el curso, mediante los protocolos ICMP y UDP.\n\nEn el caso del comando ping, los tipos de mensajes involucrados son:\n   •   Echo (request) – tipo 8\n   •   Echo Reply – tipo 0\n\nEn el caso del comando traceroute basado en ICMP, los tipos de mensaje involucrados son:\n   •   Echo (request) – tipo 8\n   •   Time Exceeded – tipo 11\n   •   Echo Reply – tipo 0\n\nEn el caso del comando traceroute basado en UDP, los mensajes involucrados son:\n   •   Segmento UDP con Puerto/s Destino muy alto/s y probabilidad muy baja de ser\n       utilizado/s (ejemplo: 33434) y Puerto/s Origen altos elegidos por el SO.\n   •   Destination Unreachable – Port Unreachable – tipo 3 – código 3\n   •   Time Exceeded – tipo 11\n\nPor lo tanto, en la interfaz eth0, se debe permitir el siguiente tráfico:\nentrante al router (IN),\nUnidades de datos que tengan las siguientes características\nCarga útil\n   •   ICMP Echo (request) – tipo 8\nCapa de Transporte\n   •   Segmento UDP con Puerto/s Destino muy alto/s y probabilidad muy baja de ser\n       utilizado/s (ejemplo: 33434) y Puerto/s Origen altos elegidos por el SO.\nCapa de Red\n   •   Las direcciones IP origen deben ser siempre pertenecientes al prefijo IP asignado a la\n       LAN.\n   •   Las direcciones IP destino pueden ser cualquiera, menos las pertenecientes al prefijo IP\n       asignado a la LAN.\nCapa de Enlace\nLa MAC origen debería ser alguna asignada a alguna tarjeta de red de alguna computadora\nconectada a la red LAN y la MAC destino, la de la interfaz eth0.\n\nsaliente del rou
