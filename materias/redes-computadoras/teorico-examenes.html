ter (OUT),\nUnidades de datos que tengan las siguientes características\n                                           Página 2/10\n\n                                      Redes de Computadoras\nCarga útil\n   •  ICMP Time Exceeded – tipo 11\n   •  ICMP Echo Reply – tipo 0\n   •  ICMP Destination Unreachable – Port Unreachable – tipo 3 – código 3\nCapa de Red\n   •  Las direcciones IP destino deben ser siempre pertenecientes al prefijo IP asignado a la\n      LAN.\n   •  Las direcciones IP origen pueden ser cualquiera, menos las pertenecientes al prefijo IP\n      asignado a la LAN.\nCapa de Enlace\n   •  La MAC origen debería ser la asignada a la interfaz eth0 y la MAC destino, la\n      correspondiente (vía ARP) a la dirección IP destino.","atype":"oficial","sources":[],"id":"redesexamen_202112_p2a"},{"exam":"Diciembre 2021","code":"2021-12","problema":"Pregunta 2 (b)","topic":"Capa de red","cat":"Capa de red","q":"Considere un router (que no requiere el uso de NAT) con dos interfaces (eth0 y eth1). En una\nde ellas (eth0) se conecta una LAN y en la otra (eth1), el enlace WAN a Internet. Si se\n                                                                   Página 1/10\n\n                                     Redes de Computadoras\npretende configurar el router para permitir la ejecución sin restricciones de los comandos ping\ny traceroute desde cualquiera de las computadoras ubicadas en la red LAN:\n\nb) ¿Se podría lograr el mismo efecto configurando exactamente lo mismo que en la\n      parte anterior (para la interfaz eth0), pero ahora en la interfaz eth1? Justifique\n      detalladamente.","answer":"Aplicando exactamente la misma configuración en la interfaz eth1 no se logra el mismo efecto.\nComo regla general hay que considerar que lo que era IN (entrante al router) en un caso,\ndeberá ser OUT (saliente del router) en el otro y viceversa; especial consideración se debe\ntener respecto a las direcciones MAC pues lo que tiene sentido a nivel de Capa de Enlace del\nlado de la red LAN no lo tiene del lado de la WAN (y viceversa).\nAdemás, se debe tener presente que si se aplica en la interfaz eth1, no estaremos\ncontemplando la posibilidad de realizar ping y traceroute desde la LAN a las interfaces del\nrouter.","atype":"oficial","sources":[],"id":"redesexamen_202112_p2b"},{"exam":"Diciembre 2021","code":"2021-12","problema":"Pregunta 3 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"a) ¿De que forma TCP infiere que existe congestión en la red? ¿Qué mecanismos utiliza TCP\npara ello?","answer":"TCP implementa un control de congestión sin notificación explícita, por eso se\nhabla de mecanismos que permiten inferir (o deducir) que está ocurriendo congestión.\nPara inferir la congestión se basa en la pérdida de paquetes.\nLos dos mecanismos provistos por TCP para este fin son:\n1) la recepción de tres ACKs duplicados, que indican que algunos paquetes se están perdiendo\npero no todos, por lo anto estaríamos ante una congestión leve.\n2) timeout, que indica congestión grave, ya que se estarían perdiendo muchos o todos los\npaquetes.","atype":"oficial","sources":[],"id":"redesexamen_202112_p3a"},{"exam":"Diciembre 2021","code":"2021-12","problema":"Pregunta 3 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) Luego de detectada la congestión, ¿cómo hace TCP para intentar disminuirla?","answer":"El objetivo es disminuir la tasa de transmisión, para esto lo que hace es reducir el tamaño de\nla ventana de congestión, de forma de disminuir el tamaño de la ventana de transmisión (la\ncantidad de paquetes que se pueden transmitir sin recibir un ACK)","atype":"oficial","sources":[],"id":"redesexamen_202112_p3b"},{"exam":"Diciembre 2021","code":"2021-12","problema":"Pregunta 3 (c)","topic":"Capa de transporte","cat":"Capa de transporte","q":"c) Explique en qué consiste la etapa del algoritmo de control de congestión de TCP conocida\ncomo ”arranque lento”, y cuándo termina.","answer":"En la etapa de arranque lento, la Ventana de Congestión del emisor se inicializa en 1 MSS, y\nse incrementa en 1 MSS por cada ACK recibido, lo que implica un crecimiento exponencial de\nla velocidad de trasmisión. Esta etapa finaliza cuando se alcanza el umbral de congestión, que\ndetermina el comienzo de la etapa de “evitado de la congestión”. El umbral queda definido por\nel valor Ventana de Congestión /2 cuando se produjo el evento de congestión anterior a la\netapa actual de arranque lento.\n\n                                           Página 3/10\n\n                                      Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_202112_p3c"},{"exam":"Diciembre 2021","code":"2021-12","problema":"Pregunta 4","topic":"Capa de enlace","cat":"Capa de enlace","q":"Considere la red de la figura donde se está ejecutando un algoritmo de Vector de Distancias y\nasuma que el mismo ya convergió.\n\na) Muestre los vectores de distancia de cada nodo.\nb) Proponga un cambio de costo de enlace para generar el problema de conteo a infinito.\nJustifique mostrando al menos 3 iteraciones del algoritmo y para al menos una iteración\nexplique claramente cómo se está aplicando Bellman-Ford.","answer":"a)Vector de A: A=0, B=9, C=14, D=8\nVector de B: A=9, B=0, C=7, D=1\nVector de C: A=14, B=7, C=0, D=6\nVector de D: A=8, B=1, C=6, D=0\n\nb) Se propone cambiar el costo del enlace C-D de 6 a 30.\nIteración 0\nEn C, antes del cambio teníamos la siguiente información\n    A    B    C    D\nC   14   7    0    6\nB   9    0    7    1\nD   8    1    6    0\n\nEn D, antes del cambio teníamos la siguiente información\n    A    B    C    D\nD   8    1    6    0\nA   0    9    14   8\nB   9    0    7    1\nC   14   7    0    6\n\nIteración 1\nAl detectar el cambio, C y D recalcularán sus vectores distancia.\nEn C,\nRecalcula su distancia a A como el mínimo entre ir por D (30) mas el costo informado por D (8)\no ir por B (20) mas el costo informado por B (9)\nRecalcula su distancia a B como el mínimo entre ir directo (20) o ir por D (30) mas el costo\ninformado por D (1)\n                                           Página 4/10\n\n                                      Redes de Computadoras\nRecalcula su distancia a D como el mínimo entre ir directo (30) o ir por B (20) mas el costo\ninformado por B (1)\n    A    B      C    D\nC   29   20     0    21\nB   9    0      7    1\nD   8    1      6    0\n\nEn D\nRecalcula su distancia a A como el mínimo entre ir directo (8), ir por B (1) mas el costo\ninformado por B (9) o ir por C (30) mas el costo informado por C (14)\nRecalcula su distancia a B como el mínimo entre ir directo (1) o ir por A (8) mas el costo\ninformado por A (9), o ir por C (30) mas el costo informado por C (7)\nRecalcula su distancia a C como el mínimo entre ir directo (30) o ir por A (8) mas el costo\ninformado por A (14), o ir por B (1) mas el costo informado por B (7)\nActualiza a 8\n    A    B      C    D\nD   8    1      8    0\nA   0    9      14   8\nB   9    0      7    1\nC   14   7      0    6\n\nIteración 2\nC y D intercambian sus nuevos vectores con sus vecinos.\nEn particular, llegan a B que recalcula su vector\n    A    B      C    D\nB   9    0      9    1\nC   29   20     0    21\nD   8    1      8    0\n\nB al actualizar su vector y lo envía a C y D\nIteración 3\nEn C, no cambia su vector.\nEn D, recalcula su distancia a C como el mínimo entre ir directo (30), ir por B (1) mas el costo\ninformado por B (9), o ir por A (8) mas el costo informado por A (14)\nActualiza a 10\n    A    B      C    D\nD   8    1      10   0\nA   0    9      14   8\nB   9    0      7    1\nC   14   7      0    6\n\nSe puede observar el problema de conteo a infinito, que terminará cuando B elija ir a C por en\nenlace directo con costo 20.\n\n                                               Página 5/10\n\n                                      Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_202112_p4"},{"exam":"Febrero 2022","code":"2022-02","problema":"Pregunta 1 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"Considere el formato de los datagramas IPv4.\n\na) ¿Por qué es necesario contar con un campo de Longitud de la cabecera (header length)?","answer":"Puesto que un datagrama IPv4 puede contener un número variable de opciones (las cuales\nse incluyen en la cabecera del datagrama IPv4), estos 4 bits son necesarios para determinar\ndónde comienzan realmente la carga útil (por ejemplo, el segmento de la capa de transporte\nencapsulado en este datagrama) del datagrama IP.","atype":"oficial","sources":[],"id":"redesexamen_202202_p1a"},{"exam":"Febrero 2022","code":"2022-02","problema":"Pregunta 1 (b)","topic":"Capa de red","cat":"Capa de red","q":"Considere el formato de los datagramas IPv4.\n\nb) ¿Qué función cumple y por qué es necesario el campo Tiempo de vida (ttl – time to live)?","answer":"El campo Tiempo de vida (TTL, Time-To-Live) se incluye con el fin de garantizar que los\ndatagramas no estarán eternamente en circulación a través de la red (debido, por\nejemplo, a un bucle de enrutamiento de larga duración). Este campo se decrementa en una\nunidad cada vez que un router procesa un datagrama. Si el campo TTL alcanza el valor 0, el\ndatagrama tiene que ser descartado por el router.","atype":"oficial","sources":[],"id":"redesexamen_202202_p1b"},{"exam":"Febrero 2022","code":"2022-02","problema":"Pregunta 2 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"a) ¿En qué capa se transporta el protocolo ARP?","answer":"Una conexión TCP está definida por la 4-tupla IP origen, puerto origen, IP destino, puerto\ndestino. Además de esto, en una conexión TCP se acuerda un número de secuencia para\ncada uno de los pares. Un segmento es aceptado por un receptor cuando pertenece a una\nconexión establecida, es decir la 4-tupla corresponde a una conexión establecida y además el\nnúmero de secuencia es válido (es decir, está dentro de la ventana de recepción en cuestión)","atype":"oficial","sources":[],"id":"redesexamen_202202_p2a"},{"exam":"Febrero 2022","code":"2022-02","problema":"Pregunta 2 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) Represente en un diagrama los encabezados (de ARP y la capa que lo transporta) y la\ncarga útil de un mensaje ARP Request.","answer":"La afirmación no es correcta. Para que el segmento en cuestión logre su efecto, lo primero\nes que sea aceptado por el destinatario. Si asumimos que el tercero se encuentra enviando el\nsegmento desde una computadora que, en el caso más general, está conectada a cualquier\nred, a una distancia en saltos y/o ASs, a priori desconocida entonces deberá considerar lo\nsiguiente:\n\n- Identificación de la conexión. Se debe disponer de toda la información que identifica\nunívocamente la conexión TCP, a saber: IP_Origen, IP_Destino, Puerto_Origen y Puerto\nDestino.\n\n- Número de Secuencia incluido en el segmento RST. El número de secuencia del segmento\nRST enviado debe ser válido para el receptor, o sea que debe estar dentro de la ventana de\nrecepción en cuestión.\n\n- Routing/forwarding al destino. En principio, nada asegura que el paquete IP que se origine\ndesde el tercero, con IP origen falsificada efectivamente alcance al otro peer. Aquí\nobservamos consideraciones a contemplar vinculadas al “forwarding/routing” en el camino\nentre el tercero y el destino.\n\nDe lograrse todo lo anterior, y dado que la especificación original de TCP indica que de ello\nocurrir, ningún otro segmento debe ser procesado y se debe proceder al cierre inmediato de la\nconexión TCP, se habría logrado el objetivo del tercero.\n\nComo complemento a la respuesta, pero aclarando que no es parte de lo exigido pues escapa\na los objetivos del curso, resulta de orden comentar que una gran cantidad de los problemas\n\nde seguridad que se sufren, se sustentan en decisiones de diseño tomadas en otros tiempos\ny para otras realidades. El buen uso de la flag RST es una gran herramienta al momento del\ndiseño, desarrollo y del troubleshooting, pero la vulnerabilidad intrínseca puesta de manifiesto\nen este ejemplo, ha hecho que la comunidad haya trabajado en diversos paliativos que\ndeberían complementar las consideraciones mencionadas a la hora de realizar un análisis o\ninvestigación más profunda y profesional. Para quienes estén interesados, la RFC 5961 es un\nbuen punto de partido ahondar en ello.","atype":"oficial","sources":[],"id":"redesexamen_202202_p2b"},{"exam":"Febrero 2022","code":"2022-02","problema":"Pregunta 2 (c)","topic":"Capa de red","cat":"Capa de red","q":"c) ¿En qué capa se transporta el protocolo ICMP?","answer":"Capa de Red","atype":"oficial","sources":[],"id":"redesexamen_202202_p2c"},{"exam":"Febrero 2022","code":"2022-02","problema":"Pregunta 2 (d)","topic":"Capa de red","cat":"Capa de red","q":"d) Represente en un diagrama los encabezados (de ICMP y la capa que lo transporta) y la\ncarga útil de un mensaje ICMP Echo Reply.","answer":"Se representan en el diagrama los campos más relevantes (no se incluye el encabezado\nde capa 2)\n\nPregunta 3 (12 puntos)","atype":"oficial","sources":[],"id":"redesexamen_202202_p2d"},{"exam":"Febrero 2022","code":"2022-02","problema":"Pregunta 4 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"A diferencia de IPv4, donde cada interfaz normalmente posee una única dirección de red, IPv6\nestá diseñado para tener tantas direcciones por interfaz como sea necesario.\n\na) Nombre las direcciones de red que debe implementar cada interfaz (sin ser la de loopback)\nde un host en IPv6","answer":"En IPv6 cada host debe implementar las siguientes:\n    • link local\n    • all-nodes(multicast)\n    • solicited-node\nb)En IPv6 cada router debe implementar las siguientes:\n    • todas las de un host\n    • anycast subnet-router\n    • multicast all routers","atype":"oficial","sources":[],"id":"redesexamen_202202_p4a"},{"exam":"Febrero 2022","code":"2022-02","problema":"Pregunta 4 (c)","topic":"Capa de red","cat":"Capa de red","q":"A diferencia de IPv4, donde cada interfaz normalmente posee una única dirección de red, IPv6\nestá diseñado para tener tantas direcciones por interfaz como sea necesario.\n\nc) Explique la utilidad del uso del EUI-64 y como es utilizado en IPv6","answer":"Para el protocolo SLAAC la dirección link-local se genera\nde acuerdo a:\n\n[fe80 (10 bits) + 0 (54 bits)] + interface ID (64 bits)\n\ncon el uso del EUI-64 se calcula el intefaceID, donde\nfundamentalmente se coloca ff:fe “al medio” de los 48 bits\nde la dirección mac","atype":"oficial","sources":[],"id":"redesexamen_202202_p4c"},{"exam":"Julio 2022","code":"2022-07","problema":"Pregunta 1 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"a) Muestre el formato de los mensajes consulta y respuesta de DNS y la utilidad de cada uno\nde sus campos. En particular, explique la utilidad de al menos 4 banderas (flags).","answer":"Ambos mensajes tienen el mismo formato. Este es:\n\n                                 Los primeros 12 bytes constituyen la sección de cabecera, la\n                                 cual contiene una serie de campos.\n                                 El primero de estos campos es un número de 16 bits que\n                                 identifica la consulta. Este identificador se copia en el\n                                 mensaje de respuesta a la consulta, lo que permite al cliente\n                                 establecer las correspondencias correctas entre las\n                                 respuestas recibidas y las consultas enviadas.\n                                 En el campo Flags se incluyen una serie de banderas. A\n                                 continuación se mencionan y describen las básicas.\n                                 Una flag consulta/respuesta (qr) de 1 bit informa si el\n                                 mensaje es una consulta (0) o una respuesta (1).\n                                 Una bandera autoritativa (aa) de 1 bit se activa en un\n                                 mensaje de respuesta cuando el servidor DNS que genera la\n                                 respuesta es un servidor autoritativo para el nombre\n                                 solicitado.\nLa bandera recursión-deseada (rd), también de 1 bit, se activa cuando un cliente (host o\nservidor DNS) desea que el servidor DNS realice una recursión cuando no disponga del\nregistro.\nEn un mensaje de respuesta, la flag de recursión-disponible (ra) de 1 bit se activa si el\nservidor DNS que responde soporta la recursión.\nEn la cabecera también se incluyen cuatro campos “número de” (#...), que indican el número\nde apariciones de los cuatro tipos de secciones de datos que siguen a la cabecera.\nEl resto de mensaje tiene por tanto un largo variable, pudiendo contener 4 campos distintos\n(cada uno de largo variable): consultas (questions), respuestas (answers), autoridad\n(authority) y información adicional (additional information).\nLa sección consultas (questions) contiene información acerca de la consulta que se va a\nrealizar. Esta sección incluye un campo de nombre que contiene el nombre que se va a\nconsultar y un\ncampo de tipo que especifica el tipo de cuestión que se plantea acerca del nombre; por\nejemplo, la\ndirección del host asociada con un nombre (tipo A) o el servidor de correo para un nombre\n(tipo\nMX).\nEn una respuesta de un servidor DNS, la sección respuestas (answers) contiene los\nregistros del recurso para el nombre que fue consultado originalmente. En cada registro de\nrecurso (RR) existe un parámetro Tipo (por ejemplo, A, NS, CNAME y MX), un parámetro\nValor y el parámetro TTL. Una respuesta puede devolver varios registros de recursos, ya que\nun nombre de host puede tener asociadas varias direcciones IP.\n\nLa sección autoridad (authority) contiene información autoritativa relacionada con la consulta\nrealizada.\nLa sección información adicional (additional information) contiene otros registros útiles.\nPor ejemplo, el campo de respuesta en un mensaje de respuesta a una consulta MX contiene\nun registro de recurso que proporciona el nombre de host canónico de un servidor de correo.\nEsta sección de información adicional contiene un registro de tipo A que proporciona la\ndirección IP para el nombre de host canónico del servidor de correo.","atype":"oficial","sources":[],"id":"redesexamen_202207_p1a"},{"exam":"Julio 2022","code":"2022-07","problema":"Pregunta 1 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"b) ¿Es posible que un mensaje de respuesta de DNS contenga sólo la cabecera? Justifique.","answer":"Si la consulta que motiva dicha respuesta está bien formada, no, no es posible, pues en la\nrespuesta siempre se incluye en la sección consultas (questions), la query realizada.","atype":"oficial","sources":[],"id":"redesexamen_202207_p1b"},{"exam":"Julio 2022","code":"2022-07","problema":"Pregunta 2 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"Suponga que hay dos programas, un emisor y un receptor, transfiriendo datos sobre Internet\nusando transporte TCP.\n\na) ¿Qué mecanismo entra en acción si el transmisor genera datos a una tasa mayor de la que\nla red es capaz de transportar? Describa brevemente el principio de funcionamiento del\nmecanismo.","answer":"Control de congestión. El mecanismo consiste en ajustar la cantidad de paquetes sin\nconfirmar que el emisor está permitido generar. Esta cantidad se ajusta respondiendo a\neventos que son interpretados como síntomas de congestión, tales como la llegada de ACKs\nduplicados o eventos de timeout. Mientras estos eventos no se dan, el emisor intenta\naumentar esta cantidad. Este ajuste se realiza controlando el tamaño de la ventana de\ncongestión, que luego tiene impacto en el tamaño de la ventana de transmisión.","atype":"oficial","sources":[],"id":"redesexamen_202207_p2a"},{"exam":"Julio 2022","code":"2022-07","problema":"Pregunta 2 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"Suponga que hay dos programas, un emisor y un receptor, transfiriendo datos sobre Internet\nusando transporte TCP.\n\nb) ¿Qué mecanismo entra en acción si el transmisor genera datos a una tasa mayor de la que\nel receptor es capaz de recibir? Describa brevemente el principio de funcionamiento del\nmecanismo.","answer":"Control de flujo. En ese mecanismo el receptor notifica al emisor de la cantidad de buffer\nlocal disponible, usando los mensajes ACK. Esto permite al emisor ajustar la emisión de datos\nde forma de no desbordar al receptor. Para esto ajusta la ventana de recepción del emisor con\nla cantidad máxima de datos que puede soportar el receptor.","atype":"oficial","sources":[],"id":"redesexamen_202207_p2b"},{"exam":"Julio 2022","code":"2022-07","problema":"Pregunta 3","topic":"Capa de red","cat":"Capa de red","q":"Indique y describa brevemente las dos funciones principales de la capa de red y como\nfuncionan en conjunto.","answer":"a) Reenvío (forwarding): mover paquetes entre puertos de entrada y salida del router.\nEnrutamiento (routing): determinar la ruta de los paquetes desde origen a destino. Para ello\nexisten los algoritmos de enrutamiento.\nInteracción: Cada router intercambia con sus pares, mediante al menos un protocolo de\nenrutamiento, información que se utiliza, en al menos un algoritmo de enrutamiento, para\npoblar sus tablas de forwarding. Dichas tablas, en su formato más básico contienen para un\nvalor de dirección contenido en la cabecera de los paquetes que llegan al router, el enlace de\nsalida. De esta forma, para cada paquete que arriba a un router por cualquiera de sus\n\ninterfaces, el router examina la tabla de forwarding (en el caso de IP a partir de la dirección IP\ndestino contenida en el encabezado IP) y a partir del “longest match” determina por qué\ninterfaz debe ser enviado (además de determinar cuál es el “next hop”, lo que determina en el\ncaso más genérico, la dirección destino de capa de enlace que deberá contener la trama que\nlo lleve a su próximo salto).","atype":"oficial","sources":[],"id":"redesexamen_202207_p3"},{"exam":"Julio 2022","code":"2022-07","problema":"Pregunta 4 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) Describa el algoritmo CSMA/CD de acceso al medio utilizado en Ethernet.","answer":"1. El adaptador de red obtiene un datagrama de la capa de red, prepara una trama de capa\nde enlace y la coloca en el buffer del adaptador.\n2. Si el adaptador detecta que el canal está inactivo (es decir, no hay señal de energía\nentrando al adaptador desde el canal), comienza a transmitir la trama. Si, por otro lado, el\nadaptador detecta que el canal está ocupado, espera hasta que detecta que no hay señal, y\nluego comienza a transmitir la trama.\n3. Mientras transmite, el adaptador monitoriza la presencia de energía de señales\nprovenientes de otros adaptadores que usan el canal de transmisión.\n4. Si el adaptador transmite la trama completa sin detectar señales de otros adaptadores, la\ntrasmisión de la trama se da por finalizada. Si, por el contrario, el adaptador detecta señales\nde otros adaptadores mientras transmite, aborta la transmisión (es decir, deja de transmitir su\ntrama).\n5. Después de parar la trasmisión, el adaptador espera una cantidad de tiempo aleatoria y\nluego regresa al paso 2.","atype":"oficial","sources":[],"id":"redesexamen_202207_p4a"},{"exam":"Julio 2022","code":"2022-07","problema":"Pregunta 4 (b)","topic":"Capa de enlace","cat":"Capa de enlace","q":"b) Describa el mecanismo de backoff exponencial binario ejecutado luego de una colisión.","answer":"La espera aleatoria se implementa mediante el algoritmo de backoff exponencial binario.\nCuando al transmitir una trama se experimentan n colisiones, el nodo elige un valor de K al\nazar entre {0, 1, 2, . . . . 2exp(n) - 1}. De este modo, cuantas más colisiones experimente una\ntrama, mayor será el intervalo desde el cual K es elegido. Para Ethernet, la cantidad real de\ntiempo que espera un nodo es K veces la cantidad de tiempo necesario para enviar 512 bits a\nEthernet) y n está topeado en 10.","atype":"oficial","sources":[],"id":"redesexamen_202207_p4b"},{"exam":"Diciembre 2022","code":"2022-12","problema":"Pregunta 1 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Suponga que conecta su computador personal a una red pública, en la que el router gateway\nestá en manos de un operador desconocido que puede usarlo para capturar (esnifear) el\ntráfico que pasa por el. Usted abre su navegador y escribe en la barra de URL:\nhttps://www.fing.edu.uy/docs/reporte.pdf\n\nResponda a las siguientes preguntas de forma justificada:\n\na) ¿El operador puede saber a qué servidor se conectó? ¿Cómo?","answer":"Si, ya sea interceptando la posible consulta DNS, o el three-way handshake del\nestablecimiento de la conexión TCP. Notar que se está usando HTTPS, por lo que no es\nposible obtener información del cabezal HTTP debido a que el request viaja encriptado.","atype":"oficial","sources":[],"id":"redesexamen_202212_p1a"},{"exam":"Diciembre 2022","code":"2022-12","problema":"Pregunta 1 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Suponga que conecta su computador personal a una red pública, en la que el router gateway\nestá en manos de un operador desconocido que puede usarlo para capturar (esnifear) el\ntráfico que pasa por el. Usted abre su navegador y escribe en la barra de URL:\nhttps://www.fing.edu.uy/docs/reporte.pdf\n\nResponda a las siguientes preguntas de forma justificada:\n\nb) ¿El operador sabe el protocolo que se usó durante la descarga? ¿Cómo?","answer":"No de menera determinante, aunque puede suponer que es HTTP si el puerto de la\nconexión TCP es el 80, así como inferir que está encriptado de alguna forma (por ejemplo\nHTTPS).","atype":"oficial","sources":[],"id":"redesexamen_202212_p1b"},{"exam":"Diciembre 2022","code":"2022-12","problema":"Pregunta 1 (c)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Suponga que conecta su computador personal a una red pública, en la que el router gateway\nestá en manos de un operador desconocido que puede usarlo para capturar (esnifear) el\ntráfico que pasa por el. Usted abre su navegador y escribe en la barra de URL:\nhttps://www.fing.edu.uy/docs/reporte.pdf\n\nResponda a las siguientes preguntas de forma justificada:\n\nc) ¿El operador tiene acceso al nombre del documento que descargó? ¿Cómo?","answer":"No, el nombre del documento es un parámetro de la operación GET y viaja encriptado\nporque el protocolo es HTTPS.","atype":"oficial","sources":[],"id":"redesexamen_202212_p1c"},{"exam":"Diciembre 2022","code":"2022-12","problema":"Pregunta 1 (d)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Suponga que conecta su computador personal a una red pública, en la que el router gateway\nestá en manos de un operador desconocido que puede usarlo para capturar (esnifear) el\ntráfico que pasa por el. Usted abre su navegador y escribe en la barra de URL:\nhttps://www.fing.edu.uy/docs/reporte.pdf\n\nResponda a las siguientes preguntas de forma justificada:\n\nd) ¿El operador tiene acceso al contenido del documento que descargó? ¿Cómo?","answer":"No, como el protocolo es HTTPS el response va encriptado.","atype":"oficial","sources":[],"id":"redesexamen_202212_p1d"},{"exam":"Diciembre 2022","code":"2022-12","problema":"Pregunta 1 (e)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Suponga que conecta su computador personal a una red pública, en la que el router gateway\nestá en manos de un operador desconocido que puede usarlo para capturar (esnifear) el\ntráfico que pasa por el. Usted abre su navegador y escribe en la barra de URL:\nhttps://www.fing.edu.uy/docs/reporte.pdf\n\nResponda a las siguientes preguntas de forma justificada:\n\ne) ¿El operador tiene acceso al tamaño aproximado del documento que descargó?\n     ¿Cómo?","answer":"Puede estimarlo midiendo la cantidad de bytes transmitidos desde el servidor al cliente. Es\nuna estimación porque el tamaño del cabezal HTTP es desconocido.","atype":"oficial","sources":[],"id":"redesexamen_202212_p1e"},{"exam":"Diciembre 2022","code":"2022-12","problema":"Pregunta 2 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"a) Dada una red de conmutación de paquetes, mencione y defina los 4 componentes\n      fundamentales del retardo que sufre un paquete que viaja por ella.","answer":"En los protocolos stop&wait se debe esperar el ACK del segmento actual para enviar un\nnuevo segmento. En los casos con grandes retardos de propagación (RTTs grandes), típico\nen enlaces de largas distancias (miles de km), este comportamiento es inaceptable, ya que\nimplica que el enlace está la mayor parte del tiempo vacío; en efecto, si despreciamos el\ntamaño (y por tanto el tiempo de trasmisión) de los ACKs, y consideramos solo los retardos de\npropagación, la tasa de utilización de un protocolo stop&wait se puede aproximar por\nUemisor=L/R/(RTT+L/R), es decir, el tiempo de trasmisión de un segmento dividido por el\ntiempo total que hay que esperar para volver a trasmitir un nuevo segmento. Por ejemplo para\nlos valores RTT=30ms, L=1000bytes (8000 bits), R=1Gbps, la tasa de utilización es de\n0,008ms/30,008ms=0,00027, es decir 0,27%, inadmisible.\nLos protocolos en pipeline, en cambio, admiten tener muchos segmentos “en viajes” sin que\nhayan llegado los ACKs correspondientes, lo cual permite llenar el canal y por lo tanto\naumentar la tasa de utilización.","atype":"oficial","sources":[],"id":"redesexamen_202212_p2a"},{"exam":"Diciembre 2022","code":"2022-12","problema":"Pregunta 2 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) Indique cuál/es de los retardos puede variar paquete a paquete, por qué y de qué\n      depende.","answer":"Los protocolos de tipo Go Back N funcionan de modo que si un segmento con número de\nsecuencia n se recibe correctamente y en orden (es decir, los últimos datos entregados a la\ncapa superior proceden de un segmento con el número de secuencia n-1), el receptor envía\nun ACK para el segmento n y entrega la parte de los datos del segmento a la capa superior.\nEn todos los restantes casos, el receptor descarta el segmento y reenvía un mensaje ACK\npara el segmento recibido en orden más recientemente, es decir, descarta los paquetes que\nno están en orden. La ventaja de este método es la simplicidad del almacenamiento en el\nbuffer del receptor (el receptor no necesita almacenar en el buffer ninguno de los segmentos\nentregados desordenados), sin embargo, si los segmentos no llegan en orden, se debe\ndescartar toda la “ventana” de segmentos recibidos, bajando la eficiencia del protocolo. En\nefecto, un único segmento erróneo podría hacer que el protocolo GBN retransmitiera una gran\ncantidad de segmentos, muchos de ellos de forma innecesaria.\n\nEn cambio, los protocolos de repetición selectiva evitan las retransmisiones innecesarias\nhaciendo que el emisor únicamente retransmita aquellos segmentos que se sospeche que\nllegaron al receptor con error (es decir, que se perdieron o estaban corrompidos). Esta\nretransmisión individualizada y necesaria requerirá que el receptor confirme individualmente\nqué paquetes ha recibido correctamente. Esta característica mejora la eficiencia del uso del\ncanal, pero la implementación es más compleja que GBN.","atype":"oficial","sources":[],"id":"redesexamen_202212_p2b"},{"exam":"Diciembre 2022","code":"2022-12","problema":"Pregunta 2 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"a) Cuando un paquete viaja de un nodo (host o router) al siguiente nodo (host o router) a lo\nlargo de esa ruta, el paquete sufre varios tipos de retardo en cada uno de los nodos de dicha\nruta. Los más importantes de estos retardos son: el retardo de procesamiento nodal, el\nretardo de cola, el retardo de transmisión y el retardo de propagación; todos estos\nretardos se suman para proporcionar el retardo nodal total.\n\nEl tiempo requerido para examinar la cabecera del paquete y determinar dónde hay que\nenviarlo es parte del retardo de procesamiento. El retardo de procesamiento puede también\nincluir otros factores, como el tiempo necesario para comprobar los errores de nivel de bit del\npaquete que se hayan producido al transmitir los bits del paquete desde el nodo situado aguas\narriba hasta el siguiente router.\n\nEn la cola, el paquete experimenta un retardo de cola mientras espera para ser transmitido a\ntravés del enlace. La duración del retardo de cola para un determinado paquete dependerá del\nnúmero de paquetes que hayan llegado antes a la cola y que estén esperando para ser\ntransmitidos por el enlace.\n\nSea la longitud del paquete igual a L bits y la velocidad de transmisión del enlace del router\nA hasta el router B igual a R bits/segundo. El retardo de transmisión será igual a L/R. Este es\nel tiempo necesario para introducir (es decir, transmitir) todos los bits del paquete en el\nenlace.\n\nUna vez que un bit ha entrado en el enlace, tiene que propagarse hasta el próximo router. El\ntiempo necesario para propagarse desde el principio del enlace hasta el router B es el retardo\nde propagación.\nEl retardo de propagación es igual a la distancia entre dos routers dividida por la velocidad de\npropagación. Es decir, el retardo de propagación es igual a d/s, donde d es la distancia entre\nun router y el router siguiente, y s es la velocidad de propagación del enlace.","answer":"En los protocolos stop&wait se debe esperar el ACK del segmento actual para enviar un\nnuevo segmento. En los casos con grandes retardos de propagación (RTTs grandes), típico\nen enlaces de largas distancias (miles de km), este comportamiento es inaceptable, ya que\nimplica que el enlace está la mayor parte del tiempo vacío; en efecto, si despreciamos el\ntamaño (y por tanto el tiempo de trasmisión) de los ACKs, y consideramos solo los retardos de\npropagación, la tasa de utilización de un protocolo stop&wait se puede aproximar por\nUemisor=L/R/(RTT+L/R), es decir, el tiempo de trasmisión de un segmento dividido por el\ntiempo total que hay que esperar para volver a trasmitir un nuevo segmento. Por ejemplo para\nlos valores RTT=30ms, L=1000bytes (8000 bits), R=1Gbps, la tasa de utilización es de\n0,008ms/30,008ms=0,00027, es decir 0,27%, inadmisible.\nLos protocolos en pipeline, en cambio, admiten tener muchos segmentos “en viajes” sin que\nhayan llegado los ACKs correspondientes, lo cual permite llenar el canal y por lo tanto\naumentar la tasa de utilización.","atype":"oficial","sources":[],"id":"redesexamen_202212_p2ax"},{"exam":"Diciembre 2022","code":"2022-12","problema":"Pregunta 2 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) El retardo de cola.\nPor ejemplo, si llegan 10 paquetes a una cola vacía al mismo tiempo, el primer paquete\ntransmitido no sufrirá retardo de cola, mientras que el último paquete transmitido sufrirá un\nretardo de cola relativamente largo (mientras espera a que los restantes nueve paquetes sean\ntransmitidos).\nDepende de la velocidad a la que llega el tráfico a la cola, de la velocidad de transmisión\ndel enlace y de la naturaleza del tráfico entrante, es decir, de si el tráfico llega periódicamente\no a ráfagas.\n\nSi el tamaño de los paquetes varía, se puede considerar que el retardo de transmisión varía\nentre los paquetes de distinto tamaño. Sin embargo, esta variación es determinista y solo\ndepende del tamaño del paquete, no del estado “desconocido” de la red.","answer":"Los protocolos de tipo Go Back N funcionan de modo que si un segmento con número de\nsecuencia n se recibe correctamente y en orden (es decir, los últimos datos entregados a la\ncapa superior proceden de un segmento con el número de secuencia n-1), el receptor envía\nun ACK para el segmento n y entrega la parte de los datos del segmento a la capa superior.\nEn todos los restantes casos, el receptor descarta el segmento y reenvía un mensaje ACK\npara el segmento recibido en orden más recientemente, es decir, descarta los paquetes que\nno están en orden. La ventaja de este método es la simplicidad del almacenamiento en el\nbuffer del receptor (el receptor no necesita almacenar en el buffer ninguno de los segmentos\nentregados desordenados), sin embargo, si los segmentos no llegan en orden, se debe\ndescartar toda la “ventana” de segmentos recibidos, bajando la eficiencia del protocolo. En\nefecto, un único segmento erróneo podría hacer que el protocolo GBN retransmitiera una gran\ncantidad de segmentos, muchos de ellos de forma innecesaria.\n\nEn cambio, los protocolos de repetición selectiva evitan las retransmisiones innecesarias\nhaciendo que el emisor únicamente retransmita aquellos segmentos que se sospeche que\nllegaron al receptor con error (es decir, que se perdieron o estaban corrompidos). Esta\nretransmisión individualizada y necesaria requerirá que el receptor confirme individualmente\nqué paquetes ha recibido correctamente. Esta característica mejora la eficiencia del uso del\ncanal, pero la implementación es más compleja que GBN.","atype":"oficial","sources":[],"id":"redesexamen_202212_p2bx"},{"exam":"Febrero 2023","code":"2023-02","problema":"Pregunta 1 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"a) Considere el protocolo HTTP en su versión 1.1.\n      i. Muestre y explique el formato general de un mensaje de respuesta HTTP.\n      ii. ¿Como hace el receptor del mensaje para diferenciar cada campo de la cabecera?\n      iii. ¿Como hace el receptor del mensaje para diferenciar la cabecera del mensaje del cuerpo?\n      iv. ¿Es necesario para el receptor conocer el final del mensaje? Justifique, y si la respuesta es\n           afirmativa explique como lo hace.","answer":"i) El mensaje consta de una línea de estado, donde se indica si la respuesta es correcta o si hay algún\nerror. Esta línea consta de tres campos: versión, código estado y frase que explica el código.\nLuego sigue la cabecera, que consta de varias líneas. Cada línea corresponde a un campo que se\nidentifica con el nombre del campo y le sigue el valor.\nPor último, se tiene el cuerpo del mensaje, que es el que contiene el objeto solicitado.\n\nii) Cada línea de la cabecera representa un campo con el formato nombre<SP>valor, donde <SP> es\nel caracater de espacio. Cada línea se separa de la siguiente con los códigos <CR> (retorno de carro)\ny <LF> (salto de línea).\n\niii) Lo hace mediante una línea que solo incluye los códigos de control <CR> (retorno de carro) y <LF>\n(salto de línea).\n\niv) Dado que HTTP viaja sobre TCP y en TCP no existe el concepto de mensaje o datagrama que nos\npermita delimitar un mensaje, entonces es necesario para el receptor determinar en que parte del\nstream de datos finaliza un mensaje y comienza otro.\nPara esto, en HTTP1.1 se incluye un campo de Content length, que indica el largo del cuerpo del\nmensaje. De esta forma, el receptor sabe cuantos datos leer del stream que corresponden al mensaje.","atype":"oficial","sources":[],"id":"redesexamen_202302_p1a"},{"exam":"Febrero 2023","code":"2023-02","problema":"Pregunta 1 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"b) Considere ahora el protocolo SMTP:\n      i. Compare ambos protocolos en relación a su objetivo, las entidades que participan, quien\n           inicia la conexión y el formato de datos en los mensajes.\n      ii. ¿Es necesario para el receptor conocer el final del mensaje? Justifique y si la respuesta es\n           afirmativa explique como lo hace.","answer":"i) Ambos protocolos tienen el mismo objetivo, transferir información (p.e. archivos) de un host a otro\n\n                                         Redes de Computadoras\n\nhost. En el caso de HTTP la transferencia es entre un host cliente y un host servidor mientras que en\nSMTP, además del intercambio cliente servidor (p.e. thunderbird) también ocurre entre dos servidores\nde correo (relay). Una diferencia importante es que en el caso de HTTP, el cliente que desea obtener\nun archivo del servidor, inicia la conexión y solicita el archivo. En cambio, en SMTP, es la entidad que\ntiene el archivo quien inicia la conexión y envía el archivo a la otra entidad. En cuanto al formato de los\nmensajes, SMTP requiere que cada mensaje, incluyendo el cuerpo, esté en formato ASCII de 7 bits\nmientas que HTTP no impone esta restricción.\n\nii) Si es necesario, por la misma razón dada para HTTP. Sin embargo, en este caso el final del\nmensaje se identifca con una línea con un caractar especial, el punto.","atype":"oficial","sources":[],"id":"redesexamen_202302_p1b"},{"exam":"Febrero 2023","code":"2023-02","problema":"Pregunta 2 (a)","topic":"Capa de red","cat":"Capa de red","q":"Considere el algoritmo Path MTU Discovery en IPv6.\n\na) Fundamente la necesidad del mismo.","answer":"Los routers no realizan fragmentación en IPv6, por lo que, si un PDU de IPv6 excede el MTU es\ndescartado. Es importante para cualquier par de entidades que se comuniquen, asegurarse que sus\nmensajes lleguen a destino, y para ello, sus mensajes no deben exceder el mínimo MTU del camino\npor el que transitan.","atype":"oficial","sources":[],"id":"redesexamen_202302_p2a"},{"exam":"Febrero 2023","code":"2023-02","problema":"Pregunta 2 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"Considere el algoritmo Path MTU Discovery en IPv6.\n\nb) Fundamente por qué no es un requerimiento en IPv4.","answer":"La definición de IPv4 involucra que, cuando segmentos de determinado flujo arriban a un enlace con\nun MTU inferior, se realiza fragmentación y reensamblado en dicho enlace, sin que las entidades\norigen y destino de la comunicación eventualmente lleguen a enterarse. Los extremos de la\ncomunicación pueden ignorar el mínimo MTU del camino, pues, los routers intermedios lo resuelven.","atype":"oficial","sources":[],"id":"redesexamen_202302_p2b"},{"exam":"Febrero 2023","code":"2023-02","problema":"Pregunta 3 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) Explique el concepto de enrutamiento jerárquico, y señale dos razones por las cuales es\n      necesario en Internet.","answer":"Dada una red o conjunto de redes de gran escala como la Internet, el enrutamiento jerárquico\nconsiste en dividir la o las redes en distintas zonas que implementan un enrutamiento detallado,\ninterconectadas entre sí para lograr encaminar tráfico entre distintas zonas; cada host o router conoce\nen detalle su zona (vecindario), pero solo un resumen del resto de la/las redes. Este mecanismo es\nnecesario en Internet por su escala, que hace inviable que todos los nodos de la red ejecuten un\nmismo protocolo de enrutamiento, y por la autonomía administrativa de distintas zonas de la red. EN\nel caso inter-dominio estas zonas se denominan Sistemas Autónomos, y en el caso intra-domnio,\nestas zonas se denominan áreas de enrutamiento.","atype":"oficial","sources":[],"id":"redesexamen_202302_p3a"},{"exam":"Febrero 2023","code":"2023-02","problema":"Pregunta 3 (b)","topic":"Capa de red","cat":"Capa de red","q":"b) Mencione y explique brevemente el funcionamiento de los protocolos de enrutamiento que\n      implementan este concepto a nivel inter-dominio e intra-dominio.","answer":"A nivel inter-dominio, el protocolo utilizado en Internet es el Border Gateway Protocol (BGP), que\nimplementa el concepto de Sistemas Autónomos, identificados por su Número de Sistema Autónomo\n(ASN). BGP es un protocolo de tipo “path-vector”, similar a los protocolos “distance-vector”, donde la\nmétrica habitual es la longitud medida en cantidad de Ases entre un origen y un destino (prefijos de\nred); a esta métrica se le denomina “AS_PATH lenght”. BGP incorpora el concepto de “policy routing”,\nque implica que cada Sistema Autónomo puede modificar los atributos asociados a la alcanzabilidad\nde los prefijos de red, de forma de favorecer determinado objetivo administrativo.\n\nA nivel intra-dominio, un protocolo que implementa el enrutamiento jerárquico es Open Shortest Path\n\n                                       Redes de Computadoras\n\nFirst (OSPF). Un sistema autónomo que usa OSPF se puede configurar jerárquicamente en áreas.\nCada área ejecuta su propio algoritmo de enrutamiento de estado de enlace OSPF, con cada\nenrutador en un área transmitiendo su estado de enlace a todos los demás enrutadores en esa área.\nDentro de cada área, uno o más enrutadores de borde de área son responsables de enrutar paquetes\nfuera del área. El esquema jerárquico se completa con un área configurada para ser el “backbone”,\ncuyo cometido es encaminar el tráfico entre las otras áreas en el AS. El backbone siempre contiene\ntodos los enrutadores de borde de área en el AS y puede contener otros enrutadores también. El\nencaminamiento de un paquete entre áreas dentro del AS requiere que el paquete sea primero\nenrutado a un enrutador de borde de área (enrutamiento dentro del área), luego enrutado a través del\nbackbone al enrutador de borde de área que está en el área de destino, y luego enrutado al destino\nfinal.","atype":"oficial","sources":[],"id":"redesexamen_202302_p3b"},{"exam":"Febrero 2023","code":"2023-02","problema":"Pregunta 4 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"a) ¿Cómo percibe un emisor TCP que existe congestión en la ruta entre él mismo y el destino?","answer":"Un “suceso de pérdida” en un emisor TCP como el hecho de que se produzca un fin de\ntemporización o se reciban tres paquetes ACK duplicados procedentes del receptor.","atype":"oficial","sources":[],"id":"redesexamen_202302_p4a"},{"exam":"Febrero 2023","code":"2023-02","problema":"Pregunta 4 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) Mencione los tres principios del mecanismo de control de congestión de TCP.","answer":"- Un segmento perdido implica congestión y, por tanto, la velocidad del emisor TCP debe reducirse\ncuando se pierde un segmento.\n- Un segmento que ha sido reconocido indica que la red está entregando los segmentos del emisor al\nreceptor y, por tanto, la velocidad de transmisión del emisor puede incrementarse cuando llega un\npaquete ACK correspondiente a un segmento que todavía no había sido reconocido. La llegada de\npaquetes de reconocimiento se interpreta como una indicación implícita de que todo funciona bien.\nLuego se puede aumentar el tamaño de la ventana de congestión.\n- Tanteo del ancho de banda. Puesto que los paquetes ACK indican que la ruta entre el origen y el\ndestino está libre de congestión y la pérdida de paquetes indica que hay una ruta congestionada, la\nestrategia de TCP para ajustar su velocidad de transmisión consiste en incrementar su velocidad en\nrespuesta a la llegada de paquetes ACK hasta que se produce una pérdida, momento en el que reduce\nla velocidad de transmisión. El emisor TCP incrementa entonces su velocidad de transmisión para\ntantear la velocidad a la que de nuevo aparece congestión, retrocede a partir de ese punto y comienza\nde nuevo a tantear para ver si ha variado la velocidad a la que comienza de nuevo a producirse\ncongestión.","atype":"oficial","sources":[],"id":"redesexamen_202302_p4b"},{"exam":"Febrero 2023","code":"2023-02","problema":"Pregunta 4 (c)","topic":"Capa de transporte","cat":"Capa de transporte","q":"c) Considere el algoritmo de control de congestión de TCP. En la fase de Evitación de la\n      Congestión, si MSS es igual a 1.260 bytes y VentCongestion es igual a 12.600 bytes, ¿Cuántos\n      segmentos se enviarán en 1 RTT? Justifique su respuesta.","answer":"Si MSS es igual a 1.260 bytes y VentCongestion es igual a 12.600 bytes, entonces se enviarán 10\nsegmentos en un RTT.","atype":"oficial","sources":[],"id":"redesexamen_202302_p4c"},{"exam":"Febrero 2023","code":"2023-02","problema":"Pregunta 5 (a)","topic":"Capa de enlace","cat":"Capa de enlace","q":"a) Describa las modificaciones que introduce a nivel de los cabezales de capa 2.","answer":"El protocolo 802.1Q involucra una redefinición del cabezal Ethernet, que introduce cuatro bytes\nadicionales luego de las direcciones MAC src y dst:\n\n                                        Redes de Computadoras\n\nde los 32bits adicionales, se reservan 12 para identificar VLANs.","atype":"oficial","sources":[],"id":"redesexamen_202302_p5a"},{"exam":"Febrero 2023","code":"2023-02","problema":"Pregunta 5 (b)","topic":"Capa de red","cat":"Capa de red","q":"b) Explique cómo se combina este tráfico en los switches con el tráfico Ethernet original que no\n       utiliza ese etiquetado.","answer":"A nivel de los switches se distinguen puertos a los que se pueden conectar dispositivos que\nmanipulan los cabezales extendidos y son capaces de intercambiar tráfico que incluye TAGS de los\npuertos en los que se conectan equipos que desconocen del uso de tags. Estos puertos, los que\nreciben tráfico sin tags se conocen como UNTAGGED PORTS y realizan la tarea de etiquetar tráfico al\ningreso y quitar el tag al momento de forwardear el paquete hacia el host. Los puertos por los que se\ntransmiten tramas extendidas se conocen tomo TRUNK PORTS. Cabe mencionar que la distinción es\nadministrativa, y no hay diferencias físicas en los puertos.\n\n                                       Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_202302_p5b"},{"exam":"Julio 2023","code":"2023-07","problema":"Pregunta 1 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"a) Se pretende configurar un nuevo dominio de DNS, con nombre redes202307.net. Si el\n        servidor que será el autoritativo para dicho dominio tiene la dirección IP 192.5.6.31 y el nombre\n        ns.redes202307.net, indique qué registros se deben configurar y en qué servidor/es para\n        activar la delegación de su administración.","answer":"Tanto en el servidor con IP 192.5.6.31 (por ser el autoritativo para dicha zona) como en los\nservidores autoritativos de la zona “net” (para realizar la delegación de la administración), se debe\nconfigurar lo siguiente:\n        redes202307.net               IN      NS      ns.redes202307.net\nformato libro: (redes202307.net, ns.redes202307.net, NS)\n        ns.redes202307.net            IN      A       192.5.6.31\nformato libro: (ns.redes202307.net, 192.5.6.31, A)","atype":"oficial","sources":[],"id":"redesexamen_202307_p1a"},{"exam":"Julio 2023","code":"2023-07","problema":"Pregunta 1 (b)","topic":"Capa de red","cat":"Capa de red","q":"b) Si se desea disponer también de la administración del dominio redes202307.net.uy\n        también en el servidor con IP 192.5.6.31, ¿es necesario realizar alguna configuración\n        adicional?","answer":"Sí, se debe configurar en la zona redes202307.net.uy del servidor 192.5.6.31 así como también en\nlos servidores autoritativos de la zona “net.uy” (para realizar la delegación de la administración)\n        redes202307.net.uy            IN      NS      ns.redes202307.net.uy\n        ns.redes202307.net.uy IN              A       192.5.6.31\nVale formato libro","atype":"oficial","sources":[],"id":"redesexamen_202307_p1b"},{"exam":"Julio 2023","code":"2023-07","problema":"Pregunta 1 (c)","topic":"Capa de red","cat":"Capa de red","q":"c) Se configurará un único servidor web asociado a los nombres www.redes202307.net y\n        www.redes202307.net.uy, el que tendrá la dirección IP 192.5.6.32. ¿Qué registro/s hay que\n        agregar y dónde para que el mismo sea alcanzable desde cualquier sitio de Internet?","answer":"Se debe agregar en la zona redes202307.net\n        www.redes202307.net           IN      A       192.5.6.32\ny en la zona redes202307.net.uy\n        www.redes202307.net.uy                IN      A       192.5.6.32\nVale formato libro\n\n                                                                   Página 1/13\n\n                                             Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_202307_p1c"},{"exam":"Julio 2023","code":"2023-07","problema":"Pregunta 2","topic":"Capa de transporte","cat":"Capa de transporte","q":"Al utilizar UDP es posible enviar mensajes de Broadcast simplemente indicando la dirección IP\ncorrespondiente. Sin embargo, en TCP no existe el concepto de Broadcast. Explique la razón,\nindicando que conceptos de la implementación de TCP son incompatibles con este tipo de servicio.","answer":"TCP es orientado a conexión, y depende de variables de estado que describen la configuración propia\n(p.ej. números de secuencia) y del otro extremo de la conexión (p.ej. último ACK recibido). Estas\nvariables se usan para implementar los servicios de TCP tales como entrega confiable y control de\nflujo. Estas variable son transmitidas en los segmentos TCP en campos dedicados. Resumiendo:\n- El protocolo TCP no tiene previsto la posibilidad de que haya más de dos participantes en una\nconexión.\n- TCP depende de un establecimiento de conexión para inicializar el estado de los terminales antes de\nempezar a transmitir datos\n- La implementación de los servicios TCP dependen de conocer el estado de los nodos participantes,\nlo que entra en contradicción con la idea de enviarles a todos incluso sin saber a quiénes.","atype":"oficial","sources":[],"id":"redesexamen_202307_p2"},{"exam":"Julio 2023","code":"2023-07","problema":"Pregunta 3 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) ¿Cómo se codifican y representan las direcciones de capa 2 (MAC) y las de la capa 3 (IPv4 e IPv6)?","answer":"Las direcciones MAC son de tamaño 48 bits, y se representan en una secuencia de 6 pares de números\nhexadecimales separados por dos puntos (:). Un ejemplo es 1A:2F:BB:76:09:AD\n\nLas IP son en caso de IPv4 32 bits y se representan con cuatro cifras entre 0 y 255 (representación de un byte),\nseparados por punto (.). Un ejemplo es 200.36.12.25\n\nPor último IPv6 son direcciones con tamaño de 128 bits. Se representan en hexadecimal, agrupado de a 4\ndígitos y separados por :. Un ejemplo es 2001:0db8:85a3:0000:0000:8a2e:0370:7334, también notada como\n2001:db8:85a3::8a2e:370:7334","atype":"oficial","sources":[],"id":"redesexamen_202307_p3a"},{"exam":"Julio 2023","code":"2023-07","problema":"Pregunta 3 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"b) ¿Qué instituciones asignan los valores de las direcciones en ambos casos?","answer":"La asignación de direcciones MAC es administrada por IEEE. Por lo tanto, los fabricantes compran porciones\ndel espacio de direcciones MAC (asegurando su unicidad). La dirección se compone de dos elementos, OUI\n(Organizationallly Unique Identifier) , que son los tres primeros octeto s(company_id) y los restantes 3 octetos\nadministrados por las compañía.\n\nLas direcciones IP para dispositivos conectados a Internet tiene la exigencia que ésta dirección IP debe ser única\npara toda la Red.\nLas direcciones son entregadas por bloques a los IPS que distribuyen entre sus clentes. Los bloques son\nadministrados por ICANN: Internet Corporation for Assigned Names and Numbers, que tiene entre otras\nexigencias reparto de direcciones, manejo del DNS y asignación de nombres de dominios. Además se encarga\nde resolver disputas.\n\nAsimismo hay organismos que se encargan de gestionar dichas asignaciones regionalmente. Estas\norganizaciones son Arin, Ripe, Apnic, Lacnic y Afrinic.","atype":"oficial","sources":[],"id":"redesexamen_202307_p3b"},{"exam":"Julio 2023","code":"2023-07","problema":"Pregunta 3 (c)","topic":"Capa de red","cat":"Capa de red","q":"c) ¿Porqué se dice que las direcciones de capa 3 son jerárquicas?","answer":"Las direcciones de capa 3 se denominan jerárquicas, por tener en la dirección una componente que\nrepresenta la subred a la que pertenece y otra que identifica el host dentro de la subred. Los primeros bits indican\nla subred y los últimos indican el elemento en la subred.\n\nEl direccionamiento jeráquico permite ser más eficiente en la publicación de la información de ruteo, dado que\npermite agregar las redes y publicar menos información.\n\n                                                  Página 2/13\n\n                                         Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_202307_p3c"},{"exam":"Julio 2023","code":"2023-07","problema":"Pregunta 4 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) Describa el atributo AS_PATH de BGP, y explique su utilidad en:\n       i) enrutamiento inter-dominio (eBGP)\n       ii) enrutamiento intra-dominio (iBGP)","answer":"El atributo AS_PATH contiene los números de AS (ASNs) a través de los cuales se ha transmitido el\nanuncio de un determinado prefijo. Cuando un router recibe un anuncio de un prefijo desde un vecino\nBGP externo, agrega su ASN al AS_PATH antes de difundirlo a otros vecinos BGP.\ni) En eBGP, si un router recibe un anuncio de prefijo que contiene su propio ASN en el atributo\nAS_PATH, sabe que existe un ciclo y debe descartar el anuncio.\nii) En iBGP, el AS_PATH no se puede usar para detectar ciclos dentro del AS, ya que el ASN no cambia\nen este caso.\nEn ambos casos, el largo del atributo AS_PATH se utiliza como métrica en el proceso de decisión de\nBGP","atype":"oficial","sources":[],"id":"redesexamen_202307_p4a"},{"exam":"Julio 2023","code":"2023-07","problema":"Pregunta 4 (b)","topic":"Capa de red","cat":"Capa de red","q":"b) Considere un ISP que tiene dos proveedores de nivel superior con los que mantiene sesiones BGP.\nEl ISP en cuestión gestiona el prefijo 22.22.0.0/23; ¿cómo debe anunciarlo por BGP a sus proveedores\npara intentar lograr balanceo de carga y tolerancia a fallos ante la caída de un enlace?","answer":"Se debe anunciar:\nEn el primer enlace\n22.22.0.0/24 → se prefiere que el tráfico hacia la mitad “baja” del prefijo completo venga por este\nenlace\n22.22.0.0/23 → respaldo\n\nEn el segundo enlace\n22.22.0.1/24 → se prefiere que el tráfico hacia la mitad “alta” del prefijo completo venga por este\nenlace\n22.22.0.0/23 → respaldo","atype":"oficial","sources":[],"id":"redesexamen_202307_p4b"},{"exam":"Julio 2023","code":"2023-07","problema":"Pregunta 5","topic":"Capa de red","cat":"Capa de red","q":"Explique en qué consiste el problema de conteo a infinito en protocolos de enrutamiento de vector\ndistancia. Comente posibles técnicas para mitigar este problema.","answer":"El problema del conteo infinito se genera por el propio mecanismo utilizado por los protocolos vector-\ndistancia, ya que si bien los nodos reciben los vectores-distancias de sus vecinos, que ellos luego\nutilizan para re-calcular el propio, no tienen conocimiento de si alguno de esos costos corresponden a\ncaminos que pasan por ellos y por ende es posible que se generen bucles de enrutamiento. Cuando\nuno tiene visión global de la red es un problema sencillo de detectar y evitar, pero en los algoritmos\nvector-distancia solo se maneja información parcial.\n\nEl horizonte dividido (split-horizon) es uno de los métodos utilizados por los protocolos de enrutamiento\nde vector de distancia para evitar bucles de enrutamiento. El principio es simple: un enrutador no\nanunciará una ruta de regreso a la interfaz desde la cual se aprendió.\n\n                                              Página 3/13\n\n                                       Redes de Computadoras\nOtro método para solucionar éste problema es la reversa envenenada (route poisoning) donde se\nrealiza una modificación del algoritmo de vector distancia, evitando que un nodo informe a su vecino\nsobre la distancia que conoce hasta el nodo X cuando la trayectoria hacia X pasa a través de ese nodo\nvecino. Lo que realiza es informar que dicha distancia es infinito.\n\n                                            Página 4/13\n\n                                   Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_202307_p5"},{"exam":"Julio 2011","code":"2011-07","problema":"Pregunta 1 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"a) Describa someramente el principio de funcionamiento del protocolo FTP.","answer":"FTP: File Transfer Protocol. Protocolo que permite la transferencia de archivo/s desde/hacia un host\n        remoto. Se ajusta al modelo cliente/servidor. El cliente es quién inicia la conexión para que ocurra la\n        transferencia. El servidor es el host remoto. Está documentado en la RFC 959. Utiliza TCP como protocolo\n        de transporte. El handshake que ocurre ente el cliente y el servidor permite que primero se establezca una\n        conexión de control (utilizada para autorización y comandos) desde el cliente al puerto 21 del servidor.\n        Cuando quien oficia de servidor recibe un comando de transferencia de archivo, establece otra conexión\n        con el cliente; ésta será con el puerto 20 del servidor.\n        No se requiere la descripción del modo pasivo.","atype":"oficial","sources":[],"id":"redesexamen_201107_p1a"},{"exam":"Julio 2011","code":"2011-07","problema":"Pregunta 1 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"b) Justifique por qué se dice que FTP envía la información de control en modalidad *fuera de banda* (out-of-\n       band).","answer":"Porque los comandos son enviados por una conexión separada de la conexión de datos.","atype":"oficial","sources":[],"id":"redesexamen_201107_p1b"},{"exam":"Julio 2011","code":"2011-07","problema":"Pregunta 2 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) ¿Qué es un Sistema Autónomo (Autonomous System, AS)?","answer":"AS es un concepto vinculado al enrutamiento jerárquico. Si podemos decir que Internet es una “red de\n        redes” y se pretende que en la gestión de ellas mantenga un orden, debemos identificar redes con\n        autonomía administrativa para el conjunto de dispositivos que la componen, y en particular para los\n        protocolos de enrutamiento configurados en ella. Por lo tanto podemos decir que un AS es *una\n        agrupación de routers con una administración común*.","atype":"oficial","sources":[],"id":"redesexamen_201107_p2a"},{"exam":"Julio 2011","code":"2011-07","problema":"Pregunta 2 (b)","topic":"Capa de red","cat":"Capa de red","q":"b) Explique los conceptos Interior Gateway Protocols (IGP) y Exterior Gateway Protocols (EGP)\n       vinculándolos con el concepto explicado en la parte a) y brinde un ejemplo de cada uno.","answer":"Interior Gateway Protocols (IGP): protocolos de enrutamiento que “corren” dentro de un AS (routing\n        intra-AS); ejemplos: RIP y OSPF. Exterior Gateway Protocols (EGP): protocolos de enrutamiento que\n        “corren” entre ASs (routing inter-AS); ejemplo: BGP.","atype":"oficial","sources":[],"id":"redesexamen_201107_p2b"},{"exam":"Julio 2011","code":"2011-07","problema":"Pregunta 2 (c)","topic":"Capa de red","cat":"Capa de red","q":"c) Describa brevemente el uso que hace BGP (Border Gateway Protocol) del atributo AS-PATH y realice un\n       ejemplo sencillo que lo muestre en acción.","answer":"El atributo AS-PATH contiene la lista de ASs que ha atravesado la publicación de un prefijo. Cuando un\n        prefijo es pasado a un AS, éste agrega su ASNumber al atributo. Este atributo tiene dos usos\n                                                   Página 1/8\n\n                   Introducción a las Redes de Computador{ae}s y Comunicación de Datos\n        fundamentales: evitado de loops en las publicaciones (si un AS se encuentra a sí mismo en el AS-PATH)\n        y, si es tenido en cuenta en el proceso de selección de ruta y cuando se lo considere (existen otros\n        atributos), se seleccionará aquella que tenga el AS-PATH más corto. Ejemplo: Figura 4.41 del libro.\n        Suponiendo que el prefijo 138.16.64/24 es publicado por el AS2 al AS1, si AS1 lo publica al AS3, lo hará\n        con AS-PATH valiendo AS2 AS1.","atype":"oficial","sources":[],"id":"redesexamen_201107_p2c"},{"exam":"Julio 2011","code":"2011-07","problema":"Pregunta 4","topic":"Capa de transporte","cat":"Capa de transporte","q":"Si todos los enlaces de Internet tuvieran que proporcionar un servicio de entrega de tramas fiable, ¿sería el servicio\nde entrega fiable de TCP redundante?¿Por qué?","answer":"No, no seria redundante ya que aun así se pueden perder paquetes por congestión en las colas de los routers o\npueden llegar en desorden a causa de diversidad de caminos en un flujo.","atype":"oficial","sources":[],"id":"redesexamen_201107_p4"},{"exam":"Julio 2012","code":"2012-07","problema":"Pregunta 1","topic":"Capa de red","cat":"Capa de red","q":"(a) ¿Cuál es el objetivo principal de la capa de enlace?","answer":"La capa de enclace de datos tiene la responsabilidad de transferir datagramas desde un nodo a\notro adyacente, a través de un link.\n\n    (b) Determinados protocolos hacen uso de un único canal de broadast compartido, lo que lleva a que dos o\n        más transmisiones simultáneas generen colisiones. Detalle el protocolo de acceso múltiple CSMA/CD.\n        Respuesta: Capitulo 5, slide 12 del material del curso.","atype":"oficial","sources":[],"id":"redesexamen_201207_p1"},{"exam":"Julio 2012","code":"2012-07","problema":"Pregunta 2","topic":"Capa de transporte","cat":"Capa de transporte","q":"(a) El camino por el que es enrutado un paquete IPv4 a través de Internet, ¿puede ser fijado de antemano?\n        Justifique.","answer":"El protocolo IP enruta usando la direccion IP de destino que viene en el paquete (también IP\n        permite hacerlo por la IP de origen), y ese enrutamiento es realizado en cada router que atrviesa el paquete\n        hasta su destino. De esta forma, el protocolo IP toma la decisión de ruteo en cada hop de la red, de manera\n        que no hay forma de decirle al paquete cuál es el camino que debe seguir para llegar al end-system destino\n        (ni tampoco como retornar). Es por esta propiedad que las redes IP son típicamente llamadas redes de\n        conmutacion de paquetes, en contraste a las redes de conmutación de circuitos, en las cuales sí es posible\n        prefijar y reservar un camino y recursos por los cuales será siempre enrutado un flujo para los mismos end-\n        system que son origen y destino de la comunicación.\n\n    (b) ¿En qué campo/s del encabezado IP se basa el enrutamiento en IPv4?\n        Respuesta: El campo utilizado por el protocolo para conocer cuál será el next-hop al cual entregar el\n        paquete es el campo Destination IP (también IP permite hacerlo por la IP de origen) que tiene 32 bits.\n\n    (c) Describa la relación entre la MTU del enlace y la fragmentación IP, mencionando los campos del\n        encabezado IP definidos para este fin.\n        Respuesta: El protocolo IPv4 permite la fragmentación de un paquete, de manera que el paquete pueda ser\n        transmitido por la capa de enlace. Esta fragmentación además, depende de los enlaces por los que atraviesa\n        el paquete hasta el destino, ya que podrían existir distintos tipos de capas de enlaces con diferentes\n        tamaños de MTU. En consecuencia, el protocolo IP divide el paquete en unidades que sean menores a la\n        MTU del segmento a atravesar, indicando en cada uno de ellos que es un paquete fragmentado, cuál es el\n        offset de esos datos dentro del paquete original y por último, indicando si existen o no mas fragmentos a\n        re-ensamblar para volver a armar el paquete original. IPv4 prevee también en el encabezado que el nodo\n        origen pueda decir que el paquete no sea fragmentado en absoluto aún cuando no pueda ser transmitido por\n        el enlace sin ser fragmentado. Cada uno de los campos y su uso está descrito en detalle en el material del\n        curso del capítulo 4 de la capa 3 clase 1 en la slide 12.\n                                                      Página 1/6\n\n                  Introducción a las Redes de Computador{ae}s y Comunicación de Datos","atype":"oficial","sources":[],"id":"redesexamen_201207_p2"},{"exam":"Julio 2012","code":"2012-07","problema":"Pregunta 3 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"a) NS","answer":"Registro utilizado para definir el nombre del servidor de nombres autoritativo de una zona.\n       Ejemplo:          irc.fing.edu.uy         IN      NS              dns.irc.fing.edu.uy","atype":"oficial","sources":[],"id":"redesexamen_201207_p3a"},{"exam":"Julio 2012","code":"2012-07","problema":"Pregunta 3 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"b) A","answer":"Registro utilizado para asociar una dirección IPv4 a un nombre\n        Ejemplo:         dns.irc.fing.edu.uy      IN     A             164.73.128.6","atype":"oficial","sources":[],"id":"redesexamen_201207_p3b"},{"exam":"Julio 2012","code":"2012-07","problema":"Pregunta 3 (c)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"c) MX","answer":"Registro utilizado para indicar los servidores que están dispuestos a recibir los correos electrónicos\n        destinados a determinado dominio de correo\n        Ejemplo:         irc.fing.edu.uy          IN      MX               10 mail.irc.fing.edu.uy","atype":"oficial","sources":[],"id":"redesexamen_201207_p3c"},{"exam":"Julio 2012","code":"2012-07","problema":"Pregunta 3 (d)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"d) AAAA","answer":"Registro utilizado para asociar una dirección IPv6 a un nombre\n        Ejemplo:         dns.irc.fing.edu.uy      IN     AAAA          fdda:5cc1:23:4::1f\n        En los ejemplos brindados no se incluye el TTL","atype":"oficial","sources":[],"id":"redesexamen_201207_p3d"},{"exam":"Julio 2012","code":"2012-07","problema":"Pregunta 4","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Describa el principio de funcionamiento de las Redes de Distribución de Contenido (CDN por su sigla en inglés).","answer":"Una arquitectura muy genérica de cómo se implementa el servicio asociado a las CDN comprende un\nproveedor de contenido y nodos y servidores de la propia CDN (en general las CDNs brindan servicio a varios\nproveedores de contenido). El proveedor de contenido define qué objetos de todo su contenido estarán disponibles\nmediante la CDN y los carga en ella; primero en algún nodo de distribución, lo que luego se replica a los servidores\ndistribuidos en la red.\nEl principio de funcionamiento es el siguiente:\nSi al proveedor de contenido lo identificamos como www.pdc.com y a la CDN como www.cdn.com, cuando el\ncliente, desde su navegador, solicita el contenido, por ejemplo, de la página\nwww.pdc.com/sports/london2012.html, en el HTML de la misma encontrará referencias del estilo\nhttp://www.cdn.com/www.pdc.com/sports/london2012/survival­muse.mpg. Ello hará que el\nnavegador requiera de una consulta DNS para determinar la dirección IP asociada a www.cdn.com; el servidor\nautoritativo correspondiente (el de la CDN) le responderá con la dirección IP del servidor de contenido más\n“cercano” en la red. En un tercer paso, el navegador solicitará a dicha IP el recurso\nhttp://www.cdn.com/www.pdc.com/sports/london2012/survival­muse.mpg.","atype":"oficial","sources":[],"id":"redesexamen_201207_p4"},{"exam":"Julio 2012","code":"2012-07","problema":"Pregunta 5","topic":"Capa de transporte","cat":"Capa de transporte","q":"Suponga que en un futuro no muy lejano, su computadora se encuentra conectada a Internet y está descargando\narchivos .ogg utilizando algún sistema para compartir archivos entre pares (p.e. Kazaa, BitTorrent, etc.). El cuello\nde botella en Internet es su enlace de acceso residencial: 512kbps, full-duplex, simétrico. Mientras está\ndescargando los archivos que le interesan, otros diez usuarios empiezan, de repente, a cargar archivos .mp3 desde\nsu computador. Asumiendo que su computador es muy potente y que el trabajo adicional es imperceptible (CPU,\ndisco, etc.) ¿harán las cargas simultáneas que se enlentezcan sus descargas? Fundamente.","answer":"Cuando 10 clientes arrancan las transferencias, saturan el ancho de banda de subida de la conexión. Los\npaquetes de las subidas (cargas) compiten con los ACK de las descargas, y dado que saturan el enlace, algunos se\npierden. Esos ACKs que no llegan, fuerzan re-transmisiones por parte del emisor. Esas re-transmisiones son\nconsideradas congestión por el stack en el emisor, y por ende baja la velocidad de transmisión de nuestro flujo,\nenlenteciendo nuestra descarga.\n\n                                                     Página 2/6\n\n                  Introducción a las Redes de Computador{ae}s y Comunicación de Datos\n                                                 1.Problemas Prácticos","atype":"oficial","sources":[],"id":"redesexamen_201207_p5"},{"exam":"Febrero 2013","code":"2013-02","problema":"Pregunta 1 (a)","topic":"Capa de red","cat":"Capa de red","q":"Suponga que debido a un error usted tiene una red con dos hosts A y B con direcciones IP IP_A e IP_B pero con la\nmisma dirección MAC MAC_A. A y B pertenecen a la misma subred y están conectadas al mismo hub.\n\na) Describa los problemas que pueden aparecer cuando los hosts A y B se conecten con otros hosts en la\n        misma subred. Analice en particular la incidencia sobre el protocolo ARP.","answer":"Dado que a nivel de capa de red las direcciones son diferentes, las tablas de ARP de los\nhosts tendrán dos entradas con la misma MAC para direcciones IP diferentes, no habrá\nproblemas. Como el hub entregará TODOS los paquetes a TODOS los hosts, no se filtrará tráfico\nen la red; cuando el clasificador de paquetes de la tarjeta de red reciba paquetes con la\nMAC_A y entregue a la capa superior, se realizará la clasificación relativa a la capa de red\ncorrespondiente al host A o B, descartándose los paquetes que recibe A y correspondían a B o\nviceversa. Por lo tanto, otros hosts que se comuniquen con A o B no tendrán problemas.\nUn problema podría ser que, debido a la cantidad de tráfico que reciba uno de los hosts, el\notro recibirá una cantidad equivalente de interrupciones, pudiendo generar impacto en su\ndesempeño. Todo lo de más funcionará bien, siempre que los protocolos no tengan en cuenta la\ninformación de capa de enlace.\nPodrá haber problemas con características como autoconfiguración a nivel de IPv6.","atype":"oficial","sources":[],"id":"redesexamen_201302_p1a"},{"exam":"Febrero 2013","code":"2013-02","problema":"Pregunta 1 (b)","topic":"Capa de red","cat":"Capa de red","q":"Suponga que debido a un error usted tiene una red con dos hosts A y B con direcciones IP IP_A e IP_B pero con la\nmisma dirección MAC MAC_A. A y B pertenecen a la misma subred y están conectadas al mismo hub.\n\nb) Suponga ahora que las máquinas anteriores son colocadas en dos segmentos de red independientes, con dos\n        routers intermedios y direcciones IP coherentes con la nueva topología. Describa el intercambio de tramas\n        y paquetes que ocurrirá cuando el host A envía un paquete al host B.\n\nNota: A y B están conectadas en subredes Ethernet, y los enlaces entre routers son de otra tecnología con\ndirecciones de capa de enlace conocidas. Asuma que las tablas de ARP están inicialmente vacías.","answer":"Dado que los dominios de colisiones son totalmente independientes y que la información de\ncapa de enlace queda circunscripta al mismo, todo funcionará adecuadamente.\nEn detalle:\nCuando A quiera enviar un paquete a B, verá que pertenece a otra subred, y por lo tanto\nenviará el paquete al gateway de su subred; para ello deberá descubrir su dirección MAC\n(utilizando ARP), y una vez que la conozca, puede enviar el paquete al gateway (contenido en\nuna trama con destino la MAC del mismo). El gateway verá que el paquete es destinado a otra\nsubred, y se lo enviará al gateway de la otra subred, utilizando las direcciones de capa de\nenlace conocidas (por ejemplo, circuitos virtuales de ATM). Cuando el paquete sea recibido por\nel segundo gateway, deberá descubrir la dirección MAC de B (utilizando ARP), para enviar\nfinalmente el paquete a B, contenido en una trama con destino MAC_B==MAC_A).\n\n                                                   Página 1/8\n\n                 Introducción a las Redes de Computador{ae}s y Comunicación de Datos","atype":"oficial","sources":[],"id":"redesexamen_201302_p1b"},{"exam":"Febrero 2013","code":"2013-02","problema":"Pregunta 2 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Describa los siguientes componentes de la arquitectura de IP móvil:\n\na) Home Network, Home Agent, Foreign Agent, Correspondent node, Mobile Node, Home Address, Care-of-\n       Address, Mobile Node, Visited Network.","answer":"Ver transparencias 6-3 y 6-4 de http://eva.fing.edu.uy/mod/resource/view.php?id=6527 (Clase\n2 de Redes Inalámbricas y Móviles).","atype":"oficial","sources":[],"id":"redesexamen_201302_p2a"},{"exam":"Febrero 2013","code":"2013-02","problema":"Pregunta 2 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Describa los siguientes componentes de la arquitectura de IP móvil:\n\nb) Explique en que consiste el “routing triangular” en esta arquitectura, que problemas introduce, y proponga","answer":"Ver transparencias 6-8 a 6-13 http://eva.fing.edu.uy/mod/resource/view.php?id=6527 (Clase 2\nde Redes Inalámbricas y Móviles).","atype":"oficial","sources":[],"id":"redesexamen_201302_p2b"},{"exam":"Febrero 2013","code":"2013-02","problema":"Pregunta 3","topic":"Redes (general)","cat":"Redes (general)","q":"Dada la red que se muestra en la figura, muestre la ejecución\n                                                detallada paso a paso del algoritmo Link-State en el nodo u hasta\n                                                su convergencia.\n\n                                                Utilice una tabla que muestre:\n                                                    •    Paso de la iteración\n                                                    •    Red considerada: (N')\n                                                    •    Distancia al nodo n, predecesor para el nodo n: D(n),p(n).","answer":"Sección 4.5.1 del libro, Tabla 4.3 y Figura 4.28.","atype":"oficial","sources":[],"id":"redesexamen_201302_p3"},{"exam":"Febrero 2013","code":"2013-02","problema":"Pregunta 4 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) Explique el concepto de longest prefix-match utilizado para el proceso de forwarding.","answer":"“Longest prefix-match” es un algoritmo utilizado para seleccionar una entrada en la\n        tabla de forwarding. Dado que una dirección destino puede coincidir (“match”) más de\n        una entrada en la tabla, se denomina “longest prefix-match” a la entrada más\n        específica, es decir, la que coincide con más bits de la máscara de subred.","atype":"oficial","sources":[],"id":"redesexamen_201302_p4a"},{"exam":"Febrero 2013","code":"2013-02","problema":"Pregunta 4 (b)","topic":"Capa de red","cat":"Capa de red","q":"b) Dadas estas entradas en una tabla de forwarding:\n\n                            Prefijo               Gateway          Interfaz\n                            10.10.10.0/25         1.1.1.1         if0\n                            10.10.10.0/24         2.2.2.2         if1\n                            0.0.0.0/0             3.3.3.3         if2\n\n        ¿Por qué interfaz será enviado un paquete con destino 10.10.10.129?","answer":"10.10.10.129 “matchea” con 10.10.10.0/24, pero no con 10.10.10.0/25 (que representa\n        direcciones desde 10.10.10.0 a 10.10.10.127), por lo tanto el paquete será enviado por\n        la interfaz if1.","atype":"oficial","sources":[],"id":"redesexamen_201302_p4b"},{"exam":"Febrero 2013","code":"2013-02","problema":"Pregunta 5 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) Mencione ventajas y desventajas de la traducción NAT64, en la que clientes IPv6 se comunican con un\n        dispositivo que realiza la traducción a I
