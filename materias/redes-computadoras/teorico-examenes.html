i de los costos intermedios del camino.\nEsto genera que un nodo pueda calcular sus costos con información desactualizada y propagar\nesta información a sus vecinos.\nEn este contexto, imaginemos el caso de la figura.\n\n         60\n                   y\n            4             1\n        x                     z\n                   50\nAntes del cambio de costo, Y le había informado a Z que alcanza a X con costo 4 y Z le había\ninformado a Y que alcanza a X con costo 5.\nCuando el nodo Y detecta un aumento del costo de uno de sus enlaces, informa a sus vecinos su\nnuevo vector de distancias donde alcanza a X con costo 6 (por Z). X no puede saber que el\ncamino que Z le informó pasa por él y por lo tanto por el enlace que aumentó de costo\nA su vez, Z tiene en su vector que alcanza a X con costo 5 (lo que le informó Y originalmente\nmas 1), por lo que re calcula su vector y ahora alcanza a X con costo 7. Difunde esto a sus\nvecions. Z no puede saber que ese camino pasa por el enlace que aumentó de costo.\nEsto genera un intercambio de los vectores de Y y Z, donde por cada iteración se aumenta en 1\nel costo hasta detectar que el mejor camino es por el enlace de costo 50.","atype":"oficial","sources":[],"id":"redesexamen_201912_p4a"},{"exam":"Diciembre 2019","code":"2019-12","problema":"Pregunta 4 (b)","topic":"Capa de enlace","cat":"Capa de enlace","q":"b) ¿Por qué es imposible que se de este problema en algoritmos de Estado del Enlace (Link-\n      State)?","answer":"Esto no puede suceder en los algoritmos de Estado de Enlace porque cada nodo conoce toda la\ntopología de la red en base al flooding de los mensajes link-state, y a partir de esta\ninformación calcula los caminos de costo mínimo.\n\n                                              Página 4/9\n\n                                                     Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201912_p4b"},{"exam":"Febrero 2020","code":"2020-02","problema":"Pregunta 1","topic":"Capa de transporte","cat":"Capa de transporte","q":"En muchas APIs de sockets (incluida la del curso) se prevé la posibilidad de configurar un timeout para la\noperación de UDP read pero no para UDP send. Justifique esta decisión de diseño.","answer":"Como UDP no ofrece entrega confiable, un datagrama puede ser descartado en cualquier momento y\nen cualquier lugar, incluido en el host emisor. Por lo tanto, se puede considerar que un\ntimeout para transmitir exitosamente implica una garantía que en realidad el protocolo no\nofrece, y por lo tanto no está bien definido.","atype":"oficial","sources":[],"id":"redesexamen_202002_p1"},{"exam":"Febrero 2020","code":"2020-02","problema":"Pregunta 2 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) Explique por qué es necesario conocer la topología completa en los algoritmos de enrutamiento de tipo Link\nState, y describa (mediante un pseudocódigo) un algoritmo de este tipo que computa los caminos más cortos\ndesde un nodo al resto de los nodos de la red.","answer":"Los algoritmos de enrutamiento tipo de link state calculan la ruta de costo mínimo entre un\norigen y un destino, y para esto, deben tener como entrada el conocimiento global y completo\nacerca de la red, que típicamente debe ser adquirido mediante mecanismos de flooding.\n\nUn algoritmo que que computa los caminos más cortos desde un nodo al resto de los nodos de la\nred es el algoritmo de Dijkstra.\n\nInicialización:\n       N’ = {u}\n       for todo nodo v\n              if v es un vecino de u then D(v) = c(u,v)\n              else D(v) = inf\nBucle\n       encontrar w no perteneciente a N’ tal que D(w) sea un mínimo\n       sumar w a N’\n       actualizar D(v) para cada vecino v de w, que no pertenezca a N’:\n              D(v) = min( D(v), D(w) + c(w,v) )\n       /* el nuevo coste a v es o bien el antiguo coste a v o el coste\n       de la ruta de coste mínimo a w más el coste desde w a v */\nuntil N’= N\n\n                                                                    Página 1/7\n\n                                            Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_202002_p2a"},{"exam":"Febrero 2020","code":"2020-02","problema":"Pregunta 2 (b)","topic":"Capa de enlace","cat":"Capa de enlace","q":"b) Muestre un ejemplo de un escenario donde, ejecutando un algoritmo de este tipo, se produzcan oscilaciones.\nDiscuta posibles soluciones para evitar este tipo de problemas.","answer":"Se considera una topología de red simple donde el costo de cada enlace es igual a la carga\ntransportada por el enlace, reflejando, por ejemplo, el retardo experimentado en ese enlace.\nEn este ejemplo, los costos de los enlaces no son simétricos; es decir, c(u,v) es igual a\nc(v,u) sólo si la carga transportada en ambas direcciones del enlace (u,v) es la misma. La\nfigura a continuación refleja el problema:\n\nUna solución sería obligar a que los costes de enlace no dependieran de la cantidad de tráfico\ntransportado (por ejemplo costos fijos, proporcionales al costo económico del enlace, o a la\nlongitud o delay). Otra solución consiste en garantizar que no todos los routers ejecuten el\nalgoritmo LS al mismo tiempo.","atype":"oficial","sources":[],"id":"redesexamen_202002_p2b"},{"exam":"Febrero 2020","code":"2020-02","problema":"Pregunta 3 (a)","topic":"Redes (general)","cat":"Redes (general)","q":"a) ¿Que utilidad tiene la herramienta traceroute?","answer":"El traceroute es una herramienta de diagnóstico de red que se utiliza para visualizar la\nruta entre dos nodos, devolviendo los nodos intermedios entre origen y destino. Asimismo,\ncalcula y muestra el tiempo que registró para cada salto.","atype":"oficial","sources":[],"id":"redesexamen_202002_p3a"},{"exam":"Febrero 2020","code":"2020-02","problema":"Pregunta 3 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) Describa el funcionamiento de la herramienta traceroute, explicando sobre qué protocolo(s) funciona y cómo\nlo(s) usa.","answer":"Una implementación posible es mediante mensajes ICMP. Funciona enviando mensajes de eco\nICMP (tipo ICMP '8') al mismo destino con un valor creciente del campo de tiempo de vida\n(TTL), iniciando con TTL=1 para el primer salto. Los enrutadores a lo largo de la ruta\ndevuelven el mensaje ICMP de tiempo excedido (tipo ICMP '11') cuando el campo TTL se convierte\nen cero. El destino final envía mensajes de respuesta ICMP (tipo ICMP '0') al recibir la\nsolicitud de eco ICMP. Las direcciones IP de los enrutadores que envían respuestas se pueden\nextraer de los paquetes recibidos. El tiempo de ida y vuelta entre el host emisor y un\nenrutador se determina configurando un temporizador en el host emisor.\n\nOtra implantación posible envía datagramas UDP con números de puerto de destino que varían\nentre 33434 y 33534, utilizando la misma técnica de ir incrementando el TTL. Cuando se alcanza\nel destino final se recibirá un mensaje ICMP de destino inalcanzable (tipo ICMP '3'), ya que\nes muy poco probable que el destino esté escuchando en los puertos UDP utilizados.\n\n                                                   Página 2/7\n\n                                             Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_202002_p3b"},{"exam":"Febrero 2020","code":"2020-02","problema":"Pregunta 4","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"a) Describa las diferencias entre Control de flujo y Control de congestión en TCP.\nb) Describa el mecanismo que usa TCP para el control de flujo.","answer":"a) Definición de los conceptos:\n\nControl de Congestión: Hace referencia al control del tráfico de entrada hacia una red de\ntelecomunicaciones para evitar un colapso por congestión. El control consiste en reducir la\ntasa de envío de paquetes de datos para disminuir la congestión en la red.\n\nControl de Flujo: Es el proceso de gestionar la tasa de transmisión de datos entre dos nodos.\nEl objetivo de esto es prevenir que un transmisor rápido sature a un receptor lento. Provee\nmecanismos para que el receptor controle la velocidad de transmisión, haciendo que el nodo\nreceptor no se sature con los datos entrantes.\n\nLas diferencias se fundamentan en que el control de flujo se centra en el análisis de la\ncapacidad del nodo receptor de procesar la información recibida (ya sea por falta de buffes\npara su almacenamiento u otros posibles problemas). Mientras el control de congestión, busca\nresolver posibles problemas de congestión en los enlaces intermedios que conectan a los\nequipos (su estudio se basa en el análisis de pérdidas de segmentos enviados).\n\nb)Como se indica el Control de Flujo busca que emisores rápidos no saturen receptores lentos.\nEl problema se fundamenta en que TCP utiliza un buffer donde va recepcionando los datos\nrecibidos y posteriormente se entrega a la capa aplicación. En caso que la capa aplicación no\nsolicite la información, este buffer se llenará.\nPara resolver ésto se utiliza un campo del header llamado receive window en el que comunica la\ncantidad de buffer disponible. Este valor limitará el envío de datos, y no podrá ser superado\npor el emisor. En cada segmento, ésta información es enviada.","atype":"oficial","sources":[],"id":"redesexamen_202002_p4"},{"exam":"Febrero 2020","code":"2020-02","problema":"Pregunta 5 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) ¿Qué información contiene y para qué es utilizado el atributo AS-PATH por el protocolo BGP?","answer":"El atributo AS-PATH contiene la lista de los identificadores de sistemas autónomos que\natraviesa la ruta publicada, para llegar a la red destino. Este atributo se utiliza para\ndeterminar el camino más corto en término de ASes, por lo tanto, se prefiere el AS-PATH más\ncorto. Además es utilizado para identificar ciclos en la ruta.","atype":"oficial","sources":[],"id":"redesexamen_202002_p5a"},{"exam":"Febrero 2020","code":"2020-02","problema":"Pregunta 5 (b)","topic":"Capa de red","cat":"Capa de red","q":"b) ¿Se puede afirmar que la decisión basada en el atributo AS-PATH garantiza un camino más corto en cantidad\nde hops de routers?","answer":"No, porque se desconoce la información interna de cada AS. Un camino con AS-PATH más corto\npuede incluir ASes con muchos saltos de routers internos, y puede ser más largo en término de\nrouters que otro camino con AS-PATH más largo.\n\n                                                    Página 3/7\n\n                                            Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_202002_p5b"},{"exam":"Julio 2020","code":"2020-07","problema":"Pregunta 1 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Considere una aplicación que transmite datos a una velocidad constante. Además, cuando esta\naplicación se inicia, se ejecutará durante un periodo de tiempo relativamente largo.\n\na) ¿Qué sería más apropiado para esta aplicación, una red de conmutación de circuitos o\n       una red de conmutación de paquetes? ¿Por qué?","answer":"La red de conmutación de circuitos tiene como desventaja el costo inicial para\n      establecer el circuito, pero dado que la hipótesis es que la aplicación se ejecutará por un\n      período largo de tiempo, ese costo fijo inicial se diluye y tiene poco peso respecto al\n      peso que tiene en el global. Dado que la aplicación transmite a una velocidad constante,\n      con conmutación de circuitos podemos reservar los recursos necesarios para ese tráfico\n      y además no estaremos desperdiciando esos recursos, ya que van a estar siempre\n      usados.","atype":"oficial","sources":[],"id":"redesexamen_202007_p1a"},{"exam":"Julio 2020","code":"2020-07","problema":"Pregunta 1 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Considere una aplicación que transmite datos a una velocidad constante. Además, cuando esta\naplicación se inicia, se ejecutará durante un periodo de tiempo relativamente largo.\n\nb) Suponga que se utiliza una red de conmutación de paquetes y el único tráfico que existe\n          en la misma procede de la aplicación que acabamos de describir. Además, suponga que\n          la suma de las velocidades de datos de la aplicación es menor que las capacidades de\n          cada uno de los enlaces. ¿Será necesario algún mecanismo de control de congestión?\n          ¿Por qué?","answer":"Dado que los datos viajan a velocidad constante, que la suma de todos no logra llenar la\n      capacidad de ninguno de los enlaces de la red, y que no existe en la red ningún otro\n      tráfico que no sea el de la aplicación bajo estudio, podemos decir que ningún router\n      debería presentar problemas para manejar el enrutamiento del mismo y por ende no\n      debería esperarse una situación de congestión en la red.","atype":"oficial","sources":[],"id":"redesexamen_202007_p1b"},{"exam":"Julio 2020","code":"2020-07","problema":"Pregunta 2 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Considere el protocolo DHCP.\n\na) Describa su utilidad.","answer":"El protocolo DHCP, Dinamic Host Configuration Protocol, es una de las formas\n        disponibles para que un nodo conectado a una red IP obtenga una dirección IPv4 desde\n        un servidor DHCP, el que gestiona un pool de direcciones IP a tales efectos. Con este\n        protocolo logramos mayor flexibilidad en el uso del rango de direcciones IP disponibles\n        para numerar los nodos de una red, pudiendo reutilizarlas. DHCP brinda de forma\n        automática un conjunto de parámetros de red, para el correcto funcionamiento de los\n        dispositivos. Mínimamente uno espera que los dispositivos obtengan una dirección y\n        máscara de red, pero pueden obtener otros parámetros como ser default gateway, rutas\n        estáticas, servidores DNS entre otros.","atype":"oficial","sources":[],"id":"redesexamen_202007_p2a"},{"exam":"Julio 2020","code":"2020-07","problema":"Pregunta 2 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Considere el protocolo DHCP.\n\nb) Describa en detalle los mensajes que se intercambian en el protocolo y entre que\n          entidades. Indique el protocolo de transporte que utiliza.\n\n                                                                    Página 1/9\n\n                                       Redes de Computadoras","answer":"Utiliza el protocolo UDP. Los mensajes intercambiados son los siguientes:\n        ◦   El equipo cliente solicita la configuración enviando un mensaje de difusión de tipo\n            “DHCP DISCOVER”.\n        ◦   Cada servidor DHCP responde con un mensaje de tipo “DHCP OFFER” que contiene\n            una dirección IP y otras opciones de configuración. Este mensaje se envía al cliente\n            por unicast si es posible o por broadcast en otro caso (RFC 1531 -\n            http://tools.ietf.org/html/rfc1531).\n        ◦   El cliente acepta los parámetros ofrecidos por alguno de los servidores respondiendo\n            con un mensaje de difusión de tipo “DHCP REQUEST” indicando en él el\n            identificador de servidor que ha elegido. El mensaje DHCPREQUEST debe ser\n            enviado a todos los servidores que recibieron el DHCPDISCOVER para que puedan\n            reutilizar la dirección que habían ofrecido. También se usa DHCPREQUEST para\n            extender en el tiempo la validez de una dirección IP.\n        ◦   El servidor elegido envía un mensaje de confirmación de tipo “DHCP ACK” indicando\n            que aprueba esa concesión y confirmando la configuración, así como indicando el\n            tiempo máximo en que la dirección IP es válida.","atype":"oficial","sources":[],"id":"redesexamen_202007_p2b"},{"exam":"Julio 2020","code":"2020-07","problema":"Pregunta 3 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"Considere un protocolo de transferencia de datos fiable que sólo utiliza paquetes de\nreconocimiento negativo (NAK).\n\na) Imagine que el emisor envía datos con muy poca frecuencia. ¿Sería preferible un\n      protocolo que solo emplea paquetes NAK a uno que utilice paquetes ACK? ¿Por qué?\n\n                                             Página 2/9\n\n                                          Redes de Computadoras","answer":"En este caso, sería preferible un protocolo que utiliza paquetes ACK. En un protocolo que\nutiliza NAK exclusivamente, la pérdida de un paquete x es detectado al recibir el paquete x+1,\nes decir, recibió el x-1 y luego el x+1, momento en el que detecta que no recibió el x y entiende\nque se perdió. Al recibir el x+1 enviará el NAK y luego recibirá el x, luego de al menos 4 RTT de\nla transmisión original. Dado que hay una demora grande entre un paquete de datos y el\nsiguiente (por letra) entonces pasará un tiempo muy largo hasta que la situación vuelva a la\nnormalidad y se recupere el paquete perdido. En un protocolo con ACK, el propio emisor puede\nreenviar automáticamente ante la finalización de los timers, incluso sin recibir nada del\nreceptor.","atype":"oficial","sources":[],"id":"redesexamen_202007_p3a"},{"exam":"Julio 2020","code":"2020-07","problema":"Pregunta 3 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"Considere un protocolo de transferencia de datos fiable que sólo utiliza paquetes de\nreconocimiento negativo (NAK).\n\nb) Suponga ahora que el emisor tiene muchos datos que transmitir y que la conexión\n          terminal a terminal experimenta muy pocas pérdidas. En este segundo caso, ¿sería\n          preferible un protocolo que solo emplee paquetes NAK a otro que utilice paquetes ACK?\n          ¿Por qué?","answer":"En este caso sería preferible un protocolo que utiliza solo NAKs. Dado que en este caso los\ndatos se envían a mayor frecuencia, la recuperación en un protocolo basado en NAKs ocurriría\nmas rápido. Mas aún, como los errores son poco frecuentes, se generarán muy pocos NAKs a\ndiferencia de un protocolo basado en ACKs que por cada paquete generaría un ACK. Con lo\ncual podríamos decir que, en este caso, hay un consumo menor de ancho de banda por menos\nconsumo en la mensajería de reconocimiento (ACK y NAK).","atype":"oficial","sources":[],"id":"redesexamen_202007_p3b"},{"exam":"Julio 2020","code":"2020-07","problema":"Pregunta 4 (a)","topic":"Capa de red","cat":"Capa de red","q":"Considere el algoritmo de enrutamiento de vector-distancia.\n\na) Explique el fenómeno de conteo a infinito.","answer":"El problema del conteo infinito se genera por el propio mecanismo utilizado por los\nprotocolos vector-distancia, ya que si bien los nodos reciben los vectores-distancias de sus\nvecinos, que ellos luego utilizan para recalcular el propio, no tienen conocimiento de si alguno\nde esos costos corresponden a caminos que pasan por ellos y por ende es posible que se\ngeneren bucles de enrutamiento. Cuando uno tiene visión global de la red es un problema\nsencillo de detectar y evitar, pero en los algoritmos vector-distancia solo se maneja información\nparcial.","atype":"oficial","sources":[],"id":"redesexamen_202007_p4a"},{"exam":"Julio 2020","code":"2020-07","problema":"Pregunta 4 (b)","topic":"Capa de red","cat":"Capa de red","q":"Considere el algoritmo de enrutamiento de vector-distancia.\n\nb) Ejemplifique el fenómeno anterior en una red de cuatro nodos.","answer":"(a)     1        (b)        1       (c)     1->K      (d)\n                          O------------------O------------------O------------------O\n\n                                                 Página 3/9\n\n                                        Redes de Computadoras\nEste ejemplo presenta el problema del conteo a infinito. A partir de una solución estable con los\ncostos iniciales unitarios, cuando el costo del enlace c-d cambia a un valor K>>1,los nodos c y\nd van a comenzar una iteración que arrastrará al resto de los nodos.\n   •    Al inicio c informará del cambio y luego b le enviará su vector, en el que tiene un camino\n        de costo 2 para llegar a b que evidentemente es mejor de lo que c tiene (por el cambio\n        de costo) pero lo que no sabe es que ese camino ya lo incluye.\n   •    En este paso de la iteración, c va a tener costo 3 hacia d (via b! Que a su vez era via c!).\n   •    En la iteración siguiente b va a tener costo 4 hacia d (via a!), mejor camino que la\n        información que recibe de c.\n   •    Este proceso va a continuar hasta que c finalmente llegue al costo K hacia d, y con K\n        grande, el proceso puede ser arbitrariamente largo.","atype":"oficial","sources":[],"id":"redesexamen_202007_p4b"},{"exam":"Febrero 2024","code":"2024-02","problema":"Pregunta 1 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"a) Mencione y describa los 3 principales componentes del servicio de correo electrónico vistos en el curso.","answer":"Los 3 componentes principales vistos en el curso son: agentes de usuario, servidores de correo y el protocolo\nsimple de transferencia de correo (SMTP, Simple Mail Transfer Protocol).\nLos agentes de usuario permiten a los usuarios leer, responder, reenviar, guardar y componer mensajes.\nLos servidores de correo forman el núcleo de la infraestructura del correo electrónico. Cada destinatario tiene un\nbuzón de correo ubicado en uno de los servidores de correo. Un mensaje típico inicia su viaje en el agente de\nusuario del emisor, viaja hasta el servidor de correo del emisor y luego hasta el servidor de correo del\ndestinatario, donde es depositado en el buzón del mismo.\nSMTP es el principal protocolo de la capa de aplicación para el correo electrónico por Internet. Utiliza el servicio\nde transferencia de datos fiable de TCP para transferir el correo desde el servidor de correo del emisor al\nservidor de correo del destinatario. Al igual que la mayoría de los protocolos de la capa de aplicación, SMTP\ntiene dos lados: el lado del cliente, que se ejecuta en el servidor de correo del emisor, y el lado del servidor, que\nse ejecuta en el servidor de correo del destinatario. Tanto el lado del cliente como el del servidor de SMTP se\nejecutan en todos los servidores de correo. Cuando un servidor de correo envía mensajes de correo a otros\nservidores de correo, actúa como un cliente SMTP. Cuando un servidor de correo recibe correo de otros\nservidores, actúa como un servidor SMTP.","atype":"oficial","sources":[],"id":"redesexamen_202402_p1a"},{"exam":"Febrero 2024","code":"2024-02","problema":"Pregunta 1 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"b) Realice una breve comparación entre los protocolos POP3 e IMAP.","answer":"Ambos son protocolos de acceso al correo electrónico. POP3 es mucho más simple y cuenta con menos\nfuncionalidades que IMAP (surgido posteriormente). Las implementaciones de IMAP resultan más complejas que\nPOP3.\nIMAP ofrece comandos para crear carpetas y mover los mensajes a ellas, permitiendo que el servidor de correo\nmantenga la configuración (estado) para cada usuario sin importar desde qué computadora (cliente) se está\naccediendo.\nTambién, a diferencia de POP3, IMAP ofrece comandos que permiten al agente obtener determinadas partes de\nlos mensajes, lo que permite una mejor gestión del ancho de banda de la conexión.","atype":"oficial","sources":[],"id":"redesexamen_202402_p1b"},{"exam":"Febrero 2024","code":"2024-02","problema":"Pregunta 2 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"a) Discuta ventajas y desventajas del uso de TCP y UDP para transmisiones de streaming. Se busca que\n          considere el efecto de la variación de retardo y de la pérdida de paquetes en el stream.","answer":"Si bien TCP ofrece un servicio orientado a conexión con garantías en la entrega de datos, de forma clásica\néste no se considera el más adecuado para streaming. Se considera a UDP como un protocolo más adecuado,\npues, el video acepta leves pérdidas de paquetes de forma imperceptible para el ojo humano o a lo sumo,\npixelado de algunas regiones de la imagen. El tipo de datos que se transmiten acepta pérdidas y desde el punto\nde vista de la percepción, se asimila mejor una disminución transitoria de la calidad que la detención del stream\nmientras se re-transmite un dato perdido: es preferible ver un tiro penal pixelado que tener la secuencia perfecta\n5 minutos más tarde (luego que los vecinos gritaron el gol). La variación de retardo o jitter, se mitiga colocando\nun buffer a la recepción que suavice los cambios en los tiempos de llegada y ofrezcan un servicio estable. La\nvariación de retardo en TCP puede generar retransmisiones, mientras que en UDP pueden ser suavizadas.","atype":"oficial","sources":[],"id":"redesexamen_202402_p2a"},{"exam":"Febrero 2024","code":"2024-02","problema":"Pregunta 2 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"b) La visión clásica vista en el curso indica que UDP es el servicio de transporte más adecuado para\n          streaming, mientras que TCP para transferencias de archivos. Considerando este punto, ¿cómo es\n          posible que los servicios comerciales de streaming como Youtube, Netflix o Amazon Prime operen sobre\n          HTTP sobre TCP? Use su análisis de la parte a) en esta respuesta.\n\n                                             Redes de Computadoras","answer":"Internet en general ha mejorado notablemente sus velocidades de servicio y su calidad. Tanto servicios de\ncobre como de Fibra Óptica logran tasas de error muy bajas, por lo que, son muy escasas las retransmisiones,\nasí como, los niveles de ancho de banda ofrecen retardos de transmisión o cola muy bajos y estables, con un\njitter bajo. Esto permite que la transmisión de video por TCP de excelentes resultados. Por otra parte, el uso\ngeneralizado de NAT hace muy difícil el uso de protocolos basados en UDP de forma generalizada. El uso de\nTCP también ofrece una solución para mitigar los problemas asociados al NAT.","atype":"oficial","sources":[],"id":"redesexamen_202402_p2b"},{"exam":"Febrero 2024","code":"2024-02","problema":"Pregunta 3 (a)","topic":"Capa de red","cat":"Capa de red","q":"En el contexto de la capa de red:\n\na) Describa plano de datos y plano de control. Cada descripción debe incluir su función, como la realiza y si\n        es local o global.","answer":"Respuesta extraída textualmente de las diapositivas del curso:\nPlano de datos\n- función local a cada enrutador\n- determina cómo el datagrama que llega a un puerto de entrada se reenvía a un puerto de salida del enrutador\n- implementa la función de reenvío o forwarding\n\nPlano de control\n- funcionalidad global en toda la red\n- determina cómo se encamina un datagrama entre enrutadores a lo largo de la ruta desde el host de origen al\nhost de destino, utilizando los algoritmos de enrutamiento.","atype":"oficial","sources":[],"id":"redesexamen_202402_p3a"},{"exam":"Febrero 2024","code":"2024-02","problema":"Pregunta 3 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"En el contexto de la capa de red:\n\nb) Mencione dos ejemplos de protocolos por cada uno de los planos mencionados.","answer":"En el plano de control tenemos los algoritmos de enrutamiento, por ejemplo RIP y OSPF. El plano de\n         datos tranfiere los datos de los usuarios, y por ende son protocolos de capa de aplicación los que llevan\n         esos datos. Dos ejemplos posibles son HTTP y SMTP.","atype":"oficial","sources":[],"id":"redesexamen_202402_p3b"},{"exam":"Febrero 2024","code":"2024-02","problema":"Pregunta 3 (c)","topic":"Capa de red","cat":"Capa de red","q":"En el contexto de la capa de red:\n\nc) IPv4 permite fragmentación, ¿cuándo se utiliza este mecanismo?. Especifique cuales nodos pueden\n        fragmentar y reensamblar.","answer":"IPv4 prevee este mecanismo para cuando un paquete IP debe atravesar un enlace con un MTU menor\n         que el tamaño del paquete. IPv4 permite entonces fragmentar el paquete en cualquier nodo de la red,\n         para luego ser reensamblado por el host destino.","atype":"oficial","sources":[],"id":"redesexamen_202402_p3c"},{"exam":"Febrero 2024","code":"2024-02","problema":"Pregunta 4 (a)","topic":"Capa de enlace","cat":"Capa de enlace","q":"a) Describa diferencias en el formato de los cabezales de los protocolos 802.1 y 802.1q.","answer":"Se le agrega una etiqueta de VLAN de 4 bytes, que destina 12 bits a VLANs. Esta desencadena un\n       cambio en el tamaño de los frames.","atype":"oficial","sources":[],"id":"redesexamen_202402_p4a"},{"exam":"Febrero 2024","code":"2024-02","problema":"Pregunta 4 (b)","topic":"Capa de enlace","cat":"Capa de enlace","q":"b) Presente un ejemplo de topologías equivalentes con y sin 802.1q, que demuestre alguna ventaja de usar\n       este protocolo.\n\n                                            Redes de Computadoras","answer":"Ejemplos:\n       •   Múltiples LANs → el uso de VLANs permite unificar multiples switches en uno, agregando flexibilidad\n           para conectar equipos a diferentes LANs.\n       •   Múltiples LAN en varias localizaciones → permite reemplazar múltiples enlaces con un trunk, y\n           permite migrar equipos entre localizaciones permaneciendo lógicamente en la misma LAN.\n       •   “Router on a stick” → permite ocupar un solo puerto mediante un enlace trunck entre un router y un\n           switch que soporta VLANs.\n\n                                            Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_202402_p4b"},{"exam":"Julio 2024","code":"2024-07","problema":"Pregunta 1 (a)","topic":"Capa de enlace","cat":"Capa de enlace","q":"En una red de paquetes:\n\na) Defina los retardos de trasmisión y propagación; plantee ejemplos que permitan comparar los órdenes de\nmagnitud entre ambos tipos de retardos.","answer":"Retardo de trasmisión:\nEs el tiempo que demora el nodo en poner todos los bits del paquete a trasmitir en el enlace.\nDados L, longitud del paquete (en bits) y R, ancho de banda del enlace (o velocidad de la interfaz, en bits por\nsegundo, bps o bits/seg), el retardo de trasmisión es dtrans = L/R\n\nRetardo de propagación:\nEs el tiempo que demora un bit en atravesar el enlace.\nDados d, longitud del enlace físico (en metros) y s, velocidad de propagación en el medio (cobre, fibra, del orden\nde ~2x108 metros/segundo), el retardo de propagación es dprop = d/s\n\nPara un enlace de 1Gbps (1x109 bits/segundo) con paquetes de 1000 bits, y un enlace de 2000 kilómetros:\n\n                        3\n              1 x 10 bits\ndrans=         9\n                              =1 x 10−6 segundos=1 microsegundo\n         1 x 10 bits/ segundo\n                        6\n            2 x 10 metros\ndprop=       8\n                              =1 x 10−2 segundos =10 milisegundos o 10.000 microsegundos\n       2 x 10 metros/ segundo\nEs decir en este ejemplo el retardo de propagación es 4 órdenes de magnitud mayor que el de trasmisión.","atype":"oficial","sources":[],"id":"redesexamen_202407_p1a"},{"exam":"Julio 2024","code":"2024-07","problema":"Pregunta 1 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"En una red de paquetes:\n\nb) Analice el retardo de cola (queueing delay) en función de R (ancho de banda en bps), L (largo del paquete en\nbits) y a (tasa de arribo de paquetes).","answer":"Dados R (ancho de banda en bps), L (largo del paquete en bits) y a (tasa de arribo\nde paquetes), se define la intensidad del tráfico como el cociente La/R.\nIntuitivamente, la relación entre intensidad de tráfico y retardo de cola se puede ver\n                                                                                                                average queueing\nen la figura, que permite comentar:\nLa/R ~ 0: el retardo de cola promedio es pequeño.\n\n                                                                                                                         delay\nLa/R -> 1: el retardo de cola promedio es grande (hay congestión).\nLa/R > 1: llegan más paquetes que los que se pueden procesar, el retardo tiende a\n\n                                                                                                                         traffic intensity = La/R   1\n\n                                             Redes de Computadoras\n\ninfinito.","atype":"oficial","sources":[],"id":"redesexamen_202407_p1b"},{"exam":"Julio 2024","code":"2024-07","problema":"Pregunta 1 (c)","topic":"Capa de red","cat":"Capa de red","q":"En una red de paquetes:\n\nc) Defina el mecanismo de almacenamiento y reenvío (store and forward).","answer":"La transmisión de almacenamiento y reenvío significa que el conmutador de paquetes debe recibir\ntodo el paquete antes de que pueda comenzar a transmitir el primer bit del paquete al enlace saliente.","atype":"oficial","sources":[],"id":"redesexamen_202407_p1c"},{"exam":"Julio 2024","code":"2024-07","problema":"Pregunta 2","topic":"Capa de transporte","cat":"Capa de transporte","q":"Suponga que tiene un flujo de datos TCP entre dos dispositivos usando un enlace. El nodo transmisor genera\ndatos más rápido que el receptor puede procesar, y el nodo receptor es capaz de consumir los datos de su\ninterfaz de entrada más rápido de lo que en el enlace puede transmitir. Describa el o los mecanismos de capa de\ntransporte que son responsable de regular la velocidad de transmisión en este escenario.","answer":"En el escenario descrito el transmisor es más rápido que el receptor, y este es más rápido que el enlace. El\ncuello de botella es por lo tanto el enlace. El mecanismo encargado de ajustar la velocidad de transmisión a la\ncapacidad del enlace es el control de congestión.\nEste mecanismo se basa en ir incrementando la tasa de transmisión hasta detectar algún evento que sugiera que\nel canal se saturó. En este caso se procede a reducir dicha tasa para luego continuar el proceso. La tasa de\ntransmisión se acota limitando el número de segmentos que se entrega a la red pendientes de confirmación. Los\neventos de pérdida detectados pueden ser la recepción de confirmaciones duplicadas (que indican la pérdida de\nsegmentos, considerado un evento leve) o el timeout a la espera de confirmaciones (que indican la pérdida de\nsegmentos y/o confirmaciones, considerado un evento grave).","atype":"oficial","sources":[],"id":"redesexamen_202407_p2"},{"exam":"Julio 2024","code":"2024-07","problema":"Pregunta 3 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) Describa el algoritmo de Dijkstra y provea un pseudocódigo del mismo. ¿Qué problema resuelve?","answer":"El algoritmo de Dijkstra permite encontrar, en un grafo con costos de aristas no negativos, los caminos más\ncortos desde un vértice a todos los restantes. Es un algoritmo iterativo que va construyendo los caminos más\ncortos comparando el costo actual con el costo para llegar a un vecino más la distancia desde ese vecino al nodo\nobjetivo.\n\nPseudo-código:\n\n                           Dijkstra’s link-state routing algorithm\n                                     1 Initialization:\n                                     2 N' = {u}                     /* compute least cost path from u to all other nodes */\n                                     3 for all nodes v\n                                     4   if v adjacent to u         /* u initially knows direct-path-cost only to direct neighbors */\n                                     5      then D(v) = cu,v      /* but may not be minimum cost!                                 */\n                                     6   else D(v) = ∞\n                                     7\n                                     8 Loop\n                                     9    find w not in N' such that D(w) is a minimum\n                                     10 add w to N'\n                                     11 update D(v) for all v adjacent to w and not in N' :\n                                     12       D(v) = min ( D(v), D(w) + cw,v )\n                                     13 /* new least-path-cost to v is either old least-cost-path to v or known\n                                     14 least-cost-path to w plus direct-cost from w to v */\n                                     15 until all nodes in N'\n                                                                                                                           Network Layer: 5-13\n\n                                                       Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_202407_p3a"},{"exam":"Julio 2024","code":"2024-07","problema":"Pregunta 3 (b)","topic":"Capa de enlace","cat":"Capa de enlace","q":"b) Usando un protocolo de estado de enlace en una red típica con N nodos, ¿cuántas instancias del algoritmo se\nejecutan?","answer":"Dijkstra se ejecuta en cada nodo en base a la información topológica (estado del enlace) que se recolecta\nmediante un mecanismo de inundación de información (flooding). Por lo tanto para una red de N nodos, se\nejecutan N instancias del algoritmo.","atype":"oficial","sources":[],"id":"redesexamen_202407_p3b"},{"exam":"Julio 2024","code":"2024-07","problema":"Pregunta 3 (c)","topic":"Fundamentos de redes","cat":"Fundamentos de redes","q":"c) Muestre la ejecución paso a paso del algoritmo en una red sencilla de 4 nodos o más con costos positivos.","answer":"Se muestra un caso de 6 nodos:\n\n                  Dijkstra’s algorithm: an example\n                                                            v         w             x               y              z\n                       Step                N'           D(v),p(v) D(w),p(w)     D(x),p(x)       D(y),p(y)       D(z),p(z)\n                          0                u              2,u        5,u          1,u                ∞               ∞\n                          1               ux              2,u        4,x                            2,x              ∞\n                          2              uxy              2,u        3,y                                            4,y\n                          3             uxyv                         3,y                                            4,y\n                          4            uxyvw                                                                        4,y\n                          5           uxyvwz\n                                                                     Initialization (step 0): For all a: if a adjacent to then D(a) = cu,a\n                                      5\n                                           3                            find a not in N' such that D(a) is a minimum\n                                      v            w      5             add a to N'\n                                  2\n                          u            2           1          z         update D(b) for all b adjacent to a and not in N' :\n                                               3                           D(b) = min ( D(b), D(a) + ca,b )\n                              1                           2\n                                      x    1\n                                                   y\n\n                                                                                                                                  Network Layer: 5-14","atype":"oficial","sources":[],"id":"redesexamen_202407_p3c"},{"exam":"Julio 2024","code":"2024-07","problema":"Pregunta 4 (a)","topic":"Capa de enlace","cat":"Capa de enlace","q":"a) Describa el funcionamiento del protocolo slotted aloha (aloha “ranurado”).","answer":"Se asume lo siguiente:\n    • Todas las tramas constan exactamente de L bits.\n    • El tiempo se divide en intervalos (slots) de tamaño L/R segundos (es decir, un intervalo equivale al\n       tiempo necesario para transmitir una trama).\n    • Los nodos comienzan a transmitir tramas sólo al comienzo de los intervalos.\n    • Los nodos están sincronizados para que cada nodo sepa cuándo comienzan los intervalos.\n    • Si dos o más tramas colisionan en un intervalo, todos los nodos detectan la colisión antes de que finalice\n       dicho intervalo.\n\nSea p una probabilidad, es decir, un número entre 0 y 1. La operación de Aloha ranurado en cada nodo es la\nsiguiente:\n\n    •   Cuando el nodo tiene una nueva trama para enviar, espera hasta el comienzo del siguiente intervalo y\n        transmite la trama completa en dicho intervalo.\n    •   Si no hay colisión, el nodo ha transmitido exitosamente su trama y por lo tanto no es necesario\n        considerar la retransmisión de la misma (ll nodo puede preparar una nueva trama para transmisión, si la\n        tiene).\n\n                                              Redes de Computadoras\n\n     •   Si hay una colisión, el nodo la detecta antes del final del intervalo. El nodo retransmite su trama en cada\n         intervalo subsiguiente con probabilidad p hasta que la trama se transmite sin colisión.","atype":"oficial","sources":[],"id":"redesexamen_202407_p4a"},{"exam":"Julio 2024","code":"2024-07","problema":"Pregunta 4 (b)","topic":"Capa de enlace","cat":"Capa de enlace","q":"b) Calcule la eficiencia del protocolo, y compárela con la eficiencia del aloha puro (sin sincronización de “ranuras”\nde tiempo).","answer":"Aloha ranurado:\nEn una red con N nodos, la probabilidad de que un slot sea exitoso (o sea, sin colisiones), es la probabilidad de\nque uno de los nodos transmita y que los N–1 nodos restantes no transmiten. La probabilidad de que un nodo\ndeterminado transmita es p, mientras que la probabilidad de que los nodos restantes no transmitan es\n(1–p)exp(N-1). Por lo tanto, la probabilidad de que un nodo determinado tenga éxito es:\n\n             p(1–p)exp(N-1)\n\nDebido a que hay N nodos, la probabilidad de que cualquiera de los N nodos tenga éxito es:\n\n             Np(1–p)exp(N-1)\n\nEsta es pues la expresión de la eficiencia de Aloha ranurado. Para obtener la máxima eficiencia debemos\nmaximizar esta expresión, tomando el límite para N → infinito. Se puede calcular que dicho límite es:\n\n             1/e (donde e es el número neperiano, que vale ~2.72)\n\nEsto da una eficiencia de alrededor del 37%.\n\nAloha puro:\nEn este caso no existe la sincronización de intervalos, y por lo tanto en cada nodo las colisiones se pueden dar\ncon el “intervalo anterior” y el “intervalo posterior”. Intuitivamente esto implica que puede haber el doble de\ncolisiones que en el caso ranurado, luego la eficiencia baja a la mitad, alrededor del 18%.\n\n                                     Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_202407_p4b"}];

let active=[], idx=0, revealed=false, shuffleMap={}, sessionCombo=0;
const $=s=>document.querySelector(s);
const esc=t=>(t||"").replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const examOrderKey=c=>{const m=(c||"").match(/(\d{4})-(\d{2})/);return m?(m[1]+m[2]):"9999";};
function save(){ state.known=[...known]; try{localStorage.setItem(LS,JSON.stringify(state));}catch(e){} }
function levelOf(xp){ return Math.floor(xp/50)+1; }
function toast(msg){ const el=$("#toast"); el.textContent=msg; el.classList.add("show"); clearTimeout(toast._t); toast._t=setTimeout(()=>el.classList.remove("show"),2200); }
function cheerMsg(){
  const n=known.size, tot=DATA.length, pct=tot?Math.round(100*n/tot):0;
  if(!n) return "Respondé en voz alta y después revelá la solución oficial.";
  if(n===tot) return "🏆 Cubriste todas las teóricas cargadas de Redes.";
  if(pct>=70) return "Casi full. Cerrá los huecos del mapa de dominio.";
  if(sessionCombo>=3) return "Combo ×"+sessionCombo+" en esta sesión.";
  return "XP y progreso se guardan en este navegador.";
}
function groupKey(q){
  const p=(q.problema||"").trim();
  // "Pregunta 1 (a)" / "Pregunta 1"
  let m=p.match(/Pregunta\s+(\d+)/i);
  if(m) return (q.code||"")+"|Pg"+m[1];
  // "P1 (a)", "P1.1", "P1 (a) I", "P3 (a)"
  m=p.match(/^P(\d+)/i);
  if(m) return (q.code||"")+"|P"+m[1];
  // fallback: quitar letra final (a)/(b) y romanos
  const base=p.replace(/\s*\([a-e]\)\s*.*$/i,"").replace(/\s+[IVX]+$/i,"").trim();
  return (q.code||"")+"|"+(base||q.id);
}
function partOrder(q){
  const p=(q.problema||"");
  const m=p.match(/\(([a-e])\)/i);
  if(m) return m[1].toLowerCase().charCodeAt(0)*10;
  const m2=p.match(/P\d+\.(\d+)/i);
  if(m2) return parseInt(m2[1],10);
  const m3=p.match(/\b(I{1,3}|IV|V)\s*$/i);
  if(m3){ const map={I:1,II:2,III:3,IV:4,V:5}; return map[m3[1].toUpperCase()]||0; }
  return 0;
}
function buildActive(){
  let list=DATA.filter(q=>(state.cat==="__all__"||q.cat===state.cat)&&(state.exam==="__all__"||q.exam===state.exam)&&(!state.hideKnown||!known.has(q.id)));
  if(state.order==="rand"){
    // Barajar por grupo (mismo examen + misma pregunta); a/b/c o subpartes quedan seguidas
    const groups=new Map();
    list.forEach(q=>{ const k=groupKey(q); if(!groups.has(k)) groups.set(k,[]); groups.get(k).push(q); });
    const keys=[...groups.keys()];
    keys.forEach(k=>{ if(!(k in shuffleMap)) shuffleMap[k]=Math.random(); });
    keys.sort((a,b)=> shuffleMap[a]-shuffleMap[b]);
    list=[];
    keys.forEach(k=>{
      const g=groups.get(k);
      g.sort((a,b)=> partOrder(a)-partOrder(b) || a.id.localeCompare(b.id));
      list.push(...g);
    });
  } else {
    list.sort((a,b)=> examOrderKey(a.code).localeCompare(examOrderKey(b.code))
      || groupKey(a).localeCompare(groupKey(b))
      || partOrder(a)-partOrder(b)
      || (a.problema||"").localeCompare(b.problema||"","es")
      || a.id.localeCompare(b.id));
  }
  active=list; if(idx>=active.length) idx=Math.max(0,active.length-1);
}

function fmtAnswer(t){ return (t||"").split(/\n\n+/).map(p=>"<p>"+esc(p).replace(/\n/g,"<br>")+"</p>").join(""); }
function renderCard(){
  const card=$("#card");
  if(!active.length){ card.innerHTML=`<div class="empty"><b>¡Nada por acá!</b><br><br><button class="btn primary" onclick="clearFilters()">Ver todas</button></div>`; updateChrome(); return; }
  const q=active[idx], isK=known.has(q.id);
  card.innerHTML=`<div class="meta"><span class="pill exam">📄 ${esc(q.exam)}</span><span class="pill prob">${esc(q.problema)}</span><span class="pill topic">${esc(q.topic)}</span>${isK?'<span class="pill known">✓ ya la sé</span>':''}</div><div class="q">${esc(q.q)}</div><div class="qhint">Pensá la justificación y después revelá la solución oficial.</div><div class="reveal-wrap" id="rw"></div>`;
  const rw=$("#rw");
  if(!revealed) rw.innerHTML=`<button class="btn primary big-reveal" onclick="reveal()">👁 Mostrar respuesta</button>`;
  else rw.innerHTML=`<div class="answer"><span class="atype">✔ Solución oficial del examen</span><div class="txt">${fmtAnswer(q.answer)}</div></div>`;
  const act=document.createElement("div"); act.className="actions";
  act.innerHTML=`<button class="btn ${isK?'ghost':'primary'}" onclick="markKnown()">${isK?'✓ Sabida':'✓ La sabía'}</button><button class="btn ghost" onclick="markReview()">↻ A repasar</button><div class="nav"><button class="btn" onclick="go(-1)">← Anterior</button><div class="pos">${idx+1} / ${active.length}</div><button class="btn" onclick="go(1)">Siguiente →</button></div>`;
  card.appendChild(act); updateChrome();
}
function applyDomain(){
  const el=$("#domain"), btn=$("#domainToggle");
  if(!el) return;
  const open = state.domainOpen!==false;
  el.classList.toggle("collapsed", !open);
  if(btn) btn.setAttribute("aria-expanded", open?"true":"false");
}
function renderDomain(){
  const box=$("#dgrid"); if(!box) return;
  const cats=[...new Set(DATA.map(q=>q.cat))].sort((a,b)=>{const na=parseInt(a)||99,nb=parseInt(b)||99;return na-nb||a.localeCompare(b,'es');});
  box.innerHTML=cats.map(c=>{const all=DATA.filter(q=>q.cat===c);const kn=all.filter(q=>known.has(q.id)).length;const pct=all.length?Math.round(100*kn/all.length):0;return `<div class="ditem"><div class="dn">${esc(c)}</div><div class="db"><i style="width:${pct}%"></i></div><div class="ds">${kn}/${all.length}</div></div>`;}).join("");
  applyDomain();
}
function updateChrome(){
  $("#knownN").textContent=known.size; $("#totalN").textContent=DATA.length;
  $("#pbar").style.width=(100*known.size/Math.max(1,DATA.length)).toFixed(0)+"%";
  $("#levelN").textContent="Nv. "+levelOf(state.xp||0); $("#xpN").textContent=(state.xp||0)+" XP"; $("#comboN").textContent=String(sessionCombo);
  $("#cheer").textContent=cheerMsg(); renderDomain(); renderList();
}
function renderList(){
  const box=$("#list"); if(!box) return;
  const term=($("#search")?.value||"").toLowerCase().trim();
  let items=active.filter(q=>!term||q.q.toLowerCase().includes(term)||q.exam.toLowerCase().includes(term)||q.topic.toLowerCase().includes(term)||(q.cat||"").toLowerCase().includes(term));
  $("#listCount").textContent="("+items.length+")"; box.innerHTML="";
  items.forEach(q=>{const cur=active[idx]&&active[idx].id===q.id,isK=known.has(q.id);const el=document.createElement("div");el.className="li"+(cur?" cur":"")+(isK?" done":"");el.innerHTML=`<span class="dot"></span><span class="code">${esc(q.code)}</span><span class="qt">${esc(q.q.length>90?q.q.slice(0,90)+'…':q.q)}</span>${isK?'<span class="chk2">✓</span>':''}`;el.onclick=()=>{idx=active.indexOf(q);revealed=false;renderCard();};box.appendChild(el);});
}
window.reveal=()=>{revealed=true;renderCard();};
window.go=d=>{if(!active.length)return;idx=(idx+d+active.length)%active.length;revealed=false;renderCard();};
window.markKnown=()=>{const q=active[idx];if(!q)return;const was=known.has(q.id);known.add(q.id);if(!was){state.xp=(state.xp||0)+XP_PER;sessionCombo++;toast("✔ +"+XP_PER+" XP");if(known.size%5===0)toast("⬆️ Nivel "+levelOf(state.xp));}save();if(state.hideKnown){buildActive();revealed=false;}renderCard();};
window.markReview=()=>{const q=active[idx];if(!q)return;known.delete(q.id);sessionCombo=0;save();renderCard();};
window.clearFilters=()=>{state.cat="__all__";state.exam="__all__";state.hideKnown=false;$("#fCat").value="__all__";$("#fExam").value="__all__";$("#hideKnown").checked=false;idx=0;revealed=false;buildActive();renderCard();save();};
function initControls(){
  const cats=[...new Set(DATA.map(q=>q.cat))].sort((a,b)=>{const na=parseInt(a)||99,nb=parseInt(b)||99;return na-nb||a.localeCompare(b,'es');});
  $("#fCat").innerHTML=`<option value="__all__">Todos los temas (${DATA.length})</option>`+cats.map(c=>`<option value="${esc(c)}">${esc(c)} (${DATA.filter(q=>q.cat===c).length})</option>`).join("");
  const exams=[...new Set(DATA.map(q=>q.exam))].sort((a,b)=>examOrderKey(DATA.find(q=>q.exam===b).code).localeCompare(examOrderKey(DATA.find(q=>q.exam===a).code)));
  $("#fExam").innerHTML=`<option value="__all__">Todos los exámenes</option>`+exams.map(e=>`<option value="${esc(e)}">${esc(e)} (${DATA.filter(q=>q.exam===e).length})</option>`).join("");
  $("#fCat").value=state.cat; $("#fExam").value=state.exam; $("#hideKnown").checked=!!state.hideKnown;
  document.querySelectorAll("#orderSeg button").forEach(b=>{b.classList.toggle("on",b.dataset.o===state.order);b.onclick=()=>{state.order=b.dataset.o;if(b.dataset.o==="rand")shuffleMap={};document.querySelectorAll("#orderSeg button").forEach(x=>x.classList.toggle("on",x===b));idx=0;revealed=false;buildActive();renderCard();save();};});
  $("#fCat").onchange=e=>{state.cat=e.target.value;idx=0;revealed=false;buildActive();renderCard();save();};
  $("#fExam").onchange=e=>{state.exam=e.target.value;idx=0;revealed=false;buildActive();renderCard();save();};
  $("#hideKnown").onchange=e=>{state.hideKnown=e.target.checked;idx=0;revealed=false;buildActive();renderCard();save();};
  $("#toggleList").onclick=()=>{state.listOpen=!state.listOpen;applyList();save();};
  $("#search")&&($("#search").oninput=renderList);
  $("#resetBtn").onclick=()=>{if(confirm("¿Borrar progreso?")){known=new Set();state.xp=0;sessionCombo=0;save();buildActive();renderCard();}};
  $("#domainToggle")&&($("#domainToggle").onclick=()=>{state.domainOpen=state.domainOpen===false; applyDomain(); save();});
  applyList();
  applyDomain();
}
function applyList(){$("#listpanel").style.display=state.listOpen?"flex":"none";$("#layout").classList.toggle("withlist",state.listOpen);$("#toggleList").classList.toggle("primary",state.listOpen);if(state.listOpen)renderList();}
document.addEventListener("keydown",e=>{if(e.target.tagName==="INPUT"||e.target.tagName==="SELECT")return;if(e.key==="ArrowLeft")go(-1);else if(e.key==="ArrowRight")go(1);else if(e.key===" "||e.key==="Enter"){e.preventDefault();if(!revealed)reveal();}else if(e.key.toLowerCase()==="s")markKnown();else if(e.key.toLowerCase()==="r")markReview();else if(e.key.toLowerCase()==="l"){state.listOpen=!state.listOpen;applyList();save();}});
initControls(); buildActive(); renderCard();
</script>
</body>
</html>
