reo\nelectrónico, así como también gestionar el envío y la recepción de los mensajes hacia y desde los\nservidores de correo electrónico.\nLos “mail servers” contienen los mensajes de los usuarios ordenados en “mailboxes”, gestionan el envío y la\nrecepción de dichos mensajes entre servidores similares, mediante el uso del protocolo SMTP (incluidos los\nrecibidos desde los “user agent”), y de acceso a los mailboxes mediante protocolos como POP3 e IMAP.\nEl protocolo SMTP, como ya se comentó, es el que se emplea para el envío de mensajes desde los clientes\na los servidores y para el “movimiento” de los mensajes entre los servidores.","atype":"oficial","sources":[],"id":"redesexamen_202602_p2a"},{"exam":"Febrero 2026","code":"2026-02","problema":"Pregunta 2 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"b) Describa el uso de los comandos HELO, MAIL FROM, RCPT TO, DATA y QUIT del protocolo SMTP.","answer":"HELO: se utiliza para iniciar la comunicación entre el cliente y el servidor.\nMAIL FROM: indica la dirección del remitente del mensaje de correo electrónico.\nRCPT TO: especifica la dirección del destinatario del mensaje.\nDATA: señaliza que el cliente comienza a enviar el contenido del mensaje\nQUIT: finaliza la conexión SMTP.","atype":"oficial","sources":[],"id":"redesexamen_202602_p2b"},{"exam":"Febrero 2026","code":"2026-02","problema":"Pregunta 2 (c)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"c) Explique en qué consisten las fases de autenticación y de transacción del protocolo POP3.","answer":"Fase de autorización: el cliente presenta al servidor las credenciales del usuario involucrado,\ngeneralmente indicando “nombre de usuario” y “contraseña”. El servidor responde a ello con OK o ERR\nsegún si la autenticación del usuario utilizando el cliente en cuestión fue exitosa o no.\nFase de transacción: sólo puede ocurrir si la fase de autorización culminó con un OK. En ella el cliente\npuede listar los mensajes disponibles en su mailbox en el servidor (comando “list”), obtener o borrar algunos\nde dichos mensajes (comandos “retr” y “dele” respectivamente), y cerrar de manera ordenada la conexión\ncon el servidor (comando “quit”).","atype":"oficial","sources":[],"id":"redesexamen_202602_p2c"},{"exam":"Febrero 2026","code":"2026-02","problema":"Pregunta 3 (a)","topic":"Capa de red","cat":"Capa de red","q":"Con relación al protocolo DHCP:\n\na) ¿En qué situaciones puede ser necesario su uso?","answer":"Retardo de transmisión\nH1 → R1: 16.000 / 20 × 10^6 = 0,0008 s = 0,8 ms\nR1 → R2: 16.000 / 10 × 10^6 = 1,6 ms\nR2 → H2: 16.000 / 5 × 10^6 = 3,2 ms\nRetardo total de transmisión: 0,8 + 1,6 + 3,2 = 5,6 ms\n\nRetardo de propagación\nH1 → R1: 500.000 / 2 × 10^8 = 2,5 ms\nR1 → R2: 1.000.000 / 2 × 10^8 = 5 ms\nR2 → H2: 2,5 ms\nRetardo total de propagación: 2,5 + 5+ 2,5 = 10 ms\n\nRetardo de procesamiento\nR1: 1,5 ms\nR2: 1,5 ms\nRetardo total de procesamiento: 1,5 + 1,5 = 3 ms\n\nRetardo de cola\nR1: 2 ms\nR2: 8 ms\nRetardo total de cola: 2 + 8 = 10 ms\n\nRetardo total extremo a extremo: 5,6 + 10 + 3 + 10 = 28,6 ms","atype":"oficial","sources":[],"id":"redesexamen_202602_p3a"},{"exam":"Febrero 2026","code":"2026-02","problema":"Pregunta 3 (b)","topic":"Capa de red","cat":"Capa de red","q":"Con relación al protocolo DHCP:\n\nb) Explique su funcionamiento, haciendo énfasis en los mensajes intercambiados.","answer":"Cambian los retardos que dependen del largo del paquete.\nPor lo tanto, el retardo de transmisión, que pasa al doble.\nEl retardo de procesamiento puede aumentar muy levemente, del orden de algunos µs\nSe asume que los retardos de cola permanecen constantes en este caso.\nEl retardo de propagación permanece constante.","atype":"oficial","sources":[],"id":"redesexamen_202602_p3b"},{"exam":"Febrero 2026","code":"2026-02","problema":"Pregunta 3 (c)","topic":"Capa de red","cat":"Capa de red","q":"Con relación al protocolo DHCP:\n\nc) Considerando toda la red de una organización cualquiera, ¿existe alguna restricción respecto a\n        dónde instalar y configurar el o los servidores DHCP? Justifique su respuesta.","answer":"Hay un incremento de 42 ms en el retardo total de extremo a extremo respecto a los cálculos de la\nprimera parte. Por lo tanto, el nuevo valor es 70,6 ms.\n\n                                        Problemas Prácticos","atype":"oficial","sources":[],"id":"redesexamen_202602_p3c"},{"exam":"Febrero 2017","code":"2017-02","problema":"Pregunta 1","topic":"Capa de enlace","cat":"Capa de enlace","q":"Un switch que tiene dos VLANs definidas recibe una trama ethernet con dirección\ndestino broadcast por uno de sus puertos (que pertenece a una de las VLANs\ndefinidas). Explique qué hace el switch con esta trama.","answer":"La trama ethernet será re­enviada por todos los puertos del switch que tengan\nasignados la VLAN del puerto de entrada, exceptuando el puerto por el que llegó la\ntrama.\nPor los puertos asignados con la otra VLAN, no envía nada.","atype":"oficial","sources":[],"id":"redesexamen_201702_p1"},{"exam":"Febrero 2017","code":"2017-02","problema":"Pregunta 2 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"a) Mencione los mecanismos provistos por TCP para que un emisor pueda inferir que\nexiste congestión en la red.","answer":"TCP implementa un control de congentión sin notificación explícita, por eso se\nhabla de mecanismos que permiten inferir (o deducir) que está ocurriendo congestión.\nLos dos mecanismos provistos por TCP para este fin son:\n1) la recepción de tres ACKs duplicados, que indican congestión leve.\n2) timeout, que indica congestión grave.","atype":"oficial","sources":[],"id":"redesexamen_201702_p2a"},{"exam":"Febrero 2017","code":"2017-02","problema":"Pregunta 2 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) Explique en qué consiste la etapa del algoritmo de control de congestión conocida\ncomo ”arranque lento”, y cuándo termina.","answer":"En la etapa de arranque lento, la Ventana de Congestión del emisor se inicializa\nen 1 MSS, y se incrementa en 1 MSS por cada ACK recibido, lo que implica un\ncrecimiento exponencial de la velocidad de trasmisión. Esta etapa finaliza cuando se\nalcanza el umbral de congestión, que determina el comienzo de la etapa de “evitación\nde la congestión”. El umbral queda definido por el valor Ventana de Congestión /2\ncuando se produjo el evento de congestión anterior a la etapa actual de arranque\nlento.","atype":"oficial","sources":[],"id":"redesexamen_201702_p2b"},{"exam":"Febrero 2017","code":"2017-02","problema":"Pregunta 3","topic":"Redes (general)","cat":"Redes (general)","q":"Compare el tiempo de distribución de un archivo de tamaño F desde un servidor hacia\nN clientes, considerando i)una arquitectura cliente­servidor, y ii) una arquitectura\nP2P.\n\n                                                      Página 1/6\n\n                                 Redes de Computadoras","answer":"i) Cliente­servidor (transparencias del curso):\n\nii) P2P (transparencias del curso):\n\n                                      Página 2/6\n\n                                   Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201702_p3"},{"exam":"Febrero 2017","code":"2017-02","problema":"Pregunta 4 (a)","topic":"Capa de red","cat":"Capa de red","q":"Considere los algoritmos de enrutamiento vistos en el curso.\n\na) ¿Qué es un algoritmo de vector­distancia?","answer":"Los algoritmos de vector­dictancia (Distance­Vector, DV) utilizan información\npropia y la aportada por los vecinos para calcular un vector de estimaciones de\ncosto hacia los nodos conocidos de la red. Son algoritmos distribuidos y asíncronos,\nya que cada nodo ejecuta una instancia del algoritmo independientemente del resto de\nlos nodos; es también iterativo, ya que cada nodo, durante el proceso de cómputo,\ncomunica a sus vecinos su vector de distancias si el mismo sufre modificaciones. El\nalgoritmo termina cuando no se reciben más actualizaciones, y puede recomenzar ante\nla ocurrencia de un evento, por ejemplo el cambio en un costo de un enlace. Un\nejemplo típico es el algoritmo de Bellman­Ford.","atype":"oficial","sources":[],"id":"redesexamen_201702_p4a"},{"exam":"Febrero 2017","code":"2017-02","problema":"Pregunta 4 (b)","topic":"Capa de red","cat":"Capa de red","q":"Considere los algoritmos de enrutamiento vistos en el curso.\n\nb) ¿Qué es un algoritmo de estado del enlace?","answer":"Los algoritmo de estado del enlace (Link State, LS) utilizan información\ntopológica completa de la red, aprendida dinámicamente, para resolver el problema de\nlos caminos de costo mínimo. Estos algoritmos pueden ejecutarse en forma distribuida\no centralizada; en el caso de IP (OSPF, IS­IS), cada nodo ejecuta su instancia sobre\nsu vista de la información global. Un ejemplo típico es el algoritmo de Dijkstra,\nque para cada nodo construye un árbol de cubrimiento mínimo cuya raíz es el nodo en\nel que se ejecuta.","atype":"oficial","sources":[],"id":"redesexamen_201702_p4b"},{"exam":"Febrero 2017","code":"2017-02","problema":"Pregunta 4 (c)","topic":"Capa de red","cat":"Capa de red","q":"Considere los algoritmos de enrutamiento vistos en el curso.\n\nc) Compare en función de la robustez de cada tipo de algoritmo.","answer":"Los algortimos LS comunican costos de enlaces, y cada nodo computa los costos\nmínimos independientemente de los demás, mientras que en DV se comunican (y\npropagan) los costos de los caminos al resto de los nodos, iterando sobre estos\ncambios. Por lo tanto un fallo en DV puede potencialmente afectar a toda la red,\nmientras que en LS el efecto está acotado.","atype":"oficial","sources":[],"id":"redesexamen_201702_p4c"},{"exam":"Febrero 2017","code":"2017-02","problema":"Pregunta 5","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Explique qué servicios ofrece la Capa de Transporte del modelo TCP/IP.","answer":"La capa transporte (capa 4 del modelo) proporciona una comunicación lógica entre los\nprocesos de las aplicación que se ejecutan en distintos sistemas finales (“hosts” o\n“end systems”), independiente de las redes físicas que los conectan.\n\nLos protocolos de transporte se ejecutan en los sistemas finales e implementan:\n   •  del lado del transmisor: genera segmentos a partir de los mensajes de la\n      Aplicación, y los pasa a la capa de red.\n   •  del lado del receptor: a partir de los segmentos, los mensajes son pasados a\n      la capa de Aplicación.\n\nEn Internet la capa de transporte ofrece dos alternativas: TCP y UDP. Mientras TCP\nofrece un transporte orientado a conexión y confiable (entrega de segmentos en orden\ny sin errores), UPD ofrece un servicio no orientado a conexión, libre de errores.\n\n                                        Página 3/6\n\n                                 Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201702_p5"},{"exam":"Julio 2013","code":"2013-07","problema":"Pregunta 1 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"a) Describa el algoritmo conocido como TCP Slow Start y su vinculación con el control de congestión.","answer":"Al comienzo de la conexión, TCP tiene una tasa de transferencia baja, que se incrementa en forma\n       exponencial hasta que se alcanza un valor de umbral ssthesh o hasta que se registre el primer evento de\n       pérdida. Inicialmente, la ventana de congestión tiene un valor cwnd = 1 MSS, y se va duplicando cada vez\n       que pasa el tiempo de un RTT, implementado de forma tal que cada vez que se recibe un ACK se\n       incrementa en 1 MSS el valor de cwnd.\n        El control realizado por la ventana cwnd está fijado por la siguiente limitante: LastByteSent-LastByteAcked\n        < cwnd, por lo que si aumenta cwnd, tendrá una ventana mayor para el envío de datos.\n        Resumiendo, inicialmente tiene una taza de transferencia baja, pero se incrementa rápido en forma\n        exponencial.","atype":"oficial","sources":[],"id":"redesexamen_201307_p1a"},{"exam":"Julio 2013","code":"2013-07","problema":"Pregunta 1 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) Nombre y de una breve descripción de otros dos algoritmos que cooperen en el control de congestión\n       TCP (no más de dos oraciones por cada uno).","answer":"Congestion Avoidance, mientras no se reciban ACKs duplicados, la ventana de congestión cwnd se\n       incrementa linealmente en una unidad por RTT. Esto se debe a que la recepción de ACK duplicados, en\n       general se debe a pérdida de paquetes.\n       Fast Recovery, TCP retransmite el segmento que ha recibido tres ACKs duplicados y espera la llegada del\n       ACK correspondiente, antes de volver a Congestion Avoidance. En caso de no recibir el ACK, entonces\n       pasa a Slow Start.","atype":"oficial","sources":[],"id":"redesexamen_201307_p1b"},{"exam":"Julio 2013","code":"2013-07","problema":"Pregunta 2","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"La ventana de congestión (cwnd) típica al inicio de una conexión TCP es de 4KB. Describa el impacto que\n        tendría cuadruplicar su tamaño en una LAN y en Internet. Recomiende o desaconseje la aplicación de\n        este cambio a los stacks TCP/IP de los sistemas operativos.","answer":"En Internet la mayoría de las transacciones Web son de corta duración y por lo tanto terminan antes de finalizar el\nslow start. Esto genera que la ventana de congestión inicial sea un parámetro crítico en la velocidad de los flujos\nWeb. En particular reduciría la latencia de las transacciones que se completan en el estado slow start, también\npermitiría aumentar el tamaño de las páginas Web sin impactar en el tiempo de carga de la página. Tiene menos\nrelevancia en una LAN donde la congestión no suele ser un problema importante. Esta modificación forma parte\nde un conjunto de cambios que buscan mejorar el throughput de TCP, y que están siendo incorporadas en\ndistintos sistemas operativos, por ejemplo en el kernel de Linux 3.2.\n\n                                                    Página 1/7\n\n                                              Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201307_p2"},{"exam":"Julio 2013","code":"2013-07","problema":"Pregunta 3 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"a) En redes TCP/IP, ¿cuál es la interfaz utilizada por una aplicación, que le permite hacer uso de los\n       servicios de la capa de transporte?","answer":"La interfaz utilizada es una API denominada sockets. Esta interfaz es brindada por el sistema operativo, y\n       permite el intercambio de la información de capa de red con las aplicaciones.","atype":"oficial","sources":[],"id":"redesexamen_201307_p3a"},{"exam":"Julio 2013","code":"2013-07","problema":"Pregunta 3 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) ¿Qué atributos mínimos son necesarios para identificar una comunicación TCP?","answer":"Los atributos requeridos para definir un socket TCP: dirección IP local, dirección IP remota, número de\n       puerto local y número de puerto remoto, que permiten al sistema operativo identificar los procesos que\n       intercambian datos.","atype":"oficial","sources":[],"id":"redesexamen_201307_p3b"},{"exam":"Julio 2013","code":"2013-07","problema":"Pregunta 3 (c)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"c) El protocolo UDP no es confiable ni orientado a conexión, ¿por qué usaría usted UDP en lugar de usar\n       directamente IP para comunicarse con otro host?","answer":"UDP provee una interfaz de aplicación para IP. Como se indica no soporta confiabilidad, control de flujo o\n       recuperación de errores para IP. Lo que permite es la posibilidad de \"multiplexar/demultiplexar\" para\n       enviar y recibir datagramas, usando puertos para dirigir los datagramas a las aplicaciones\n       correspondientes. De esta forma se generaliza la utilización de protocolos de transporte por parte de las\n       aplicaciones. Si se utilizara IP directamente, cada aplicación debería implementar los mecanismos de\n       mux/demux mencionados anteriormente.","atype":"oficial","sources":[],"id":"redesexamen_201307_p3c"},{"exam":"Julio 2013","code":"2013-07","problema":"Pregunta 4 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) Explique los siguientes conceptos para la capa de enlace: Framing, Link Access, Half-duplex y Full-\n       duplex.","answer":"Framing se refiere a encapsular el datagrama de capa de red en un frame de capa de enlace, agregando\n       un cabezal (header) y trailer.\n       Links Access involucra el acceso al medio en caso de medios compartidos.\n       Half-duplex indica que ambos extremos de un enlace punto a punto pueden transmitir pero no al mismo\n       tiempo.\n       Full-duplex indica que ambos extremos de un enlace punto a punto pueden transmitir al mismo tiempo.","atype":"oficial","sources":[],"id":"redesexamen_201307_p4a"},{"exam":"Julio 2013","code":"2013-07","problema":"Pregunta 4 (b)","topic":"Capa de enlace","cat":"Capa de enlace","q":"b) El uso de medios de acceso compartido genera colisiones en la transmisión. Mencione un protocolo para\n       cada una de las siguientes categorías de protocolos:\n           •   Particionamiento del canal (Channel Partitioning).\n           •   Acceso aleatorio al canal (Random Access).\n           •   Toma de turnos (Taking Turns).","answer":"Particionado del canal (Channel Partitioning): TDM, FDM, CDMA.\n       Acceso aleatorio al canal (Random Access): ALOHA, CSMA/CD.\n       Toma de turnos (Taking Turns): token ring.","atype":"oficial","sources":[],"id":"redesexamen_201307_p4b"},{"exam":"Julio 2013","code":"2013-07","problema":"Pregunta 5","topic":"Capa de red","cat":"Capa de red","q":"Defina y explique brevemente los siguientes conceptos y describa como interactúan entre si: protocolo de\nenrutamiento, tabla de reenvío o forwarding, protocolo IP y protocolo ICMP.","answer":"El protocolo de enrutamiento permite a los routers intercambiar información topológica, y de esta forma,\nutilizando un algoritmo específico (link-state o distance vector), construir rutas hacia diferentes destinos en la red.\n\nLa tabla de reenvío o forwarding es generada a partir de los protocolos de enrutamiento, y establece que puerto\nde salida se debe utilizar para cada destino o rango de destinos de un datagrama.\n\nEl protocolo IP (Internet Protocol) define reglas para la transmisión de datagramas, a través de distintas redes\nfísicas. El protocolo define, entre otros elementos:\n     •   un sistema de direccionamiento, permitiendo asignar un identificador a cada interfaz de red,\n     •   formato de los datagramas utilizados\n     •   convenciones para el manejo de los datagramas.\n\nICMP (Internet Control Message Protocol) es un protocolo de control para IP; el mismo permite la notificación de\nerrores y señalización de eventos ocurridos. Por ejemplo, en caso de que un datagrama tenga un valor de TTL =\n                                                   Página 2/7\n\n                                             Redes de Computadoras\n0, se notificará al origen. ICMP es considerado un protocolo de capa de red, pero sin embargo se transporta como\ncarga útil en IP.\n\n                                                  Página 3/7\n\n                                            Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201307_p5"},{"exam":"Diciembre 2013","code":"2013-12","problema":"Pregunta 1 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"a) muchas pérdidas de segmentos en ráfagas.","answer":"En este caso, si las ráfagas son pocas, aun cuando cada ráfaga implique un\n      número significativo de segmentos, es posible llevar dicha información en un\n      solo segmento hacia el emisor, por lo que en este caso sí conviene el uso de\n      la estrategia SACK.","atype":"oficial","sources":[],"id":"redesexamen_201312_p1a"},{"exam":"Diciembre 2013","code":"2013-12","problema":"Pregunta 1 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) muchas pérdidas de segmentos no secuenciales.","answer":"En este otro caso, dada la gran granularidad que se observa en los segmentos\n      perdidos, SACK no es conveniente utilizarlo ya que no permitirá anunciar en un\n      solo segmento que viaje hacia el emisor cuáles fueron los perdidos y por lo\n      tanto la estrategia resulta de muy baja eficiencia.","atype":"oficial","sources":[],"id":"redesexamen_201312_p1b"},{"exam":"Diciembre 2013","code":"2013-12","problema":"Pregunta 2 (a)","topic":"Capa de red","cat":"Capa de red","q":"Considere el entramado de conmutación de un router:\n\na) Describa brevemente las alternativas para realizar la conmutación de paquetes.","answer":"Ref. Sección 4.3.2 libro del curso.","atype":"oficial","sources":[],"id":"redesexamen_201312_p2a"},{"exam":"Diciembre 2013","code":"2013-12","problema":"Pregunta 2 (b)","topic":"Capa de enlace","cat":"Capa de enlace","q":"Considere el entramado de conmutación de un router:\n\nb) Describa el fenómeno de bloqueo HOL (Head Of Line – Cabeza de Línea).","answer":"Ref. Sección 4.3.4 libro del curso.\n\n                                                  Página 1/7\n\n                                               Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201312_p2b"},{"exam":"Diciembre 2013","code":"2013-12","problema":"Pregunta 3 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) ¿Qué es una Virtual LAN (VLAN)? Describa su utilidad, y muestre un ejemplo.","answer":"Es una tecnología que permite la creación de redes virtuales lógicas dentro de\n      la misma red física en un entorno de conectividad de capa 2 ethernet. Las\n      VLANs definen dominios de broadcast independientes para cada red virtual, que\n      normalmente se corresponde con una subred IP. En un conmutador es posible\n      definir VLANs de acuerdo a diferentes criterios, como por ejemplo, asignar un\n      conjunto de puertos a cada VLAN. Los hosts conectados a una determinada VLAN\n      tienen conectividad de capa de enlace aislada del resto de las VLANs\n      definidas.\n                                                       Página 2/7\n\n                                  Redes de Computadoras\n       Como ejemplo consideremos una empresa con varios departamentos, los que se\n       encuentran distribuidos en diferentes sitios geográficos. La solución permite\n       definir VLANs por departamento, y que en cada sitio se puedan asignar hosts a\n       las diferentes VLANs. Por lo tanto, los diferentes departamentos tienen\n       presencia en todos los sitios, sin necesidad de conmutadores especializados\n       para cada subred.","atype":"oficial","sources":[],"id":"redesexamen_201312_p3a"},{"exam":"Diciembre 2013","code":"2013-12","problema":"Pregunta 3 (b)","topic":"Capa de enlace","cat":"Capa de enlace","q":"b) Suponga que se cuenta con 2 conmutadores (switches) con varias VLAN definidas, interconectados mediante\n        un enlace troncal (trunk). Cuáles son las diferencias entre las tramas que se trasmiten en el enlace troncal y las\n        que se trasmiten en los enlaces con los sistemas finales (hosts).","answer":"Los enlaces troncales transmiten tramas que incluyen información adicional de\n      identificación de VLANs (etiquetas o tags de VLANs), según el protocolo\n      802.1q, mientras que los hosts utilizan tramas ethernet “normales”. Es decir,\n      los host no tienen conocimiento del uso de VLANs.","atype":"oficial","sources":[],"id":"redesexamen_201312_p3b"},{"exam":"Diciembre 2013","code":"2013-12","problema":"Pregunta 3 (c)","topic":"Capa de red","cat":"Capa de red","q":"c) ¿Es posible cursar tráfico entre VLANs diferentes a nivel de capa de enlace o requiere la intervención de las\n        capas superiores?","answer":"Dado que las VLANs definen dominios de broadcast (subredes) de capa 2\n      aislados, para cursar tráfico entre diferentes VLANs es necesario utilizar los\n      servicios de capa de red, es decir, se necesita un enrutador que interconecte\n      las VLANs a nivel IP.","atype":"oficial","sources":[],"id":"redesexamen_201312_p3c"},{"exam":"Diciembre 2013","code":"2013-12","problema":"Pregunta 4 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"Considere el protocolo DHCP:\n\na) Describa los mensajes que se intercambian en el protocolo y entre que entidades. ¿Qué protocolo de\n       transporte utiliza?","answer":"En la figura se muestran los mensajes\n                                                   intercambiados entre el servidor DHCP y un\n                                                   cliente. Los mensajes se transportan en UDP.","atype":"oficial","sources":[],"id":"redesexamen_201312_p4a"},{"exam":"Diciembre 2013","code":"2013-12","problema":"Pregunta 4 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Considere el protocolo DHCP:\n\nb) ¿Cuál es su utilidad? ¿Lo utilizaría en una red de servidores que implementan el balanceo de carga de un\n       sitio web?","answer":"El protocolo DHCP permite la\n                                                   autoconfiguración de clientes que no están\n                                                   conectados permanentemente a una red, en\n                                                   particular la asignación de direcciones IP,\n                                                   default gateway, DNS.\n\n                                                   En el caso de una red de servidores, por\n                                                   definición son sistemas conectados\n                                                   permanentemente y deben ser alcanzables por\n                                                   su nombre (definido en el DNS); por lo tanto,\n                                                   no es conveniente asignar direcciones IP\n                                                   temporales a los servidores.\n\n                                                  Página 3/7\n\n                                             Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201312_p4b"},{"exam":"Diciembre 2013","code":"2013-12","problema":"Pregunta 5 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Se considera el servicio DNS:\n\na) Describa una forma de utilizarlo para distribuir la carga de un sitio web replicado en varios servidores.","answer":"Los sitos están replicados en varios servidores, cada uno en un sistema\n           terminal distinto con una dirección IP diferente. Estos servidores tienen\n           un conjunto de direcciones IP asociado con un único nombre de host\n           canónico, almacenado en la base de datos DNS. Cuando el servidor recibe una\n           consulta de un cliente, responde con el conjunto de direcciones pero va\n           rotando las direcciones en la lista de forma que el primero de la lista sea\n           siempre uno distinto. Los clientes usualmente usan la primer dirección de\n           la lista, por lo que sucesivas peticiones DNS son dirigidas a los distintos\n           servidores. (De la sección 2.5.1 del Libro del Curso)","atype":"oficial","sources":[],"id":"redesexamen_201312_p5a"},{"exam":"Diciembre 2013","code":"2013-12","problema":"Pregunta 5 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Se considera el servicio DNS:\n\nb) De un ejemplo de consulta recursiva, y un ejemplo de consulta iterativa. Describa cual es la utilidad de\n       cada tipo de consultas.","answer":"Las consultas recursivas\n           minimizan el número de\n           mensajes usados para\n           resolver una consulta, y la\n           implementación del nodo que\n           inicia la consulta es más\n           simple. Las consultas\n           iterativas minimizan la\n           carga sobre los servidores\n           DNS. En la práctica, lo más\n           común es que el primer\n           nivel (al DNS local) sea\n           recursivo, y el resto\n           iterativo. (De la sección\n           2.5.2 del Libro del Curso)\n\n                                                    Página 4/7\n\n                                             Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201312_p5b"},{"exam":"Febrero 2014","code":"2014-02","problema":"Pregunta 1 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"a) Explique cómo un servidor web identifica el tipo de navegador (y por lo tanto también podría identificar el\n        tipo de dispositivo) desde donde recibe un GET, de forma de definir qué versiones de los diferentes\n        objetos de una página web son devueltos.","answer":"Lo realiza a través de la interpretación del valor del campo “User-Agent” contenido en el\nencabezado de los mensajes GET de HTTP. Dicho campo contiene información que permite inferir\nel navegador que se está utilizando y el sistema operativo y eventualmente la plataforma donde\nestá instalado.\n\nLo siguiente no forma parte de la respuesta solicitada. Se incluye con el objetivo de\nejemplificar.\n\nEjemplos de valores de dicho campo:\n- GET desde un Google Chrome instalado en una computadora con SO Linux\nMozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/32.0.1700.77\nSafari/537.36\n- GET desde un Google Chrome instalado en un smartphone con SO Android\nMozilla/5.0 (Linux; Android 4.2.2; SGH-I337M Build/JDQ39) AppleWebKit/537.36 (KHTML, like\nGecko) Chrome/32.0.1700.99 Mobile Safari/537.36","atype":"oficial","sources":[],"id":"redesexamen_201402_p1ax"},{"exam":"Febrero 2014","code":"2014-02","problema":"Pregunta 1 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"b) Ejemplifique la utilidad de implementar lo explicado en la parte anterior.","answer":"Si el servidor web identifica desde qué tipo de terminal se realiza la petición podrá\n“customizar” la respuesta buscando que sea la más adecuada para el cliente (navegador). Por\nejemplo, si la solicitud viene desde un smartphone se buscará desplegar, del contenido total\n(el que se le desplegaría al usuario ante una consulta proveniente desde un navegador\ninstalado en una computadora convencional) lo más relevante, considerando que el usuario del\nsmartphone no está dispuesto ni le resulta muy sencillo recorrer las páginas web\ntradicionales. De allí que aparecen URLs del estilo www.sitio.com.uy, m.sitio.com.uy y/o\nwww.sitio.com.uy/m.","atype":"oficial","sources":[],"id":"redesexamen_201402_p1bx"},{"exam":"Febrero 2014","code":"2014-02","problema":"Pregunta 2 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"Considere un enlace L con capacidad C, sobre el cual solamente se establecen tres conexiones TCP (no existe\notro tráfico TCP, UDP, etc).\n\na) Suponiendo que cada una de las conexiones TCP intentan trasmitir a la mayor tasa posible, cuál será la\n        tasa de transferencia de c/u de ellas en régimen?\n\n                                                     Página 1/11\n\n      Redes de Computadoras, Introducción a las Redes de Computador{ae}s y Comunicación de Datos","answer":"Se puede ver que TCP cumple con la propiedad de equidad (fairness), y por lo tanto tenderá a\nrepartir el ancho de banda equitativamente, es decir, una tasa de C/3 para cada conexión.","atype":"oficial","sources":[],"id":"redesexamen_201402_p2a"},{"exam":"Febrero 2014","code":"2014-02","problema":"Pregunta 2 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"Considere un enlace L con capacidad C, sobre el cual solamente se establecen tres conexiones TCP (no existe\notro tráfico TCP, UDP, etc).\n\nb) Si se inicia un flujo UDP de tasa C/2 y se mantienen las conexiones TCP anteriores, cuál será la nueva\n      tasa de c/u de las conexiones TCP en régimen?","answer":"UDP no tiene control de congestión, y por lo tanto intentará usar toda la capacidad que\nnecesita, es decir C/2.\nLas conexiones TCP, siguiendo el principio de equidad, se repartirán la capacidad restante, es\ndecir, una tasa de C/6 para cada una.","atype":"oficial","sources":[],"id":"redesexamen_201402_p2b"},{"exam":"Febrero 2014","code":"2014-02","problema":"Pregunta 3 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) Identifique los elementos principales de la arquitectura de IP móvil, y en particular explique los conceptos\n      de dirección permanente y dirección cedida (COA – care of address) de un nodo móvil.","answer":"red propia (home network).\nred visitada (visited network).\nnodo móvil.\nnodo corresponsal.\nagente propio (home agent).\nagente ajeno (foreign agent).\nred de área extensa (wan).\nDireccionamiento.\n\nse puede ver un esquema general en el capítulo 6, fig. 6.22\n\nLa dirección permanente del nodo móvil es la que se le adjudica en la home network.\nLa dirección cedida (COA) es la que obtiene el nodo móvil en la red visitada (por ejemplo\nmediante DHCP).","atype":"oficial","sources":[],"id":"redesexamen_201402_p3a"},{"exam":"Febrero 2014","code":"2014-02","problema":"Pregunta 3 (b)","topic":"Capa de red","cat":"Capa de red","q":"b) Explique la función de agente propio (home agent) en el encaminamiento de paquetes entre un nodo\n      corresponsal y un nodo móvil.","answer":"En el esquma de enrutamiento indirecto, el nodo correspondiente que quiere enviar un datagrama\nal nodo móvil desconoce que está en una red visitada y tiene una COA; por lo tanto envía\ndatagramas a la dirección permanente del nodo móvil. Estos datagramas llegarán a la home\nnetwork, y deberán ser interceptados por el home agent, quién deberá redirigirlos al nodo\nmóvil. Esto es posible porque el home agent conoce la COA del nodo móvil; para preservar la\nintegridad del datagrama, se encapsula en un datagrama con la nueva dirección de destino (la\nCOA).\n\nEn el esquema de enrutamiento directo, el nodo correspondiente interroga al home agent sobre\nla COA del nodo móvil, y envía los datagramas directamente a la red visitada, evitando que el\ntráfico sea redirigido en la home network.","atype":"oficial","sources":[],"id":"redesexamen_201402_p3b"},{"exam":"Febrero 2014","code":"2014-02","problema":"Pregunta 3","topic":"Capa de red","cat":"Capa de red","q":"a) En un contexto unicast, describa los procesos de forwarding y enrutamiento, y explique como se\n      relacionan.\n   b) En un contexto broadcast, describa un proceso de flooding, y explique como se puede transformar en\n      flooding controlado.","answer":"a)\nEl proceso de enrutamiento permite determinar el camino entre nodos de la red, típicamente\nmediante intercambio de información de topología y ejecución de un algoritmo en cada nodo para\ndeterminar el camino al resto de los nodos.\nEl proceso de forwarding consiste en copiar cada paquete entrante a un nodo al puerto de\nsalida adecuado para que siga su camino en la red (o entregarlo a un proceso local si el\n\n                                                   Página 2/11\n\n        Redes de Computadoras, Introducción a las Redes de Computador{ae}s y Comunicación de Datos\ndestinatario es el propio nodo). La tabla de forwarding, que asocia destinos con puertos (o\ninterfaces) del nodo/router, se construye en base a la información de enrutamiento.\n\nb)","atype":"oficial","sources":[],"id":"redesexamen_201402_p3"},{"exam":"Febrero 2014","code":"2014-02","problema":"Pregunta 5 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"a) Identifique los componentes del retardo en las redes de paquetes, y señale cuáles son los más\n        significativos.","answer":"Retardo de procesamiento en el nodo.\nPor ejemplo chequeo de paridad (CRC), determinar enlace de salida (enrutamiento).\n\n                                                   Página 3/11\n\n      Redes de Computadoras, Introducción a las Redes de Computador{ae}s y Comunicación de Datos\nRetardo de encolamiento (buffering).\nEspera en colas del enlace de salida para trasmisión.\n\nRetardo de trasmisión.\nSea R=ancho de banda del enlace (bps) y L=longitud del paquete (bits), el tiempo de envío =\nL/R.\n\nRetardo de propagación.\nSea d = longitud del enlace físico y s = velocidad de propagación en el medio, el retardo de\npropagación = d/s.","atype":"oficial","sources":[],"id":"redesexamen_201402_p5a"},{"exam":"Febrero 2014","code":"2014-02","problema":"Pregunta 5 (b)","topic":"Físico y métricas","cat":"Físico y métricas","q":"b) Señale las diferencias entre el ancho de banda y la velocidad de propagación en el medio.","answer":"Ancho de Banda de una interfaz es la cantidad de bits que esta puede introducir en el medio de\ntransmisión por unidad de tiempo.\n\nLa velocidad de propagación es la velocidad con la que un bit viaja dentro del medio físico de\ntransmisión. Es una característica del medio, por ejemplo s~2x108 m/seg en cobre.","atype":"oficial","sources":[],"id":"redesexamen_201402_p5b"},{"exam":"Febrero 2014","code":"2014-02","problema":"Pregunta 5 (c)","topic":"Capa de transporte","cat":"Capa de transporte","q":"c) ¿En qué componente del retardo influye la congestión?","answer":"El retardo de encolamiento depende del nivel de congestión del router ya que a más datagramas\nllegando por segundo a la cola más larga será esta y más tiempo deberá esperar un datagrama en\nella hasta que sea reenviado.\n\n                                             Página 4/11\n\n         Redes de Computadoras, Introducción a las Redes de Computador{ae}s y Comunicación de Datos","atype":"oficial","sources":[],"id":"redesexamen_201402_p5c"},{"exam":"Agosto 2014","code":"2014-08","problema":"Pregunta 1","topic":"Capa de transporte","cat":"Capa de transporte","q":"Mencione las características fundamentales de una red de conmutación de paquetes y de una red conmutación de\ncircuitos. Proponga un ejemplo de cada tipo de red, y analice las diferencias fundamentales en cuanto a la\nasignación de recursos para cada tipo de red.","answer":"En una red de conmutación de circuitos, para iniciar un flujo de información entre dos nodos\nse debe cumplir una fase de establecimiento del circuito, que consiste en determinar un camino\nde extremo a extremo que permanecerá fijo durante la duración de la transferencia. En cambio,\nen las redes de conmutación de paquetes el flujo de información entre dos nodos se divide en\nunidades de largo variable (paquetes) que son encaminados en la red uno a uno, y donde cada\nnodo atravesado determina el próximo nodo al cual será enviado el paquete (enrutamiento hop-\nby-hop). Un ejemplo típico de red de conmutación de circuitos es la red telefónica, mientras\nque un ejemplo típico de red de conmutación de paquetes es internet (o más genéricamente, las\nredes TCP/IP). En conmutación de circuitos se asignan recursos para cada circuito y son de uso\nexclusivo mientras esté establecido (aún cuando momentáneamente no haya flujo de información);\nen cambio, en conmutación de paquetes, los recursos se asignan mediante multiplexado\nestadístico, es decir que cada paquete utiliza recursos (memoria en los routers, ancho de\nbanda en los enlaces) solo cuando lo necesita, y de esta forma cuando no se utilizan, los\nrecursos quedan liberados para otros paquetes.","atype":"oficial","sources":[],"id":"redesexamen_201408_p1"},{"exam":"Agosto 2014","code":"2014-08","problema":"Pregunta 2","topic":"Capa de enlace","cat":"Capa de enlace","q":"Describa el algoritmo de Estado del Enlace (Link State) mediante un pseudocódigo. Especifique claramente el\npaso de inicialización y las iteraciones necesarias para encontrar los caminos más cortos desde un nodo u a todos\nlos nodos de una red con N nodos.","answer":"1 Initialization:\n2 N' = {u}\n3 for all nodes v\n4   if v adjacent to u\n5   then D(v) = c(u,v)\n6 else D(v) = ∞\n7\n8 Loop\n9    find w not in N' such that D(w) is a minimum\n10 add w to N'\n11 update D(v) for all v adjacent to w and not in N' :\n12   D(v) = min( D(v), D(w) + c(w,v) )\n13 /* new cost to v is either old cost to v or known\n14 shortest path cost to w plus cost from w to v */\n                                                   Página 1/8\n\n      Redes de Computadoras, Introducción a las Redes de Computador{ae}s y Comunicación de Datos\n15 until all nodes in N'","atype":"oficial","sources":[],"id":"redesexamen_201408_p2"},{"exam":"Agosto 2014","code":"2014-08","problema":"Pregunta 3 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) Dada la siguiente tabla de forwarding de un router, ¿por qué interfaz será enviado un paquete con\n      dirección IP destino 172.31.0.126? Justifique realizando la operación que ejecuta el router para tomar\n      dicha decisión.\n                Prefijo                                         Interfaz\n                172.28.0.0/22                                   if0\n                172.30.0.0/23                                   if1\n                172.31.0.128/25                                 if2\n                0.0.0.0/0                                       if3","answer":"172.31.0.126 en notación binaria es 10101100.00011111.00000000.01111110\n\n172.28.0.0/22 incluye las redes 172.28.0.0, 172.28.1.0, 172.28.2.0 y 172.28.3.0\n172.30.0.0/23 incluye las redes 172.30.0.0 y 172.30.1.0\n\nAnalizamos cada entrada de la tabla de forwarding\n\nPara la primera entrada\n       10101100.00011111.00000000.01111110             (172.31.0.126 en notación binaria)\n       AND bit a bit\n       11111111.11111111.11111100.00000000             máscara 255.255.252.0\n       -----------------------------------\n*1     10101100.00011111.00000000.00000000             es en decimal 172.31.0.0\n*2     10101100.00011100.000000                        prefijo 172.28.0.0/22\n\n       *1 y *2 no hay match\n\nPara la segunda entrada\n       10101100.00011111.00000000.01111110             (172.31.0.126 en notación binaria)\n       AND bit a bit\n       11111111.11111111.11111110.00000000             máscara 255.255.254.0\n       -----------------------------------\n*3     10101100.00011111.00000000.00000000             es 172.31.0.0 en notación decimal\n*4     10101100.00011110.0000000                       prefijo 172.30.0.0/23\n\n       *3 y *4 no hay match\n\nPara la tercera entrada\n       10101100.00011111.00000000.01111110             (172.31.0.126 en notación binaria)\n       AND bit a bit\n       11111111.11111111.11111111.10000000             máscara 255.255.255.128\n       -----------------------------------\n*5     10101100.00011111.00000000.00000000             es en decimal 172.31.0.0\n*6     10101100.00011111.00000000.1                    es en decimal 172.31.0.128\n\n       *5 y *6 no hay match\n\nPor lo tanto la interfaz de salida es la “if3” (ruta por defecto). De no existir esta entrada\nen la tabla de forwarding del router, el paquete sería descartado.","atype":"oficial","sources":[],"id":"redesexamen_201408_p3a"},{"exam":"Agosto 2014","code":"2014-08","problema":"Pregunta 3 (b)","topic":"Capa de red","cat":"Capa de red","q":"b) ¿Cuál es el nombre del algoritmo utilizado por el router para seleccionar una entrada en la tabla de\n      forwarding?","answer":"Se llama “regla de coincidencia con el prefijo más largo” o longest prefix match.\n\n                                                   Página 2/8\n\n       Redes de Computadoras, Introducción a las Redes de Computador{ae}s y Comunicación de Datos","atype":"oficial","sources":[],"id":"redesexamen_201408_p3b"},{"exam":"Agosto 2014","code":"2014-08","problema":"Pregunta 4","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Describa las características fundamentales del protocolo FTP (File Transfer Protocol).","answer":"Protocolo de la capa de aplicación utlizado para la transferencia de archivos desde/hacia un\nhost remoto.\nTrabaja de acuerdo al modelo cliente/servidor.\nEl cliente es el lado que inicia la transferencia.\nUn servidor ftp escucha por defecto en el puerto 21 (conexión de control)\nEl puerto 20 del lado del servidor se destina para establecer la conexión de datos.\nEl protocolo de transporte en ambas conexiones es TCP.\nEl cliente inicia la conexión de control hacia el servidor, puerto 21.\nEl servidor antes de iniciar la transferencia inicia la conexión hacia el cliente, desde el\npuerto 20.","atype":"oficial","sources":[],"id":"redesexamen_201408_p4"},{"exam":"Agosto 2014","code":"2014-08","problema":"Pregunta 5 (a)","topic":"Redes (general)","cat":"Redes (general)","q":"a) ¿Cuál es la utilidad del comando traceroute?","answer":"Permite determinar el camino de ida (a ser recorrido por los paquetes en un momento dado)\nentre un origen y un destino.","atype":"oficial","sources":[],"id":"redesexamen_201408_p5a"},{"exam":"Agosto 2014","code":"2014-08","problema":"Pregunta 5 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) ¿En base a qué protocolos se implementa habitualmente?","answer":"ICMP y UDP","atype":"oficial","sources":[],"id":"redesexamen_201408_p5b"},{"exam":"Agosto 2014","code":"2014-08","problema":"Pregunta 5 (c)","topic":"Capa de transporte","cat":"Capa de transporte","q":"c) Describa el funcionamiento del traceroute (secuencia de mensajes y sus principales características) en\n      una de las implementaciones mencionadas en la parte anterior.","answer":"Se describe la implementación basada en ICMP.\n\nAl ejecutar el comando (por defecto el único argumento necesario es la dirección IP destino),\nse envían, por defecto, 3 paquetes IP CON TTL=1 conteniendo 3 mensajes ICMP de control del\ntipo “echo”. Al llegar al primer salto y se decrementado el TTL, este pasa a valer 0 y si no\nes el destino de los paquetes, se devuelven al origen 3 paquetes IP con dirección IP origen\nquien los genera, dirección IP destino la dirección IP origen de los paquetes que los motivó y\nconteniendo cada uno un mensaje de error “time exceeded”. El receptor de los mensajes refleja\nen una primera línea en consola la llegada de estos tres mensajes así como el tiempo que\ntranscurrió entre que salió cada paquete y se recibió el mensaje de error correspondiente.\n\nEl siguente paso es generar los mismos paquetes que en el paso anterior pero ahora con TTL=2.\nEllos atravesarán el primer salto y salvo que sean destinados al segundo salto, el\ncomportamiento será similar el descripto en el párrafo anterior.\n\nCuando los paquetes arriban al destino final, en lugar de retornar un mensaje ICMP de error\n“time exceeded” como en todos los saltos anteriores, se generan mensajes ICMP de control “echo\nreply”.\n\nSiempre todos los mensajes que salen desde el host donde se ejecuta el comando lo hacen con la\nmisma dirección IP destino.\n\nLa dirección IP destino de los paquetes IP que contienen las respuestas ICMP se obtienen de la\ndirección IP origen del paquete que lo motivó.\n\nLa dirección IP origen es la del nodo que genera el mensaje ICMP (payload del paquete IP)\n\nEl payload de los mensajes ICMP de error es una parte del paquete IP que lo originó\n(encabezado y algunos bits de su payload)\n\nEl traceroute basado en UDP se implementa a partir de enviar mensajes UDP dirigidos a puertos\ndonde la probabilidad de respuesta es muy baja. En todos los nodos intermedios el camino se va\nconstruyendo a partir de mensajes “time exceeded”. Al llegar al destino, se recibirá un\nmensaje ICMP de error “port unreachable”.\n\n                                                Página 3/8\n\n        Redes de Computadoras, Introducción a las Redes de Computador{ae}s y Comunicación de Datos","atype":"oficial","sources":[],"id":"redesexamen_201408_p5c"},{"exam":"Diciembre 2014","code":"2014-12","problema":"Pregunta 1","topic":"Capa de red","cat":"Capa de red","q":"Describa el concepto de medio compartido, y comente las características del mecanismo de control de acceso al\nmedio CSMA/CD utilizado en ethernet. ¿Cuál es su eficiencia?","answer":"El medio compartido, también llamado enlace de difusión (o broadcast), puede tener múltiples\nemisores y receptores, todos conectados al mismo enlace de difusión compartido. Ejemplos\ntípicos son el medio inalámbrico y la primera versión de ethernet. En este medio se utiliza el\nmecanismo de Acceso múltiple con sondeo de portadora (CSMA/CD – Carrier Sense Multiple\nAccess / Carrier Detection), que funciona de esta forma:\n\n1. La placa de red (NIC) recibe un datagrama de la capa de red y crea una trama.\n2. Si la NIC sensa el canal libre, inicia la transmisión de la trama; si sensa el canal\nocupado, espera a que el canal esté libre, y luego transmite.\n3. Si la NIC transmite la trama entera sin detectar otra transmisión, terminó con la trama\nactual.\n4. Si la NIC detecta otra transmisión mientras está transmitiendo, interrumpe la transmisión y\nenvía la señal jam.\n5. Luego de interrumpir, la NIC entra en un backoff exponencial: luego de la m-sima colisión,\nse elige un número K aleatorio entre {0,1,2,…,2m-1}. La NIC espera K*512 tiempos de bit, y\nretorna al Paso 2.\n\nEficiencia\n\nEn general, para cualquier medio compartido, la eficiencia se calcula maximizando la\nprobabilidad de transmisión exitosa. En ethernet, además, hay que tener en cuenta que el\n“intervalo de contención”, es decir, el tiempo en el cual una colisión puede NO ser detectada,\nes dos veces el tiempo de propagación (Tprop). Operando se llega a la expresión\n                      Donde:\n                      Tprop = máx. retardo de transmisión entre 2 nodos en la LAN\n                      Ttrans = tiempo empleado en transmitir una trama\n\nSe puede ver que la eficiencia se acerca al 100% si:\nTprop tiende a 0 (medio ideal), o\nTtrans tiende a infinito (tramas muy grandes)\n\nPor ejemplo, para ethernet de 10 Mbps, Tprop = 51.2 us, Ttrans = 1.2 ms → eficiencia del\n82.6%!","atype":"oficial","sources":[],"id":"redesexamen_201412_p1"},{"exam":"Diciembre 2014","code":"2014-12","problema":"Pregunta 1 (a)","topic":"Capa de enlace","cat":"Capa de enlace","q":"Considere una red inalámbrica que utiliza el estándar IEEE 802.11.\n\na) Explique el protocolo de acceso al medio que se utiliza en este estándar.\n\n                                                   Página 1/7\n\n       Redes de Computadoras, Introducción a las Redes de Computador{ae}s y Comunicación de Datos","answer":"Se utiliza el mecanismo CSMA/CA. Sin entrar en detalles, funciona de la siguiente manera:\nSuponga que una estación dispone de una trama para transmitir.\n1. Si la estación detecta inicialmente que el canal está libre, transmite la trama.\n2. En caso contrario, la estación selecciona un valor de espera (backoff) aleatorio y efectúa\nuna cuenta atrás con este valor mientras detecta que el canal está inactivo. Cuando detecta\nque el canal está ocupado, el valor del contador permanece congelado.\n3. Cuando el contador alcanza el valor cero, la estación transmite la trama completa y luego\nespera a recibir un reconocimiento.\n4. Si se recibe una trama de reconocimiento, la estación transmisora sabe que su trama ha sido\nrecibida correctamente en la estación de destino. Si la estación tiene otra trama que enviar,\ncomienza de nuevo el protocolo CSMA/CA en el paso 2. Si no se recibe una trama de\nreconocimiento, la estación transmisora vuelva a entrar en la fase de backoff del paso 2,\nseleccionando el valor aleatorio de un intervalo más largo.","atype":"oficial","sources":[],"id":"redesexamen_201412_p1a"},{"exam":"Diciembre 2014","code":"2014-12","problema":"Pregunta 1 (b)","topic":"Capa de enlace","cat":"Capa de enlace","q":"Considere una red inalámbrica que utiliza el estándar IEEE 802.11.\n\nb) Suponga un escenario con 2 pares de nodos transmisor y receptor, ¿que sucede si en uno de los\n       transmisores se desactiva el mecanismo de sensado del medio?","answer":"Debido a que en un transmisor se desactivó el mecanismo de sensado, este considerará que el\nmedio está siempre disponible y transmirá todo el tiempo, independientemente de si el otro\ntransmisor está transmitiendo o no. Esto provocará colisiones si los dos transmisores envían a\nla vez. Además, el otro transmisor detectará el medio ocupado mas seguido retrasando sus\ntransmisiones y por lo tanto limitando sus posibilidades de transmisión.","atype":"oficial","sources":[],"id":"redesexamen_201412_p1b"},{"exam":"Diciembre 2014","code":"2014-12","problema":"Pregunta 2","topic":"Capa de red","cat":"Capa de red","q":"Describa las características del protocolo Neighbor Discovery de IPv6, y señale las diferencias con ARP, utilizado\nen IPv4.","answer":"Se utiliza ND para determinar las direcciones de capa de enlace (MAC) de los nodos\npertenecientes al mismo segmento de red, y asimismo para encontrar los routers vecinos. ND\nemplea la mensajería de ICMPv6, y es la base para permitir el mecanismo de autoconfiguración\nen IPv6. El protocolo ND defines cinco tipos de paquete ICMPv6 para router solicitation (RS),\nrouter advertisement (RA), neighbor solicitation (NS), neighbor advertisement (NA), y network\nredirect (NR).\nEn particular, los nodos envían mensajes NS para determinar dinámicamente la correspondencia\nIPv6 – MAC. NS utiliza múlticast cuando el nodo necesita resolver una dirección y unicast para\ndeterminar alcance (reachability). De esta forma reemplaza los mensajes “ARP request” de IPv4\n(transportados en tramas de broadcast ethernet), brindando características mejoradas y\nteniendo mejor integración con la suite IPv6.\nND forma parte de los mecanismos de base de IPv6, mientras que en IPv4 se utilizan diferentes\nmecanismos para alcanzar funcionalidades similares: ARP, ICMP router discovery, e ICMP\nredirect.","atype":"oficial","sources":[],"id":"redesexamen_201412_p2"},{"exam":"Diciembre 2014","code":"2014-12","problema":"Pregunta 3 (a)","topic":"Capa de red","cat":"Capa de red","q":"En un contexto multicast:\n\na) ¿En qué consiste un source-based tree (árbol basado en fuente)?","answer":"En un contexto multicast se utilizan árboles de cubrimiento para implementar el\nenrutamiento por multicast. El enrutamiento por multicast mediante un árbol basado en fuente\nconstruye un árbol de enrutamiento por multicast para cada origen existente en el grupo\nmulticast. Es decir, por cada origen se crea un arbol de cubrimiento para enrutar un mensaje a\ntodos los nodos pertencientes al grupo. Mientras que el enrutamiento por multicast basado en\nárbol compartido por el grupo construye un único árbol de enrutamiento compartido para enrutar\nlos paquetes de todos los emisores.","atype":"oficial","sources":[],"id":"redesexamen_201412_p3a"},{"exam":"Diciembre 2014","code":"2014-12","problema":"Pregunta 3 (b)","topic":"Capa de red","cat":"Capa de red","q":"En un contexto multicast:\n\nb) Describa en que consiste y cómo se utiliza el mecanismo de reverse path forwarding.","answer":"RPF consiste en que cuando un router recibe un paquete de multicast con una determinada\ndirección de origen, transmite el paquete a todos sus enlaces de salida (excepto al enlace por\nel que ha sido recibido) sólo si el paquete ha llegado a través del enlace que pertenece a su\npropia ruta de unidifusión más corta que le conecta con el origen. En otro caso, el router\nsimplemente descarta el paquete entrante sin reenviarlo a ninguno de sus enlaces de salida. En\n                                                   Página 2/7\n\n        Redes de Computadoras, Introducción a las Redes de Computador{ae}s y Comunicación de Datos\nun contexto multicast, se utiliza RPF con poda (prunnig). La poda consiste en que un router\nmulticast que recibe paquetes de multicast y que no tiene hosts conectados unidos a dicho\ngrupo enviará un mensaje de poda a su router inmediatamente anterior. Si un router recibe\nmensajes de poda procedentes de cada uno de los routers situados por debajo, puede entonces\nreenviar hacia arriba un mensaje de poda. Con esto se evita enviar mensajes de multicast a\nrouters que no tienen host pertenecientes al grupo de multicast.\n\nEn multicast se utiliza un algoritmo RPF (con x como nodo de origen) para construir un árbol\nde reenvío por multicast para los datagramas de multicast que tienen su origen en x. Es decir,\npara construir un arbol basado en la fuente.","atype":"oficial","sources":[],"id":"redesexamen_201412_p3b"},{"exam":"Diciembre 2014","code":"2014-12","problema":"Pregunta 4 (a)","topic":"Capa de enlace","cat":"Capa de enlace","q":"a) ¿En qué capa se transporta el protocolo ARP?","answer":"Capa de Enlace de Datos","atype":"oficial","sources":[],"id":"redesexamen_201412_p4a"},{"exam":"Diciembre 2014","code":"2014-12","problema":"Pregunta 4 (b)","topic":"Capa de enlace","cat":"Capa de enlace","q":"b) Represente en un diagrama los encabezados y la carga útil de un mensaje ARP Request.","answer":"Se representan en el diagrama los campos más relevantes","atype":"oficial","sources":[],"id":"redesexamen_201412_p4b"},{"exam":"Diciembre 2014","code":"2014-12","problema":"Pregunta 4 (c)","topic":"Capa de red","cat":"Capa de red","q":"c) ¿En qué capa se transporta el protocolo ICMP?","answer":"Capa de Red","atype":"oficial","sources":[],"id":"redesexamen_201412_p4c"},{"exam":"Diciembre 2014","code":"2014-12","problema":"Pregunta 4 (d)","topic":"Capa de red","cat":"Capa de red","q":"d) Represente en un diagrama los encabezados y la carga útil de un mensaje ICMP Time Exceeded.","answer":"Se representan en el diagrama los campos más relevantes (no se incluye el encabezado de\ncapa 2)","atype":"oficial","sources":[],"id":"redesexamen_201412_p4d"},{"exam":"Diciembre 2014","code":"2014-12","problema":"Pregunta 5","topic":"Capa de transporte","cat":"Capa de transporte","q":"Represente las máquinas de estados del protocolo rdt 2.0, que implementa un servicio de transporte confiable\nasumiendo que no se pierden ni se alteran los mensajes de reconocimiento ACK y NAK.","answer":"Página 3/7\n\n            Redes de Computadoras, Introducción a las Redes de Computador{ae}s y Comunicación de Datos","atype":"oficial","sources":[],"id":"redesexamen_201412_p5"},{"exam":"Febrero 2015","code":"2015-02","problema":"Pregunta 1 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"a) Describa brevemente los componentes del retardo en las redes de paquetes. Señale cuáles son los más\n      significativos.","answer":"Componentes del retardo: procesamiento, cola, trasmisión, propagación.\n\nRetardo de Procesamiento en el nodo: involucra el análisis y procesamiento de cabezales,\nforwarding, cálculo de CRC y similares, entre otros.\nRetardo de Cola: generado por paquetes que esperan ser trasmitidos en un enlace, es variable\nen función de la carga de la red.\nRetardo de trasmisión: tiempo requerido para insertar en el enlace los bits de un paquete, a\nla velocidad de la interfaz del nodo (por ejemplo, 100Mbps, 1Gbps).\nRetardo de propagación: es el tiempo que “de viaje” de un bit entre dos nodos; depende del\nmedio (fibra, cobre, etc) y de la distancia.\n\nEn diversos escenarios los retardos más significativos pueden variar; en una LAN, con cables\ncortos y velocidades de trasmisión superiores a 100Mbps, los retardos de trasmisión y\npropagación serán típicamente despreciables. En enlaces intercontinentales, por ejemplo\nsatelitales, el retardo de propagación puede ser muy importante, en el orden de cientos de\nmilisegundos, y si la velocidad de trasmisión (ancho de banda) es baja, del orden de 64 Kbps,\nel retardo de trasmisión puede ser influyente. Normalmente el retardo de procesamiento es\ndespreciable, y el retardo de cola es variable y se analiza en la parte c)","atype":"oficial","sources":[],"id":"redesexamen_201502_p1a"},{"exam":"Febrero 2015","code":"2015-02","problema":"Pregunta 1 (b)","topic":"Físico y métricas","cat":"Físico y métricas","q":"b) Señale las diferencias entre la tasa de trasmisión y la velocidad de propagación en el medio.","answer":"La tasa o velocidad de trasmisión es la cantidad de bits por unidad de tiempo que se pueden\n“meter en el cable”, y depende del hardware del nodo (router). Por ejemplo, un router puede\ntener interfaces de 100Mbps y 1Gbps con cableado físico UTP de cobre; el medio es el mismo,\npero la tasa de trasmisión depende de la electrónica de cada intefaz. Si la tasa de trasmisión\nes R, y los paquetes son de largo L, el retardo de trasmisión es L/R. La velocidad de\npropagación es la velocidad con que un bit “viaja” en el medio físico; en el ejemplo anterior,\nserá la velocidad de propagación en el cobre, indistintamente de si la interfaz es de 100Mbps\n                                      o 1Gbps. Si la velocidad de propagación es s, y la\n                                      distancia recorrida es d, el retardo de propagación es\n                                      d/s.","atype":"oficial","sources":[],"id":"redesexamen_201502_p1b"},{"exam":"Febrero 2015","code":"2015-02","problema":"Pregunta 1 (c)","topic":"Físico y métricas","cat":"Físico y métricas","q":"c) Sean L el tamaño de los paquetes, a la tasa de arribo de paquetes, y R la tasa de trasmisión, y llamamos\n      intensidad del tráfico al cociente I=La/R. Describa la relación entre el retardo de cola y la intensidad del\n      tráfico.","answer":"El producto La es la tasa de arribo de bits a la cola\n                                             del nodo, mientras que R es la tasa de trasmisión, es\n                                             decir, la velocidad con que el nodo vacía la cola. Por\n                                             lo tanto si La/R > 1 la cola nunca se vacía y el retardo\n                                             tenderá a infinito; en el otro extremo, si La/R << 1, la\n\n                                                   Página 1/10\n\n       Redes de Computadoras, Introducción a las Redes de Computador{ae}s y Comunicación de Datos\ncola se vacía rápido y consecuentemente el retardo de cola es pequeño, como se ve en la\nfigura.","atype":"oficial","sources":[],"id":"redesexamen_201502_p1c"},{"exam":"Febrero 2015","code":"2015-02","problema":"Pregunta 2 (a)","topic":"Capa de red","cat":"Capa de red","q":"Uno de los atributos fundamentales que utiliza el proceso de decisión de BGP es el AS-PATH, es decir, la cantidad\nde Sistemas Autónomos que atraviesa una ruta determinada para alcanzar un prefijo de red.\n\na) Defina Sistema Autónomo.","answer":"Un sistema autónomo (AS) es un conjunto de routers bajo un mismo control técnico y\nadministrativo, y que típicamente ejecutan el mismo protocolo de enrutamiento interno. Se\ndistingue por un número de AS que es utilizado por BGP para establecer sesiones y comunicar la\nmétrica AS-PATH.\nb)Este atributo se utiliza para determinar el camino más corto en término de ASes, por lo\ntanto, “gana” el AS-PATH más corto.","atype":"oficial","sources":[],"id":"redesexamen_201502_p2a"},{"exam":"Febrero 2015","code":"2015-02","problema":"Pregunta 2 (c)","topic":"Capa de red","cat":"Capa de red","q":"Uno de los atributos fundamentales que utiliza el proceso de decisión de BGP es el AS-PATH, es decir, la cantidad\nde Sistemas Autónomos que atraviesa una ruta determinada para alcanzar un prefijo de red.\n\nc) ¿Se puede afirmar que la decisión garantiza un camino más corto en cantidad de hops de routers?","answer":"No, porque se desconoce la información interna de cada AS. Un camino con AS-PATH más corto\npuede incluir ASes con muchos “hops” de routers internos, y puede ser más largo en término de\nrouters que otro camino con AS-PATH más largo.","atype":"oficial","sources":[],"id":"redesexamen_201502_p2c"},{"exam":"Febrero 2015","code":"2015-02","problema":"Pregunta 3 (a)","topic":"Capa de red","cat":"Capa de red","q":"Considere el algoritmo Path MTU Discovery en IPv6.\n\na) Fundamente la necesidad del mismo.","answer":"Los routers no realizan fragmentación en IPv6, por lo que, si un PDU de IPv6 excede el MTU\nes descartado. Es importante para cualquier par de entidades que se comuniquen, asegurarse que\nsus mensajes lleguen a destino, y para ello, sus mensajes no deben exceder el mínimo MTU del\ncamino por el que transitan.","atype":"oficial","sources":[],"id":"redesexamen_201502_p3a"},{"exam":"Febrero 2015","code":"2015-02","problema":"Pregunta 3 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"Considere el algoritmo Path MTU Discovery en IPv6.\n\nb) Fundamente por qué no es un requerimiento en IPv4.","answer":"La definición de IPv4 involucra que, cuando segmentos de determinado flujo arriban a un\nenlace con un MTU inferior, se realiza fragmentación y reensamblado en dicho enlace, sin que\nlas entidades origen y destino de la comunicación eventualmente lleguen a enterarse. Los\nextremos de la comunicación pueden ignorar el mínimo MTU del camino, pues, los routers\nintermedios lo resuelven.","atype":"oficial","sources":[],"id":"redesexamen_201502_p3b"},{"exam":"Febrero 2015","code":"2015-02","problema":"Pregunta 3 (c)","topic":"Capa de red","cat":"Capa de red","q":"Considere el algoritmo Path MTU Discovery en IPv6.\n\nc) Proponga un pseudocódigo del algoritmo Path MTU Discovery","answer":"vamos a proponer un algoritmo por bipartición, asumiendo IP_O el origen e IP_D el destino.\nAsumo que dispongo de una función para el envío de un mensaje ICMP echo request;\n\n   int pathMTUDiscovery(IPv6_address IP_O, IP_D)\n       int max_mtu= link.getMTU(); // el valor máximo lo define el enlace\n       int min_mtu= 1280; //según RFC 2460\n       int cant_fallos=0;\n       while ((max_mtu – min_mtu)>1)\n               mtu_candidato = (max_mtu + min_mtu) / 2;\n               envio_ICMP_ER(IP_O,IP_D,mtu_candidato);\n               switch event:\n                      timeout: //no se lo que pasó: hubo retardo o se perdió el mensaje\n                              if (cant_fallos < MAX_FALLOS_ADMITIDOS)\n                                     cant_fallos++;\n                              else\n                                     return 1280; // no pude determinar el MTU, pero\n                                                  // devuelvo un MTU válido\n                      ICMP_echo_reply: // mtu_candidato es un MTU válido\n                              min_mtu = mtu_candidato;\n                      ICMP_packet_too_big: //mtu_candidato excede el pathMTU\n                              max_mtu = mtu_candidato;\n       end; //while\n       return min_mtu;","atype":"oficial","sources":[],"id":"redesexamen_201502_p3c"},{"exam":"Febrero 2015","code":"2015-02","problema":"Pregunta 4","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Considere una red LAN de servidores que funciona correctamente donde todos acaban de ser reiniciados.\nDesde un navegador web instalado en el único servidor DNS perteneciente a dicha LAN, se realiza la petición de\nla página principal de un portal web instalado en otro servidor de la misma LAN.\n\n                                                  Página 2/10\n\n      Redes de Computadoras, Introducción a las Redes de Computador{ae}s y Comunicación de Datos\n¿Qué mensajes se intercambian a través de dicha red LAN hasta que la página es desplegada en el navegador?\nDocumente todas las hipótesis razonables asumidas para elaborar su respuesta.","answer":"Hipótesis:\n            •   se considera el caso más típico. Existen muchas variantes posibles y válidas.\n            •   todos los cachés, tanto de DNS como de ARP están vacíos.\n            •   no existen tablas estáticas IP – MAC\n            •   el servidor DNS configurado en todas las máquinas instaladas en la red LAN en\n                cuestión, es el de la red LAN\n            •   todas las máquinas instaladas en la red LAN resuelven todas las consultas DNS\n                contra el server instalado en la red.\n            •   el servidor DNS instalado en la red LAN contiene una zona donde están almacenados\n                todos los registros necesarios para acceder a todos los recursos disponibles en\n                la red LAN.\n            •   la página web no incluye contenido que para ser obtenido, se deba recurrrir a\n                protocolos que no sea http.\n          •  sólo se utiliza http1.1\nLa resolución de DNS para conocer la dirección IP asociada a la URL ingresada en el navegador\nse realiza de manera local en el servidor DNS, por lo que no hay mensajes intercambiados en la\nLAN.\nMensajes observados en la red LAN\n    •   Luego de la resolución, desde el DNS server se genera un mensaje broadcast ARP Request\n        para conocer la dirección MAC asociada a la dirección IP obtenida de la respuesta DNS.\n    •   El servidor que contiene el portal web del que se peticiona su página principal\n        responde con un mensaje unicast ARP Reply dirigido a la máquina que realizó la\n        consulta, indicando su dirección MAC.\n    •   A partir de esta respuesta, se establece una conexión TCP entre el servidor DNS y el\n        servidor Web. Se requieren 3 mensajes: “segmento SYN” desde el servidor DNS hacia el\n        servidor WEB, “segmento SYN-ACK” desde el servidor WEB hacia el servidor DNS y\n        “segmento ACK” desde desde el servidor DNS al servidor WEB.\n    •   A través de esa conexión TCP se envía un mensaje “HTTP GET” desde el servidor DNS hacia\n        el servidor WEB.\n    •   En el otro sentido viaja uno o más mensajes HTTP llevando el contenido de la página web\n        hacia el navegador instalado en el servidor DNS.\n    •   Si la página web ofrece contenido web que está almacenado en otros servidores y no\n        localmente, tenemos dos casos: si los servidores están en la misma red, luego de las\n        peticiones ARP necesarias, se establecerán las conexiones TCP con ellos para solicitar\n        el contenido (y el tráfico observable es similar al mencionado antes); si los\n        servidores están fuera de la red LAN, vía ARP el servidor deberá conocer la dirección\n        MAC del default gateway de la red LAN para encaminar a través de él los mensajes de\n        establecimiento de las conexiones TCP necesarias para el envío de los HTTP GET\n        necesarios y para recibir el contenido.\n    •   Suponiendo que las URL contenidas en la página principal del servidor WEB se basan en\n        nombres y no en direcciones IP, para poder establecer las conexiones TCP será necesario\n        que previamente se traslade (vía DNS) cada nombre a una dirección IP. Si son nombres de\n        recursos que no están instalados en la red LAN, las consultas serán iterativas y todo\n        el tráfico de consulta (que recorre la estructura jerárquica del servicio DNS) hasta\n        llegar a la respuesta esperada será observado en la LAN, “entrando y saliendo” de la\n        misma. Si hay recursos en la red, se observará tráfico DNS local (que no sale de la red\n        LAN).","atype":"oficial","sources":[],"id":"redesexamen_201502_p4"},{"exam":"Febrero 2015","code":"2015-02","problema":"Pregunta 5","topic":"Capa de transporte","cat":"Capa de transporte","q":"Si todos los enlaces de Internet tuvieran que proporcionar un servicio de entrega de tramas fiable, ¿sería\nredundante el servicio de entrega fiable de TCP?","answer":"No, no sería redundante ya que se pueden perder paquetes por congestión en las colas de los\nrouters, o pueden llegar en desorden a causa de diversidad de caminos en un flujo.\n\n                                                    Página 3/10\n\n       Redes de Computadoras, Introducción a las Redes de Computador{ae}s y Comunicación de Datos","atype":"oficial","sources":[],"id":"redesexamen_201502_p5"},{"exam":"Diciembre 2015","code":"2015-12","problema":"Pregunta 1 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Sea el protocolo FTP.\n\na) Describa brevemente el protocolo, su utilidad y funcionamiento mencionando ¿cómo se utilizan el canal de\n      control y el de datos por parte del protocolo?","answer":"El protocolo de transferencia de archivos (File Transfer Protocol) sirve para la\n      transferencia de archivos entre hosts sobre una red IP utilizando el protocolo de\n      transporte TCP. Sigue el paradigma cliente-servidor y utiliza conexiones de control y\n      datos independientes entre el cliente y el servidor. El funcionamiento del protocolo se\n      basa en un establecimiento de conexión y autenticación, seguido de una ejecución\n      interactiva de comandos locales o remotos y posterior desconexión. Se pueden enviar y\n      recibir archivos en una misma sesión FTP\n      Cuando el cliente se conecta al servidor, establece una conexión TCP al puerto 21 del\n      servidor, que es utilizada para autenticación, envío de mensajes y recepción de códigos\n      de salida. Cuando el servidor transfiere información al cliente, desde la salida de un\n      comando ls (o dir) hasta la transferencia específica de un archivo, utiliza una segunda\n      conexión, denominada de datos. El comportamiento original del protocolo involucraba que\n      la conexión de datos era iniciada por el servidor y atendida por el cliente.\n      Normalmente se usa el puerto 20 de TCP para la transferencia de datos.","atype":"oficial","sources":[],"id":"redesexamen_201512_p1a"},{"exam":"Diciembre 2015","code":"2015-12","problema":"Pregunta 1 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Sea el protocolo FTP.\n\nb) Mencione al menos dos diferencias con HTTP, particularmente, cuál es un protocolo con señalización in-\n      band y cuál out-of-band.","answer":"•   HTTP utiliza el mismo canal para control y datos, por lo que es del tipo in-\n                     band. FTP utiliza canales separados para datos y control, por lo que es del\n                     tipo out-of-band.\n                 •   El protocolo HTTP es stateless (sin estado), mientras que FTP es statefull\n                     (o con estado)\n                 •   FTP ofrece servicios de adaptación de datos (ASCII, EBCDIC o Binario)\n                     mientras que HTTP solamente realiza transferencias binarias.\n                 •   Para las transferencias de datos, FTP puede funcionar en modos activo y\n                     pasivo.","atype":"oficial","sources":[],"id":"redesexamen_201512_p1b"},{"exam":"Diciembre 2015","code":"2015-12","problema":"Pregunta 2 (a)","topic":"Capa de enlace","cat":"Capa de enlace","q":"a) Describa el mecanismo de self-learning de los switches (conmutadores de capa 2).","answer":"Para su funcionamiento básico, los switches no requieren configuración, pues, son\n       capaces de aprender lo requerido para operar. Cuando un mensaje llega a una boca de un\n       switch, el switch puede inspecionarlo y en base a la dirección origen del mismo, es\n       capaz de aprender que a dicha boca está conectado un host con esa dirección MAC\n       específica. A medida que el tiempo pasa y diferentes hosts envían tramas, el switch\n       aprende a que bocas están conectados cuales hosts. Con esa información, el switch es\n       capaz de reenviar tramas solamente a las bocas donde están conectados los hosts. Los\n       mapeos de MACs a puertos tienen tiempos de vida acotados y deben ser constantemente\n       refrescados a efectos de permitir que los hosts puedan migrar entre bocas del switch.\n       Siempre que se desconoce una asociación y se debe hacer llegar una trama a un host\n       particular, la trama se copia a todas las bocas.","atype":"oficial","sources":[],"id":"redesexamen_201512_p2a"},{"exam":"Diciembre 2015","code":"2015-12","problema":"Pregunta 2 (b)","topic":"Capa de red","cat":"Capa de red","q":"b) Cuando llega una trama a un switch cuya dirección de destino de capa 2 es la dirección de broadcast, la\n      misma se reenvía por todos los puertos. ¿Es posible que una trama cuya dirección de destino no sea la de\n      broadcast también se propague por todos los puertos del switch?\n\n                                                 Página 1/8\n\n       Redes de Computadoras, Introducción a las Redes de Computador{ae}s y Comunicación de Datos","answer":"Si, es posible. Cuando se desconoce el mapeo, según se vio en a), una trama se copia a\n       todas las bocas. En casos de protocolos como IPv6, cuando se transmite al grupo de\n       multicast all-hosts (ff02::1), la trama se copia en todas las bocas asociadas al\n       segmento.","atype":"oficial","sources":[],"id":"redesexamen_201512_p2b"},{"exam":"Diciembre 2015","code":"2015-12","problema":"Pregunta 3","topic":"Capa de red","cat":"Capa de red","q":"Nombre el protocolo utilizado en IPv6 para asociar dinámicamente direcciones de capa de enlace a direcciones\nIPv6. Describa los mensajes utilizados.","answer":"El protocolo que utiliza IPv6 para control en general es ICMPv6. El subprotocolo que se\nencarga del conocimiento, administración y gestión de vecinos en el enlace es el Neighboor\nDiscovery Protocol, ND. Los mensajes que se utilizan para descubrir y anunciar las direcciones\nMAC de un vecino asociadas a cierta dirección IPv6 son Neighbor Solicitation y Neighbor\nAdvertisement. Cuando un host desea conocer la direccion MAC asociada a un vecino HOST-A envía\nun mensaje ND, con destino IPv6 la dirección de multicast asociada a todos los hosts (ff02::1)\ny con dirección de destino a nivel mac, la asociada a dicho grupo de multicast (que no es\nbroadcast). En el payload de ICMPv6, el mensaje ND contiene la dirección objetivo de la\nconsulta. La eventual respuesta (si existe y es alcanzable en ese momento el destino) será\nenviado en un mensaje de tipo unicast con las direcciones origen y destino esperadas a nivel\nde cabezales MAC e IPv6. En el payload ICMPv6 viene la respuesta a la consulta donde se indica\nla dirección MAC solicitada.","atype":"oficial","sources":[],"id":"redesexamen_201512_p3"},{"exam":"Diciembre 2015","code":"2015-12","problema":"Pregunta 4","topic":"Capa de red","cat":"Capa de red","q":"Sea el protocolo de etiquetado VLAN 802.1Q. Describa las modificaciones que introduce a nivel de los cabezales\nde capa 2 y explique cómo se combina este tráfico en los switches con el tráfico ethernet original que no utiliza\nese etiquetado.","answer":"El protocolo 802.1Q involucra una redefinición del cabezal Ethernet, que introduce cuatro\nbytes adicionales luego de las direcciones MAC src y dst:\n\n                                                   Página 2/8\n\n       Redes de Computadoras, Introducción a las Redes de Computador{ae}s y Comunicación de Datos\nde los 32bits adicionales, se reservan 12 para identificar VLANs.\nA nivel de los switches se distinguen puertos a los que se pueden conectar dispositivos que\nmanipulan los cabezales extendidos y son capaces de intercambiar tráfico que incluye TAGS de\nlos puertos en los que se conectan equipos que desconocen del uso de tags. Estos puertos, los\nque reciben tráfico sin tags se conocen como UNTAGGED PORTS y realizan la tarea de etiquetar\ntráfico al ingreso y quitar el tag al momento de forwardear el paquete hacia el host. Los\npuertos por los que se transmiten tramas extendidas se conocen tomo TRUNK PORTS. Cabe\nmencionar que la distinción es administrativa, y no hay diferencias físicas en los puertos.","atype":"oficial","sources":[],"id":"redesexamen_201512_p4"},{"exam":"Diciembre 2015","code":"2015-12","problema":"Pregunta 4","topic":"Capa de enlace","cat":"Capa de enlace","q":"Describa los mensajes RTS y CTS presentes en los protocolos IEEE 802.11. Explique que problema pretenden\nresolver, y cómo se utilizan para lograr dicho objetivo.","answer":"El objetivo es evitar el problema de la terminal oculta, por el mecanismo de reserva el acceso\nal canal. El transmisor emite un mensaje RTS, y el receptor responde con un CTS en cuanto esté\nlisto para recibir. Cuando el transmisor recibe el CTS inicia la transmisión de datos. Otros\nnodos que reciban el RTS o el CTS retrasan sus transmisiones.","atype":"oficial","sources":[],"id":"redesexamen_201512_p4x"},
