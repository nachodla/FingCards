Pv4.","answer":"Algunas ventajas: se puede acceder a contenido/servicios de IPv4 sin que se hayan\n       migrado a IPv6 ; El despliegue es muy simple; Se puede eliminar IPv4 de una red interna\n       Algunas desventajas: Se depende de un único punto de fallos; En caso de requerir\n       traducciones de protocolos avanzadas puede generar un problema de desempeño; no todos\n       los protocolos pueden ser traducidos debido a la forma que utilizan -equivocadamente-\n       información de capas inferiores","atype":"oficial","sources":[],"id":"redesexamen_201302_p5a"},{"exam":"Febrero 2013","code":"2013-02","problema":"Pregunta 5 (b)","topic":"Capa de red","cat":"Capa de red","q":"b) Suponga que usted es el administrador/a de una red con direcciones IPv4 públicas. Ahora, necesita\n        expandir la red y su proveedor de servicio solo puede asignarle direcciones IPv6. Justifique cual de las\n        siguientes opciones adoptaría para resolver el problema: i) renumerar la red con direcciones IPv6 o ii) usar\n        NAT.\n                                                     Página 2/8\n\n              Introducción a las Redes de Computador{ae}s y Comunicación de Datos","answer":"Cualquiera de ambas opciones es viable. Si el número de hosts es relativamente acotado\n       y hay herramientas que puedan ayudar a la re-numeración, como el DHCP, podríamos\n       pensar en renumerar como una opción, siempre que los protocolos que utilizamos estén\n       portados a IPv6. En caso que el número de hosts sea más amplio, la red mantenga una\n       complejidad bastante grande, especialmente, contando con protocolos que no corran sobre\n       IPv6, se deberá pensar en ampliar el espacio de direcciones sobre IPv4, utilizando\n       rangos de direcciones privadas y compartir mediante NAT algunas direcciones IPv4\n       públicas a efecto de dar conectividad a los nuevos hosts.\n\n                                          Página 3/8\n\n                  Introducción a las Redes de Computador{ae}s y Comunicación de Datos","atype":"oficial","sources":[],"id":"redesexamen_201302_p5b"},{"exam":"Febrero 2014","code":"2014-02","problema":"Pregunta 1 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) ¿Qué es un Sistema Autónomo (Autonomous System, AS)?","answer":"AS es un concepto vinculado al enrutamiento jerárquico. Si podemos decir que Internet es\nuna \"red de redes\" y se pretende que en la gestión de ellas mantenga un orden, debemos\nidentificar redes con autonomía administrativa para el conjunto de dispositivos que la\ncomponen, y en particular para los protocolos de enrutamiento configurados en ella. Por lo\ntanto podemos decir que un AS es una agrupación de routers con una administración común.","atype":"oficial","sources":[],"id":"redesexamen_201402_p1a"},{"exam":"Febrero 2014","code":"2014-02","problema":"Pregunta 1 (b)","topic":"Capa de red","cat":"Capa de red","q":"b) Explique los conceptos Interior Gateway Protocol (IGP) y Exterior Gateway Protocol (EGP), vinculándolos con el\n      concepto explicado en la parte a), y brinde un ejemplo de cada uno.","answer":"Interior Gateway Protocols (IGP): protocolos de enrutamiento que \"corren\" dentro de un AS\n(routing intra-AS); ejemplos: RIP y OSPF.\nExterior Gateway Protocols (EGP): protocolos de enrutamiento que \"corren\" entre ASs (routing\ninter-AS); ejemplo: BGP.","atype":"oficial","sources":[],"id":"redesexamen_201402_p1b"},{"exam":"Febrero 2014","code":"2014-02","problema":"Pregunta 1 (c)","topic":"Capa de red","cat":"Capa de red","q":"c) Describa brevemente el uso que hace BGP (Border Gateway Protocol) del atributo AS-PATH.","answer":"El atributo AS-PATH contiene la lista de ASs que ha atravesado la publicación de un\nprefijo. Cuando un prefijo es pasado a un AS, éste agrega su ASNumber al atributo. Este\natributo tiene dos usos fundamentales: evitar loops en las publicaciones (si un AS se\nencuentra a sí mismo en el AS-PATH) y, si es tenido en cuenta en el proceso de selección de\nruta y cuando se lo considere (existen otros atributos), se seleccionará aquella que tenga\nel AS-PATH más corto. Ejemplo: Figura 4.41 del libro. Suponiendo que el prefijo 138.16.64/24\nes publicado por el AS2 al AS1, si AS1 lo publica al AS3, lo hará con AS-PATH valiendo AS2\nAS1.\n\n                                                     Página 1/6\n\n                       Introducción a las Redes de Computador{ae}s y Comunicación de Datos","atype":"oficial","sources":[],"id":"redesexamen_201402_p1c"},{"exam":"Febrero 2014","code":"2014-02","problema":"Pregunta 4 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) Describa la técnica denominada NAT, explicando las modificaciones que un router NAT debe realizar sobre los\n       paquetes salientes y entrantes.","answer":"Páginas 339-341 del libro del curso","atype":"oficial","sources":[],"id":"redesexamen_201402_p4a"},{"exam":"Febrero 2014","code":"2014-02","problema":"Pregunta 4 (b)","topic":"Capa de red","cat":"Capa de red","q":"b) De una justificación para la siguiente frase: NAT no respeta el principio de aislación de capas.","answer":"Páginas 341 del libro del curso","atype":"oficial","sources":[],"id":"redesexamen_201402_p4b"},{"exam":"Diciembre 2023","code":"2023-12","problema":"Pregunta 1 (a)","topic":"Redes (general)","cat":"Redes (general)","q":"a) Muestre el formato y contenido del mensaje query enviado.","answer":"Lleva un Identificador (Transaction ID) para asociar el mensaje reply al query, generado por quien crea el\n          mensaje query.\n          Flags\n                  Existe una flag (1 bit) que indica el tipo de mensaje: si está en 0 es una query (este caso).\n                  Otra flag (1 bit) indica si se pretende que sea una query recursiva.\n                  Lleva un Identificador (Transaction ID) para asociar el mensaje reply al query.\n          Los valores de los campos “contadores” (“number of...”) son los siguientes:\n                  Questions: 1\n                  Answers: 0\n                  Authority: 0\n                  Additional: 0\n\n                                                                   Página 1/10\n\n                                               Redes de Computadoras\n        En el campo Questions el contenido es\n                cert.uy: type NS, class IN\n        No existen campos Answers, Authority ni Additional.","atype":"oficial","sources":[],"id":"redesexamen_202312_p1a"},{"exam":"Diciembre 2023","code":"2023-12","problema":"Pregunta 1 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"b) Muestre el formato y contenido del mensaje reply recibido.\n\nTodos los detalles cuentan, sea exhaustivo en su respuesta.","answer":"Lleva el Identificador copiado del mensaje query que lo motiva\n        Flags\n                Flag (1 bit) en 1 indicando que es un reply (query response)\n                Otra flag (1 bit) indica si se pretende que sea una query recursiva.\n                Otra flag (1 bit) indica si se dispone de servicio recursivo.\n        Los valores de los campos “contadores” (“number of...”) son los siguientes:\n                Questions: 1\n                Answers: 2\n                Authority: 0\n                Additional: 3\n        En el campo Questions el contenido es\n                cert.uy: type NS, class IN\n        En el campo Answers el contenido es\n                cert.uy: type NS, class IN, ns dns06.agesic.gub.uy\n                cert.uy: type NS, class IN, ns dns05.agesic.gub.uy\n        No existe campo Authority.\n        En el campo Additional el contenido es\n                dns06.agesic.gub.uy: type A, class IN, addr 179.27.169.254\n                dns06.agesic.gub.uy: type AAAA, class IN, addr 2800:a8:a02:2:179:27:169:254\n                dns05.agesic.gub.uy: type A, class IN, addr 179.27.169.190","atype":"oficial","sources":[],"id":"redesexamen_202312_p1b"},{"exam":"Diciembre 2023","code":"2023-12","problema":"Pregunta 2 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"a) Explique las diferencias entre protocolos de transporte stop-and-wait y en pipeline.","answer":"En un protocolo stop-and-wait, el emisor espera por el reconocimiento de un paquete para empezar la\ntransmisión de un nuevo paquete.\nEn el caso de los protocolos de pipeline, el emisor puede enviar varios paquetes sin esperar a los mensajes de\nreconocimiento. Para esto es necesario definir una ventana de transmisión que definirá cuantos paquetes se\npueden transmitir “simultáneamente” sin haber recibido un reconocimiento.","atype":"oficial","sources":[],"id":"redesexamen_202312_p2a"},{"exam":"Diciembre 2023","code":"2023-12","problema":"Pregunta 2 (b)","topic":"Físico y métricas","cat":"Físico y métricas","q":"b) De un ejemplo del problema de tener tamaños de ventana muy parecidos al rango de números de\n       secuencia en protocolos de tipo Selective Repeat.","answer":"Para el caso de un protocolo de pipeline, una opción es utilizar selective repeat para el reconocimiento de los\npaquetes. Esto implica que el receptor genera un paquete de reconocimiento por cada paquete recibido. Del lado\ndel emisor, solo se reenvían paquetes que no fueron reconocidos luego de un cierto tiempo.\nImaginemos un escenario con una ventana de transmisión de 3 paquetes y número de secuencia del 0 al 3. Se\nilustra a continuación un posible problema:\n\n                                                    Página 2/10\n\n                                                Redes de Computadoras\nEn la imagen (a) se puede observar que el receptor no detecta que el emisor está enviando un mensaje duplicado\ny considera que es un nuevo paquete.\nVer que no puede diferenciarlo del caso (b) donde es un nuevo paquete con secuencia 0.","atype":"oficial","sources":[],"id":"redesexamen_202312_p2b"},{"exam":"Diciembre 2023","code":"2023-12","problema":"Pregunta 3","topic":"Capa de red","cat":"Capa de red","q":"Mencione y compare las principales características de los algoritmos de enrutamiento de estado de enlace (LS,\nlink-state) con las de los algoritmos de vector distancia (DV, distance-vector).","answer":"Se analizan los siguientes 4 tópicos: cuál es centralizado y cuál distribuido, qué “habla” cada nodo, con quiénes\n“habla” nodo, y qué parte de la red conoce cada nodo.\nUn algoritmo de enrutamiento centralizado calcula la ruta de coste mínimo entre un origen y un destino utilizando\nun conocimiento global y completo acerca de la red.\nEn un algoritmo de enrutamiento descentralizado, el cálculo de la ruta de coste mínimo se realiza por parte de los\nrouters de manera iterativa y distribuida. Ningún nodo tiene toda la información acerca del coste de todos los\nenlaces de la red.\nLos algoritmos con información de estado global a menudo se denominan algoritmos de estado de enlaces (LS,\nLink-State), ya que el algoritmo tiene que ser consciente del coste de cada enlace de la red.\nEl algoritmo de enrutamiento descentralizado que estudiamos en el curso se denomina algoritmo de vector de\ndistancias (DV, Distance-Vector), porque cada nodo mantiene un vector de estimaciones de los costes (distancias)\na todos los demás nodos de la red.\nEn un algoritmo de estado de enlaces, la topología de la red y el coste de todos los enlaces son conocidos; es\ndecir, están disponibles como entradas para el algoritmo LS. En la práctica, esto se consigue haciendo que cada\nnodo difunda paquetes del estado de los enlaces a todos los demás nodos de la red, conteniendo cada paquete\nde estado de enlaces las identidades y costes de sus enlaces conectados.\nEl resultado de difundir la información por parte de los nodos es que todos los nodos tienen una visión completa e\nidéntica de la red. Cada nodo puede entonces ejecutar el algoritmo LS y calcular el mismo conjunto de rutas de\ncoste mínimo que cualquier otro nodo.\nMientras que el algoritmo LS es un algoritmo que emplea información global, el algoritmo por vector de distancias\n(DV) es iterativo, asíncrono y distribuido. Es iterativo porque este proceso continúa hasta que ya no se intercambia\nmás información entre los vecinos. El algoritmo es asíncrono en el sentido de que no requiere que todos los nodos\noperen sincronizados entre sí.\nEs distribuido en el sentido de que cada nodo recibe información de uno o más de sus vecinos directamente\nconectados, realiza un cálculo y luego distribuye los resultados de su cálculo de vuelta a sus vecinos.","atype":"oficial","sources":[],"id":"redesexamen_202312_p3"},{"exam":"Diciembre 2023","code":"2023-12","problema":"Pregunta 4 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) Defina que es una ruta en el contexto de BGP.","answer":"Una ruta está compuesta por un prefijo de red acompañado de sus atributos. Este objeto se denomina Network\nLayer Reachability Information (NLRI), y se anuncia en los mensajes UPDATE de BGP.","atype":"oficial","sources":[],"id":"redesexamen_202312_p4a"},{"exam":"Diciembre 2023","code":"2023-12","problema":"Pregunta 4 (b)","topic":"Capa de red","cat":"Capa de red","q":"b) Defina los dos atributos principales de una ruta BGP.","answer":"Los principales atributos de una ruta son AS-PATH y NEXT-HOP. El AS-PATH contiene la lista de los Números\nde Sistemas Autónomos (ASN – Autonomous System Number) por los que ha pasado el anuncio, mientras que el\nNEXT-HOP es la dirección IP del router que inicia la secuencia de ASNs (AS-PATH). En una sesión BGP externa\n(eBGP), el router cambia el atributo NEXP-HOP de una ruta BGP (a su propia dirección IP) cuando envía el\nanuncio de dicha ruta.","atype":"oficial","sources":[],"id":"redesexamen_202312_p4b"},{"exam":"Diciembre 2023","code":"2023-12","problema":"Pregunta 4 (c)","topic":"Capa de red","cat":"Capa de red","q":"c) ¿Cuándo es necesario que un router ejecute el algoritmo de selección de ruta de BGP?","answer":"El algoritmo de selección de ruta se debe aplicar cunado existen varias rutas posibles para el mismo prefijo.\nEste algoritmo busca “desempatar” entre todas las opciones, eligiendo una sola de ellas.","atype":"oficial","sources":[],"id":"redesexamen_202312_p4c"},{"exam":"Diciembre 2023","code":"2023-12","problema":"Pregunta 4 (d)","topic":"Capa de transporte","cat":"Capa de transporte","q":"d) Mencione al menos cuatro pasos del algoritmo de selección de ruta de BGP.","answer":"1) Se comparan los valores de Preferencia Local (local-pref), y gana el más grande. Este es un valor\nadministrativo que se fija en base a la política del Sistema Autónomo. Por ejemplo, un AS que tiene dos\nproveedores, puede asignar mayor local-pref a uno de ellos por precio, confiabilidad del enlace u otras razones.\n\n                                                    Página 3/10\n\n                                                  Redes de Computadoras\n2) Si luego de aplicar la regla anterior quedan rutas empatadas (con igual local-pref), se compara el largo del\natributo AS-PATH (AS-PATH lenght), y gana la más corta, es decir, que AS-PATH lenght se usa como una métrica\nde vector-distancia.\n3) Para las rutas que siguen empatadas se aplica el “enrutamiento de papa caliente”: gana la ruta con menor costo\nal router de borde.\n4) Si en los pasos anteriores no se ha logrado desempatar, se utilizará el “Indentificador BGP” (BGP ID) como\nmecanismo de desempate. Se prefiere la ruta que proviene del router con BGP ID más bajo. Este valor es la\ndirección IP más alta del router, dándose preferencia a las direcciones de loopback. Además, se puede fijar\nadministrativamente por configuración del router.","atype":"oficial","sources":[],"id":"redesexamen_202312_p4d"},{"exam":"Diciembre 2023","code":"2023-12","problema":"Pregunta 5 (a)","topic":"Capa de enlace","cat":"Capa de enlace","q":"a) Defina los términos dominio de colisión y dominio de broadcast.","answer":"En un contexto de tecnología Ethernet:\n1) Un dominio de colisión es el conjunto de dispositivos que pueden sufrir colisiones al transmitir una trama. En la\nimplementación original de Ethernet con todos los hosts de una red de área local conectados a un bus (o un hub),\nel dominio de colisión son todos los hostos conectados al medio. Sin embargo, en un medio conmutado (con\nswitches), el dominio de colisión se restringe a cada host y puerto del switch que comparten un cable.\n2) Por otro lado, el dominio de broadcast es el conjunto de hosts que forman parte de una red de área local (Local\nArea Network - LAN), cuya frontera es un router. A todos estos hosts le puede llegar una trama de broadcast\n(dirección destino FF-FF-FF-FF-FF-FF).","atype":"oficial","sources":[],"id":"redesexamen_202312_p5a"},{"exam":"Diciembre 2023","code":"2023-12","problema":"Pregunta 5 (b)","topic":"Capa de enlace","cat":"Capa de enlace","q":"b) Explique cuál es la función fundamental de un conmutador de capa 2 (switch)","answer":"La función fundamental de un switch es recibir tramas por los puertos entrantes y reenviarlas por los puertos de\nsalida, en base a una tabla de conmutación que se construye mediante la técnica del auto-aprendizaje.","atype":"oficial","sources":[],"id":"redesexamen_202312_p5b"},{"exam":"Diciembre 2023","code":"2023-12","problema":"Pregunta 5 (c)","topic":"Capa de enlace","cat":"Capa de enlace","q":"c) Los puertos de un switch, ¿tienen direcciones MAC? Justifique su respuesta.","answer":"No, los switches son trasnparentes, en el sentido que los hosts de una LAN desconocen su existencia, y envían\ntramas ethernet cuyos orígenes y destinos son los propios hosts de la LAN. Nunca es posible enviar una trama\ncuyo destino sea el switch, ya que como se mencionó, no tiene direcciones MAC.","atype":"oficial","sources":[],"id":"redesexamen_202312_p5c"},{"exam":"Julio 2015","code":"2015-07","problema":"Pregunta 1 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) Describa el funcionamiento del protocolo ARP.","answer":"Address Resolution Protocol (ARP) resuelve el problema de comunicación dentro de la\n       LAN, donde además de las direcciones IP se necesitan las direcciones MAC para que\n       efectivamente las tramas se transfieran desde el origen al destino. Cada host tiene una\n       tabla ARP, que contiene las correspondencias entre direcciones IP y direcciones MAC, y\n       un campo TTL que indica la validez de dicha entrada en la tabla. Cuando un host\n       necesita comunicarse con otro host de la LAN del cual conoce su dirección IP, si hay\n       una entrada válida en la tabla ARP se comunica directamente, y en caso contrario\n       utiliza el protocolo ARP para obtener la correspondencia. El mensaje ARP Request es\n       encapsulado en una trama ethernet con MAC origen la del host origen y MAC destino FF-\n       FF-FF-FF-FF-FF (broadcast ethernet), que contiene en su payload los campos ARP (MAC\n       origen, IP origen, MAC destino - desconocida, se pone en todos ceros-, IP destino). Por\n       ser un broadcast ethernet todos los host reciben la trama, y el Request sólo será\n       respondido por el nodo que tiene la IP destino. La respuesta ARP tiene los mismos\n       campos, solamente que ahora los datos de origen serán los del host que antes era\n       destino, del que ahora se conoce la MAC.","atype":"oficial","sources":[],"id":"redesexamen_201507_p1a"},{"exam":"Julio 2015","code":"2015-07","problema":"Pregunta 1 (b)","topic":"Capa de red","cat":"Capa de red","q":"b) Un conmutador (switch) de capa 2 puro, ¿tiene tabla ARP?. Justifique su respuesta.","answer":"No, ya que al ser de capa 2 puro solo funciona a nivel de ehernet. ARP funciona entre\n       equipos que manejan la capa IP y superiores.","atype":"oficial","sources":[],"id":"redesexamen_201507_p1b"},{"exam":"Julio 2015","code":"2015-07","problema":"Pregunta 1 (c)","topic":"Capa de enlace","cat":"Capa de enlace","q":"c) Dada una red conmutada (compuesta por varios switches), considere dos PCs comunicándose entre ellos.\n      ¿En algún momento de esa comunicación existen tramas con dirección MAC (origen o destino) que\n      corresponda a cualquiera de los switches?","answer":"Los switches reenvián tramas de una interfaz a la otra, y mantienen siempre la MAC\n       origen y destino. Se dice que los switches “no tienen MAC”.","atype":"oficial","sources":[],"id":"redesexamen_201507_p1c"},{"exam":"Julio 2015","code":"2015-07","problema":"Pregunta 2","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Suponga que se tiene una red de circuitos (en oposición a una red de conmutación de paquetes) en la que no hay\npérdida ni errores de bits, y los mismos llegan al destino en orden. En este contexto, ¿es posible prescindir de\nmecanismos de confiabilidad y control de congestión como los que implementa TCP? Justifique.","answer":"Se supone que el circuito es creado solamente cuando es posible asegurar los recursos a lo\nlargo de todo el camino de extremo a extremo, y por lo tanto, en las hipótesis planteadas,\npodemos prescindir de mecanismos de confiabilidad y control de congestión como los que\nimplementa TCP.\nSin embargo, si consideramos los hosts en los extremos del circuito, aún podríamos tener\ncontrol de acceso y la necesidad de repartir el ancho de banda disponible entre aplicaciones,\ny en ese caso la multiplexación y fairness de TCP serían necesarias.\n\n                                                   Página 1/5\n\n        Redes de Computadoras, Introducción a las Redes de Computador{ae}s y Comunicación de Datos\nFinalmente, si la red de circuitos no asegura la recuperación \"automática\" ante fallos, se\nnecesitaría alguna función de recuperación a nivel de transporte y/o aplicación.","atype":"oficial","sources":[],"id":"redesexamen_201507_p2"},{"exam":"Julio 2015","code":"2015-07","problema":"Pregunta 3","topic":"Capa de enlace","cat":"Capa de enlace","q":"Explique el fenómeno de conteo a infinito en el algoritmo de vector-distancia, y ejemplifique en una red de cuatro\nnodos.","answer":"El fenómeno del conteo a infinito es un problema del algoritmo de vector-distancia, que ante\nun aumento de costo (o la caída) de un enlace, demora en converger a la nueva situación\nmediante el intercambio iterativo de los vectores distancia entre nodos, generando posibles\nloops transitorios. El problema se origina en que cada nodo solo almacena la distancia\ncalculada para cada destino, y los vecinos next-hop hacia dichos destinos.\nConsideremos la red de la figura:\n\n    A      1     B     1     C     1     D\nEn este caso tenemos que el vector distancia de A es (1,2,3) para alcanzar a B, C y D\nrespectivamente, siempre pasando por B. Por su lado el de B es (1, 1, 2) para (A, C, D)\npasando por A, C y C respectivamente.\nSuponga que el costo del enlace BC cambia a 60. B recalcula su vector y lo envía a A, el cual\navisa a B que tiene un camino a C de costo 2, y por lo tanto B recalcula su costo a C en 3\npasando por A (absurdo si uno mira el grafo). A recibe esta información, y actualiza su vector\ndistancia, aumentando en 1 el costo, llegando con costo 4 a C a través de B. Esta interacción\nse dará hasta que el costo de las iteraciones supere a 60, en cuyo caso B decidirá que puede\nllegar a C a través del enlace BC, en lugar de enviar erróneamente el tráfico hacia A,\ngenerando un loop de tráfico.","atype":"oficial","sources":[],"id":"redesexamen_201507_p3"},{"exam":"Julio 2015","code":"2015-07","problema":"Pregunta 4","topic":"Capa de transporte","cat":"Capa de transporte","q":"Explique el concepto de “violación de capas”, y mencione dos ejemplos en TCP/IP, explicando por qué se produce\ndicha violación.","answer":"El concepto refiere a que un protocolo de una capa haga uso de campos de información de otra\ncapa del stack, y/o que la implementación de determinado protocolo de capa N haga uso de\ninformación de capa N-1 u otra capa. El caso mas común es el de ARP, donde el protocolo\nincluye direcciones de capa 2 (MAC) y capa 3 (IP). Otro ejemplo son los protocolos de\nenrutamiento, los que intercambian datos de rutas (capa 3) utilizando para ello protocolos de\ncapas superiores, por ejemplo sesiones TCP entre enrutadores BGP.","atype":"oficial","sources":[],"id":"redesexamen_201507_p4"},{"exam":"Julio 2015","code":"2015-07","problema":"Pregunta 5 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"a) Explique por qué se dice que TCP intenta ser un protocolo justo (fair).","answer":"Si suponemos K conexiones TCP (lo suficientemente duraderas) que atraviesan un enlace\ncuello de botella cuyo ancho de banda R bps es menor a la suma de los anchos de banda de las K\nconexiones individuales, y además suponemos que que no existe tráfico UDP en la red, entonces\nlos algoritmos de control de congestión de TCP llevarán a que la tasa de transmisión de cada\nconexión individual tienda a R/K. A este fenómeno se le denomina fairness.","atype":"oficial","sources":[],"id":"redesexamen_201507_p5a"},{"exam":"Julio 2015","code":"2015-07","problema":"Pregunta 5 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"b) Suponga que usted es desarrollador de una aplicación que utiliza TCP, ¿que podría hacer para intentar\n       obtener un mayor ancho de banda para dicha aplicación?","answer":"Haría que mi aplicación abriera conexiones TCP concurrentes, para lograr un mayor ancho de\nbanda en total para la alicación, aplicando el concepto de fairness en forma egoísta.","atype":"oficial","sources":[],"id":"redesexamen_201507_p5b"},{"exam":"Julio 2015","code":"2015-07","problema":"Pregunta 5 (c)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"c) ¿Cómo podría obtener resultados similares si tiene acceso al sistema operativo?","answer":"Configurando los parámetros de TCP para todo el sistema operativo, por ejemplo, para que no\nrespeten el control de congestión. De esta forma, haría cambios en forma global al sistema y\npara todas las aplicaciones.","atype":"oficial","sources":[],"id":"redesexamen_201507_p5c"},{"exam":"Julio 2015","code":"2015-07","problema":"Pregunta 5 (d)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"d) ¿Por qué UDP no es un protocolo fair?","answer":"Dado que UDP no tiene control de congestión, puede enviar segmentos a la velocidad que le\npermita el medio (o le demande la aplicación) y no se auto-limita acorde al estado de la red.\nDe esta forma, UDP podría consumir un mayor ancho de banda frente a las conexiones TCP que\ncoexistan en el mismo tiempo.\n\n                                                    Página 2/5\n\n        Redes de Computadoras, Introducción a las Redes de Computador{ae}s y Comunicación de Datos","atype":"oficial","sources":[],"id":"redesexamen_201507_p5d"},{"exam":"Diciembre 2024","code":"2024-12","problema":"Pregunta 1 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Suponga que usted es el administrador de red de la organización examenredes y adquirió un servidor al\nque le asignó la IP privada 10.1.0.10. Allí instaló un servidor web para la página web institucional.\n\na) ¿Es posible acceder a la página web institucional desde Internet? Justifique su respuesta.\n\nSuponga ahora que al servidor se le asignó la IP pública 164.73.32.20. Usted adquirió el dominio\nexamenredes.uy y desea que la página pueda accederse solo en la URL http://www.examenredes.uy .","answer":"No es posible, ya que desde Internet no se puede acceder a una IP privada de una red. En\nparticular 10.1.0.10 pertenece además al bloque de IPs 10.0.0.0/8, que es de uso exclusivo para redes\nprivadas y sus direcciones no son enrutables en Internet (RFC 1918).","atype":"oficial","sources":[],"id":"redesexamen_202412_p1a"},{"exam":"Diciembre 2024","code":"2024-12","problema":"Pregunta 1 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Suponga que usted es el administrador de red de la organización examenredes y adquirió un servidor al\nque le asignó la IP privada 10.1.0.10. Allí instaló un servidor web para la página web institucional.\n\nb) Mencione y explique los distintos niveles de la jerarquía DNS. ¿Qué registros DNS deben insertarse\n      en la jerarquía para que la página web sea accesible desde Internet? Suponga que la organización\n      examenredes tiene un servidor DNS instalado en la dirección IP pública 164.73.32.4 pero sin ningún\n      registro configurado.","answer":"La jerarquía DNS consiste de los siguientes niveles:\n    1. Servidores raíz – Conocidos globalmente, contienen registros NS, A y AAAA de los servidores\nTLD.\n     2. Servidores TLD (ej: com, edu, uy) – Contienen registros NS, A y AAAA de los servidores\nautoritativos que pertenecen al TLD (ej: el servidor TLD com tiene los registros asociados al servidor\nautoritativo de un dominio que termina en com)\n   3. Servidores autoritativos de los dominios – Contienen más registros (MX, TXT, CNAME, A, AAAA,\nNS) y son administrados por el propietario del dominio.\n   4. Servidor DNS local – Cuando los hosts hacen consultas DNS, lo hacen a su servidor DNS local,\nquien resuelve la consulta ya sea iterativa o recursivamente.\n\nPara que la página pueda ser accedida en al URL solicitada, en el servidor DNS TLD de uy se agregan\nlos siguientes registros:\n\ni. (examenredes.uy, ns.examenredes.uy, NS)\nii. (ns.examenredes.uy, 164.73.32.4, A)\n\n                                         Redes de Computadoras\n\nY en el servidor DNS autoritativo de examenredes (ns.examenredes.uy por la configuración anterior)\nse agrega el siguiente registro:\n\ni. (www.examenredes.uy, 164.73.32.20, A)","atype":"oficial","sources":[],"id":"redesexamen_202412_p1b"},{"exam":"Diciembre 2024","code":"2024-12","problema":"Pregunta 1 (c)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Suponga que usted es el administrador de red de la organización examenredes y adquirió un servidor al\nque le asignó la IP privada 10.1.0.10. Allí instaló un servidor web para la página web institucional.\n\nc) ¿Es posible tener otro servidor web que sirva la misma página en la misma URL? ¿Cómo?","answer":"Sí, si se tienen dos servidores web con el mismo contenido, se insertan dos registros A con nombre\n“www.examenredes.uy” en el servidor DNS autoritativo de examenredes, con la IP de un servidor web.\nEl servidor DNS realizará Round Robin entre los dos registros para responder la consulta, así sirviendo\nla misma página en dos servidores distintos en la misma URL, implementando un balanceo de carga\nbásico.","atype":"oficial","sources":[],"id":"redesexamen_202412_p1c"},{"exam":"Diciembre 2024","code":"2024-12","problema":"Pregunta 2 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"a) Analice el rendimiento de un protocolo de transporte de tipo stop&wait.","answer":"Vamos a usar un ejemplo con magnitudes realistas tomado del libro (p. 247 de la 7a edición en inglés).\nSi consideramos dos hosts separados por aprox. por 4500km, el RTT, es decir, el doble del retardo de\npropagación se calcula como:\nRTT = 2*4,5*10exp(6)m/3*10exp(8)m/s = 3*10exp(-2)s = 30 milisegundos\n\nPor otro lado, si consideramos paquetes de 1000 bytes y una tasa de 1 Gbps, el retardo de trasmisión se\ncalcula:\ndTRANS = L/R = 1000*8bits/1*10exp(9)bits/s = 8*10exp(-6)s = 8 microsegundos.\n\nDado que se debe esperar el ACK del receptor, solo se puede enviar un paquete por cada RTT.\nLa utilidad o rendimiento del protocolo stop&wait se calcula como:\nUtilidad = dTRANS/(dTRANS+RTT) = 0.008 milisegundos/30.008 milisegundos = 0.00027\n\nEs decir que para las magnitudes consideradas el rendimiento es del 0.027%, o dicho de otra forma, solo\npodemos enviar 270 kbps en un enlace de 1 Gbps, completamente inaceptable.\nPara paquetes muy grandes mejora un poco, pero siempre es inaceptable.","atype":"oficial","sources":[],"id":"redesexamen_202412_p2a"},{"exam":"Diciembre 2024","code":"2024-12","problema":"Pregunta 2 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) Explique la relación entre números de secuencia y tamaño de ventana en protocolos de transporte\n      en pipeline. En particular, comente si se pueden generar situaciones que impidan el correcto\n      funcionamiento mediante un ejemplo sencillo.","answer":"Si tenemos una cantidad finita de números de secuencia, por ejemplo, un campo de 3 bits (0⋯7), cada\ntanto tendremos que reutilizar dichos números de secuencia, es decir, usaremos 0...7, 0...7 y así\nsucesivamente. Esto introduce el problema de poder distinguir entre diferentes instancias de los mismos\nnúmeros de secuencia (¿estoy en la primera, segunda, tercera instancia de 0..7?), lo que implica que la\ncantidad de números de secuencia posibles debe ser mayor que la cantidad de paquetes pendientes\npermitidos. Por ejemplo, la técnica stop&wait permite un paquete pendiente a la vez y tiene dos números de\nsecuencia distintos (0 y 1).\n\nLlamemos SWS (Sender Window Size) y RWS (Receiver Window Size) a los tamaños de ventana del\nemisor y receptor respectivamente. Supongamos que tenemos un número más en nuestro espacio de\nnúmeros de secuencia que paquetes potencialmente pendientes; es decir, SWS ≤ MaxSeqNum − 1, donde\nMaxSeqNum es la cantidad de números de secuencia disponibles. ¿Es esto suficiente? La respuesta\ndepende de RWS. Si RWS = 1, entonces MaxSeqNum ≥ SWS + 1 es suficiente. Si RWS es igual a SWS,\nentonces tener un MaxSeqNum que sea solo uno mayor que el tamaño de la ventana de envío no es\nsuficiente. Para ver esto, consideremos la situación en la que tenemos los ocho números de secuencia del\n0 al 7, y SWS = RWS = 7. Supongamos que el remitente transmite los paquetes 0…6, se reciben\n\n                                            Redes de Computadoras\n\ncorrectamente, pero se pierden los ACK. El receptor ahora espera los paquetes 7, 0…5, pero el remitente\nagota el tiempo de espera y envía los paquetes 0…6. Desafortunadamente, el receptor espera la segunda\ninstancia de los paquetes 0…5, pero recibe la primera instancia, lo cual es erróneo y es una situación que\nqueremos evitar.\n\nLuego, el tamaño de la ventana de envío no puede ser más de la mitad del tamaño de la cantidad de\nnúmeros de secuencia disponibles cuando RWS = SWS, o dicho de manera más precisa,\n\nSWS < (MaxSeqNum+1)/2\n\nIntuitivamente, lo que esto quiere decir es que el protocolo de ventana deslizante alterna entre las dos\nmitades del espacio de números de secuencia, de la misma manera que stop&wait alterna entre los\nnúmeros de secuencia 0 y 1. La única diferencia es que se desliza continuamente entre las dos mitades en\nlugar de alternar discretamente entre ellas.","atype":"oficial","sources":[],"id":"redesexamen_202412_p2b"},{"exam":"Diciembre 2024","code":"2024-12","problema":"Pregunta 2 (c)","topic":"Capa de transporte","cat":"Capa de transporte","q":"c) ¿Cómo se determina la diferencia entre el último byte enviado y el último byte reconocido en TCP,\n      teniendo en cuenta el control de congestión y el control de flujo?","answer":"LastByteSent – LastByteAcked = min{cwnd, rwnd}","atype":"oficial","sources":[],"id":"redesexamen_202412_p2c"},{"exam":"Diciembre 2024","code":"2024-12","problema":"Pregunta 3","topic":"Capa de red","cat":"Capa de red","q":"a) Describa mediante un pseudo-código el algoritmo de enrutamiento de vector-distancia. ¿Qué\n      información mantiene cada nodo?\n   b) Proponga un ejemplo de red donde:\n      i) un cambio en los costos de los enlaces provoca conteo a infinito.\n      ii) un cambio en los costos de los enlaces no provoca conteo a infinito.\n\n        Muestre el intercambio de mensajes del protocolo para justificar la respuesta.","answer":"a)\nEn cada nodo, x:\n1 Initialization:\n2           for all destinations y in N:\n3                          Dx(y)= c(x,y)/* if y is not a neighbor then c(x,y)= ∞ */\n4           for each neighbor w\n5                          Dw(y) = ? for all destinations y in N\n6           for each neighbor w\n7                          send distance vector Dx = [Dx(y): y in N] to w\n8\n9 loop\n10          wait (until I see a link cost change to some neighbor w or\n11                until I receive a distance vector from some neighbor w)\n12\n13          for each y in N:\n14                         Dx(y) = minv{c(x,v) + Dv(y)}\n15\n16 if Dx(y) changed for any destination y\n17          send distance vector Dx = [Dx(y): y in N] to all neighbors\n18\n19 forever\n\nCada nodo x mantiene la siguiente información de enrutamiento:\nPara cada vecino v, el costo c(x,v) desde x hasta el vecino directamente conectado, v.\nEl vector de distancia del nodo x, es decir, Dx = [Dx(y): y en N], que contiene la estimación de x de\nsu costo para todos los destinos, y, en N.\nLos vectores de distancia de cada uno de sus vecinos, es decir, Dv = [Dv(y): y en N] para cada vecino\n\n                                          Redes de Computadoras\n\nv de x.\n\nb.ii)                                                                     1\nConsideremos el ejemplo del libro, donde el costo de (x,y) cambia de 4 a          y 1\n1.                                                                          4\nEl algoritmo DV hace que ocurra la siguiente secuencia de eventos:       x              z\n                                                                                 50\n   •      En el momento t0, y detecta el cambio de costo del enlace (el costo ha\n          cambiado de 4 a 1), actualiza su vector de distancia e informa a sus vecinos de este cambio.\n   •      En el momento t1, z recibe la actualización de y y actualiza su tabla. Calcula un nuevo costo\n          mínimo para x (ha disminuido de un costo de 5 a un costo de 2) y envía su nuevo vector de\n          distancia a sus vecinos.\n   •      En el momento t2, y recibe la actualización de z y actualiza su vector de distancia. Los costos\n          mínimos de y no cambian y, por lo tanto, y no envía ningún mensaje a z. El algoritmo llega a un\n          estado de reposo.\n\nb.i)\n                                                                                   60\nConsideremos ahora lo que puede suceder cuando aumenta el costo de un                     y\nenlace. Supongamos que el costo del enlace entre x e y aumenta de 4 a 60,             4        1\ncomo se muestra en la figura.                                                      x             z\n1. Antes de que cambie el costo del enlace, Dy(x) = 4, Dy(z) = 1, Dz(y) = 1 y             50\nDz(x) = 5.\nEn el momento t0, y detecta el cambio en el costo del enlace (el costo ha cambiado de 4 a 60). y\ncalcula su nueva ruta de costo mínimo a x para que tenga un costo de\nDy(x) = min{c(y,x) + Dx(x), c(y,z) + Dz(x)} = min{60 + 0, 1 + 5} = 6\nPor supuesto, con nuestra visión global de la red, podemos ver que este nuevo costo a través de\nz es incorrecto. Pero la única información que tiene el nodo y es que su costo directo para x es 60\ny que z le ha dicho a y que z podría llegar a x con un costo de 5. Entonces, para llegar a x, y ahora\npasaría por z, esperando que z pueda llegar a x con un costo de 5. A partir de t1 tenemos un bucle de\nenrutamiento: para llegar a x, y pasa por z y z pasa por y.\n\n2. Dado que el nodo y ha calculado un nuevo costo mínimo para x, informa a z de su nuevo vector de\ndistancia en el momento t1.\n\n3. Algún tiempo después de t1, z recibe el nuevo vector de distancia de y, que indica que el costo\nmínimo de y para x es 6. z sabe que puede llegar a y con un costo de 1 y, por lo tanto, calcula un\nnuevo costo mínimo para x de Dz(x) = min{50 + 0,1 + 6} = 7. Como el costo mínimo de z para x ha\naumentado, entonces informa a y de su nuevo vector de distancia en t2.\n\n4. De manera similar, después de recibir el nuevo vector de distancia de z, y determina Dy(x) = 8 y\nenvía a z su vector de distancia. Luego, z determina Dz(x) = 9 y envía a y su vector de distancia, y así\nsucesivamente.\n\nEste intercambio persistirá durante 44 iteraciones, hasta que z finalmente calcule que el costo de su\nruta a través de y es mayor que 50. En este punto, z determinará que su ruta de menor costo a x es a\ntravés de su conexión directa a x.\n\nEste problema se conoce como el problema de conteo a infinito.","atype":"oficial","sources":[],"id":"redesexamen_202412_p3"},{"exam":"Diciembre 2024","code":"2024-12","problema":"Pregunta 4 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) Explique los conceptos de dominio de broadcast y dominio de colisión en redes Ethernet.","answer":"Un dominio de broadcast es una subred donde todos los nodos pueden recibir una trama dirigida a la\ndirección de broadcast FF:FF:FF:FF:FF:FF. Esta subred puede estar compuesta de múltiples switches y\notros dispositivos de capa de enlace.\n\nUn dominio de colisión es un medio donde las tramas de los terminales pueden colisionar, por ejemplo un\ncable de un switch, o terminales conectadas a un hub.","atype":"oficial","sources":[],"id":"redesexamen_202412_p4a"},{"exam":"Diciembre 2024","code":"2024-12","problema":"Pregunta 4 (b)","topic":"Capa de red","cat":"Capa de red","q":"b) Dadas dos subredes A y B separadas por un router, ¿es posible hacer una consulta ARP desde un\n      nodo de A a uno de B? Justifique su respuesta señalando las tramas intercambiadas si es\n      necesario.\n\n                                         Redes de Computadoras","answer":"Las subredes están separadas por un dispositivo de capa 3, por lo tanto no es posible hacer una consulta\nARP desde un nodo de la subred A a uno de la subred B, ya que ARP tiene alcance de una subred o Red\nde Área Local (LAN).","atype":"oficial","sources":[],"id":"redesexamen_202412_p4b"},{"exam":"Febrero 2025","code":"2025-02","problema":"Pregunta 1 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"a) Mencione y describa brevemente los 5 métodos de HTTP vistos en el curso.","answer":"En HTTP los métodos son la forma de indicar qué se quiere hacer (acción) con determinado recurso.\nLos 5 métodos vistos en el curso son: GET, POST, HEAD, PUT y DELETE.\nEl método GET se emplea por ejemplo cuando un navegador solicita un objeto, identificándose dicho\nobjeto en el campo URL.\nCon un mensaje POST, por ejemplo el usuario solicita también una página web al servidor, pero el\ncontenido concreto de la misma dependerá de lo que el usuario haya escrito en el o los campos de un\nformulario.\nCuando un servidor recibe una solicitud con el método HEAD, responde con un mensaje HTTP, pero\nexcluye el objeto solicitado (debugging).\nEl método PUT suele utilizarse junto con herramientas de publicación web. Esto permite a un usuario\ncargar un objeto en una ruta específica (directorio) en un servidor web determinado.\nEl método DELETE permite a un usuario o a una aplicación borrar un objeto de un servidor web.","atype":"oficial","sources":[],"id":"redesexamen_202502_p1a"},{"exam":"Febrero 2025","code":"2025-02","problema":"Pregunta 1 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"b) ¿Cómo se especifica el método a utilizar en una comunicación HTTP?","answer":"El método de una solicitud HTTP se especifica en la primera línea de la cabecera, donde se identifican\n3 campos: el campo de método, el campo URL y el campo de la versión HTTP.\nEl campo que especifica el método puede tomar diferentes valores, entre los que se incluyen GET,\nPOST, HEAD, PUT y DELETE (vistos en la parte a).","atype":"oficial","sources":[],"id":"redesexamen_202502_p1b"},{"exam":"Febrero 2025","code":"2025-02","problema":"Pregunta 1 (c)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"c) Indique cuáles de ellos no están considerados en HTTP 1.0.","answer":"En HTTP 1.0 no están especificados los métodos PUT y DELETE.","atype":"oficial","sources":[],"id":"redesexamen_202502_p1c"},{"exam":"Febrero 2025","code":"2025-02","problema":"Pregunta 2 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"a) Explique por qué se dice que TCP intenta ser un protocolo justo (fair).","answer":"Si suponemos K conexiones TCP (lo suficientemente duraderas) que atraviesan un enlace cuello\nde botella cuyo ancho de banda R bps es menor a la suma de los anchos de banda de las K\nconexiones individuales, y además suponemos que que no existe tráfico UDP en la red, entonces los\nalgoritmos de control de congestión de TCP llevarán a que la tasa de transmisión de cada conexión\nindividual tienda a R/K. A este fenómeno se le denomina fairness.","atype":"oficial","sources":[],"id":"redesexamen_202502_p2a"},{"exam":"Febrero 2025","code":"2025-02","problema":"Pregunta 2 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"b) ¿Que se podría hacer, desde el lugar de un desarrollador de una aplicación que utiliza TCP, para intentar\n         obtener un mayor ancho de banda para dicha aplicación?","answer":"Se podría implementar la aplicación de tal forma que abriera conexiones TCP concurrentes, para\nlograr un mayor ancho de banda en total para la aplicación, aplicando el concepto de fairness en forma\negoísta.","atype":"oficial","sources":[],"id":"redesexamen_202502_p2b"},{"exam":"Febrero 2025","code":"2025-02","problema":"Pregunta 2 (c)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"c) ¿Por qué UDP no es un protocolo fair?\n\n                                           Redes de Computadoras","answer":"Dado que UDP no tiene control de congestión, puede enviar segmentos a la velocidad que le\npermita el medio (o le demande la aplicación) y no se auto-limita acorde al estado de la red. De esta\nforma, UDP podría consumir un mayor ancho de banda frente a las conexiones TCP que coexistan en\nel mismo tiempo.","atype":"oficial","sources":[],"id":"redesexamen_202502_p2c"},{"exam":"Febrero 2025","code":"2025-02","problema":"Pregunta 3","topic":"Capa de enlace","cat":"Capa de enlace","q":"Dada la red de la figura, ejecute paso a paso el algoritmo de Dijkstra para encontrar los caminos más cortos\ndesde el origen u hacia todos los nodos.\n\nJustifique textualmente cada paso, mostrando los resultados parciales en\nuna tabla de la forma:                                                              5\nPaso N’ D(v),p(v) D(w),p(w) D(x),p(x)         D(y),p(y)   D(z),p(z)                 v   3       w\n                                                                              2                      5\n                                                                          u         2           1         z\n                                                                                            3\n                                                                              1                       2\n                                                                                    x    1\n                                                                                                y\nObs: agregue todas las filas necesarias.","answer":"Paso N’              D(v),p(v)    D(w),p(w)   D(x),p(x)     D(y),p(y)   D(z),p(z)\n0    u               2,u          5,u         1,u           ∞           ∞\n1    ux              2,u          4,x                       2,x         ∞\n2    uxy             2,u          3,y                                   4,y\n3     uxyv                        3,y                                   4,y\n4     uxyvw                                                             4,y\n5     uxyvwz\n\nEn el paso de inicialización del algoritmo, las rutas de menor costo conocidas actualmente desde u\nhasta sus vecinos directamente conectados, v, x y w, se inicializan en 2, 1 y 5, respectivamente.\nNótese en particular que el costo para w se establece en 5 (aunque pronto veremos que existe una\nruta de menor costo) ya que este es el costo del enlace directo (un salto) desde u hasta w. Los costos\npara y y z se establecen en infinito porque no están conectados directamente a u.\n\nEn la primera iteración, buscamos entre aquellos nodos que aún no se han agregado al conjunto N′ y\nencontramos el nodo con el menor costo al final de la iteración anterior. Ese nodo es x, con un costo\nde 1, y por lo tanto x se agrega al conjunto N′. Ejecutamos entonces la actualización D(i) para todos\nlos nodos i, lo que produce los resultados que se muestran en la segunda línea (paso 1) de la Tabla.\n            recordar que D(i) = min(D(i), D(j)+ c(j,i))\nEl costo de la ruta a v no cambia. El costo de la ruta a w (que era 5 al final de la inicialización) a través\ndel nodo x tiene un costo de 4. Por lo tanto, se selecciona esta ruta de menor costo y el predecesor de\n\n                                        Redes de Computadoras\n\nw a lo largo de la ruta más corta desde u se establece en x. De manera similar, el costo de y (a través\nde x) se calcula como 2, y la tabla se actualiza en consecuencia.\n\nEn la segunda iteración, se descubre que los nodos v e y tienen las rutas de menor costo (2), y\nrompemos el empate arbitrariamente y agregamos y al conjunto N′ de modo que N′ ahora contiene u,\nx e y. El costo para los nodos restantes que aún no están en N', es decir, los nodos v, w y z, se\nactualizan como indica el algoritmo para D(i), lo que produce los resultados que se muestran en la\ntercera fila de la Tabla.\n\nY así sucesivamente...\n\nCuando el algoritmo LS termina, tenemos, para cada nodo, su predecesor a lo largo de la ruta de\nmenor costo desde el nodo de origen. Para cada predecesor, también tenemos su predecesor, y de\nesta manera podemos construir la ruta completa desde el origen hasta todos los destinos. La tabla de\nreenvío en el nodo u, se puede construir a partir de esta información almacenando, para cada destino,\nel nodo del siguiente salto en la ruta de menor costo desde u hasta el destino. En la siguiente Figura\nse muestran las rutas de menor costo resultantes y la tabla de reenvío de u.\n\n                 v             w                           Destino        Enlace de salida\n                                                           v              (u,v)\n      u                                     z\n                                                           w              (u,x)\n                 x             y                           x              (u,x)\n                                                           y              (u,x)\n                                                           z              (u,x)","atype":"oficial","sources":[],"id":"redesexamen_202502_p3"},{"exam":"Febrero 2025","code":"2025-02","problema":"Pregunta 4 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"a) Describa brevemente los mecanismos de detección/corrección de errores de UDP, IP y Ethernet\nconsiderados en el curso.","answer":"UDP provee un mecanismo de detección de errores mediante la incorporación al encabezado de\ncada segmento de una suma de comprobación (checksum). UDP en el lado del emisor calcula el\ncomplemento a 1 de la suma de todas las palabras de 16 bits del segmento, acarreando cualquier\ndesbordamiento obtenido durante la operación de suma sobre el bit de menor peso. Este resultado se\nalmacena en el campo suma de comprobación del segmento. Si se detecta error, se descarta el\nsegmento.\nEn el caso de IP, la suma de comprobación de cabecera ayuda a los routers a detectar errores de bit\nen el encabezado de un datagrama IP recibido. Esta suma de comprobación se calcula tratando cada\npareja de 2 bytes de la cabecera como un número y sumando dichos números utilizando aritmética de\ncomplemento a 1. El complemento a 1 de esta suma, conocido como suma de comprobación Internet,\nse almacena en el campo Suma de comprobación. Un router calcula la suma de comprobación de\ncabecera para cada datagrama IP recibido y detecta una condición de error si la suma de\ncomprobación incluida en la cabecera del datagrama no coincide con la suma de comprobación\ncalculada. Normalmente, los routers descartan los datagramas en los que se ha detectado que existe\nun error. Observe que la suma de comprobación tiene que volver a calcularse y almacenarse en cada\nrouter, ya que el campo TTL, y posiblemente también el campo de opciones, pueden cambiar.\nEthernet utiliza la técnica conocida como Comprobación de Redundancia Cíclica (CRC) (4 bytes). El\n\n                                        Redes de Computadoras\n\npropósito del campo CRC es permitir que el adaptador de red del receptor, detecte los errores de bit de\nla trama. Los códigos CRC también se conocen con el nombre de códigos polinómicos, dado que se\npuede ver la cadena de bits que hay que enviar como si fuera un polinomio cuyos coeficientes son los\nvalores 0 y 1 de la cadena de bits, interpretándose las operaciones realizadas con la cadena de bits\nsegún la aritmética de polinomios. Permite detectar determinados errores de bit en ráfaga. Si se\ndetecta error, se descarta la trama.","atype":"oficial","sources":[],"id":"redesexamen_202502_p4a"},{"exam":"Febrero 2025","code":"2025-02","problema":"Pregunta 4 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) Dada una comunicación UDP en una red IP y donde todos los segmentos de red involucrados en\nla misma utilizan la tecnología Ethernet, ¿es necesario contar con funcionalidades de gestión de\nerrores en las 3 capas? Justifique su respuesta.","answer":"UDP proporciona una suma de comprobación aun cuando muchos protocolos de la capa de enlace\n(por ejemplo, Ethernet) también proporcionan mecanismos de comprobación de errores. La razón de\nello es que no existe ninguna garantía de que todos los enlaces existentes entre el origen y el destino\nproporcionen un mecanismo de comprobación de errores (no es el caso de la letra de la pregunta); es\ndecir, uno de los enlaces puede utilizar un protocolo de la capa de enlace que no proporcione\ncomprobación de errores. Además, incluso si los segmentos se transfieren correctamente a través del\nenlace, es posible que se introduzcan errores de bit cuando un segmento se procesa y almacena en la\nmemoria de un router. Por lo tanto, sí resulta necesario contar con dicha funcionalidad en el protocolo\nde capa de transporte.\n\n                                           Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_202502_p4b"},{"exam":"Julio 2025","code":"2025-07","problema":"Pregunta 1 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"a) Indique los participantes involucrados en el envío y recepción de correo electrónico y qué protocolos\n         utilizan para comunicarse.","answer":"Los participantes involucrados son: agente de usuario remitente, servidor de correos remitente,\nservidor de correos destino, agente de usuario destino. Los protocolos usados son: SMTP o HTTP (en\nel caso de webmail) para el envío de correo del agente de usuario remitente al servidor de correos\nremitente, SMTP para envío de correo desde el servidor de correos remitente al servidor de correos\ndestino, y POP, IMAP o HTTP para la recepción del correo del servidor de correos destino al agente de\nusuario destino.","atype":"oficial","sources":[],"id":"redesexamen_202507_p1a"},{"exam":"Julio 2025","code":"2025-07","problema":"Pregunta 1 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"b) Describa brevemente los protocolos de acceso a correo vistos en el curso y sus principales\n         características.","answer":"Los protocolos de acceso a correo vistos en el curso son POP, IMAP y HTTP.\n\nPOP (Post Office Protocol) permite listar, leer y eliminar correos pero no mantiene estado entre\nsesiones. Puede operar como download and delete, borrando los mensajes después de descargados\ndel servidor o download and keep, donde los mensajes se mantienen en el servidor después de\ndescargados. No almacena estado, entonces por ejemplo no se pueden marcar correos como leídos.\n\nIMAP (Internet Message Access Protocol) al igual que POP permite listar, leer y eliminar correos pero\nmantiene estados al introducir la noción de carpetas. Los mensajes pueden asociarse a carpetas como\nRecibidos, Favoritos, Papelera, Spam y demás, así manteniendo estado entre sesiones.\n\nHTTP se utiliza como protocolo de acceso a correo en el caso del webmail. Los agentes de usuario, en\neste caso navegadores web, se comunican con el servidor de correos vía HTTP para obtener los\ncorreos e interactuar con ellos.","atype":"oficial","sources":[],"id":"redesexamen_202507_p1b"},{"exam":"Julio 2025","code":"2025-07","problema":"Pregunta 1 (c)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"c) Suponga que le han dicho que el nombre de host del (único) servidor de correos de fing.edu.uy es\n         correo-e.fing.edu.uy.\n         i. ¿Cómo podría verificarlo sin comunicarse con correo-e.fing.edu.uy?\n         ii. ¿Cómo podría obtener la dirección IP del servidor de correos de fing.edu.uy una vez obtenido el\n             nombre de host?","answer":"i) Haciendo una consulta DNS para obtener el valor del registro MX de fing.edu.uy se obtiene el\nnombre de host del servidor de correos de fing.edu.uy. Si es correo-e.fing.edu.uy, lo que le han dicho\n\n                                          Redes de Computadoras\n\nes cierto.\nii) Haciendo una consulta DNS para obtener el valor del registro A asociado al nombre de host hallado\nen la parte anterior se obtiene la dirección IP del servidor de correos de fing.edu.uy.","atype":"oficial","sources":[],"id":"redesexamen_202507_p1c"},{"exam":"Julio 2025","code":"2025-07","problema":"Pregunta 2 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"a) Explique la estrategia de generación de segmentos ACK de TCP vista en el curso, considerando qué\n       eventos en el receptor generan qué acciones por parte de éste.","answer":"En el curso se vieron 4 situaciones:\n1. Evento: llegada de un segmento en orden con el número de secuencia esperado. Todos los datos\nhasta el número de secuencia esperado ya han sido reconocidos.\nAcción: ACK retardado. Esperar hasta durante 500 milisegundos la llegada de otro segmento en orden.\nSi el siguiente segmento en orden no llega en este intervalo, enviar un ACK.\n2. Evento: llegada de un segmento en orden con el número de secuencia esperado. Hay otro\nsegmento en orden esperando la transmisión de un ACK.\nAcción: enviar inmediatamente un único ACK acumulativo, reconociendo ambos segmentos\nordenados.\n3. Evento: llegada de un segmento desordenado con un número de secuencia más alto que el\nesperado. Se detecta un hueco.\nAcción: enviar inmediatamente un ACK duplicado, indicando el número de secuencia del siguiente byte\nesperado (que es el límite inferior del hueco).\n4. Evento: llegada de un segmento que completa parcial o completamente el hueco existente en los\ndatos recibidos.\nAcción: enviar inmediatamente un ACK, suponiendo que el segmento comienza en el límite inferior del\nhueco.","atype":"oficial","sources":[],"id":"redesexamen_202507_p2a"},{"exam":"Julio 2025","code":"2025-07","problema":"Pregunta 2 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"b) Considere 2 situaciones de conexiones TCP utilizando Ethernet en Capa de Enlace de Datos:\n       unas sobre un enlace con una tasa de pérdidas de un segmento cada 100 transmitidos, y otras sobre un\n       enlace con una tasa de pérdidas de un segmento cada 1.000.000 transmitidos. Comente y justifique\n       respecto a si al comparar las 2 situaciones planteadas, la generación de ACKs se podría ver afectada y\n       de qué forma.","answer":"La lógica que el receptor TCP aplica para generar ACK no cambia con la tasa de error del enlace:\nsiempre responde a los cuatro eventos listados en la parte a).\nLo que sí varía es la frecuencia con la que cada evento ocurre, y por tanto la cantidad y el tipo de ACK\nque realmente se envían.\n\nEn un enlace con pérdidas relativamente altas (un segmento perdido por cada cien transmitidos, 1%)\naparecen huecos en la secuencia de mensajes con mayor frecuencia. Cada vez que un segmento se\npierde, los que llegan después lo hacen “por delante” del esperado, de modo que el receptor detecta la\nbrecha y envía de inmediato ACK duplicados (evento 3) para indicar el byte que falta. Cuando el\nemisor retransmite y completa ese hueco, el receptor reacciona con un ACK inmediato (evento 4).\nAdemás, el receptor apenas puede aprovechar la técnica del ACK retardado debido a las pérdidas. El\nresultado global es una mayor generación de ACKs debido a los duplicados y ACKs inmediatos,\nsubutilización del canal y retrasos en el envío de la información contenida en los segmentos a las\naplicaciones que está haciendo uso de las conexiones TCP afectadas.\n\nEn cambio, cuando la tasa de errores es muy baja (un segmento perdido cada millón, 0,0001 %) los\nsegmentos casi siempre llegan en orden y sin huecos. Predominan los eventos 1 y 2: la mayoría de los\nACK pueden agrupar datos porque otro segmento consecutivo suele llegar antes de que expire el\nretardo de 500 ms. Los eventos 3 y 4 solo se producen excepcionalmente, así que los ACK duplicados\ncasi desaparecen. El flujo de ACK se vuelve estable, con menos ACKs individuales y mayor proporción\nde ACKs acumulativos por lo que el canal se utiliza mas eficientemente para transportar la información\n\n                                            Redes de Computadoras\n\nútil de las aplicaciones.","atype":"oficial","sources":[],"id":"redesexamen_202507_p2b"},{"exam":"Julio 2025","code":"2025-07","problema":"Pregunta 3 (a)","topic":"Capa de red","cat":"Capa de red","q":"Respecto a IPv6:\n\na) Enumere y explique dos diferencias con IPv4.","answer":"Dos diferencias son:\n\n1. Mayor tamaño de dirección. Con 32 bits en IPv4 y 128 bits en IPv6, IPv6 permite tener un número de\ndirecciones mucho mayor que IPv4, solucionando el problema de agotamiento de direcciones. El total de\ndirecciones IPv6 es 2^128, suficientes como para que cada grano de arena del planeta tenga su propia\ndirección IPv6.\n2. Desaparición de la fragmentación y reensamblado en routers intermedios. En IPv6, la fragmentación y el\nreensamblado debe realizarse en los emisores y receptores, no en los routers intermedios. Si un router\nintermedio recibe un datagrama IPv6 cuyo tamaño supera el MTU del enlace de salida, se descarta y se\nenvía un mensaje ICMP de notificación al emisor, quien puede reenviar los datos en datagramas más\npequeños.","atype":"oficial","sources":[],"id":"redesexamen_202507_p3a"},{"exam":"Julio 2025","code":"2025-07","problema":"Pregunta 3 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"Respecto a IPv6:\n\nb) Indique los tipos de direcciones existentes. ¿Para qué se utiliza cada uno?","answer":"Los tipos de direcciones existentes son:\n\ni) Unicast – Identifican una única interfaz en la red.\nii) Multicast – Identifican un grupo de interfaces. Un datagrama enviado a una dirección multicast se entrega\na todos los miembros del grupo.\niii) Anycast – También identifica un grupo de interfaces, pero un datagrama enviado a una dirección anycast\nse entrega a un solo miembro del grupo, el más próximo.\niv) Direcciones reservadas – No identifican interfaces, cumplen propósitos específicos. Por ejemplo, la\ndirección sin especificar (::/128), la dirección de loopback (::1/128) y la dirección de ruta por defecto (::/0).","atype":"oficial","sources":[],"id":"redesexamen_202507_p3b"},{"exam":"Julio 2025","code":"2025-07","problema":"Pregunta 3 (c)","topic":"Capa de red","cat":"Capa de red","q":"Respecto a IPv6:\n\nc) Dos subredes que utilizan IPv6 deben comunicarse entre sí a través de una red que utiliza IPv4. Explique\n       una técnica para poder lograr la comunicación.","answer":"Para comunicar dos subredes IPv6 a través de una red IPv4, una posibilidad es aplicar la técnica de\ntunneling: en el router de origen que une la red IPv6 con la red IPv4, se encapsula el datagrama IPv6 como\ncarga útil de un datagrama IPv4. El datagrama IPv4 con el datagrama IPv6 encapsulado se enruta y\ntransmite a través de la red IPv4 hasta que llega al router que une la red IPv4 con la red IPv6 de destino,\nquien desencapsula el datagrama IPv6 y lo envía dentro de la red IPv6.","atype":"oficial","sources":[],"id":"redesexamen_202507_p3c"},{"exam":"Julio 2025","code":"2025-07","problema":"Pregunta 4 (a)","topic":"Capa de red","cat":"Capa de red","q":"La empresa “ACME Networking” fabrica placas de red Ethernet y accidentalmente les ha asignado la misma\ndirección MAC a todas. Usted compra tres equipos (A, B y C) con una tarjeta de red marca ACME cada uno, y\nlos instala en una subred privada, donde A, B y C tienen direcciones IP distintas.\nSe envía un ping de A hacia B. Explique y justifique si la operación funcionaría correctamente, mencionando el\ntráfico observado en los tres hosts, si todos los dispositivos están conectados a través de:\n\na) Un hub.","answer":"Un hub es un dispositivo de capa física que repite los datos recibidos por todas sus interfaces (excepto la\ninterfaz por la que llegó). El ARP Request llegará a todos los dispositivos de la red, debido al\ncomportamiento del hub. La dirección IP contenida en el ARP Request coincide con la dirección IP de B,\npor lo que B responde con un ARP Reply. El ARP Reply tendrá la misma dirección MAC en origen y\ndestino, que además coincide con las MAC de A, B y C. Al estar los hosts conectados mediante un hub, el\nARP Reply llega a todos los dispositivos (excepto B). La dirección MAC de destino del paquete coincide con\nlas direcciones MAC de A y C, por lo que ambos procesan el paquete. Sin embargo, C recibe un ARP Reply\nsin un ARP Request previo, y además la IP de destino contenida en el ARP Reply no coincide con la IP de\nC; por lo tanto, C descarta el paquete. A recibe el ARP Reply, lo acepta y ya puede enviar el Echo Request.\n\nPor el hub el Echo Request es recibido por todos los dispositivos de la subred (excepto A); como la MAC de\ndestino coincide con la MAC de B y C, B y C aceptan el paquete en su capa de enlace y lo pasan a la capa\nde red. Sin embargo, en C la dirección IP de destino no coincide con la IP de la interfaz por lo que se\ndescarta. En B el paquete coincide en dirección MAC de destino y dirección IP de destino, por lo que se\nprocesa y envía el Echo Reply.\n\nSiguiendo la misma lógica, por el hub el Echo Reply es recibido por todos los dispositivos de la subred\n(excepto B); como la MAC de destino coincide con la MAC de A y C, A y C aceptan el paquete en su capa\nde enlace y lo pasan a la capa de red. Sin embargo, en C la dirección IP de destino no coincide con la IP de\nla interfaz por lo que se descarta. En A el paquete coincide en dirección MAC de destino y dirección IP de\ndestino por lo que se recibe correctamente el Echo Reply.\n\nLa operación funciona, con procesamiento adicional.","atype":"oficial","sources":[],"id":"redesexamen_202507_p4a"},{"exam":"Julio 2025","code":"2025-07","problema":"Pregunta 4 (b)","topic":"Capa de red","cat":"Capa de red","q":"La empresa “ACME Networking” fabrica placas de red Ethernet y accidentalmente les ha asignado la misma\ndirección MAC a todas. Usted compra tres equipos (A, B y C) con una tarjeta de red marca ACME cada uno, y\nlos instala en una subred privada, donde A, B y C tienen direcciones IP distintas.\nSe envía un ping de A hacia B. Explique y justifique si la operación funcionaría correctamente, mencionando el\ntráfico observado en los tres hosts, si todos los dispositivos están conectados a través de:\n\nb) Un switch.\nNota: En cada parte, todas las tablas inicialmente están vacías.","answer":"Llamemos MAC_ACME a la MAC de A, B y C. Inicialmente el switch tiene su tabla vacía por lo que el\nARP Request de A es enviado por flooding a todos los dispositivos de la red excepto A. El switch asocia el\npuerto conectado a A con la MAC MAC_ACME, ya que es la MAC de origen del paquete. La dirección IP en\nla solicitud coincide con la dirección IP de B, por lo que B responde con un ARP Reply. El switch recibe el\nARP Reply, y ahora asocia el puerto conectado a B con la MAC MAC_ACME, ya que es la MAC de origen\ndel paquete. La interfaz de origen y la interfaz por la que se enviaría según lo recién aprendido son iguales,\npor lo que el switch descarta la trama (filtrado). El ARP Request de A no tuvo éxito, por lo que no puede\nenviar el Echo Request.\n\nLa operación no funciona.\n\n                                            Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_202507_p4b"},{"exam":"Diciembre 2025","code":"2025-12","problema":"Pregunta 1 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"La empresa ITP ha definido que su presencia en Internet será utilizando el dominio itp.uy.\n\na) Explique para cada caso, qué registros, con qué configuración y en qué servidor/es hay que agregarlos\n       para que:\n       i. El servidor DNS autoritativo del dominio itp.uy sea 34.53.12.12 y se llame dns.itp.uy.\n       ii. El servidor web esté disponible en la dirección IP 35.80.12.12, y que responda el mismo contenido\n            tanto para www.itp.uy como para itp.uy.\n       iii. El servidor web también debe ser identificado con el nombre webserver en el dominio en cuestión.\n       iv. El servidor de correo electrónico esté configurado en la dirección IP 36.25.12.12 y se llame\n            mail.itp.uy.","answer":"i)Los registros solicitados se muestran respetando el formato del libro, o sea:\n\nFORMATO RR: (nombre, valor, tipo, ttl)\n* Se simplifica la notación omitiendo el valor de ttl\n\nPara que el servidor DNS autoritativo del dominio itp.uy sea 34.53.12.12 y se llame dns.itp.uy se debe agregar\ndos registros (I y II) en los servidores de nombre autoritativos del TLD .uy, y dos registros (III y IV) en el propio\nservidor DNS con esa IP (en el archivo de zona de itp.uy), pues ese servidor pasa a ser el autoritativo del\ndominio itp.uy. Es decir:\n\nI: (itp.uy, dns.itp.uy, NS)\nII: (dns.itp.uy, 34.53.12.12, A)\nIII: (itp.uy, dns.itp.uy, NS)\nIV: (dns.itp.uy, 34.53.12.12, A)\n\nii) Para que el servidor web esté disponible en la IP 35.80.12.12 y responda tanto como www.itp.uy como itp.uy,\nse deben agregar en el archivo de zona de itp.uy, los siguientes registros:\n\n(www.itp.uy, 35.80.12.12, A)\n(itp.uy, 35.80.12.12, A)\n\n                                              Redes de Computadoras\n\niii) Para que el servidor web también sea identificado como webserver.itp.uy, se debe agregar el registro:\n\n(webserver.itp.uy, www.itp.uy, CNAME)\n\nOtra opción es agregar\n(webserver.itp.uy, 35.80.12.12, A), pero no resulta la más adecuada para la gestión del servicio DNS\n\niv) Para que el servidor de correo esté en la IP 36.25.12.12 y se llame mail.itp.uy, se deben agregar los\nsiguientes registros:\n\n- Registrar el host del servidor de correo: mail IN A 36.25.12.12\n- Indicar que este es el servidor MX del dominio: itp.uy. IN MX mail.itp.uy.\n\n(mail.itp.uy, 36.25.12.12, A)\n(itp.uy, mail.itp.uy, MX)","atype":"oficial","sources":[],"id":"redesexamen_202512_p1a"},{"exam":"Diciembre 2025","code":"2025-12","problema":"Pregunta 1 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"La empresa ITP ha definido que su presencia en Internet será utilizando el dominio itp.uy.\n\nb) Si se requiere cambiar la dirección IP del servidor dns.itp.uy, ¿qué acciones sólo a nivel del servicio\n       DNS buscaría realizar para que dicha modificación impacte lo menos posible en la resolución de nombre\n       del dominio itp.uy?","answer":"Se debería gestionar con el administrador de la zona padre (TLD .uy) para que se baje al menor valor posible\ny razonable el TTL del registro A de la delegación (registro “II” de la parte a)); luego, solicitar cambiar la dirección\nIP por la nueva (tanto en la zona padre como en la zona hija), y luego de verificar que todo está ok (o sea que los\nservidores de DNS comienzan a responder con la nueva IP asociada al servidor dns.itp.uy), solicitar que el valor\ndel TTL del registro A vuelva al original","atype":"oficial","sources":[],"id":"redesexamen_202512_p1b"},{"exam":"Diciembre 2025","code":"2025-12","problema":"Pregunta 2 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"a) Explique el servicio de control de flujo de TCP.","answer":"El control de flujo es el mecanismo mediante el cual el emisor evita sobrecargar al receptor, enviando datos\nsolo a la velocidad que este último es capaz de procesar y almacenar.\nPara esto TCP utiliza una ventana deslizante (buffer) del lado del receptor, donde se almacenan los datos\nrecibidos y aún no procesados. El receptor anuncia en cada segmento el valor rwnd (receive window), que indica\nla cantidad de bytes que el receptor puede recibir sin desbordar su buffer.\n\nDel lado del emisor, se usa esta información para no enviar más datos que el tamaño de la ventana anunciada.\nEs decir, si el receptor reduce su ventana, el emisor debe disminuir el envío.","atype":"oficial","sources":[],"id":"redesexamen_202512_p2a"},{"exam":"Diciembre 2025","code":"2025-12","problema":"Pregunta 2 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) Mencione la situación de deadlock o bloqueo que se puede presentar en el control de flujo y cómo lo\n       resuelve TCP.","answer":"Puede producirse una situación de bloqueo cuando el receptor, al quedarse sin espacio en su buffer, anuncia\nuna ventana de recepción igual a cero y por lo tanto, el emisor detiene el envío de datos.\nAl no haber mas intercambio de datos, el emisor podría quedarse bloqueado esperando que aumente la ventana\ny el receptor queda esperando por nuevos datos del emisor.\nTCP evita este bloqueo indefinido mediante el envío periódico de un segmento de un byte. Este segmento obliga\nal receptor a responder con un ACK que incluye su valor actual de ventana.","atype":"oficial","sources":[],"id":"redesexamen_202512_p2b"},{"exam":"Diciembre 2025","code":"2025-12","problema":"Pregunta 3 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) Mencione las características principales del protocolo OSPF.","answer":"OSPF (Open Shortest Path First) es un protocolo de enrutamiento interior (IGP) basado en el algoritmo de\nestado de enlace (link-state). Sus características principales son las siguientes:\n\n- Es abierto (“open”). Está especificado en una RFC (2328).\n- Utiliza un algoritmo de estado de enlace y cálculo de los caminos de costo mínimo por Dijkstra\n- Convergencia rápida\n- Los mensajes viajan directamente en datagramas IP\n\n                                            Redes de Computadoras\n\n- Ofrece seguridad respecto a que los mensajes pueden ser autenticados\n- Puede considerar más de un camino con el mismo costo\n- Soporta multicast (además de unicast)\n- Enrutamiento jerárquico","atype":"oficial","sources":[],"id":"redesexamen_202512_p3a"},{"exam":"Diciembre 2025","code":"2025-12","problema":"Pregunta 3 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) Explique brevemente el concepto de jerarquía de áreas de OSPF.","answer":"La jerarquía de área de OSPF se basa en la capacidad del protocolo de agrupar los routers en áreas\ntopológicas (en dos niveles jerárquicos) que reflejan el flujo de tráfico esperado en cada una y entre ellas.\n\nSe define un área 0 (primer nivel jerárquico, siempre existe), asimilable al concepto de backbone (“backbone\nrouters”), y luego un conjunto de áreas (segundo nivel jerárquico, puede no existir, área 1, área 2,…) conectadas\na ésta a través de los “area border routers”, y cada una de ellas con sus “internal routers”. El área 0 se conecta\ncon el “resto del mundo” (otros Ass) a través de los “boundary routers”, pertenecientes al área 0.\n\nLos área border routers “sumarizan” hacia el área 0 las redes de su área, lo cual le da escalabilidad a la\nconfiguración del routing (de los prefijos) y pone de manifiesto los niveles jerárquicos del OSPF","atype":"oficial","sources":[],"id":"redesexamen_202512_p3b"},{"exam":"Diciembre 2025","code":"2025-12","problema":"Pregunta 4","topic":"Capa de red","cat":"Capa de red","q":"Mencione y describa brevemente, incluyendo ejemplos concretos, las tres grandes clases de protocolos MAC\n(Medium Access Control) vistas en el curso. Como parte de la descripción incluya como resuelve las colisiones\n(si las hay) y que ventajas o desventajas tiene a nivel de uso eficiente del medio.","answer":"1) Protocolos de particionamiento del canal: dividen el canal en porciones fijas —en tiempo, frecuencia o códigos\n— asignadas a los usuarios. No hay colisiones porque a cada nodo le corresponde una parte exclusiva del\nmedio. Cada usuario tiene una porción garantizada del medio, lo que hace eficientes bajo carga alta, pero tienen\nun uso deficiente de recursos si hay poco tráfico. Ejemplos: TDMA o FDMA\n\n2) Protocolos de acceso aleatorio: En estos protocolos, cada nodo transmite cuando tiene datos, asumiendo que\nel medio está disponible. Existe la posibilidad de colisiones, y los protocolos incluyen mecanismos para\ndetectarlas o evitarlas. El control de colisiones depende del protocolo. Por ejemplo ALOHA al detectar una\ncolisión interrumpe la transmisión e intenta retransmitir con una probabilidad p. En CSMA/CD, se detecta la\ncolisión y la probabilidad de retransmisión depende de una probabilidad que se calcula mediante un backof\nexponencial. La eficiencia en este caso depende de la cantidad de nodos, del tráfico y de la probabilidad de\nretransmisión. Con tráfico bajo son mas eficientes que el caso anterior.\n\n3) Protocolos de toma de turnos: En esta clase, un “testigo” (token) circula entre los nodos, y solo quien posee el\ntoken puede transmitir. Esto evita colisiones y da un orden predecible. Depende del protocolo tiene problemas en\nsi depende de un nodo maestro\n que asigna los turnos o de overhead en el aviso a cada nodo de que es su turno de transmitir. Un ejemplo es\nToken Ring.\n\n                                            Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_202512_p4"},{"exam":"Febrero 2026","code":"2026-02","problema":"Pregunta 1 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) Defina el concepto general de Round Trip Time (RTT).","answer":"RTT es el tiempo que transcurre entre que se envía un mensaje de determinado protocolo y se recibe el\nmensaje originado en destino en respuesta al mensaje recibido.","atype":"oficial","sources":[],"id":"redesexamen_202602_p1a"},{"exam":"Febrero 2026","code":"2026-02","problema":"Pregunta 1 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) En TCP,\n         i.   ¿Cómo se estima el RTT?\n        ii.   ¿Qué consideraciones hay que tener presente al momento de determinar el timeout?","answer":"i. Para estimar el valor del RTT a lo largo de la vida de la conexión, TCP utiliza la siguiente fórmula:\nEstimatedRTT = (1- α) x EstimatedRTT + α x SampleRTT\n\ndonde un valor típico de α es 0.125.\n\nEl valor de SampleRTT (“MuestraRTT”) se obtiene considerando el tiempo entre que se envía un segmento\ny se recibe el ACK correspondiente.\n\nPor lo tanto, la ponderación que aporta α busca suavizar las posibles fluctuaciones presentes en el\nSampleRTT “muestra a muestra” frente al histórico del EstimatedRTT (“EstimadoRTT”).\n\nii. Respecto al timeout, sin dudas que debe ser mayor al RTT, pero si es muy corto, es un timeout\nprematuro, lo que puede hacer incurrir a la conexión en retransmisiones innecesarias; si es muy largo,\npuede impactar negativamente pues las reacciones a la pérdida de segmentos serían tardías.","atype":"oficial","sources":[],"id":"redesexamen_202602_p1b"},{"exam":"Febrero 2026","code":"2026-02","problema":"Pregunta 2 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"a) Mencione los 3 componentes principales del servicio de correo electrónico vistos en el curso y\n       comente sus características fundamentales.","answer":"Los 3 componentes principales son: user agent, mail servers y protocolo SMTP.\nLos “user agent” son las aplicaciones que permiten componer, editar y leer los mensajes de cor
