{"exam":"Diciembre 2015","code":"2015-12","problema":"Pregunta 5","topic":"Capa de transporte","cat":"Capa de transporte","q":"Suponga que el host A envía al host B un segmento encapsulado en un datagrama IP. Cuando el host B recibe el\ndatagrama, ¿cómo sabe la capa de red de ese host que debería pasar el segmento a TCP en lugar de a UDP o\ncualquier otro protocolo?","answer":"La capa de red le entrega el payload del datagrama a el protocolo indicado por el campo de\nocho bits “protocol” del encabezado. Los valores de ese campo están estandarizados y cada uno\nde ellos indica un protocolo de capa superior determinado. Si en payload del datagrama es un\nsegmento TCP, el campo protocol tiene el valor 6.\n\n                                                 Página 3/8\n\n       Redes de Computadoras, Introducción a las Redes de Computador{ae}s y Comunicación de Datos","atype":"oficial","sources":[],"id":"redesexamen_201512_p5"},{"exam":"Julio 2016","code":"2016-07","problema":"Pregunta 1 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) ¿Qué tipo de dispositivos son los responsables de definir el camino por el que es enrutado un paquete IPv4 a través de\n       Internet, cuál es la tabla y algoritmo que utiliza para tomar la decisión y en qué parte del cabezal del datagrama IPv4\n       se basa dicha decisión?","answer":"Los dispositivos para enrutar el tráfico IPv4 son los enrutadores (routers) de capa 3,\n       quienes en base al valor de la dirección destino del encabezado IP origen toman la\n       decisión de reenviar el paquete actual hacia el siguiente hop según lo indique el\n       resultado de aplicar el algoritmo Longest Prefix Match sobre su tabla de forwarding.","atype":"oficial","sources":[],"id":"redesexamen_201607_p1a"},{"exam":"Julio 2016","code":"2016-07","problema":"Pregunta 1 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) Dado un intercambio de paquetes entre los hosts Origen y Destino, identifique al menos dos causas que justifiquen el\n       hecho de que un paquete que envía Destino hacia Origen pueda no recorrer necesariamente el mismo camino Origen-\n       Destino pero en orden inverso.","answer":"Dado que la red IPv4 es una red de datagramas esto implica que las decisiones son\n       distribuidas y descentralizadas; además, a diferencia de una red de conmutación de\n       circuitos, no implica necesariamente que el camino de ida y vuelta sean los mismos.\n       Como la decisión de enrutamiento es tomada de forma distribuida y por el carácter\n       dinámico de la red, es posible que las condiciones de la misma cambien con el tiempo.\n       De esta forma pueden existir condiciones como congestión, pérdida de paquetes en\n       enlaces o incluso la caída de uno. Cualquiera de estos factores puede influir sobre el\n       protocolo de ruteo dinámico (o incluso también cuando el ruteo sea estático) y por\n       consiguiente generar diferente información en cada uno de los nodos de la red.\n       Incluso los prefijos de las redes pueden estar publicados de forma de forzar caminos de\n       ida y vuelta distintos (en este caso el motivo es la política del proveedor de\n       servicio, no un fallo en la red).","atype":"oficial","sources":[],"id":"redesexamen_201607_p1b"},{"exam":"Julio 2016","code":"2016-07","problema":"Pregunta 1 (c)","topic":"Capa de red","cat":"Capa de red","q":"c) Describa la relación entre la MTU del enlace y la fragmentación IPv4, mencionando los campos del encabezado IPv4\n       definidos para este fin.","answer":"La MTU del enlace limita el tamaño que puede tener un paquete IPv4 incluyendo los\n       encabezados. Cuando se tienen datos a transmitir y el tamaño de los datos + 20 bytes\n       (cabezal IPv4) es superior a la MTU, entonces se deberá hacer algo o de lo contrario se\n       descartará el paquete, eventualmente enviando un mensaje ICMP de error. Al fragmentar\n       un paquete se deben configurar correctamente (al menos) 4 campos del encabezado, que\n       son: largo, DF, MF y Fragment Offset. Con la flag DF se indica si ese paquete se puede\n       o no fragmentar, con MF se indica si el fragmento actual es o no el último de la\n       secuencia y el Offset indica la posición que deberá ocupar en el paquete original el\n       actual, contado en unidades de 8 bytes.","atype":"oficial","sources":[],"id":"redesexamen_201607_p1c"},{"exam":"Julio 2016","code":"2016-07","problema":"Pregunta 2 (a)","topic":"Capa de enlace","cat":"Capa de enlace","q":"a) Suponga que en una red se tiene un hub y a éste le ingresa una trama mal formada por un puerto, ¿qué hace el hub\n       con ella?","answer":"Dado que un hub es un dispositivo de capa física y no maneja el concepto de frame sino\n        que replica bit a bit todo el tráfico que ingresa a sus interfaces, cuando algún\n        dispositivo conectado a él le envía tráfico mal formado, el mismo será replicado.","atype":"oficial","sources":[],"id":"redesexamen_201607_p2a"},{"exam":"Julio 2016","code":"2016-07","problema":"Pregunta 2 (b)","topic":"Capa de enlace","cat":"Capa de enlace","q":"b) Explique por qué se afirma que un switch al ser encendido se comporta como un hub y luego evoluciona al\n       comportamiento típico de un switch.","answer":"Al encender un switch el mismo tiene su tabla de switching vacía. Al llegarle una trama\n        por una de sus interfaces el switch deberá hacer un flooding controlado y reenviarlo\n        por todas las interfaces, dado que la dirección MAC Destino presente en el encabezado\n        de la trama no se encuentra en su tabla. Al mismo tiempo, el switch ahora sabe que al\n        dispositivo que tiene la dirección MAC que está en el encabezado MAC Origen de la trama\n        lo puede alcanzar a través del enlace por el que llegó esa trama. De esta forma el\n        switch comienza a completar la tabla de switching con ese dato, agregando una fila que\n        contiene: Dirección MAC (la que viene en el MAC Origen de la trama), Interfaz (por la\n        que llegó la trama) y TTL (tiempo durante el cual es válida la entrada). Este mecanismo\n        es lo que llamamos self-learning. Esto es fundamental para que el switch pueda ser\n        plug&play y no sea necesario realizarle ninguna configuración adicional. A su vez, dado\n        que los dispositivos pueden cambiar de lugar o que la red es dinámica y puede cambiar\n        también, el campo TTL mencionado antes es importante, y permite a su vez que este tipo\n        de cambios también sea soportado por los switches sin la necesidad de configuración\n        manual.","atype":"oficial","sources":[],"id":"redesexamen_201607_p2b"},{"exam":"Julio 2016","code":"2016-07","problema":"Pregunta 2 (c)","topic":"Capa de red","cat":"Capa de red","q":"c) ¿Es posible tener colisiones en una red implementada sólo con hubs? ¿Qué sucede en una red switcheada pura?\n\n                                                         Página 1/8\n\n                                                Redes de Computadoras","answer":"Sí, porque son dispositivos de capa física y lo único que hacemos al conectar muchos\n        hubs es agrandar el mismo dominio de colisión. Al utilizar switches, y mediante su\n        mecanismo de store & forward, los dominios de colisión se limitan ahora a uno por cada\n        enlace y si estos enlaces son FullDúplex entonces podemos decir que no habrá colisiones\n        (si fueran HalfDúplex podría colisionar cuando dos estaciones quieren transmitir al\n        mismo tiempo).","atype":"oficial","sources":[],"id":"redesexamen_201607_p2c"},{"exam":"Julio 2016","code":"2016-07","problema":"Pregunta 3 (a)","topic":"Capa de enlace","cat":"Capa de enlace","q":"a) Describa brevemente las tecnologías FDM (Frecuency Division Multiplexing) y TDM (Time Division Multiplexing).","answer":"En Multiplexación por División de la Frecuencia (FDM),\nel espectro de frecuencias disponible en un enlace se\nreparte todo el tiempo entre las conexiones establecida\nen el mismo.\n\nEn Multiplexación por División en el Tiempo (TDM), el\ntiempo   se   divide  en   ranuras   de   duración   fija\npreestablecida (“marcos”) y éstas en otras ranuras (con\nuna   cantidad preestablecida),    también de    duración\nconstante (”particiones”), y cada una de ellas es\nutilizada periódicamente por una conexión, con todo el espectro de frecuencias disponible en\nese lapso de tiempo para ella.","atype":"oficial","sources":[],"id":"redesexamen_201607_p3a"},{"exam":"Julio 2016","code":"2016-07","problema":"Pregunta 3 (b)","topic":"Capa de enlace","cat":"Capa de enlace","q":"b) Mencione las principales diferencias entre los medios físicos fibra óptica y UTP.","answer":"Fibra óptica                           UTP\nMaterial utilizado para llevar hilo de vidrio o plásticos                        hilo/s de cobre trenzados\nla información\nPrincipio de funcionamiento               la información se             transmite la información se transmite\n                                          como pulsos de luz                      como pulsos eléctricos\nInmunidad a interferencias                si                                     no\nAtenuación de la señal                    menor                                  mayor\nDirección de la comunicación              unidireccional                         bidireccional\nVelocidades    de            operación mayor (“decenas de Gbps”)                 menor (“Gbps”)\n(según distancias)\nDistancias de operación                   mayor (“kilómetros”)                   menor (“metros”)\nCosto                                     mayor                                  menor","atype":"oficial","sources":[],"id":"redesexamen_201607_p3b"},{"exam":"Julio 2016","code":"2016-07","problema":"Pregunta 4 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"a) Describa el formato de los mensajes de DNS (Query y Reply).\n                                                        Página 2/8\n\n                                               Redes de Computadoras","answer":"Ambos tipos de mensajes tienen el mismo\n                                                            formato: encabezado de largo fijo (12 bytes) y\n                                                            carga útil de largo variable. En el encabezado\n                                                            viaja la siguiente información:\n\n                                                            Identificador de 16 bits, para asociar parejas\n                                                            de mensajes Query-Reply.\n\n                                             Indicadores o Flags (señalizando por ejemplo, si\n                                             es un Query o un Reply, si se desea realizar una\n                                             consulta   recursiva,    si   la   recursión   está\n                                             disponible, si la respuesta es autoritativa, el\n                                             tipo de respuesta, entre otras) y, el Número de\n                                             Consultas, el Número de RRs (Resources Records)\n                                             de Respuesta (respuesta/s a la/s consulta/s\n                                             realizada/s), el Número de RRs de Autoridad\n                                             (información    proporcionada     por    servidores\n                                             autoritativos)    y   el    Número    de   RRs   de\n                                             (información) Adicional (información que podría\n        ser útil para quien recibirá el Reply, a juicio de quien lo generó). Los últimos 3\n        Números pueden ser 0.\n\n        En la carga útil viene la información                     referenciada      en   el   encabezado      (questions,\n        answers, authority, additional).","atype":"oficial","sources":[],"id":"redesexamen_201607_p4a"},{"exam":"Julio 2016","code":"2016-07","problema":"Pregunta 4 (b)","topic":"Fundamentos de redes","cat":"Fundamentos de redes","q":"b) ¿Es posible que un servidor recursivo funcionando correctamente consulte por determinado registro, reciba la\n       respuesta e inmediatamente después repita la misma consulta?","answer":"Sí. Por ejemplo en el caso que los RRs de la primera respuesta tuvieran 0 como valor\n        de TTL.","atype":"oficial","sources":[],"id":"redesexamen_201607_p4b"},{"exam":"Julio 2016","code":"2016-07","problema":"Pregunta 5","topic":"Redes (general)","cat":"Redes (general)","q":"Utilizando dos diagramas de mensajes y sus números de secuencia como los vistos en el curso, uno para el emisor y otro para\nel receptor, explique el principio de funcionamiento de la técnica denominada Repetición Selectiva.","answer":"Página 3/8\n\n                                            Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201607_p5"},{"exam":"Diciembre 2016","code":"2016-12","problema":"Pregunta 1 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"a) ¿Por qué el servicio DNS no está implementado de manera centralizada?","answer":"Sería un único punto de falla.\nEl volumen de tráfico en ese único punto sería enorme.\nLa operación y mantenimiento de una base de datos centralizada con millones de\nregistros sería inviable.","atype":"oficial","sources":[],"id":"redesexamen_201612_p1a"},{"exam":"Diciembre 2016","code":"2016-12","problema":"Pregunta 1 (b)","topic":"Redes (general)","cat":"Redes (general)","q":"b) Explique el formato de los Resource Records (RR).","answer":"NOMBRE   TTL    TIPO       VALOR","atype":"oficial","sources":[],"id":"redesexamen_201612_p1b"},{"exam":"Diciembre 2016","code":"2016-12","problema":"Pregunta 1 (c)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"c) Brinde y explique dos ejemplos de Resource Records.","answer":"www.fing.edu.uy.        551   IN    A    164.73.32.5\nfing.edu.uy.            1502 IN     MX   0           smtp.fing.edu.uy.\nSon dos registros de la clase Internet (IN).\nPrimer registro:\nNOMBRE:     www.fing.edu.uy\nTTL:        551\nTIPO:       A\nVALOR:      164.73.32.5\nBrinda la correspondencia nombre – dirección IP\nSegundo registro:\nNOMBRE:     fing.edu.uy\nTTL:        1502\nTIPO:       MX\n      Preferencia: 0\nVALOR:      smtp.fing.edu.uy\nBrinda el nombre de un servidor de correo para el dominio fing.edu.uy. De existir\nmás de un registro MX para un mismo dominio, la primera opción será la de menor\nvalor de preferencia.","atype":"oficial","sources":[],"id":"redesexamen_201612_p1c"},{"exam":"Diciembre 2016","code":"2016-12","problema":"Pregunta 3 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) Defina los términos “dominio de broadcast” y “dominio de colisión” en el contexto de redes ethernet. En\n      qué caso estos conceptos coinciden?","answer":"Un “dominio de broadcast” ethernet es el conjunto de sistemas alcanzables\nmediante un mensaje de broadcast, es decir, cuando la dirección de destino es “todos\n1” (FF:…:FF). El dominio de broadcast constituye una red de área local, y\ntípicamente se corresponde con el concepto de “subred” en capa 3, donde todos los\nsistemas comparten el mismo prefijo de red. Un “dominio de colisión” es un concepto\nfísico, y está constituído por aquellos sistemas que comparten el medio y por lo\ntanto pueden colisionar tramas al intentar transmitir. En redes constituídas\nexclusivamente por “hubs” ambos conceptos coinciden.","atype":"oficial","sources":[],"id":"redesexamen_201612_p3a"},{"exam":"Diciembre 2016","code":"2016-12","problema":"Pregunta 3 (b)","topic":"Capa de enlace","cat":"Capa de enlace","q":"b) En un contexto de medio compartido, describa al menos dos técnicas de acceso al medio. Haga énfasis\n      en sus diferencias, explicándolas detalladamente.","answer":"“Carrier Sense Multiple Access” con detección de colisiones (CSMA/CD) es\nutilizado en redes ethernet, y especifica la forma de enviar tramas al medio\ncompartido, el mecanismo de detección de colisiones, y el algoritmo de reintento\ncuando se detecta una colisión (backoff exponencial).\n“Aloha” es una técnica de acceso al medio inalámbrico, donde cada nodo transmite una\ntrama cuando está disponible, y si detecta colisiones, intenta trasmitirla\nnuevamente con cierta probabilidad p.\nEstas dos técnicas se usan en medios diferentes (cableado vs. Inalámbrico), y\ndifieren en el mecanismo de reintento, que determina que la eficiencia de los\nprotocolos sea muy distinta.","atype":"oficial","sources":[],"id":"redesexamen_201612_p3b"},{"exam":"Diciembre 2016","code":"2016-12","problema":"Pregunta 3","topic":"Capa de enlace","cat":"Capa de enlace","q":"Describa los conceptos Exploración (Scanning) Pasiva y Exploración Activa de la tecnología 802.11 o WiFi.","answer":"El proceso de scanning de 802.11 o WiFi ­recorriendo todos los canales disponibles­\nes el que permite a las estaciones (STAs) conocer los APs/SSIDs disponibles a los\nefectos que se pueda decidir con cuál de ellos se intentará la Asociación (trama\nAssociation Request ­destinada a la MAC del AP seleccionado­, y trama Association\nResponse ­destinada a la MAC de la STA que envió la trama previa­).\n\nLas dos modalidades de scanning disponibles son: Pasivo y Activo.\n\nEn el Pasivo, la STA “escucha” y procesa las tramas Beacon ­destinadas al broadcast­\nemitidas periódicamente por el AP y decide con cual de ellos iniciar la Asociación o\npresenta la información a quién decidirá.\n\n                                                   Página 2/7\n\n                                 Redes de Computadoras\nEn el Activo, la STA genera una trama Probe Request ­destinada al broadcast­ que\nmotivará a los APs que la procesen a que generen una trama Probe Response ­destinada\na la MAC de la STA que envió la trama previa­ que contendrá, a los efectos de la\nAsociación, la misma información que la trama Beacon.","atype":"oficial","sources":[],"id":"redesexamen_201612_p3"},{"exam":"Diciembre 2016","code":"2016-12","problema":"Pregunta 4","topic":"Capa de red","cat":"Capa de red","q":"Explique y compare las técnicas de “Reverse Path Forwarding” y “flooding controlado por número de secuencia”\nque se pueden utilizar para determinar el forwarding en redes multicast/broadcast.","answer":"La técnica de “Reverse Path Forwarding” (RPF) especifica que cuando se recibe un\npaquete de difusión, se reenviará a todas las interfaces del nodo (excepto la\ninterfaz de entrada) solo si el paquete arribó desde un origen que está en el\ncaminio unicast de costo mínimo desde la interfaz de entrada, y en caso contrario,\nse descartará.\nLa técnica de “flooding controlado por número de secuencia” especifica que cuando se\nrecibe un paquete de difusión, se reenviará a todas las interfaces del nodo (excepto\nla interfaz de entrada) solo si el paquete no se había recibido antes, y para esto\nse marcan los paquetes recibidos con un número de secuencia. En caso de paquete\nrepetido, se descartará.\nAmbas técnicas implementan el “flooding” o inundación controlada; RPF es una técnica\nliviana que solo necesita comprobar la tabla de forwarding del nodo, mientras que la\notra técnica exige mantener estado, y consecuentemente es más costosa.","atype":"oficial","sources":[],"id":"redesexamen_201612_p4"},{"exam":"Diciembre 2016","code":"2016-12","problema":"Pregunta 5","topic":"Capa de enlace","cat":"Capa de enlace","q":"Describa el algoritmo “link state” utilizado para determinar los caminos de menor costo desde un origen a todos los\ndestinos en una red, y explique por qué determina un árbol de cubrimiento mínimo. Es un algoritmo distribuido o\ncentralizado?","answer":"El algoritmo link­state utilizado es Dijkstra. Determina los caminos de menor costo\nsin ciclos desde cada nodo hacia los demás, es decir, un árbol de cubrimiento\nmínimo. Es un algoritmo distribuido, ya que cada nodo corre su instancia,\nalimentándose de la información intercambiada con los otros nodos, sin que exista\nuna instancia de coordinación.","atype":"oficial","sources":[],"id":"redesexamen_201612_p5"},{"exam":"Julio 2017","code":"2017-07","problema":"Pregunta 1 (a)","topic":"Capa de enlace","cat":"Capa de enlace","q":"a) Explique qué es un medio compartido y cite al menos dos ejemplos.","answer":"Es un medio de difusión, donde muchos emisores pueden trasmitir simultáneamente, generando\ncolisiones con determinada probabilidad. Un ejemplo de medio compartido es el aire, o medio\ninalámbrico, otro ejemplo es el cable coaxil donde se conectan múltiples nodos.","atype":"oficial","sources":[],"id":"redesexamen_201707_p1a"},{"exam":"Julio 2017","code":"2017-07","problema":"Pregunta 1 (b)","topic":"Capa de enlace","cat":"Capa de enlace","q":"b) Describa las clases de protocolos de acceso al medio compartido y cite un ejemplo para cada una de dichas clases de\n       protocolos.","answer":"Las clase de protocolos son i) \"por partición de canal\", ii) de \"acceso aleatorio\" y iii)\npor \"toma de turnos\". En el caso i) se divide el medio \"en porciones\", por ejemplo en\nfracciones de frecuencias del medio electromagnético, o en fracciones de tiempo o \"time­\nslots\". En el caso ii) se puede citar el protocolo de acceso en ethernet, denominado \"Carrier\nSense Multiple Access/ Collision Detection\" (CSMA/CD), y en el caso iii) un caso típico es\n\"Token Ring\".","atype":"oficial","sources":[],"id":"redesexamen_201707_p1b"},{"exam":"Julio 2017","code":"2017-07","problema":"Pregunta 2","topic":"Capa de red","cat":"Capa de red","q":"En el contexto de multicast, explique en qué consiste el mecanismo de \"Reverse Path Forwarding\", y para qué sirve.","answer":"\"Reverse Path Forwarding\" (RPF) es un mecanismo de inundación (flooding) controlado, que\npermite determinar por qué enlaces se va a re­enviar un mensaje de difusión. Cuando un node\nrecibe un mensaje desde una fuente, lo reenviará por todos sus enlaces excepto por donde\nllegó, solo si dicho enlace está en el camino más corto desde el nodo a la fuente. RPF sirve\npara implementar inundación controlada, como se dijo anteriormente.","atype":"oficial","sources":[],"id":"redesexamen_201707_p2"},{"exam":"Julio 2017","code":"2017-07","problema":"Pregunta 3","topic":"Capa de red","cat":"Capa de red","q":"Explique mediante un ejemplo sencillo por qué es posible generar oscilaciones en el enrutamiento cuando se utilizan costos\ndinámicos para los enlaces, proporcionales al tráfico cursado por ellos.","answer":"Usaremos el ejemplo del libro que refiere a protocolos \"Link State\", pero el problema puede\naparecer en otros tipos de protocolos. Dado un \"rombo\" con un enrutamiento inicial en sentido\nantihorario (figura a), si se inicia un tráfico \"e\" desde y hacia x, se encontrará un camino\nde menor costo en sentido horario, que como resultado recargará el enlace z­w (figura b),\ndeterminando un nuevo cambio de sentido. Esta situación oscilará permanentemente.\n\n                                                         Página 1/7\n\n                                                 Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201707_p3"},{"exam":"Julio 2017","code":"2017-07","problema":"Pregunta 4","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Dada una red de paquetes conmutados, mencione y describa los tipos de retardo.","answer":"Las fuentes de retardo son 4:\nProcesamiento en el nodo\nPor ejemplo, debido a chequeo de paridad (CRC) y/o a determinar enlace de salida.\nEncolamiento\nDebido a espera en colas del enlace de salida para trasmisión; depende del nivel de congestión\ndel router.\nRetardo de transmisión\nSi R=ancho de banda del enlace (bps) y L=longitud del paquete (bits), tiempo de envío = L/R.\nRetardo de propagación\nSea d = longitud del enlace físico y s = velocidad de propagación en el medio (por ejemplo\n~2x10^8 m/seg en cobre), entonces, el retardo de propagación es = d/s.","atype":"oficial","sources":[],"id":"redesexamen_201707_p4"},{"exam":"Julio 2017","code":"2017-07","problema":"Pregunta 5","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Describa las características de las arquitecturas de Capa de Aplicación Cliente-Servidor y Peer-to-Peer. Mencione al menos dos\nejemplos de cada una.","answer":"Cliente­Servidor\nEn estas arquitecturas, típicamente las aplicaciones tienen dos componentes fundamentales: el\ncliente y el servidor.\nLos requerimientos de los clientes (hosts), a los que no se les requiere ser “always­on”, son\nservidos por servidores, estos sí “always­on”\nCliente: típicamente, quien inicia el contacto con el servidor, requiriendo servicios\nofrecidos por él.\nServidor: quien provee el servicio demandado por el cliente.\nEn general, no hay comunicación directa entre clientes.\nEjemplo1 DNS (Servicio de resolución de nombres)\nEjemplo2 Web\n\nPeer­to­Peer\nEn este tipo de arquitecturas hay un uso mínimo (o nulo) de servidores dedicados.\nTodos los peers ofician de clientes y también servidores, lo que le otorga a este tipo de\narquitectura la propiedad de ser altamente escalable.\n\n                                                         Página 2/7\n\n                                    Redes de Computadoras\nLos peers “aparecen” y “desaparecen” de la red, por lo que, desde el rol de servidores, no\ncumplen con la propiedad de “always­on”, en comparación con el caso de la arquitectura\nCliente­Servidor.\nEstas arquitecturas aprovechan la capacidad de procesamiento y almacenamiento de los peers,\nasí como el ancho de banda de sus conexiones a Internet, liberando de dichos requerimientos a\nlos “servidores tradicionales”. Además de diferenciarse de la arquitectura Cliente­Servidor en\ncuanto al paradigma de funcionamiento, también se diferencia en cómo escalan, ya que en este\ncaso la capacidad de crecimiento está autocontenida en los peers que participan de la misma.\nEn el caso de la arquitectura Cliente­Servidor, la demanda de crecimiento se concentra del\nlado del Servidor.\nEjemplo1 Bit Torrent (transferencias de archivos).\nEjemplo2 Skype (videollamadas, chat).\n\n                                          Página 3/7\n\n                                                 Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201707_p5"},{"exam":"Diciembre 2017","code":"2017-12","problema":"Pregunta 1 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Considerando el conjunto de protocolos y servicios globalmente conocidos como “correo electrónico” se pide:\n\na) Identifique los endpoints involucrados y protocolos utilizados en el envío de un correo electrónico.","answer":"Para el envío de correo electrónico se utiliza el protocolo SMTP. El cliente de correo\n(p.e. Thunderbird, K9, Outlook, mail, elm, etc.) implementa el endpoint utilizado por el\nusuario, mientras que, el servidor de correo del dominio del cliente implementa el endpoint al\nque se conecta el cliente. Posteriormente, este servidor se conecta con el servidor del\ndominio del receptor del correo, y en esta comunicación los endpoints están implementados por\nlos servidores (Postfix, qmail, sendmail, etc.).","atype":"oficial","sources":[],"id":"redesexamen_201712_p1a"},{"exam":"Diciembre 2017","code":"2017-12","problema":"Pregunta 1 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Considerando el conjunto de protocolos y servicios globalmente conocidos como “correo electrónico” se pide:\n\nb) Identifique los endpoints involucrados y protocolos utilizados en la descarga de un correo electrónico.","answer":"Para la descarga de correo se pueden utilizar tanto IMAP como POP. En ambos casos, una\naplicación cliente (Thunderbird, Eudora, Pegasus mail, pine, etc.) será la responsable\nimplementar su endpoint, mientras que del lado servidor una implementación de dicho protocolo\nserá la responsable de implementar dicho endpoint (cyrus, dovecot, etc.)","atype":"oficial","sources":[],"id":"redesexamen_201712_p1b"},{"exam":"Diciembre 2017","code":"2017-12","problema":"Pregunta 1 (c)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Considerando el conjunto de protocolos y servicios globalmente conocidos como “correo electrónico” se pide:\n\nc) Explique el rol que cumple el protocolo HTTP en el contexto del correo electrónico actual, describiendo el concepto\n        de “webmail”. Describa específicamente como complementa o reemplaza los protocolos mencionados en a) y b).","answer":"Por muchos motivos se eligió evitar que el usuario final requiriera la instalación de\nsoftware en su PC para la descarga de correo y se decidió permitir que éste pueda “ver” el\ncorreo sin necesidad de descargarlo. Allí surge el webmail. Para el envío de correo, desde un\nservidor web se ofrece una interfaz de edición (HTML). Luego de finalizar la escritura del\ncorreo, la aplicación asociada al servidor web es quién se conecta con el servidor y habla\nSMTP con éste. De allí en más el proceso es el descrito en a). Entre el servidor web y\nnavegador del cliente se implementa el protocolo HTTP, siendo un navegador (firefox, chromium,\nopera, etc.) y un servidor web (apache, nginx, etc.) los endpoints. Para la comunicación entre\nla aplicación que corre en el servidor y el servidor de correo probablemente se utilice alguna\nbiblioteca del lenguaje de programación de dicha aplicación para implementar el endpoint SMTP\n(p.e. php­mail o similares). En el caso relativo a la lectura de mail, la aplicación servidora\nimplementa POP o IMAP contra un servidor de correo e implementa la visualización sobre HTML,\nque es vista por el cliente desde el navegador. El HTTP se utiliza para transportar la\ninformación (HTML) entre un navegador y una aplicación que implementa los protocolos de correo\nespecíficos.","atype":"oficial","sources":[],"id":"redesexamen_201712_p1c"},{"exam":"Diciembre 2017","code":"2017-12","problema":"Pregunta 2 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"a) Explique el mecanismo de control de congestión de TCP (Transmission Control Protocol).","answer":"TCP emplea un mecanismo de control de congestión terminal a terminal, donde cada emisor\nlimita la tasa de transmisión de datos a través de su conexión en función de la congestión de\nred percibida. Para ello, cada emisor, mantiene una variable “ventana de congestión” que\nimpone una restricción a la velocidad a la que TCP puede enviar tráfico a la red: la cantidad\nde datos no reconocidos en un emisor no puede exceder el mínimo entre la “ventana de\ncongestión” y la “ventana de recepción”.\n\n                                                       Página 1/8\n\n                                                 Redes de Computadoras\nLa percepción de congestión en la red por parte de un emisor TCP se basa en la ocurrencia de\n“sucesos de pérdida”: fin de temporización o 3 ACKs duplicados relativos a la conexión en\ncuestión.\nEl ajuste del tamaño de la “ventana de congestión” se hace en función de los ACKs que se\nreciben.\nEn TCP:\nUn segmento perdido implica congestión y, por tanto, la velocidad del emisor TCP debe\nreducirse cuando ello ocurre.\nUn segmento que ha sido reconocido indica que la red está entregando los segmentos del emisor\nal receptor y, por tanto, la velocidad de transmisión del emisor puede incrementarse cuando\nllega un paquete ACK correspondiente a un segmento que todavía no había sido reconocido.\nLa estrategia de TCP para ajustar su velocidad de transmisión consiste en incrementar su\nvelocidad en respuesta a la llegada de segmentos ACK hasta que ocurre un “suceso de pérdida”,\nmomento en el que reduce la velocidad de transmisión.\nEn funcionamiento por defecto de TCP, no existen notificaciones explícitas de congestión en la\nred, la misma se infiere.\nEl algoritmo de control de congestión de TCP consta de tres componentes fundamentales,\nllamadas: arranque lento, evitado de congestión y recuperación rápida.\nEn arranque lento, la “ventana de congestión” se establece en 1 MSS y se incrementa en 1 MSS\ncada vez que se reconoce un segmento transmitido (“crecimiento exponencial”).\nCuando recibe 3 ACKs duplicados\nCuando termina un temporizador (inferencia de congestión en la red), la “ventana de\ncongestión” pasa a valer 1 MSS, vuelve al arranque lento y “umbral” es igual a “ventana de\ncongestión” / 2.\nCuando el valor de “ventana de congestión” alcanza el valor de “umbral”, TCP pasa de fase\narranque lento a fase de evitado de congestión.\nEn la fase de evitado de congestión, TCP adopta un mecanismo más conservador de incrementado\ndel valor de “ventana de congestión”, pasando de duplicarla en cada RTT a incrementarla en 1\nMSS por cada RTT (crecimiento lineal).\nSi TCP no implementa recuperación rápida, ante un suceso de pérdida durante la fase de evitado\nde congestión, la “ventana de congestión” pasa a valer 1 MSS y “umbral” es igual a “ventana de\ncongestión” / 2.\nSi TCP sí implementa recuperación rápida, durante la fase de evitado de congestión y si el\n                              suceso de pérdida es “3 ACKs duplicados”, la “ventana de\n                              congestión” pasa a valer (“ventana de congestión” / 2)+3 (para\n                              contemplar los 3 ACKs que abandonaron la red).\n                              Durante la fase de recuperación rápida el crecimiento de la\n                              ventana de congestión es lineal (1 MSS por cada ACK duplicado\n                              hasta que se recibe un ACK nuevo, momento en que retorna a la\n                              fase de evitado de congestión.\n                              Durante la fase de recuperación rápida si ocurre un fin de\n                              temporización, pasa a la fase de arranque lento, con “ventana de\n                              congestión” = 1 MSS y “umbral” = “ventana de congestión” / 2.","atype":"oficial","sources":[],"id":"redesexamen_201712_p2a"},{"exam":"Diciembre 2017","code":"2017-12","problema":"Pregunta 2 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) Respecto al control de congestión, ¿en qué difiere la versión TCP Reno de la versión TCP Tahoe?","answer":"TCP Tahoe siempre pasa a estado “arranque lento” ante cualquier “suceso de pérdida”.\nTCP Reno incorpora el estado de “recuperación rápida”.","atype":"oficial","sources":[],"id":"redesexamen_201712_p2b"},{"exam":"Diciembre 2017","code":"2017-12","problema":"Pregunta 3 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"a) Explique al menos 4 ventajas de IPv6 sobre IPv4.","answer":"•  Mayor espacio de direcciones\n          •  Incorpora servicios de autoconfiguración (SAAC)\n          •  Procesamiento de cabezales (y extensiones) más eficiente\n          •  Elimina características no utilizadas en IPv4 (ToS)\n          •  Posibilidad de contar con cargas útiles superiores a los 64K (Jumbograms)\n          •  Soporte para etiquetado de flujo (Flow label)","atype":"oficial","sources":[],"id":"redesexamen_201712_p3a"},{"exam":"Diciembre 2017","code":"2017-12","problema":"Pregunta 3 (b)","topic":"Capa de red","cat":"Capa de red","q":"b) Explique por qué aún no se ha producido el reemplazo total de IPv4 por IPv6.","answer":"IPv6, como protocolo, se considera maduro desde el año 1998, y ha estado funcionando sobre\nInternet desde dicho entonces, sin haber llegado hasta el usuario final. Para que el protocolo\npueda utilizarse entre cualquier par de hosts tiene que implementarse en toda Internet, siendo\neste el motivo principal que ha frenado el despliegue global: tienen que cambiarse las\nimplementaciones de todos los routers, de todos los equipos de acceso y de todos los sistemas\noperativos de los clientes. También muchos protocolos (que no implementan adecuadamente la\nseparación entre capas) deben ser revisados para que funcionen con el nuevo protocolo de capa\n\n                                                         Página 2/8\n\n                                               Redes de Computadoras\nde red. El cambio se ha venido posponiendo mientras se ha podido preservar la inversión en\ninfraestructura.","atype":"oficial","sources":[],"id":"redesexamen_201712_p3b"},{"exam":"Diciembre 2017","code":"2017-12","problema":"Pregunta 3 (c)","topic":"Capa de red","cat":"Capa de red","q":"c) Explique por qué la implementación de IPv6 es más limpia que la de IPv4 desde el punto de vista de la aislación de\n        capas de red y enlace.","answer":"La adaptación de IPv4 al enlace no fue considerada en su totalidad al momento de su\nestandarización. Por ejemplo para la adaptación a la familia de protocolos Ethernet fueron\nrequeridos nuevos protocolos como ARP y RARP, entre otros. En IPv6 el protocolo de control\n(ICMPv6) fue definido con estas necesidades en mente, por lo que, la adaptación es realizada\npor el mismo protocolo, de una forma clara y definida. Siempre se usan mensajes IPv6 para que\nIPv6 funcione, sin requerir de convenciones poco claras o de protocolos auxiliares por fuera\nde la suite.","atype":"oficial","sources":[],"id":"redesexamen_201712_p3c"},{"exam":"Diciembre 2017","code":"2017-12","problema":"Pregunta 4 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"a) Describa las características fundamentales del protocolo FTP (File Transfer Protocol).","answer":"FTP es un protocolo que permite la transferencia de uno o más archivos entre dos nodos.\nEstá implementado utilizando el modelo cliente/servidor, siendo el cliente quien inicia la\nsolicitud de transmisión, desde o hacia el servidor.\nEste protocolo utiliza en su implementación dos conexiones TCP: control (puerto 21) y datos\n(puerto 20). Por ello se dice que el control de la conexión es “fuera de banda”.\nSecuencia típica básica:\n   •   El cliente establece una conexión al puerto 21 TCP del servidor.\n   •   El acceso del cliente al servidor es controlado a través de esta conexión mediante el\n       suministro de credenciales: usuario y contraseña.\n   •   El cliente puede “recorrer” la estructura de directorios ­y conocer su contenido­\n       mediante   comandos  enviados   por  esta   conexión,   y  recibiendo   las  respuestas\n       correspondientes a través de la misma.\n   •   Cuando el servidor recibe la petición para la transferencia de un archivo (o varios) en\n       un sentido u otro, él establece una segunda conexión TCP con el cliente, desde su\n       puerto 20. A través de ella se envía el archivo (o los archivos) y luego la misma se\n       cierra.","atype":"oficial","sources":[],"id":"redesexamen_201712_p4a"},{"exam":"Diciembre 2017","code":"2017-12","problema":"Pregunta 4 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"b) Mencione y explique el uso los principales comandos de FTP.","answer":"Los mencionados en el curso:\nUSER nombre_de_usuario: nombre de usuario para autenticación\nPASS: password del usuario para autenticación\nLIST: contenido de un directorio\nRETR nombre_de_un_archivo: transferencia de un archivo, desde el directorio actual en el\nservidor, hacia el cliente\nSTOR nombre_de_un_archivo: transferencia de un archivo hacia el directorio actual del servidor\nOtros comandos posibles: pwd, cd, delete, mkdir, rmdir, mget, mput, chmod, lcd\n\n                                                       Página 3/8\n\n                                                 Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201712_p4b"},{"exam":"Febrero 2018","code":"2018-02","problema":"Pregunta 1","topic":"Capa de red","cat":"Capa de red","q":"En el contexto de una LAN, suponga que por error dos hosts A y B tienen la misma dirección MAC, están conectados a un\nHUB y tienen direcciones IP diferentes, IPA e IPB respectivamente. Suponga tamién que en un host C conectado al mismo\nHUB, con MACC e IPC, se ejecuta el comado ping -c2 IPA. Asumiendo que las tablas de ARP están vacías al comienzo ,\nmuestre el intercambio completo de tramas que ocurriría hasta que el host C recibe el segundo ECHO REPLY. Explique el\nmotivo por el que se transmite cada paquete.","answer":"Dado que tenemos un HUB todas las tramas son replicadas por todas las bocas, así que en todos\nlos casos el host B recibirá las tramas/paquetes pero siempre los descartará porque son\nenviados a IPA o porque aunque sean broadcast como en ARP no consultan por IPB.\n\nComo las tablas ARP están vacías C envía una trama ARP Query a la dirección de broadcast\nconsultando por IPA usando, usando MACC e IPC\nA responde con un ARP Reply comunicando que IPA se encuentra en MACA, y lo hace por unicast a\nMACC.\n\nEn este momento las tablas ARP de A y C contienen los mapeos IPA – MAC – tiempo e IPC – MACC –\ntiempo\n\nC envía un ECHO REQUEST a IPA\nA responde con un ECHO REPLY a IPC\n\ny vuelve a repetirse los ECHO REQUEST Y REPLY, ya que no es necesario volver a hacer el ARP ya\nque asumimos que las entradas de la tabla ARP no se vencieron. El host B no participa pues, si\nbien a nivel de capa 2 hay colisiones, la clasificación de capa 3 descarta los paquetes que no\ninvolucran IPB en las comunicaciones.\n\n                                                      Página 1/11\n\n                                                 Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201802_p1"},{"exam":"Febrero 2018","code":"2018-02","problema":"Pregunta 2","topic":"Capa de red","cat":"Capa de red","q":"Describa las características del protocolo Neighbor Discovery de IPv6, y señale las diferencias con ARP, utilizado en IPv4. En\nparticular describa los distintos tipos de mensajes utilizados, y cuándo se utiliza broadcast, multicast y unicast.","answer":"Se utiliza NDP para determinar las direcciones de capa de enlace (MAC) de los nodos\npertenecientes al mismo segmento de red, y asimismo para encontrar los routers vecinos para\nSLAAC. NDP emplea la mensajería de ICMPv6, y es la base para permitir el mecanismo de\nautoconfiguración en IPv6. El protocolo ND defines cinco tipos de paquete ICMPv6 para router\nsolicitation (RS), router advertisement (RA), neighbor solicitation (NS), neighbor\nadvertisement (NA), y network redirect (NR).\nEn particular, los nodos envían mensajes NS para determinar dinámicamente la correspondencia\nIPv6 – MAC. NS utiliza múlticast cuando el nodo necesita resolver una dirección y unicast para\ndeterminar alcance (reachability). De esta forma reemplaza los mensajes “ARP request” de IPv4\n(transportados en tramas de broadcast ethernet), brindando características mejoradas y\nteniendo mejor integración con la suite IPv6.\nND forma parte de los mecanismos de base de IPv6, mientras que en IPv4 se utilizan diferentes\nmecanismos para alcanzar funcionalidades similares: ARP, ICMP router discovery, e ICMP\nredirect.\n\n                                                         Página 2/11\n\n                                             Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201802_p2"},{"exam":"Febrero 2018","code":"2018-02","problema":"Pregunta 3 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) ¿Qué es un Sistema Autónomo (Autonomous System, AS)?","answer":"AS es un concepto vinculado al enrutamiento jerárquico. Si podemos decir que Internet es\nuna “red de redes” y se pretende que en la gestión de ellas mantenga un orden, debemos\nidentificar redes con autonomía administrativa para el conjunto de dispositivos que la\ncomponen, y en particular para los protocolos de enrutamiento configurados en ella. Por lo\ntanto podemos decir que un AS es *una agrupación de routers con una administración común*.","atype":"oficial","sources":[],"id":"redesexamen_201802_p3a"},{"exam":"Febrero 2018","code":"2018-02","problema":"Pregunta 3 (b)","topic":"Capa de red","cat":"Capa de red","q":"b) Explique los conceptos Interior Gateway Protocols (IGP) y Exterior Gateway Protocols (EGP) vinculándolos con el\n      concepto explicado en la parte a) y brinde un ejemplo de cada uno.","answer":"Interior Gateway Protocols (IGP): protocolos de enrutamiento que “corren” dentro de un AS\n(routing intra-AS); ejemplos: RIP y OSPF. Exterior Gateway Protocols (EGP): protocolos de\nenrutamiento que “corren” entre ASs (routing inter-AS); ejemplo: BGP.","atype":"oficial","sources":[],"id":"redesexamen_201802_p3b"},{"exam":"Febrero 2018","code":"2018-02","problema":"Pregunta 3 (c)","topic":"Capa de red","cat":"Capa de red","q":"c) Describa brevemente el uso que hace BGP (Border Gateway Protocol) del atributo AS-PATH.","answer":"El atributo AS-PATH contiene la lista de ASs que ha atravesado la publicación de un\nprefijo. Cuando un prefijo es pasado a un AS, éste agrega su ASNumber al atributo. Este\natributo tiene dos usos fundamentales: evitado de loops en las publicaciones (si un AS se\nencuentra a sí mismo en el AS-PATH) y, si es tenido en cuenta en el proceso de selección de\nruta y cuando se lo considere (existen otros atributos), se seleccionará aquella que tenga el\nAS-PATH más corto.\n\n                                                    Página 3/11\n\n                                                 Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201802_p3c"},{"exam":"Febrero 2018","code":"2018-02","problema":"Pregunta 4","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Considere un usuario situado en un equipo H (con dirección 10.10.10.20) el cual se encuentra en una red local que provee\nsalida a Internet a través de un gateway con dirección 10.10.10.1 y cuenta con un servidor DNS local en la dirección\n10.10.10.10.\nEl usuario pretende descargar desde Internet utilizando un navegador web la página http://www.empresa.com.uy/index.html.\nEsta página cuenta con dos enlaces a las fotos /images/foto1.png e /images/foto2.png, alojados en el mismo servidor web que\natiende peticiones en el puerto 80 TCP.\n\nSe pide:\nIndique las sesiones TCP y UDP vistas en la red local (10.10.10.0/24), especificando claramente direcciones, puertos y para\nque se utiliza cada sesión. Suponga que el navegador web utiliza HTTP 1.1, que el servicio DNS y el equipo H no conocen la\ndirección IP de www.empresa.com.uy, y que el servidor DNS genera consultas iterativas.","answer":"Protocolo    IP Origen       IP Destino      Puerto        Puerto     Datos\n                                             Origen        Destino\nUDP          10.10.10.20     10.10.10.10     14000         53         Consulta DNS de tipo A por\n                                                                      www.empresa.com.uy.\n                                                                      Genera consulta y espera resultado en puerto\n                                                                      14000. Consiste de una solicitud y una\n                                                                      respuesta.\nUDP          10.10.10.10     DNS raíz        20000         53         Consulta DNS de tipo A por\n                                                                      www.empresa.com.uy. Devuelve el RR NS\n                                                                      autoritativo del TLD uy y el RR A\n                                                                      correspondiente (en cada caso, puede ser más\n                                                                      de uno). Consiste de una solicitud y una\n                                                                      respuesta.\nUDP          10.10.10.10     IP_TLD          20001         53         Consulta DNS de tipo A por\n                                                                      www.empresa.com.uy. Devuelve el RR NS\n                                                                      autoritativo de com.uy (en cada caso, puede\n                                                                      ser más de uno). Consiste de una solicitud y\n                                                                      una respuesta.\nUDP          10.10.10.10     IP_DNS_Aut_” 20002            53         Consulta DNS de tipo A por\n                             com.uy”                                  www.empresa.com.uy. Devuelve el RR NS\n                                                                      autoritativo de com.uy y el RR A\n                                                                      correspondiente (en cada caso, puede ser más\n                                                                      de uno). Consiste de una solicitud y una\n                                                                      respuesta.\nUDP          10.10.10.10     IP_DNS_Aut_” 20003            53         Consulta DNS de tipo A por\n                             empresa.com.                             www.empresa.com.uy. Devuelve IP (RR del tipo\n                             uy”                                      A) de www.empresa.com.uy (167.6.6.20).\n                                                                      Consiste de una solicitud y una respuesta.\nTCP          10.10.10.20     167.6.6.20      14001         80         Conexión que primero solicita la página\n                                                                      index.html, a través de un HTTP GET. La\n                                                                      respuesta contiene: HTTP 200 OK y la página\n                                                                      index.html solicitada.\n                                                                      A continuación solicitando la imagen\n                                                                      foto1.png, a través de un HTTP GET. La\n                                                                      respuesta contiene: HTTP 200 OK y la imagen\n                                                                      foto1.png.\n                                                                      Por último solicita a imagen foto2.png, a\n                                                                      través de un HTTP GET. La respuesta contiene:\n                                                                      HTTP 200 OK y la imagen foto2.png.\n\n                                                        Página 4/11\n\n                                               Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201802_p4"},{"exam":"Febrero 2018","code":"2018-02","problema":"Pregunta 5 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"En el protocolo de capa de transporte TCP:\n\na) ¿Por qué se necesitan números de secuencia?","answer":"TCP es un protocolo de transporte que asegura que no se perderán datos durante la\ntransmisión. Para ello, el emisor debe recibir confirmación de que el receptor recibió\ncorrectamente cada uno de los paquetes enviados.\nPara aprovechar mejor el enlace, TCP es también un protocolo pipelined por lo que el emisor\nenvía varios paquetes antes de recibir confirmación por alguno de ellos. Por esta razón, el\nemisor debe poder distinguir a que paquete o paquetes corresponde una determinada confirmación\nrecibida por lo que numera los paquetes enviados secuencialmente. Las confirmaciones enviadas\npor el receptor utilizan esos números para distinguir que paquete o conjunto de paquetes están\nconfirmando.","atype":"oficial","sources":[],"id":"redesexamen_201802_p5a"},{"exam":"Febrero 2018","code":"2018-02","problema":"Pregunta 5 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"En el protocolo de capa de transporte TCP:\n\nb) ¿Por qué son necesarios temporizadores?","answer":"TCP es un protocolo de transporte que asegura que no se perderán datos durante la\ntransmisión. Para ello, el emisor debe recibir confirmación de que el receptor recibió\ncorrectamente cada uno de los paquetes enviados. De no recibir esta confirmación, el emisor no\nsabe si esto se debe a que se perdió el paquete enviado, la confirmación o simplemente alguno\nde los dos esta demorado. La única solución es retransmitir el paquete no confirmado. Para\nésta retransmisión debe esperar un tiempo prudencial luego de enviado cada paquete por lo que\nnecesita un timer que le indique cuando hacerlo.","atype":"oficial","sources":[],"id":"redesexamen_201802_p5b"},{"exam":"Febrero 2018","code":"2018-02","problema":"Pregunta 5 (c)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"En el protocolo de capa de transporte TCP:\n\nc) En una red con tasas de errores ínfimas y recursos sobredimensionados, ¿utilizaría TCP?","answer":"Una hipotética red con las condiciones mencionadas -tasas de errores ínfimas y recursos\nsobredimensionados- no está exenta de otras que pueden afectar seriamente a determinadas\naplicaciones y/o servicios; a modo de ejemplo podemos citar que dicha red puede ofrecer\ndiversos caminos entre un origen y un destino. En dicho escenario, casi cualquier\nimplementación de e-banking o de comunicaciones asociadas a infraestructuras críticas,\nrequiere de un protocolo de transporte como TCP, ya que las funcionalidades descritas en las\npartes a) y b) resultan imprescindibles para reducir los riesgos de acciones incorrectas que\nse puedan tomar a partir de inferir la ocurrencia -o no- de algún mensaje.\n\n                                                       Página 5/11\n\n                                                 Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201802_p5c"},{"exam":"Julio 2018","code":"2018-07","problema":"Pregunta 1 (a)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"a) Resuma la utilidad del protocolo DHCP.","answer":"El protocolo DHCP, Dinamic Host Configuration Protocol, es\nuna de las formas disponibles para que un nodo conectado a una\nred IP obtenga una dirección desde un servidor DHCP, el que\ngestiona un pool de direcciones IP a tales efectos. Las dos opciones\npara que a un nodo se le asigne una dirección IP son: que se\nconfigure estáticamente (“hardcoded”) en la propia configuración\nde red del nodo, o que la obtenga al unirse a la red, por ejemplo,\nmediante DHCP. Con este protocolo logramos mayor flexibilidad en\nel uso del rango de direcciones IP disponibles para numerar los\nnodos de una red, pudiendo reutilizarlas, especialmente en redes\ndonde los nodos no requieren estar siempre conectados y con la\nmisma dirección IP, como sería el caso de los servidores.\nAdicionalmente, DHCP puede entregar más información, como por\nejemplo, nombre y dirección IP de un servidor DNS.","atype":"oficial","sources":[],"id":"redesexamen_201807_p1a"},{"exam":"Julio 2018","code":"2018-07","problema":"Pregunta 1 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) Describa los dos mensajes utilizados para la obtención de los parámetros de configuración de la red del cliente.","answer":"Figura adjunta. De los 4 mensajes del handshake, DHCP\ndiscover, DHCP offer, DHCP request y DHCP ack, se deben\ndescribir los últimos dos: Request y Reply (ACK).","atype":"oficial","sources":[],"id":"redesexamen_201807_p1b"},{"exam":"Julio 2018","code":"2018-07","problema":"Pregunta 2","topic":"Capa de red","cat":"Capa de red","q":"Discuta la utilidad del atributo AS-PATH de BGP, y comente si es una buena métrica para elegir un NEXT-HOP para el tráfico\nhacia un determinado AS.","answer":"El atributo AS-PATH contiene la lista de ASs que ha atravesado la publicación de un prefijo. Cuando un prefijo es pasado a\nun AS, éste agrega su ASNumber al atributo. Este atributo tiene dos usos fundamentales: 1) evitado de loops en las\npublicaciones (si un AS se encuentra a sí mismo en el AS-PATH); 2) si es tenido en cuenta en el proceso de selección de ruta y\ncuando se lo considere (existen otros atributos), se seleccionará aquella que tenga el AS-PATH más corto.\nLa utilización del AS-PATH como métrica de selección del NEXT-HOP puede no ser la mas adecuada si se busca un camino\nde costo mínimo. Esto se debe a que no se conoce la cantidad de saltos (hops) por los que se atraviesa dentro de cada AS.","atype":"oficial","sources":[],"id":"redesexamen_201807_p2"},{"exam":"Julio 2018","code":"2018-07","problema":"Pregunta 3 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) Explique en qué consiste la característica de store and forward (almacenamiento y reenvío) de los switches\n       (conmutadores) de capa de enlace.","answer":"Consiste en que las comunicaciones de datos se hacen en unidades de transferencia (frames en el caso de capa de enlace),\nlas cuales deben ser recibidas en su totalidad (store) antes de poder ser reenviadas (forward) o consumidas. Este mecanismo\nes bien diferente al utilizado por los hubs, los que reenvían inmediatamente por todos los puertos cada bit (en lugar de\nframes) que reciben.","atype":"oficial","sources":[],"id":"redesexamen_201807_p3a"},{"exam":"Julio 2018","code":"2018-07","problema":"Pregunta 3 (b)","topic":"Capa de enlace","cat":"Capa de enlace","q":"b) ¿Qué ventajas tiene para la capa de red que la capa de enlace utilice este mecanismo, en comparación a tener una red\n       puramente conectada con hubs?","answer":"Dado que cada frame contiene no solo los datos, sino también información de control; luego de obtenido el frame completo\nse podrían implementar controles y procesos locales que permiten servicios de chequeos de correctitud, entregas confiables,\netc.\nEl reenvío selectivo y autoaprendizaje también son ventajas que derivan directamente del procesamiento luego de recibido el\nframe completo y que son una de las mejoras notorias en el rendimiento entre switches y hubs.","atype":"oficial","sources":[],"id":"redesexamen_201807_p3b"},{"exam":"Julio 2018","code":"2018-07","problema":"Pregunta 4 (a)","topic":"Capa de red","cat":"Capa de red","q":"a) Suponga que debe configurar una red en la que solo existe un único camino ruteado posible entre cualquier par de\n       routers. Defina si utilizaría un protocolo de ruteo dinámico o estático, argumentado en favor de su decisión.","answer":"En una red con forma de árbol utilizaría ruteo estático, ya que la ausencia de caminos alternativos hace que no tenga\nsentido mantener un proceso (que además puede fallar) que resuelve una situación que no se dará nunca (seleccionar otro\ncamino ante la caída de un enlace).","atype":"oficial","sources":[],"id":"redesexamen_201807_p4a"},{"exam":"Julio 2018","code":"2018-07","problema":"Pregunta 4 (b)","topic":"Capa de enlace","cat":"Capa de enlace","q":"b) Explique las diferencias en términos de robustez y convergencia para los algoritmos vector distancia y estado del\n       enlace.","answer":"Los algoritmos de estado de enlace (LS) comunican costos de enlaces, y cada nodo computa los costos mínimos\nindependientemente de los demás, mientras que en vector de distancias (DV) se comunican (y propagan) los costos de los\ncaminos al resto de los nodos, iterando sobre estos cambios. Por lo tanto un fallo en DV puede potencialmente afectar a toda\nla red, mientras que en LS el efecto está acotado.\nAdemás, en LS como cada nodo posee una visión de toda la topología de la red, puede rápidamente calcular un nuevo camino\nante el cambio de costo de algún enlace.","atype":"oficial","sources":[],"id":"redesexamen_201807_p4b"},{"exam":"Julio 2018","code":"2018-07","problema":"Pregunta 4 (c)","topic":"Capa de enlace","cat":"Capa de enlace","q":"c) ¿Qué tipo de algoritmo utilizaría en una red donde hay cambios frecuentes en los costos de los enlaces?","answer":"En este caso utilizaría un algoritmo de estado enlace. El dato de que muchos enlaces pueden cambiar sus costos sería muy\nmalo para un protocolo de vector de distancias, ya que “las malas noticias viajan lento” y eso llevaría a períodos de\nconvergencia largos con frecuencia. Sin embargo, se debe tener en cuenta que, en estado de enlace, si la red es muy grande,\nel costo de mantener la info de la red para los dispositivos sería importante.","atype":"oficial","sources":[],"id":"redesexamen_201807_p4c"},{"exam":"Julio 2018","code":"2018-07","problema":"Pregunta 5 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"a) ¿Por qué es necesario utilizar números de puerto en las comunicaciones de capa de transporte, si a nivel de capa de\n       red y utilizando solo direcciones de red es posible comunicar un host de origen con uno de destino? ¿cuál es el\n       nombre que se le da a esta comunicación entre estas dos entidades en TCP?","answer":"Porque la necesidad real es comunicar dos procesos lógicos y no solo dos dispositivos, que además pueden existir más de\nuno en el mismo dispositivo por lo cual es necesario multiplexar/demultiplexar con mayor granularidad que solo la dirección\nde red. A la comunicación entre dos procesos lógicos en TCP se le llama conexión.","atype":"oficial","sources":[],"id":"redesexamen_201807_p5a"},{"exam":"Julio 2018","code":"2018-07","problema":"Pregunta 5 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) Tomando como ejemplo el protocolo TCP, ¿por qué es necesario utilizar timers? Mencione dos ejemplos en los que se\n       evidencia su necesidad.","answer":"Existen situaciones particulares en las cuales el emisor y el receptor esperan el uno por el otro sin tomar acción alguna,\nhaciendo necesario destrabar esa situación con otro mecanismo. Supongamos que un emisor no tiene nada más para\ntransmitir, y el receptor recibió los segmentos pero se perdieron las confirmaciones, en este caso el emisor reenviará su\nventana luego de vencido el timeout.","atype":"oficial","sources":[],"id":"redesexamen_201807_p5b"},{"exam":"Julio 2018","code":"2018-07","problema":"Pregunta 5 (c)","topic":"Capa de transporte","cat":"Capa de transporte","q":"c) Explique conceptualmente las diferencias entre control de flujo y control de congestión; ¿qué eventos son los que\n       generan transiciones/acciones en la FSM de control de congestión de TCP?","answer":"El control de flujo tiene sentido en una conexión entre un origen y un destino, mientras que el control de congestión intenta\nresponder al estado general de la red entre ese origen y destino, adaptándose a ese estado ajeno a los extremos de esa\nconexión. Los eventos interesantes para el control de congestión son la llegada de un ACK, la llegada de un ACK triplicado y\nel vencimiento del timer.\n\n                                                          Página 2/8\n\n                                                  Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201807_p5c"},{"exam":"Julio 2019","code":"2019-07","problema":"Pregunta 1 (a)","topic":"Capa de enlace","cat":"Capa de enlace","q":"a) ¿Qué función cumplen el broadcast y el flooding?, ¿Qué diferencias existen entre ambos conceptos?","answer":"Ambos mecanismos cumplen la misma función: enviar una copia de un mensaje a\n        todos los nodos de una red. En el caso de broadcast típicamente se asume un\n        medio compartido (por ejemplo un dominio de broadcast ethernet), donde el\n        origen de la comunicación envía un mensaje a una dirección especial que\n        representa a todos los nodos. En redes con topologías arbitrarias, el envío de\n        un mensaje a todos los nodos se puede implementar mediante flooding.","atype":"oficial","sources":[],"id":"redesexamen_201907_p1a"},{"exam":"Julio 2019","code":"2019-07","problema":"Pregunta 1 (b)","topic":"Capa de red","cat":"Capa de red","q":"b) De ejemplos de protocolos vistos en el curso que utilizan estas técnicas.","answer":"Ethernet 802.3 tiene la dirección FF:FF:FF:FF:FF:FF definida como dirección de\n        broadcast. OSPF utiliza flooding para el envío de información de estado-enlace\n        entre routers; en este caso se utiliza como destino una dirección de multicast\n        que representa a todos los routers.","atype":"oficial","sources":[],"id":"redesexamen_201907_p1b"},{"exam":"Julio 2019","code":"2019-07","problema":"Pregunta 1 (c)","topic":"Capa de enlace","cat":"Capa de enlace","q":"c) Describa el mecanismo de flooding básico.","answer":"El flooding no controlado es el caso más simple, aunque puede llevar a\n        problemas cuando hay ciclos. El mecanismo implica que un nodo que recibe un\n        mensaje hace copias idénticas y las reenvía por todos sus enlaces menos por el\n        que lo recibió.","atype":"oficial","sources":[],"id":"redesexamen_201907_p1c"},{"exam":"Julio 2019","code":"2019-07","problema":"Pregunta 2 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"a) Describa el protocolo de transferencia de datos fiable rdt 2.1.","answer":"Ver FSM emisor/receptor del rdt 2.1 vista en el curso.\n\n                                                                    Página 1/8\n\n                                            Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201907_p2a"},{"exam":"Julio 2019","code":"2019-07","problema":"Pregunta 2 (b)","topic":"Capa de transporte","cat":"Capa de transporte","q":"b) Mencione y describa la utilidad de todos los mensajes de control utilizados.","answer":"Se utilizan ACK y NAK. El ACK es para que el receptor pueda confirmar al\n      emisor que recibió correctamente el mensaje con la secuencia esperada,\n      mientras que el NAK indica lo contrario, por ejemplo por haber recibido el\n      paquete corrupto.","atype":"oficial","sources":[],"id":"redesexamen_201907_p2b"},{"exam":"Julio 2019","code":"2019-07","problema":"Pregunta 2 (c)","topic":"Capa de transporte","cat":"Capa de transporte","q":"c) ¿Qué agrega el emisor rdt 3.0 para afrontar la pérdida de paquetes?","answer":"Lo que agrega es el timer, el cual activa la retransmisión ante la ausencia\n      por un cierto período de tiempo de un ACK confirmando la misma secuencia del\n      último paquete enviado. Este vencimiento del timer dispara la retransmisión\n      automática del último paquete enviado no confirmado.","atype":"oficial","sources":[],"id":"redesexamen_201907_p2c"},{"exam":"Julio 2019","code":"2019-07","problema":"Pregunta 3","topic":"Capa de transporte","cat":"Capa de transporte","q":"Comente brevemente los conceptos de control de congestión y control de flujo en TCP, especificando en particular\nla existencia o no de mecanismos de señalización explícitos para ambos casos.","answer":"El control de congestión refiere a una condición o estado de la red como un todo, en\ncontraposición al control de flujo en el que lo que se controla es el flujo de datos\nentre un emisor y un receptor. El control de flujo es notificado explícitamente\nmediante el encabezado de TCP (campo \"Receive window\"), en el que el receptor\nnotifica en todo momento cuantos datos es capaz de recibir antes de que el emisor lo\nsature. Por otra parte el control de congestión es un mecanismo no explícito, donde\nel emisor infiere el estado de la red en base a algunos eventos relevantes tales\ncomo: la recepción de ACK, la recepción de ACKs duplicados y/o timeouts. Frente a\nestos eventos el control de congestión modifica la ventana de congestión del emisor,\nque indica la cantidad de paquetes sin confirmar que pueden estar \"en viaje\" en la\nred. Cuanto mayor es el grado de congestión, dicha ventana tiende a valores menores,\n                                      Página 2/8\n\n                                Redes de Computadoras\nentendiendo que en ese caso el estado de la red se recompondrá de manera gradual, y\na medida que eso suceda también ir{a en aumento los valores de la ventana de\ncongestión. Se asume que todos los nodos se comportan de esta manera (no hay \"free\nriders\").","atype":"oficial","sources":[],"id":"redesexamen_201907_p3"},{"exam":"Julio 2019","code":"2019-07","problema":"Pregunta 4","topic":"Capa de red","cat":"Capa de red","q":"Dado un Sistema Autónomo ASx conectado a otros Sistemas Autónomos utilizando BGP, describa el concepto de\n\"enrutamiendo de papa caliente\" (hot-potato routing) para routers internos al ASx.","answer":"BGP es utilizado intra-dominio para propagar a los routers internos la información\nde alcanzabilidad de prefijos externos al sistema autónomo. Si para un determinado\nprefijo existen múltiples opciones de \"next-hop\", el enrutamiento de \"papa caliente\"\neligirá como router de borde aquel que tenga el menor costo según el protocolo de\nenrutamiento interior (IGP).","atype":"oficial","sources":[],"id":"redesexamen_201907_p4"},{"exam":"Julio 2019","code":"2019-07","problema":"Pregunta 5 (a)","topic":"Capa de red","cat":"Capa de red","q":"Considere la red de la figura.\n\na) Proponga un plan de numeración para las 4 redes\n                                                         LAN. Se dispone de los prefijos 4.0.4.0/24,\n                                                         4.0.5.0/24 y 4.0.6.0/24,","answer":"Para implementar un plan de numeración en las redes LAN                              de   la   figura,\nconsideremos el requerimiento de cantidad de direcciones IP:\nLAN a: 127 hosts + 1 router + 2 (red y broadcast) -> total: 129\nLAN b: 58 hosts + 1 router + 2 (red y broadcast) -> total: 61\nLAN c: 49 hosts + 1 router + 2 (red y broadcast) -> total: 52\nLAN d: 125+ hosts + 1 router + 2 (red y broadcast) -> total: 128\n\nPor lo tanto, para cumplir con dichos requerimientos,                         los    mínimos      prefijos\nnecesarios en cada caso serán:\nLAN a: /24 - LAN b: /26 - LAN c: /26 - LAN d: /25\n\nSe dispone de los siguientes prefijos: 4.0.4.0/24, 4.0.5.0/24 y 4.0.6.0/24\nDel lado de R1, se requiere un prefijo /24 y un prefijo /26. Necesariamente implica\nla asignación de dos prefijos /24.\nDel lado de R2, se requiere un prefijo /26 y un prefijo /25. Con un prefijo /24 es\nsuficiente para ambas redes LAN.\nLa asignación más adecuada es aquella que signifique la menor cantidad de entradas\nen las tablas de routing de cada router.\nLa decisión está entonces en cómo seleccionar los dos prefijos /24 a utilizar en las\nredes LAN a y b. Si se seleccionan los prefijos 4.0.4.0/24 y 4.0.5.0/24 es posible\nresumirlos en uno solo: 4.0.4.0/23.\nPor lo tanto, la asignación a cada red LAN definida es:\nLAN a        4.0.4.0/24\nLAN b        4.0.5.0/26\nLAN c        4.0.6.128/26\nLAN d        4.0.6.0/25\nDonde en cada LAN, por ejemplo, se puede asignar la dirección más alta (permitida)\ndel prefijo, a la interfaz de red correspondiente del router, o sea:\n4.0.4.254, 4.0.5.62, 4.0.6.254 y 4.0.6.126 respectivamente.\n                                                Página 3/8\n\n                                Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201907_p5a"},{"exam":"Julio 2019","code":"2019-07","problema":"Pregunta 5 (b)","topic":"Capa de red","cat":"Capa de red","q":"Considere la red de la figura.\n\nb) Explique los conceptos de enrutamiento (routing), y\n                                                         reenvío (forwarding). Construya un ejemplo de\n                                                         estos conceptos, considerando el tráfico entre un\n                                                         host en LAN a y otro en LAN d.","answer":"La capa de red realiza dos tareas fundamentales: enrutamiento y reenvío de paquetes.\nEl concepto de enrutamiento tiene sentido a nivel global de la red, donde mediante\nel intercambio de información entre los routers a través de algún protocolo de\nenrutamiento, es posible determinar al menos un camino entre cualquier par de hosts\norigen y destino conectados a dicha red. La selección de caminos que realizan los\nalgoritmos de enrutamiento se utiliza para determinar las tabla de renvío\n(forwarding).\nEl concepto de reenvío tiene significado local en cada router e implica que, a\npartir de la información contenida en la tabla de forwarding se determina, para cada\npaquete que ingresa por una interfaz, cuál es la interfaz de salida y cuál es el\nsiguiente salto para dicho paquete, utilizando por ejemplo el algoritmo de longest\nprefix matching.\n\nSi por ejemplo tenemos un paquete IP con dirección origen 4.0.4.1 (asignada a un\nhost A en LAN a) y dirección destino 4.0.6.1 (asignada a un host D en LAN d),\n- cuando el paquete alcance el router R1, su tabla de forwarding indicará que el\nmismo debe salir por la interfaz WAN (enlace punto a punto) y con destino a la\ninterfaz con dirección IP 192.168.1.2.\n- cuando el router R2 reciba el paquete, a partir de su tabla de forwarding\ndeterminará que la interfaz de salida a utilizar es aquella donde está conectada la\nred LAN d, y que deberá ser enviado al destino 4.0.6.1.\n\n                                      Página 4/8\n\n                                               Redes de Computadoras","atype":"oficial","sources":[],"id":"redesexamen_201907_p5b"},{"exam":"Diciembre 2019","code":"2019-12","problema":"Pregunta 1 (a)","topic":"Redes (general)","cat":"Redes (general)","q":"a) Muestre el formato y contenido del mensaje query enviado.","answer":"Lleva un Identificador (Transaction ID) para asociar el mensaje reply al query,\n          generado por quien crea el mensaje query.\n          Flags\n                 Existe una flag (1 bit) que indica el tipo de mensaje: si está en 0 es una query\n                 (este caso).\n                 Otra flag (1 bit) indica si se pretende que sea una query recursiva.\n                 Lleva un Identificador (Transaction ID) para asociar el mensaje reply al query.\n          Los valores de los campos “contadores” (“number of...”) son los siguientes:\n                 Questions: 1\n                 Answers: 0\n                 Authority: 0\n                 Additional: 0\n          En el campo Questions el contenido es\n                 cert.br: type NS, class IN\n\n                                                                    Página 1/9\n\n                                        Redes de Computadoras\n      No existen campos Answers, Authority ni Additional.","atype":"oficial","sources":[],"id":"redesexamen_201912_p1a"},{"exam":"Diciembre 2019","code":"2019-12","problema":"Pregunta 1 (b)","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"b) Muestre el formato y contenido del mensaje reply recibido.","answer":"Lleva el Identificador copiado del mensaje query que lo motiva\n      Flags\n             Flag (1 bit) en 1 indicando que es un reply (query response)\n             Otra flag (1 bit) indica si se pretende que sea una query recursiva.\n             Otra flag (1 bit) indica si se dispone de servicio recursivo.\n      Los valores de los campos “contadores” (“number of...”) son los siguientes:\n             Questions: 1\n             Answers: 2\n             Authority: 0\n             Additional: 3\n      En el campo Questions el contenido es\n             cert.br: type NS, class IN\n      En el campo Answers el contenido es\n             cert.br: type NS, class IN, ns ns.dns.br\n             cert.br: type NS, class IN, ns ns2.dns.br\n      No existe campo Authority.\n      En el campo Additional el contenido es\n             ns.dns.br: type A, class IN, addr 200.160.0.5\n             ns.dns.br: type AAAA, class IN, addr 2001:12ff:0:a20::5\n             ns2.dns.br: type A, class IN, addr 200.192.232.53","atype":"oficial","sources":[],"id":"redesexamen_201912_p1b"},{"exam":"Diciembre 2019","code":"2019-12","problema":"Pregunta 2 (a)","topic":"Capa de transporte","cat":"Capa de transporte","q":"a) Explique las diferencias entre protocolos de transporte stop-and-wait y en pipeline.","answer":"En un protocolo stop-and-wait, el emisor espera por el reconocimiento de un paquete para\nempezar la transmisión de un nuevo paquete.\nEn el caso de los protocolos de pipeline, el emisor puede enviar varios paquetes sin esperar a\nlos mensajes de reconocimiento. Para esto es necesario definir una ventana de transmisión que\ndefinirá cuantos paquetes se pueden transmitir “simultáneamente” sin haber recibido un\nreconocimiento.","atype":"oficial","sources":[],"id":"redesexamen_201912_p2a"},{"exam":"Diciembre 2019","code":"2019-12","problema":"Pregunta 2 (b)","topic":"Físico y métricas","cat":"Físico y métricas","q":"b) ¿Por qué son necesario los segundos?","answer":"Los protocolos de pipeline permiten realizar un mejor aprovechamiento de los recursos\ndisponibles. En un protocolo stop-and-wait, por cada transmisión de un paquete el emisor debe\nesperar por el reconocimiento generando una cantidad importante de tiempo ocioso. En el caso\ndel pipeline, el emisor está una mayor cantidad de tiempo transmitiendo y haciendo uso del\ncanal.","atype":"oficial","sources":[],"id":"redesexamen_201912_p2b"},{"exam":"Diciembre 2019","code":"2019-12","problema":"Pregunta 2 (c)","topic":"Físico y métricas","cat":"Físico y métricas","q":"c) De un ejemplo del problema de tener tamaños de ventana muy parecidos al rango de números de\n      secuencia en protocolos de tipo Selective Repeat.","answer":"Para el caso de un protocolo de pipeline, una opción es utilizar selective repeat para el\nreconocimiento de los paquetes. Esto implica que el receptor genera un paquete de\nreconocimiento por cada paquete recibido. Del lado del emisor, solo se reenvían paquetes que\nno fueron reconocidos luego de un cierto tiempo.\nImaginemos un escenario con una ventana de transmisión de 3 paquetes y número de secuencia del\n0 al 3. Se ilustra a continuación un posible problema:\n\n                                               Página 2/9\n\n                                    Redes de Computadoras\n\nEn la imagen (a) se puede observar que el receptor no detecta que el emisor está enviando un\nmensaje duplicado y considera que es un nuevo paquete.\nVer que no puede diferenciarlo del caso (b) donde es un nuevo paquete con secuencia 0.","atype":"oficial","sources":[],"id":"redesexamen_201912_p2c"},{"exam":"Diciembre 2019","code":"2019-12","problema":"Pregunta 3","topic":"Capa de aplicación","cat":"Capa de aplicación","q":"Utilizando las primitivas de la API de sockets del curso, implemente una aplicación que espera\npor una conexión TCP en el puerto 1234 y recibe un mensaje de largo desconocido que finaliza\ncon un salto de línea. Describa la funcionalidad de cada primitiva utilizada.","answer":"function main ()\n   master = socket.tcp() //Crea un socket TCP\n\n   master.bind (*, 1234)\n   //Asocia el socket a una interfaz (en esta caso todas) y un puerto local\n\n   server = master.listen()\n   //Convierte el socket en un socket server capaz de recibir conexiones.\n\n   client, err = server.accept()\n   //Espera a que se establezca una conexión.\n   //Devuelve un socket cliente TCP conectado. Es una operación bloqueante.\n\n   buffer = []\n   do\n      data, err = client.receive()\n      //Realiza una lectura en un socket conectado.\n      //Devuelve la información disponible en el stream hasta el momento.\n      buffer += data\n   until (find(data, ‘\\n’) || err)\n\n                                          Página 3/9\n\n                                 Redes de Computadoras\n   server.close()\n   client.close()\n   // Cierra los sockets finalizando la conexión TCP\n\n   return data\n\nend function","atype":"oficial","sources":[],"id":"redesexamen_201912_p3"},{"exam":"Diciembre 2019","code":"2019-12","problema":"Pregunta 4 (a)","topic":"Capa de enlace","cat":"Capa de enlace","q":"a) Identifique la causa del problema de conteo infinito en los algoritmos Vector-Distancia. Describa\n      que es lo que sucede con los vectores distancia de los nodos involucrados.","answer":"El problema de conteo a infinito sucede debido a que cada nodo solo tiene información\nparcial del estado de la red. Cada nodo recibe de sus vecinos un vector de distancias que\ninforma el costo del camino para alcanzar los demás nodos de la red pero no recibe información\ndel camino n
