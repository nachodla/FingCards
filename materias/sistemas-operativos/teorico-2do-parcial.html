<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teórico SO · Repaso de parciales</title>
<style>
:root{
  --bg:#0f172a; --bg2:#1e293b; --panel:#ffffff; --ink:#0f172a; --muted:#64748b;
  --line:#e2e8f0; --soft:#f1f5f9; --accent:#4f46e5; --accent2:#6366f1;
  --green:#059669; --greenbg:#ecfdf5; --blue:#2563eb; --bluebg:#eff6ff;
  --amber:#b45309; --amberbg:#fffbeb; --shadow:0 10px 30px rgba(15,23,42,.08);
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--ink);background:linear-gradient(180deg,#0f172a 0,#1e293b 260px,#eef2f7 260px,#eef2f7 100%);
  min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:1120px;margin:0 auto;padding:22px 18px 60px}
header{color:#fff;padding:8px 2px 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
header h1{font-size:22px;margin:0 0 4px;letter-spacing:-.3px}
header p{margin:0;color:#c7d2fe;font-size:13.5px}
.badgeN{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:12px;padding:10px 14px;text-align:center;min-width:120px}
.badgeN b{font-size:22px;display:block;line-height:1}
.badgeN span{font-size:11px;color:#c7d2fe;text-transform:uppercase;letter-spacing:.5px}
.toolbar{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;box-shadow:var(--shadow);margin-bottom:16px}
.grp{display:flex;flex-direction:column;gap:3px}
.grp label{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;padding-left:2px}
select,.btn{font:inherit;font-size:13.5px;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:10px;padding:8px 11px;cursor:pointer;transition:.15s}
select:hover,.btn:hover{border-color:#c3cad6}
.btn{display:inline-flex;align-items:center;gap:6px;font-weight:600}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#4338ca}
.btn.ghost{background:var(--soft)}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.seg button{border:0;background:#fff;padding:8px 13px;font:inherit;font-size:13.5px;cursor:pointer;color:var(--muted);font-weight:600}
.seg button.on{background:var(--accent);color:#fff}
.chk{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--ink);background:var(--soft);padding:8px 12px;border-radius:10px;cursor:pointer;user-select:none;border:1px solid var(--line)}
.chk input{accent-color:var(--accent);width:15px;height:15px}
.spacer{flex:1 1 auto}
.layout{display:grid;grid-template-columns:1fr;gap:16px}
.layout.withlist{grid-template-columns:1fr 340px}
@media(max-width:880px){.layout.withlist{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:26px;min-height:340px;display:flex;flex-direction:column}
.meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.pill{font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:999px;border:1px solid transparent;white-space:nowrap}
.pill.exam{background:#eef2ff;color:#4338ca;border-color:#e0e7ff}
.pill.prob{background:var(--soft);color:var(--muted)}
.pill.topic{background:#f0fdfa;color:#0f766e;border-color:#ccfbf1}
.pill.known{background:var(--greenbg);color:var(--green);border-color:#a7f3d0}
.q{font-size:20px;line-height:1.5;font-weight:600;letter-spacing:-.2px;margin:0 0 8px}
.qhint{color:var(--muted);font-size:12.5px;margin-bottom:18px}
.reveal-wrap{margin-top:auto}
.answer{border-top:1px dashed var(--line);margin-top:18px;padding-top:18px;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.atype{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:999px;margin-bottom:12px}
.atype.oficial{background:var(--greenbg);color:var(--green)}
.atype.slides{background:var(--bluebg);color:var(--blue)}
.atype.general{background:var(--amberbg);color:var(--amber)}
.answer .txt{font-size:15.5px;line-height:1.62;color:#1f2937}
.answer .txt p{margin:0 0 11px}
.src{margin-top:14px;font-size:13px;color:var(--muted);background:var(--soft);border-radius:10px;padding:10px 13px;display:flex;gap:8px;align-items:flex-start}
.src b{color:#334155}
.note{margin-top:12px;font-size:13px;line-height:1.5;color:var(--amber);background:var(--amberbg);border:1px solid #fde68a;border-radius:10px;padding:10px 13px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;padding-top:18px;border-top:1px solid var(--line);align-items:center}
.nav{display:flex;gap:8px;align-items:center;margin-left:auto}
.pos{font-size:13px;color:var(--muted);min-width:74px;text-align:center;font-variant-numeric:tabular-nums}
.big-reveal{width:100%;padding:14px;font-size:15px}
/* list panel */
.listpanel{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:14px;max-height:620px;display:flex;flex-direction:column}
.listpanel h3{margin:2px 2px 10px;font-size:14px;display:flex;align-items:center;gap:8px}
.search{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:10px;font:inherit;font-size:13px;margin-bottom:10px}
.list{overflow:auto;display:flex;flex-direction:column;gap:4px;padding-right:4px}
.li{display:flex;gap:9px;align-items:flex-start;padding:9px 10px;border-radius:10px;cursor:pointer;border:1px solid transparent;font-size:12.5px;line-height:1.35}
.li:hover{background:var(--soft)}
.li.cur{background:#eef2ff;border-color:#c7d2fe}
.li .dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:0 0 auto}
.dot.oficial{background:var(--green)}.dot.slides{background:var(--blue)}.dot.general{background:#f59e0b}
.li .code{font-size:10.5px;color:var(--muted);font-weight:700;white-space:nowrap}
.li .qt{color:#334155;flex:1}
.li .chk2{margin-top:1px;color:var(--green);font-weight:800}
.li.done .qt{color:#94a3b8;text-decoration:line-through}
.legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.legend span{display:inline-flex;align-items:center;gap:5px}
.empty{text-align:center;color:var(--muted);padding:40px 10px}
.empty b{color:var(--ink);font-size:17px}
.kbd{font-size:11px;color:var(--muted);margin-top:14px;text-align:center}
.kbd kbd{background:#fff;border:1px solid var(--line);border-bottom-width:2px;border-radius:6px;padding:1px 6px;font-family:inherit;font-size:11px;color:#475569}
.progress{height:6px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden;margin-top:10px;max-width:230px}
.progress i{display:block;height:100%;background:linear-gradient(90deg,#818cf8,#34d399);width:0;transition:width .3s}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Teórico SO · Repaso de parciales</h1>
      <p id="subtitle">Preguntas teóricas de los segundos parciales · 2014–2025</p>
      <div class="progress"><i id="pbar"></i></div>
    </div>
    <div class="badgeN"><b id="knownN">0</b><span>que ya sé / <span id="totalN">0</span></span></div>
  </header>

  <div class="toolbar">
    <div class="grp"><label>Orden</label>
      <div class="seg" id="orderSeg">
        <button data-o="sec" class="on">Por parcial</button>
        <button data-o="rand">Aleatorio 🔀</button>
      </div>
    </div>
    <div class="grp"><label>Tema</label>
      <select id="fCat"></select>
    </div>
    <div class="grp"><label>Parcial</label>
      <select id="fExam"></select>
    </div>
    <div class="grp"><label>&nbsp;</label>
      <label class="chk"><input type="checkbox" id="hideKnown"> Ocultar las que ya sé</label>
    </div>
    <div class="spacer"></div>
    <div class="grp"><label>&nbsp;</label>
      <button class="btn ghost" id="toggleList">☰ Lista</button>
    </div>
    <div class="grp"><label>&nbsp;</label>
      <button class="btn ghost" id="resetBtn" title="Borrar el progreso guardado">↺ Reiniciar</button>
    </div>
  </div>

  <div class="layout" id="layout">
    <div class="card" id="card"><!-- filled by JS --></div>

    <aside class="listpanel" id="listpanel" style="display:none">
      <h3>📋 Índice de preguntas <span id="listCount" style="color:var(--muted);font-weight:500"></span></h3>
      <input class="search" id="search" placeholder="Buscar en las preguntas…">
      <div class="list" id="list"></div>
      <div class="legend">
        <span><i class="dot oficial" style="width:8px;height:8px;border-radius:50%;display:inline-block"></i> Solución oficial</span>
        <span><i class="dot slides" style="width:8px;height:8px;border-radius:50%;display:inline-block"></i> Desde diapositivas</span>
        <span><i class="dot general" style="width:8px;height:8px;border-radius:50%;display:inline-block"></i> General (sin slide)</span>
      </div>
    </aside>
  </div>

  <div class="kbd">Atajos: <kbd>←</kbd> anterior · <kbd>→</kbd> siguiente · <kbd>espacio</kbd> mostrar respuesta · <kbd>S</kbd> la sabía · <kbd>R</kbd> a repasar · <kbd>L</kbd> lista</div>
</div>

<script>
const DATA = [{"id": "2025_a1", "exam": "Julio 2025", "code": "2025-07", "problema": "P1 (a) I", "topic": "Almacenamiento / RAID", "q": "Para un proyecto se dispone de $500 para construir una estructura de almacenamiento con discos de 1 TB, cada uno con costo de $100. El objetivo primario es priorizar la tolerancia a fallas y el secundario lograr el mayor volumen. Explique qué estructura de almacenamiento es la más apropiada.", "answer": "La estructura de almacenamiento más apropiada es RAID6, ya que tolera la falla de hasta dos discos y puede costearse con el presupuesto del proyecto. Se descartan otras alternativas de RAID por los siguientes motivos: RAID 0 no provee tolerancia a fallos, RAID 1 tiene poca capacidad y solo usa dos discos, RAID 5 proporciona mayor capacidad pero menos tolerancia a fallos (solo tolera el fallo de un único disco) y RAID 10 tiene buena tolerancia a fallos pero el volumen es de menor capacidad y requiere un número par de discos. La justificación se presenta en la clase de Estructuras Masivas de (slides 27 al final).", "atype": "oficial", "sources": [], "cat": "Almacenamiento y RAID"}, {"id": "2025_a2", "exam": "Julio 2025", "code": "2025-07", "problema": "P1 (a) II", "topic": "Almacenamiento / RAID", "q": "Describa el funcionamiento de la estructura a utilizar (RAID 6) e indique el tamaño del volumen creado.", "answer": "El tamaño del volumen creado es de 3 TB (3 discos de datos + 2 discos de redundancia). RAID 6 combina striping de datos con dos bloques de paridad distribuídos. Se puede perder cualquier combinación de dos discos sin pérdida de información. Usa algoritmos (e.g., XOR) para generar paridades. Los datos y las paridades están distribuidos entre todos los discos, minimizando cuellos de botella. La justificación se presenta en la clase de Estructuras Masivas de Datos (slides 43 a 48).", "atype": "oficial", "sources": [], "cat": "Almacenamiento y RAID"}, {"id": "2025_b1", "exam": "Julio 2025", "code": "2025-07", "problema": "P1 (b) I", "topic": "Entrada/Salida", "q": "Describa los tres métodos para realizar entrada/salida.", "answer": "E/S Programada: El procesador le comunica un pedido a la controladora del dispositivo y queda consultando a la controladora para verificar el estado del pedido. Se puede hacer busy waiting o consultar cada cierto tiempo. Interrupciones: El procesador le comunica el pedido a la controladora y se libera para realizar otras tareas. Al culminar el pedido, la controladora genera una interrupción al procesador.\n\n Acceso directo a memoria (DMA): Se utiliza un chip especial que permite transferir datos desde una controladora a memoria sin que el procesador tenga que intervenir en forma continua. La justificación se presenta en la clase de Subsistema de E/S, slide 10.", "atype": "oficial", "sources": [], "cat": "Entrada/Salida"}, {"id": "2025_b2", "exam": "Julio 2025", "code": "2025-07", "problema": "P1 (b) II", "topic": "Entrada/Salida", "q": "Explique cuál es el método más apropiado para un sistema con un alto número de operaciones de entrada/salida.", "answer": "En sistemas con alto número de E/S, el método más apropiado es E/S mediante DMA ya que el procesador programa el controlador de DMA, que realiza el pedido. El controlador DMA se encarga de la tarea de transferencia, interrumpiendo al procesador cuando finalizó. De esta manera libera al procesador para poder realizar otras tareas mientras se ejecuta la transferencia de datos desde/hacia memoria. La justificación se presenta en la clase de Subsistema de E/S, slides 18 a 20.", "atype": "oficial", "sources": [], "cat": "Entrada/Salida"}, {"id": "2025_c2", "exam": "Julio 2025", "code": "2025-07", "problema": "P1 (c) II", "topic": "Seguridad UNIX", "q": "En Unix/Linux, un programa Agregar_Linea.sh con atributos -r-sr-xr-x abre en modo escritura un archivo del que otros usuarios no tienen permiso directo. Nombre y explique el mecanismo utilizado y bajo qué condiciones funciona de la manera pensada.", "answer": "El mecanismo utilizado se denomina Set User ID (SUID). Este mecanismo permite que el programa ejecute con la identidad de usr5, sin importar quién lo ejecute. Al tener configurado s en el bit de ejecución del archivo para el dueño (primer terna de permisos), el UID efectivo se hereda del archivo que se está ejecutando por lo que el programa ejecutará con los permisos de usr5. En este caso particular se podrá manipular el archivo (agregar líneas al final) siempre y cuando usr5 no sea miembro del grupo so como se determinó en la parte anterior. La justificación se presetna en la clase de Seguridad en Sistemas Operativos UNIX, slides 14 y 24.", "atype": "oficial", "sources": [], "cat": "Seguridad"}, {"id": "2025_c3", "exam": "Julio 2025", "code": "2025-07", "problema": "P1 (c) III", "topic": "Seguridad UNIX", "q": "Explique bajo qué condiciones el mecanismo utilizado (SetUID) representa un riesgo de seguridad y cómo podría mitigarse.", "answer": "El programa ejecuta con la identidad de usr5 sin importar quién lo ejecute. Si usr5 tiene privilegios elevados, ocuure un caso de ejecución con privilegios elevados. Las posibles mitigaciones son: Controlar con mucho cuidado los parámetros de entrada. Cuidar que los programas hagan únicamente lo que fueron diseñados para ejecutar. Controlar periódicamente la integridad de los archivos con herramientas como Tripwire, AIDE, Yafic. La justificación se encuentra en la clase de Seguridad en Sistemas Operativos UNIX slides 24 al 26.", "atype": "oficial", "sources": [], "cat": "Seguridad"}, {"id": "2024_aI", "exam": "Julio 2024", "code": "2024-07", "problema": "P1 (a) I", "topic": "Entrada/Salida", "q": "Explique los conceptos de operaciones no bloqueantes y operaciones asincrónicas.", "answer": "En el contexto de un subsistema de entrada/salida, una operación no bloqueante es aquella en la cual la invocación retorna tan pronto como sea posible. Una operación asincrónica es la que se ejecuta en paralelo, el control retorna inmediatamente al proceso invocante y el sistema notifica cuando la operación finaliza.", "atype": "oficial", "sources": [], "cat": "Entrada/Salida"}, {"id": "2024_b", "exam": "Julio 2024", "code": "2024-07", "problema": "P1 (b)", "topic": "Almacenamiento", "q": "Explique qué es el sector de boot, su cometido y su funcionamiento.", "answer": "El sector de boot es el primer sector en la partición de boot. Su cometido es almacenar un código de arranque, con las instrucciones para cargar el kernel del sistema operativo. El proceso de boot inicia ejecutando un código residente en ROM, que lee el Registro Maestro de Boot, lo carga en memoria, examina su tabla de particiones y determina el primer sector de\n\n la partición de boot, que es el sector de boot. Luego se cargan otros susbsistemas y servicios del kernel.", "atype": "oficial", "sources": [], "cat": "Almacenamiento y RAID"}, {"id": "2024_c", "exam": "Julio 2024", "code": "2024-07", "problema": "P1 (c)", "topic": "Almacenamiento / RAID", "q": "Explique las estrategias RAID 0+1 y RAID 1+0.", "answer": "RAID 0+1 aplica primero división (striping) y luego espejado (es un espejo de divisiones). RAID 1+0 aplica primero espejado y luego división (es una división de espejos).", "atype": "oficial", "sources": [], "cat": "Almacenamiento y RAID"}, {"id": "2024_dI", "exam": "Julio 2024", "code": "2024-07", "problema": "P1 (d) I", "topic": "Virtualización", "q": "Sobre los hipervisores de tipo 2: explique su funcionamiento.", "answer": "Un hipervisor de tipo 2 ejecuta en modo usuario como un proceso más del sistema operativo anfitrión. Aplica el procedimiento de traducción binaria: i) el hipervisor analiza el flujo de ejecución (bloques de código) y traduce las instrucciones sensibles por emulaciones (llamadas a procedimientos del hipervisor, no sensibles) y ii) los bloques traducidos son ejecutados por la CPU directamente. Mediante este procedimiento, permite la virtualización en arquitecturas que no cumplen con las hipótesis de Popek & Goldberg.", "atype": "oficial", "sources": [], "cat": "Virtualización"}, {"id": "2024_dII", "exam": "Julio 2024", "code": "2024-07", "problema": "P1 (d) II", "topic": "Virtualización", "q": "Indique las características de un bloque de código ejecutado por un hipervisor de tipo 2.", "answer": "Cada bloque tiene un único punto de entrada. No tiene instrucciones que cambien el flujo de ejecución (ni saltos, ni invocaciones, ni interrupciones), que se sustituyeron por invocaciones a procedimientos del hipervisor. El bloque termina en un salto, invocación o interrupción.", "atype": "oficial", "sources": [], "cat": "Virtualización"}, {"id": "2024_p3b", "exam": "Julio 2024", "code": "2024-07", "problema": "P3 (b)", "topic": "Sistemas de archivos", "q": "Explique cómo funciona el mapa de bits (administración de espacio libre) y explique el funcionamiento de alguna alternativa.", "answer": "El mapa de bits sirve para llevar registo de cuales bloques se encuentran ocupados y cuales libres. Se implementa como un vector de bits con igual tamaño que la cantidad de bloques en el disco: type mapa_bits = array [0.. MAX_BLOQ-1] of bit. Se macara con 0 los bloques libres y con 1 los bloques ocupados. Una alternativa al mapa de bits es utilizar una lista de bloques libres. Esta lista se construye con los propios bloques libres, almacenando en cada bloque libre un puntero al siguiente de la lista.", "atype": "oficial", "sources": [], "cat": "Sistemas de archivos"}, {"id": "2212_def", "exam": "Diciembre 2022", "code": "2022-12", "problema": "P1 (c) II", "topic": "Planificación", "q": "Defina tiempo de espera de un proceso.", "answer": "Tiempos de retorno: P1H1: 15 - 0 = 15 P1H2: 16 - 10 = 6 P2H1: 8 - 1 = 7 P2H2: 9 - 3 = 6 Tiempo de espera: Es el tiempo que un proceso pasa en la cola de listos, es decir el tiempo que pasa a la espera de que se le asigne el procesador.", "atype": "oficial", "sources": [], "cat": "Planificación de procesos"}, {"id": "cs_p1def", "exam": "Noviembre 2019", "code": "2019-11", "problema": "P1 (a)", "topic": "Planificación", "q": "Defina tiempo de espera y tiempo de retorno.", "answer": "Tiempo de retorno: Suma de los intervalos de tiempo en los que el proceso estuvo en la cola de procesos listos. Tiempo de retorno: intervalo de tiempo desde que el proceso es cargado en memoria hasta que el mismo finaliza su ejecucion.", "atype": "oficial", "sources": [], "cat": "Planificación de procesos"}, {"id": "cs_p2a", "exam": "Noviembre 2019", "code": "2019-11", "problema": "P2 (a)", "topic": "Memoria", "q": "Explique el concepto de ensamblaje dinámico de bibliotecas.", "answer": "El ensamblaje dinámico consiste en que, en lugar de incorporar las bibliotecas al ejecutable, estas sean cargadas en tiempo de ejecución.", "atype": "oficial", "sources": [], "cat": "Memoria"}, {"id": "cs_p2b", "exam": "Noviembre 2019", "code": "2019-11", "problema": "P2 (b)", "topic": "Memoria", "q": "Explique cómo funciona la asociación de direcciones en tiempo de carga y en tiempo de ejecución. Describa una ventaja de cada tipo de asociación.", "answer": "La asociación en tiempo de carga se basa en que al compilar se mantienen direcciones de memoria relativa y recién cuando se carga en memoria estas direcciones se convierten en absolutas. Es mucho más fácil de implementar pues no requiere ningún hardware externo para hacerlo. La asociación en tiempo de ejecución por el contrario no fija las direcciones permitiendo que durante la propia ejecución las direcciones físicas pueden variar.", "atype": "oficial", "sources": [], "cat": "Memoria"}, {"id": "cs_p2c", "exam": "Noviembre 2019", "code": "2019-11", "problema": "P2 (c)", "topic": "Memoria", "q": "¿Con qué mecanismos de hardware es necesario contar para implementar de forma eficiente la asociación de direcciones en tiempo de ejecución?", "answer": "Para la implementación eficiente es necesario contar con una MMU que realice la traducción de direcciones y una TLB para que sea eficiente la traducción.", "atype": "oficial", "sources": [], "cat": "Memoria"}, {"id": "2014_1", "exam": "Julio 2014", "code": "2014-07", "problema": "P1.1", "topic": "Sistemas de archivos", "q": "Explique cómo funciona el método de asignación indexada para los sistemas de archivos.", "answer": "En la asignación indexada se mantiene una tabla, llamada bloque de indexación (index block), en donde cada entrada referencia a un bloque de datos del archivo (diap. 32 y 37). De esta forma los bloques del archivo pueden accederse directamente a través del bloque de indexación, sin necesidad de recorrerlos secuencialmente (diap. 37). Como el bloque de indexación ocupa lugar, se trata de que sea lo más pequeño posible; una estrategia habitual es la indexación en varios niveles, donde algunos índices apuntan directamente a bloques de datos (directos) y otros a bloques que a su vez contienen referencias a bloques de datos (indirectos) (diap. 37). Un ejemplo de este método es el sistema UNIX, cuyo bloque de control de archivo es la estructura inode (diap. 38).", "atype": "slides", "sources": [{"deck": "clase19.pdf", "slides": [32, 37, 38]}], "cat": "Sistemas de archivos"}, {"id": "2014_2", "exam": "Julio 2014", "code": "2014-07", "problema": "P1.2", "topic": "Memoria virtual", "q": "En un sistema operativo con memoria virtual, explique los pasos que debe realizar el sistema operativo ante un fallo de página.", "answer": "Ante un fallo de pagina en memoria virtual, el SO ejecuta una rutina de atencion del fallo de pagina, activada por la interrupcion (trap) que genera el acceso a una pagina no residente. Los pasos son: primero se verifica que el proceso referencia una pagina valida en su espacio virtual (usando una tabla interna o el campo de memoria limite en el PCB); si es invalida se genera un segmentation fault y el SO finaliza el proceso. Si es valida pero el bit de validez indica que no esta en memoria, se produce el fallo y la rutina: (1) busca un frame libre en memoria principal y, si no hay, ejecuta un algoritmo de reemplazo para elegir un frame victima; (2) realiza una lectura desde el disco (backing store) para cargar la nueva pagina en el frame libre y, eventualmente, una escritura al disco para guardar el frame que se libero; (3) actualiza la tabla de paginas y la informacion en el PCB del proceso, marcando que la nueva pagina esta disponible en memoria principal; y (4) retorna el control (resume) a la instruccion que fue interrumpida por el fallo, reanudando el proceso en el mismo lugar y estado.", "atype": "slides", "sources": [{"deck": "memoria3_2026.pdf", "slides": [15, 16, 17, 18]}], "cat": "Memoria"}, {"id": "2014_3", "exam": "Julio 2014", "code": "2014-07", "problema": "P1.3", "topic": "Seguridad", "q": "Describa brevemente ventajas y desventajas del uso de la encripción simétrica frente a la asimétrica y cite algún ejemplo del uso de ambas técnicas.", "answer": "Cifrado simétrico: usa la MISMA clave para cifrar y descifrar.\n• Ventajas: rápido y eficiente, apto para cifrar grandes volúmenes de datos.\n• Desventajas: hay que distribuir/compartir la clave secreta por un canal seguro y el número de claves escala mal (una por cada par de participantes).\n• Ejemplos: AES, DES/3DES; cifrado de disco, cifrado del contenido de una sesión ya establecida.\n\nCifrado asimétrico: usa un PAR de claves, una pública y una privada.\n• Ventajas: no requiere compartir un secreto previo (resuelve la distribución de claves) y habilita firma digital y no repudio.\n• Desventajas: mucho más lento y costoso, no sirve para grandes volúmenes.\n• Ejemplos: RSA, ECC, Diffie-Hellman; intercambio de claves y autenticación en TLS/HTTPS, firma digital, certificados.\n\nEn la práctica se combinan (cifrado híbrido): asimétrico para intercambiar una clave de sesión y luego simétrico (rápido) para los datos.", "atype": "general", "sources": [], "note": "Tema no incluido en las diapositivas que subiste. Respuesta general estándar de SO — conviene verificarla contra el material de tu curso.", "cat": "Seguridad"}, {"id": "2014_4", "exam": "Julio 2014", "code": "2014-07", "problema": "P1.4", "topic": "Almacenamiento / RAID", "q": "Explique el sistema RAID 0+1 y compárelo con los sistemas RAID 0 y RAID 1.", "answer": "RAID 0+1 combina los dos niveles básicos: primero se divide (striping) y luego se hace el espejado, por lo que es un espejo de divisiones (diap. 55). Se apoya en RAID 0, que divide los datos de forma homogénea entre dos o más discos, sin información de paridad para la redundancia, y se utiliza normalmente para aumentar el rendimiento, aunque no proporciona redundancia de datos (diap. 38). Y se apoya en RAID 1, que crea una copia exacta o espejo del conjunto de datos en dos o más discos, útil cuando el rendimiento de lectura o la confiabilidad son más importantes que la capacidad, brindando protección eficaz contra la falla física de un disco (diap. 41). Así, frente a RAID 0 (que solo aporta performance por striping y ninguna redundancia) y frente a RAID 1 (que solo aporta confiabilidad por espejado), RAID 0+1 combina ambas ideas: el striping mejora el rendimiento y el espejado de esas divisiones aporta la redundancia/confiabilidad de la que carece RAID 0 (diap. 38, 41 y 55).", "atype": "slides", "sources": [{"deck": "clase21.pdf", "slides": [38, 41, 55]}], "cat": "Almacenamiento y RAID"}, {"id": "2014_5", "exam": "Julio 2014", "code": "2014-07", "problema": "P1.5", "topic": "Virtualización", "q": "En el contexto de Virtualización, explique el mecanismo de traducción binaria e indique en qué tipos de hipervisor puede ser utilizado.", "answer": "La traduccion binaria es un mecanismo de virtualizacion de CPU mediante el cual el hipervisor analiza el flujo de ejecucion del SO invitado y \"traduce\" las instrucciones sensibles reemplazandolas por llamadas a procedimientos del hipervisor que emulan dichas instrucciones (Diapositiva 14). El codigo se procesa en bloques: cada bloque tiene un unico punto de entrada, no contiene saltos, llamadas ni interrupciones internas, y termina en un salto, llamada o interrupcion. El hipervisor inspecciona cada bloque, sustituye las instrucciones sensibles por llamadas al hipervisor y tambien traduce la instruccion final (salto, llamada o interrupcion) por una llamada al hipervisor. Cada bloque traducido se almacena en un cache, de modo que se paga un costo inicial alto de traduccion pero luego los bloques quedan cacheados y se ejecutan directamente por la CPU sin producir cambio de contexto al ejecutar una instruccion sensible (Diapositivas 14, 15, 16). Su gran ventaja es que permite virtualizar arquitecturas que NO cumplen las hipotesis de Popek & Goldberg (donde las instrucciones sensibles no son un subconjunto de las privilegiadas). En cuanto a los tipos de hipervisor: la traduccion binaria es aplicada por los hipervisores de tipo 2 (Diapositivas 14 y 15), pero los hipervisores de tipo 1 tambien pueden realizar traduccion binaria (Diapositiva 16).", "atype": "slides", "sources": [{"deck": "virtualizacion.pdf", "slides": [14, 15, 16]}], "cat": "Virtualización"}, {"id": "2015_1", "exam": "Julio 2015", "code": "2015-07", "problema": "P1.1", "topic": "Memoria", "q": "Describa el mecanismo de Segmentación indicando el soporte en hardware necesario para su implementación.", "answer": "La segmentacion es una tecnica que asigna segmentos contiguos de memoria, de diferente tamano, para las areas de un proceso (codigo, stack, heap, tabla de simbolos, etc.), adaptandose a la vision que el usuario tiene de la memoria; los segmentos no son contiguos entre si. Cada segmento tiene un identificador (numero) y un largo asociado, por lo que las direcciones virtuales son bidimensionales: se componen de un numero de segmento (s) y un desplazamiento u offset dentro del segmento (d), donde el offset debe ser menor que el largo del segmento. El mapeo de la direccion bidimensional a una direccion fisica unidimensional se hace con una tabla de segmentos, que tiene una entrada por segmento con la direccion base (segment base) y el largo (segment limit). En la traduccion se controla el numero de segmento contra la cantidad de segmentos del proceso y el desplazamiento contra el limite del segmento; si el offset supera el limite ocurre un error de direccionamiento. El soporte de hardware necesario incluye la MMU con la tabla de segmentos (mantenida en memoria principal), el registro Segment Table Base Register (STBR) que apunta a la direccion base de la tabla, el registro Segment Table Length Register (STLR) para verificar el numero de segmento, y bits de proteccion controlados por hardware que asocian permisos (por ejemplo, lectura/ejecucion al codigo y lectura/escritura a los datos).", "atype": "slides", "sources": [{"deck": "memoria2_2026.pdf", "slides": [7, 9, 10, 11, 14]}], "cat": "Memoria"}, {"id": "2015_2", "exam": "Julio 2015", "code": "2015-07", "problema": "P1.2", "topic": "Sistemas de archivos", "q": "Enumere y describa brevemente cada una de las capas que componen la implementación de un sistema de archivos.", "answer": "Según el material, el sistema de archivos está compuesto de varias capas, cada una de las cuales utiliza la funcionalidad de la capa inferior (diap. 24). El diseño enfrenta dos problemas: la visión del usuario (definir los atributos, las operaciones válidas de los archivos y la estructura de directorios para su organización) y la creación de algoritmos y estructuras de datos para hacer corresponder el sistema de archivos lógico con los dispositivos físicos de datos (diap. 24). Complementariamente, cuando el sistema operativo accede a más de una implementación de sistema de archivos se genera una estructura en tres capas (diap. 45): la interfaz del sistema de archivo (llamadas a sistema como open, read, etc.), el sistema de archivos virtual (Virtual File System) y la implementación específica de cada sistema de archivo.", "atype": "slides", "sources": [{"deck": "clase19.pdf", "slides": [24, 45]}], "cat": "Sistemas de archivos"}, {"id": "2015_3", "exam": "Julio 2015", "code": "2015-07", "problema": "P1.3", "topic": "Seguridad", "q": "Describa brevemente tres métodos de autenticación de usuarios.", "answer": "La autenticación es el proceso de verificación de la identidad (pretendida) de un usuario (principal) ante un sistema, y según las diapositivas se realiza a través de tres factores o categorías (Seguridad-sistoper-Intro diap. 38):\n\n1) ALGO QUE SE SABE (conocimiento): un secreto que solo el usuario conoce. En las diapositivas el ejemplo concreto es la CONTRASEÑA (password): en el proceso de login de UNIX, el usuario se identifica con un nombre de usuario y password, y el proceso login verifica usuario y password; si la verificación es exitosa, se cambia el UID/GID al del usuario y se ejecuta la shell de login (Seguridad-sistoper-UNIX diap. 14). Las contraseñas se almacenan cifradas/hasheadas en /etc/passwd y /etc/shadow (UNIX diap. 9, 11, 12).\n\n2) ALGO QUE SE TIENE (posesión): un objeto o token que el usuario posee (por ejemplo una tarjeta o dispositivo) (Intro diap. 38).\n\n3) ALGO QUE SE ES (característica inherente / biometría): un rasgo propio del individuo (Intro diap. 38).\n\nConviene distinguir la Identificación (forma en que el principal se identifica ante el sistema, p. ej. el username) de la Autenticación (verificación de esa identidad pretendida), tal como se define en Intro diap. 38. El material desarrolla en detalle únicamente el método basado en contraseña (\"algo que se sabe\") a través del caso UNIX; los otros dos factores se enuncian como categorías.", "atype": "slides", "sources": [{"deck": "Seguridad-sistoper-Intro.pdf", "slides": [38]}, {"deck": "Seguridad-sistoper-UNIX.pdf", "slides": [9, 11, 12, 14]}], "note": "Cobertura buena de las tres categorías (algo que se sabe/se tiene/se es, Intro 38). El único método desarrollado con ejemplo concreto es la contraseña (\"algo que se sabe\") vía el login de UNIX; \"algo que se tiene\" y \"algo que se es\" solo se enuncian, sin ejemplos específicos en las slides.", "cat": "Seguridad"}, {"id": "2015_4", "exam": "Julio 2015", "code": "2015-07", "problema": "P1.4", "topic": "Entrada/Salida", "q": "Describa los registros asociados a un puerto de E/S, indicando para cada uno si son de lectura y/o escritura.", "answer": "Un puerto de E/S consiste, generalmente, en cuatro registros a traves de los cuales el procesador se comunica con el controlador del dispositivo (leyendo y escribiendo informacion en ellos):\n\n1) Registro de Estado (status): puede ser LEIDO por el equipo (solo lectura). Informa el estado del dispositivo, por ejemplo la completitud de una operacion, la disponibilidad de leer del registro de datos de entrada o la existencia de un error en el dispositivo.\n\n2) Registro de Control (control): puede ser ESCRITO por el equipo (solo escritura). Se usa para generar un pedido o cambiar el modo del dispositivo.\n\n3) Registro de Datos de entrada (data-in): es LEIDO por el equipo (solo lectura) para obtener la entrada proveniente del dispositivo.\n\n4) Registro de Datos de salida (data-out): es ESCRITO por el equipo (solo escritura) para enviar una salida al dispositivo.\n\nEn sintesis: status y data-in son de lectura; control y data-out son de escritura.", "atype": "slides", "sources": [{"deck": "clase22.pdf", "slides": [10]}], "cat": "Entrada/Salida"}, {"id": "2015_5", "exam": "Julio 2015", "code": "2015-07", "problema": "P1.5", "topic": "Virtualización", "q": "Explique el concepto de emulación de plataforma e indique ventajas y desventajas.", "answer": "La emulacion de plataforma es un mecanismo de virtualizacion de CPU que permite crear maquinas virtuales con un hardware distinto del nativo (por ejemplo, emular una arquitectura de procesador diferente a la de la maquina anfitriona) (Diapositiva 18). El emulador debe traducir todas las instrucciones del hardware destino al hardware nativo y emular ademas los perifericos. Un ejemplo tipico es QEMU (Diapositiva 18). Ventaja: permite ejecutar software y sistemas operativos disenados para una arquitectura de hardware completamente distinta de la disponible, brindando maxima flexibilidad para correr un hardware que no es el nativo (Diapositiva 18); esto se relaciona con la posibilidad de mantener en funcionamiento software heredado disenado sobre arquitecturas actualmente obsoletas (Diapositiva 4). Desventaja: es lento, ya que debe traducir todas las instrucciones del hardware destino al nativo y emular los perifericos, lo que penaliza fuertemente el rendimiento (Diapositiva 18).", "atype": "slides", "sources": [{"deck": "virtualizacion.pdf", "slides": [18]}], "cat": "Virtualización"}, {"id": "2015_p2b", "exam": "Julio 2015", "code": "2015-07", "problema": "P2 (b)", "topic": "Memoria", "q": "En general, mencione ventajas y desventajas de trabajar con páginas de tamaño grande.", "answer": "Trabajar con paginas de tamano grande presenta un compromiso (trade-off). Como ventajas: se reduce la sobrecarga asociada a la tabla de paginas, ya que hay menos entradas y por lo tanto se necesita menos espacio para almacenarla y la overhead por entrada disminuye a medida que aumenta el tamano de pagina; ademas la E/S de disco es mas eficiente cuando la cantidad de datos que se transfieren es mayor. Como desventaja principal: aumenta la fragmentacion interna, ya que los frames se asignan como unidades completas y, si el tamano del proceso es independiente del tamano de pagina, el valor esperado de la fragmentacion interna es de media pagina por proceso (en el peor caso casi un frame completo queda desaprovechado). Por eso los tamanos de pagina pequenos son deseables desde el punto de vista de la fragmentacion, pero los tamanos han crecido (actualmente 4 KB u 8 KB) a medida que crecieron los procesos, los datos y la memoria principal, buscando equilibrar la sobrecarga de la tabla y la eficiencia de E/S contra la fragmentacion interna.", "atype": "slides", "sources": [{"deck": "memoria2_2026.pdf", "slides": [24, 25]}], "cat": "Memoria"}, {"id": "2016_1", "exam": "Junio 2016", "code": "2016-06", "problema": "P1.1", "topic": "Memoria", "q": "Indique los métodos de asociación de direcciones (address binding) y mencione el soporte de hardware necesario para su implementación.", "answer": "La asociacion de direcciones (address binding) es la asignacion de un espacio de direcciones a otro y se puede realizar en tres etapas. (1) Tiempo de compilacion (compile time): si se conoce la ubicacion en memoria fisica, el compilador genera codigo absoluto; si la ubicacion inicial cambia debe recompilarse (ejemplo: programas .COM de MS-DOS). (2) Tiempo de carga (load time): si en compilacion no se sabe donde residira el proceso, el compilador genera codigo reubicable con direcciones relativas y la asociacion se retrasa hasta la carga; si cambia la direccion inicial solo hace falta recargar el codigo. (3) Tiempo de ejecucion (execution time): si el proceso puede moverse en memoria fisica durante su ejecucion (de un segmento a otro), la asociacion se retrasa hasta el tiempo de ejecucion; es el metodo usado por la mayoria de los SO de uso general. En cuanto al soporte de hardware, la asociacion en tiempo de ejecucion requiere hardware especial: la Unidad de Manejo de Memoria (MMU), que traduce direcciones logicas/virtuales a fisicas mediante un registro de reubicacion (valor base) sumado a la direccion virtual y un registro limite para verificar accesos validos. Para compilacion y carga las direcciones logicas y fisicas coinciden y no se requiere ese hardware de traduccion.", "atype": "slides", "sources": [{"deck": "memoria1_2026.pdf", "slides": [17, 18, 19, 20, 22, 23, 26]}], "cat": "Memoria"}, {"id": "2016_2", "exam": "Junio 2016", "code": "2016-06", "problema": "P1.2", "topic": "Seguridad", "q": "Nombre 3 tipos de malware (software malicioso) y explique muy brevemente cada uno de ellos.", "answer": "Las diapositivas definen malware como un \"programa que es insertado en forma encubierta dentro de otro programa con el objetivo de destruir datos, ejecutar programas destructivos o intrusivos; o que comprometan la confidencialidad, integridad o disponibilidad de los datos, aplicaciones o el propio sistema operativo de la víctima\" (Def. según NIST SP 800-83r1) y enumeran como formas de malware: Virus, Worms (gusanos) y Ransomware (Seguridad-sistoper-Intro diap. 28).\n\n1) VIRUS: código malicioso que se inserta de forma encubierta dentro de otro programa (programa \"anfitrión\"); al ejecutarse el programa infectado, el virus actúa comprometiendo la confidencialidad, integridad o disponibilidad de datos, aplicaciones o del propio sistema operativo (según la definición general de malware de la diap. 28).\n\n2) WORMS (gusanos): forma de malware que se propaga/replica de manera encubierta afectando el sistema, dentro de la misma categoría de programas insertados que buscan destruir datos o ejecutar acciones destructivas/intrusivas (diap. 28).\n\n3) RANSOMWARE: forma de malware que compromete la disponibilidad de los datos de la víctima (diap. 28).\n\nNota: las diapositivas enuncian estos tres tipos y dan la definición general de malware, pero no incluyen una explicación individual y detallada de cada tipo por separado.", "atype": "slides", "sources": [{"deck": "Seguridad-sistoper-Intro.pdf", "slides": [28]}], "note": "Cobertura parcial: las slides listan explícitamente los tres tipos (Virus, Worms, Ransomware) y dan la definición general de malware (Intro 28, NIST SP 800-83r1), pero NO describen individualmente cada tipo. La explicación breve de cada uno se deriva de la definición general de malware de esa diapositiva.", "cat": "Seguridad"}, {"id": "2016_3", "exam": "Junio 2016", "code": "2016-06", "problema": "P1.3", "topic": "Memoria", "q": "Describa la estructura de tabla de páginas invertida indicando ventajas y desventajas respecto a la estructura de tabla de páginas jerárquica.", "answer": "La tabla de paginas invertida usa una unica tabla de paginas global a todos los procesos (en lugar de una tabla por proceso). Con ello se aumentan los tiempos de busqueda, pero se reduce el espacio de almacenamiento en memoria principal, que es su objetivo. Respecto de la estructura jerarquica (forward-mapped page table, que divide la tabla en niveles como seccion/pagina/offset), sus ventajas y desventajas son: como ventaja, la invertida ocupa mucho menos espacio, ya que la jerarquica en sistemas de gran espacio de direcciones (2^32 a 2^64) puede requerir tablas muy grandes por proceso (por ejemplo, en un sistema de 32 bits con paginas de 4 KB y entradas de 4 B cada proceso necesitaria mas de un millon de entradas, 4 MB por tabla), problema que se atenua con la jerarquia pero que la invertida resuelve manteniendo una sola tabla global. Como desventaja, la invertida aumenta los tiempos de busqueda (requiere buscar en la tabla global), mientras que la jerarquica indexa directamente por niveles y facilita ademas compartir memoria. En resumen: la invertida cambia menor uso de memoria por mayor costo de busqueda frente a la jerarquica.", "atype": "slides", "sources": [{"deck": "memoria2_2026.pdf", "slides": [35, 36, 37, 40]}], "cat": "Memoria"}, {"id": "2016_4", "exam": "Junio 2016", "code": "2016-06", "problema": "P1.4", "topic": "Entrada/Salida", "q": "En el contexto de E/S, describa y compare las operaciones bloqueantes y no bloqueantes.", "answer": "Operaciones bloqueantes (Blocking): cuando un proceso requiere un servicio de E/S a traves de una rutina bloqueante, el proceso se suspende (se bloquea) hasta que la operacion haya finalizado. Son faciles de utilizar y de entender.\n\nOperaciones no bloqueantes (Nonblocking): el llamado al servicio de E/S es devuelto tan pronto como sea posible, sin esperar a que la operacion se complete totalmente. Por ejemplo, un read sobre un archivo traera quizas algunos datos, pero no necesariamente todos.\n\nComparacion: en la operacion bloqueante el proceso queda suspendido durante toda la E/S, lo que la hace simple de usar y entender pero deja al proceso sin poder avanzar hasta que termine; en la no bloqueante el control retorna rapidamente al proceso permitiendole continuar, aunque la operacion pueda haber transferido solo parte de los datos solicitados.", "atype": "slides", "sources": [{"deck": "clase22.pdf", "slides": [28]}], "cat": "Entrada/Salida"}, {"id": "2016_5", "exam": "Junio 2016", "code": "2016-06", "problema": "P1.5", "topic": "Virtualización", "q": "Describa qué problemas enfrenta un hipervisor para soportar máquinas virtuales con sistemas operativos invitados que tienen soporte de memoria virtual y cómo puede resolverlos.", "answer": "El problema surge porque cada SO invitado con memoria virtual crea y administra su propia tabla de paginas (multinivel) creyendo que dispone de toda la memoria fisica, y esas tablas deben mapearse a las tablas de paginas del hardware real (Diapositiva 21). Como distintas VMs pueden asignar las mismas paginas virtuales a los mismos marcos fisicos (ej.: el SO invitado A mapea 5=>10, 8=>11, 2=>12 y el SO invitado B mapea 4=>10, 5=>11, 6=>12), el hipervisor (VMM) no puede darle los mismos marcos reales a dos VMs distintas (Diapositiva 21). Solucion 1 - Tabla de paginas oculta (shadow page table): el VMM mantiene una tabla de paginas oculta que traduce las asignaciones de cada VM a marcos fisicos reales distintos, evitando el conflicto. El inconveniente es que crear la tabla de paginas es una accion sensible (modifica la MMU y genera una trap), pero las actualizaciones posteriores sobre la tabla NO son sensibles, por lo que el hipervisor no se enteraria de ellas; una solucion posible es marcar las paginas de la tabla como de solo lectura, de modo que cualquier actualizacion produzca una trap que el hipervisor pueda interceptar (Diapositiva 22). Solucion 2 - Paravirtualizacion: se modifica el SO invitado reemplazando las instrucciones de manejo de la MMU por llamadas al hipervisor; ademas las actualizaciones sobre la tabla de paginas pueden hacerse en modo batch, llamando al hipervisor una unica vez luego de que el SO invitado realizo todos los cambios (Diapositiva 22). Solucion 3 - Soporte de hardware: las arquitecturas modernas implementan una tabla de paginas anidada por hardware (nested page table), que realiza la doble traduccion (virtual de la VM -> fisica de la VM -> fisica real) directamente en hardware (Diapositiva 23).", "atype": "slides", "sources": [{"deck": "virtualizacion.pdf", "slides": [21, 22, 23]}], "cat": "Virtualización"}, {"id": "2017_1", "exam": "Junio 2017", "code": "2017-06", "problema": "P1.1", "topic": "Memoria", "q": "Describa brevemente los mecanismos de Segmentación y Paginación y compare ventajas y desventajas.", "answer": "La segmentacion asigna segmentos contiguos de memoria de diferente tamano para las areas del proceso (codigo, stack, heap, etc.), implementando la vision que el usuario tiene de la memoria; las direcciones son bidimensionales (numero de segmento + offset) y se traducen con una tabla de segmentos (base y limite). La paginacion divide la memoria fisica en particiones de tamano fijo (frames) y el espacio virtual en paginas del mismo tamano, con la correspondencia almacenada en una tabla de paginas; la direccion se compone de numero de pagina + offset y el espacio de direcciones logico se separa completamente del fisico, distribuyendose de forma no contigua. Comparacion: la segmentacion logra implementar la vision del usuario y permite compartir y proteger memoria entre procesos de forma mas directa (basta compartir el segmento), pero sufre fragmentacion externa (los segmentos contiguos dejan huecos al liberarse, requiriendo compactacion costosa). La paginacion evita la fragmentacion externa y elimina la necesidad de compactacion, y la asignacion de una pagina es mas rapida (con un mapa de bits se obtiene facilmente un frame libre, mientras que en segmentacion hay que mantener una lista y la busqueda es mas costosa), pero genera fragmentacion interna (por la granularidad a nivel de pagina quedan espacios sin uso dentro de las paginas) y compartir implica mantener muchas referencias de paginas compartidas.", "atype": "slides", "sources": [{"deck": "memoria2_2026.pdf", "slides": [7, 9, 10, 17, 19, 20, 23, 24, 44, 45]}], "cat": "Memoria"}, {"id": "2017_2", "exam": "Junio 2017", "code": "2017-06", "problema": "P1.2", "topic": "Almacenamiento / Disco", "q": "Describa los algoritmos de planificación de disco LOOK, C-LOOK y SSTF.", "answer": "SSTF (Shortest Seek Time First): se elige como próximo pedido a atender el que genere el menor tiempo de búsqueda (seek time) respecto de la posición actual de la cabeza; su desventaja es que puede provocar que algunos pedidos nunca se ejecuten o se demoren mucho tiempo (diap. 19). LOOK: es una versión optimizada del algoritmo de planificación SCAN; atiende las solicitudes recorriendo el disco en una dirección antes de invertirla, pero, a diferencia de SCAN, evita que el cabezal se desplace innecesariamente hacia los extremos del disco (diap. 24). C-LOOK: es parecido a C-SCAN, pero el brazo va solo hasta donde haya pedidos y luego retorna hacia el otro sentido (diap. 25). Según el material, SSTF y LOOK son los algoritmos más utilizados (diap. 26).", "atype": "slides", "sources": [{"deck": "clase21.pdf", "slides": [19, 24, 25, 26]}], "cat": "Almacenamiento y RAID"}, {"id": "2017_3", "exam": "Junio 2017", "code": "2017-06", "problema": "P1.3", "topic": "Seguridad", "q": "Explique en qué contexto se usan las claves asimétricas y cómo se usan. Mencione alguna ventaja y desventaja respecto a claves simétricas.", "answer": "Contexto y uso de las claves asimétricas (criptografía de clave pública): cada entidad tiene un par de claves, una pública (se distribuye libremente) y una privada (secreta).\n• Confidencialidad: se cifra con la clave pública del destinatario y solo él descifra con su clave privada.\n• Autenticación / firma digital: el emisor firma con su clave privada y cualquiera verifica con su clave pública (da integridad y no repudio).\nSe usan en el establecimiento de sesiones seguras (TLS/HTTPS), en la distribución de claves y en infraestructuras de clave pública (PKI, certificados).\n\nVentaja respecto a las simétricas: no necesitan un canal seguro previo para compartir un secreto (resuelven la distribución de claves) y permiten firma digital.\nDesventaja: son mucho más costosas/lentas, por lo que no se usan para grandes volúmenes; se combinan con cifrado simétrico de sesión.", "atype": "general", "sources": [], "note": "Tema no incluido en las diapositivas que subiste. Respuesta general estándar de SO — conviene verificarla contra el material de tu curso.", "cat": "Seguridad"}, {"id": "2017_4", "exam": "Junio 2017", "code": "2017-06", "problema": "P1.4", "topic": "Entrada/Salida", "q": "En el contexto del subsistema de E/S, describa qué es y para qué se usa un buffer.", "answer": "Un buffer (buffering) es un lugar de memoria que guarda informacion (datos) mientras estos son transferidos entre dos dispositivos, o entre un dispositivo y una aplicacion.\n\nExisten 3 razones para realizar buffering:\n1) Normalizar (adaptar) las velocidades entre diferentes dispositivos que operan a ritmos distintos.\n2) Adaptarse entre dispositivos que difieren en los tamanos de transferencia.\n3) Mantener la semantica de las aplicaciones que realizan E/S: en una operacion write el buffer de usuario es copiado a un buffer del sistema operativo, de modo que el sistema logra independizarse de la aplicacion.", "atype": "slides", "sources": [{"deck": "clase22.pdf", "slides": [35]}], "cat": "Entrada/Salida"}, {"id": "2017_5", "exam": "Junio 2017", "code": "2017-06", "problema": "P1.5", "topic": "Memoria virtual", "q": "Explique qué es la hiperpaginación y describa un método para detectarlo.", "answer": "La hiperpaginacion (thrashing) ocurre cuando un proceso usa activamente mas frames de los que el sistema le asigna: tiene muchos fallos de pagina y, si todas sus paginas estan en uso activo, reemplaza paginas que necesitara de inmediato. Un proceso que usa mas tiempo para paginar que para ejecutar sufre hiperpaginacion, lo que degrada significativamente el rendimiento del sistema (la multiprogramacion aumenta el uso del procesador, pero un exceso puede llevar al sistema a este estado de degradacion). Un metodo para detectarla es el modelo Working-Set (conjunto de trabajo), basado en el principio de localidad: se define el working-set (WS) como el conjunto de paginas mas recientemente referenciadas en un intervalo de tiempo Delta. La demanda total de frames del sistema es D = suma de size(WS_i); si D es mayor que la cantidad de frames disponibles, se tendra hiperpaginacion, y el SO puede tomar medidas como suspender un proceso y mover sus frames al backing store. Una estrategia alternativa es la frecuencia de fallos de pagina, que monitorea con que frecuencia ocurren los fallos: si la frecuencia supera un umbral superior el proceso necesita mas frames y si baja de un umbral inferior puede liberar un frame.", "atype": "slides", "sources": [{"deck": "memoria3_2026.pdf", "slides": [47, 48, 49, 50, 52]}], "cat": "Memoria"}, {"id": "2018_1", "exam": "Junio 2018", "code": "2018-06", "problema": "P1.1", "topic": "Memoria", "q": "Describa brevemente el concepto de ensamblaje dinámico (dynamic linking). ¿Qué ventajas brinda?", "answer": "El enlace dinamico (dynamic linking) es una alternativa al enlace estatico: en lugar de incorporar las bibliotecas compartidas al archivo ejecutable en la etapa de enlace (static linking, e.g. /usr/lib/libc.a), las bibliotecas compartidas se cargan en tiempo de ejecucion (e.g. /lib/libc.so en Linux o system.dll en Windows). En el ejecutable se incorporan las bibliotecas estaticas y para las dinamicas solo se mantiene una referencia (como muestra ldd sobre /bin/ls). A diferencia de la carga dinamica, el enlace dinamico de bibliotecas compartidas generalmente requiere la intervencion del sistema operativo, ya que como la memoria de un proceso esta protegida, solo el SO puede verificar si la rutina necesaria esta alojada en el espacio de otro proceso o permitir que multiples procesos accedan a las mismas direcciones. Sus ventajas son: usado junto con la carga dinamica permite un uso mas eficiente de la memoria, dado que las bibliotecas dinamicas se cargan una unica vez en memoria principal (compartidas por varios procesos); tambien favorece la modularizacion y reutilizacion de codigo y evita replicar el codigo de bibliotecas en cada ejecutable.", "atype": "slides", "sources": [{"deck": "memoria1_2026.pdf", "slides": [13, 14, 15]}], "cat": "Memoria"}, {"id": "2018_2", "exam": "Junio 2018", "code": "2018-06", "problema": "P1.2", "topic": "Memoria", "q": "En un sistema con paginación pura y tabla de páginas jerárquica: (a) explique la estructura jerárquica y sus ventajas; (b) describa qué sucede desde que se presenta una dirección virtual válida hasta acceder a la memoria física y los componentes que intervienen.", "answer": "(a) La tabla de paginas jerarquica se basa en dividir la tabla de paginas definiendo una jerarquia: se separa el campo de indexado de la direccion virtual en varios niveles (por ejemplo, seccion, pagina y offset), de modo que una tabla de paginas exterior apunta a paginas de la tabla de paginas. El esquema se denomina forward-mapped page table y se puede aplicar con multiples niveles de indexacion. Su ventaja es que ocupa menos espacio que una tabla lineal unica: en sistemas de gran espacio de direcciones (2^32 a 2^64) una tabla lineal seria enorme (por ejemplo 4 MB por proceso en 32 bits con paginas de 4 KB y entradas de 4 B), y la jerarquia permite no materializar las porciones no usadas, almacenando la tabla de forma mas eficiente y con menos espacio. (b) Cuando se presenta una direccion virtual valida, intervienen la CPU, la MMU (con su hardware de paginacion), la cache TLB, la tabla de paginas (referida por el Page Table Base Register, PTBR) y la memoria fisica. La direccion virtual se descompone en numero de pagina y offset; primero se busca el numero de pagina en la TLB: si hay TLB hit se obtiene el numero de frame de inmediato; si hay TLB miss se accede a la tabla de paginas en memoria para obtener el frame y ese valor se guarda en la TLB para accesos posteriores (principio de localidad). Con el numero de frame y el offset se forma la direccion fisica y se accede a la memoria fisica. Se verifica ademas el valid-invalid bit y los bits de proteccion; sin TLB el acceso a memoria se duplicaria (uno a la tabla y otro al dato).", "atype": "slides", "sources": [{"deck": "memoria2_2026.pdf", "slides": [20, 27, 28, 29, 33, 35, 36, 37]}], "cat": "Memoria"}, {"id": "2018_3", "exam": "Junio 2018", "code": "2018-06", "problema": "P1.3", "topic": "Memoria virtual", "q": "Describa brevemente las acciones que realiza la rutina de atención al fallo de página en un sistema con paginación bajo demanda.", "answer": "En paginacion bajo demanda, cuando el bit de validez indica que la pagina referenciada no esta en memoria se genera un fallo de pagina y se invoca la rutina de atencion del fallo, cuyas acciones son: (1) se busca un frame libre en memoria principal y, si no hay ninguno libre, se ejecuta un algoritmo de reemplazo (eligiendo un frame victima); (2) se realiza una lectura del disco para cargar la nueva pagina en el frame libre y, eventualmente, una operacion de escritura al disco para guardar el frame que se libero (swap out del frame victima cuando corresponde); (3) se actualiza la tabla de paginas y la informacion en el PCB del proceso para marcar que la nueva pagina esta disponible en memoria principal; y (4) se retorna el control a la instruccion que fue interrumpida por el fallo. Como la paginacion bajo demanda requiere resumir la instruccion tras el fallo, se guarda el estado del proceso (registros, flags, contador de instrucciones) al ocurrir el fallo para reanudarlo exactamente en el mismo lugar y estado, ya con la pagina accesible en memoria.", "atype": "slides", "sources": [{"deck": "memoria3_2026.pdf", "slides": [17, 21, 29]}], "cat": "Memoria"}, {"id": "2018_4", "exam": "Junio 2018", "code": "2018-06", "problema": "P1.4", "topic": "Virtualización", "q": "Describa dos técnicas para la virtualización de instrucciones sensibles y mencione al menos una ventaja de cada una.", "answer": "Tecnica 1 - Traduccion binaria (usada por hipervisores de tipo 2, y tambien posible en tipo 1): el hipervisor analiza el flujo de ejecucion en bloques de codigo y sustituye las instrucciones sensibles por llamadas a procedimientos del hipervisor que las emulan; los bloques traducidos se almacenan en un cache y luego se ejecutan directamente por la CPU (Diapositivas 14, 15). Ventaja: permite virtualizar arquitecturas que NO cumplen las hipotesis de Popek & Goldberg (Diapositiva 14); ademas, al quedar los bloques cacheados, no se produce cambio de contexto al ejecutar una instruccion sensible (Diapositiva 16).\n\nTecnica 2 - Paravirtualizacion: se modifica el SO invitado para que, en lugar de ejecutar instrucciones sensibles, realice llamadas explicitas al hipervisor a traves de una API (por ejemplo VMI, Virtual Machine Interface; ejemplo VMI Linux) (Diapositiva 17). Ventaja: evita por completo el costo de atrapar/traducir instrucciones sensibles; adicionalmente, permite optimizaciones como actualizar la tabla de paginas en modo batch llamando al hipervisor una sola vez tras todos los cambios del SO invitado, mejorando la performance (Diapositiva 22).\n\nTecnica 3 (complementaria) - Soporte de hardware: Intel con tecnologia VT (Virtualization Technology) agrega soporte para generar una trap al ejecutar instrucciones sensibles, con la ventaja de que permite virtualizar directamente arquitecturas que originalmente no cumplian la propiedad de Popek & Goldberg sin necesidad de modificar el SO invitado ni traducir el codigo (Diapositiva 10).", "atype": "slides", "sources": [{"deck": "virtualizacion.pdf", "slides": [14, 15, 17, 10, 22]}], "cat": "Virtualización"}, {"id": "2019_a", "exam": "Junio 2019", "code": "2019-06", "problema": "P1 (a)", "topic": "Deadlock", "q": "Mencione cuáles son las tres estrategias que utilizan los SO modernos para enfrentarse a un deadlock.", "answer": "Los sistemas operativos modernos usan tres estrategias frente al deadlock:\n\n1) Prevención / evitación (prevention & avoidance): se diseña el sistema para que el deadlock no pueda ocurrir, negando alguna de las cuatro condiciones de Coffman (p. ej. exigir pedir todos los recursos de una, o pedirlos en un orden fijo) o evitándolo dinámicamente concediendo recursos solo si el estado sigue siendo seguro (algoritmo del banquero).\n\n2) Detección y recuperación (detection & recovery): se permite que el deadlock ocurra, se lo detecta (p. ej. buscando ciclos en el grafo de asignación de recursos) y luego se recupera abortando procesos o expropiando recursos.\n\n3) Ignorarlo (algoritmo del avestruz): se asume que los deadlocks son tan raros que no vale la pena el costo de tratarlos. Es lo que hacen en la práctica la mayoría de los SO de propósito general (UNIX/Linux, Windows).", "atype": "general", "sources": [], "note": "Tema no incluido en las diapositivas que subiste. Respuesta general estándar de SO — conviene verificarla contra el material de tu curso.", "cat": "Deadlock"}, {"id": "2019_b", "exam": "Junio 2019", "code": "2019-06", "problema": "P1 (b)", "topic": "Sistemas de archivos", "q": "Sobre la disposición de archivos en almacenamiento secundario: (i) describa los tres métodos de asignación vistos en el curso; (ii) muestre las estructuras de datos para su implementación.", "answer": "(i) Los tres métodos de asignación son (diap. 32): asignación contigua, en la que los datos se disponen en bloques contiguos y basta con conocer el bloque de comienzo y la cantidad de bloques (sufre de fragmentación externa y obliga a reubicar los archivos si crecen, diap. 33); asignación en forma de lista, en la que los bloques de datos forman una lista encadenada y se necesita una referencia al primer y último bloque (resuelve la fragmentación externa, pero el acceso es lineal y los punteros ocupan espacio, diap. 34); y asignación indexada, en la que se mantiene una tabla donde cada entrada referencia a un bloque de datos, permitiendo acceso directo (diap. 32 y 37). (ii) Las estructuras de datos que las implementan son: para la contigua, el bloque de control del archivo (FCB) que indica el bloque inicial y el tamaño en bloques (diap. 28 y 32); para la lista, la tabla de asignación de archivos o FAT, ubicada al comienzo del volumen, con una entrada por cada bloque de disco e indexada por el número de bloque (diap. 35); y para la indexada, el bloque de indexación (index block), cuyo ejemplo es la estructura inode de UNIX (diap. 37 y 38).", "atype": "slides", "sources": [{"deck": "clase19.pdf", "slides": [32, 33, 34, 35, 37, 38, 28]}], "cat": "Sistemas de archivos"}, {"id": "2019_c", "exam": "Junio 2019", "code": "2019-06", "problema": "P1 (c)", "topic": "Sistemas de archivos", "q": "¿Qué es el sistema de archivos virtual (VFS)? Describa brevemente sus dos funcionalidades más importantes.", "answer": "El sistema de archivos virtual (Virtual File System, VFS) es una capa que se utiliza cuando un sistema operativo debe acceder a más de una implementación de sistema de archivos (ufs, ext4, btrfs, jfs, ntfs, etc.); mediante técnicas de orientación a objetos logra mantener una estructura independiente del sistema de archivos concreto que se utilice (diap. 45). Se ubica en una estructura de tres capas, entre la interfaz del sistema de archivo (llamadas a sistema) y la implementación específica de cada sistema de archivo (diap. 45). Sus dos funcionalidades más importantes son (diap. 46): proponer una interfaz genérica de sistema de archivo, independiente del tipo de sistema de archivo, logrando así un acceso transparente al sistema de archivos; y proponer un bloque de control de archivo virtual que puede representar tanto archivos locales como remotos.", "atype": "slides", "sources": [{"deck": "clase19.pdf", "slides": [45, 46]}], "cat": "Sistemas de archivos"}, {"id": "2019_d", "exam": "Junio 2019", "code": "2019-06", "problema": "P1 (d)", "topic": "Almacenamiento / RAID", "q": "Describa brevemente la estructura RAID 5 e indique los pasos requeridos para realizar la escritura de 1 bloque en RAID 5.", "answer": "RAID 5 es similar a RAID 4, pero los datos de paridad se distribuyen entre todos los discos miembros en lugar de concentrarse en un disco de paridad dedicado; es muy popular por su bajo costo de redundancia (por ejemplo, 4 unidades de 1 TiB construyen un arreglo de 3 TiB) y, si falla un disco, puede seguir funcionando (diap. 49 y 50). Una serie de bloques simultáneos, uno en cada disco del arreglo, se denomina colectivamente una raya (franja); al escribir en esa franja hay que recalcular y reescribir el bloque de paridad. Los pasos para escribir un bloque (pequeña escritura) son (diap. 51): (1) leer el bloque de datos antiguo; (2) leer el bloque de paridad antiguo; (3) comparar el bloque de datos antiguo con la solicitud de escritura y, por cada bit que se haya invertido en el bloque de datos, invertir el bit correspondiente en el bloque de paridad; (4) escribir el bloque de datos nuevo; y (5) escribir el nuevo bloque de paridad.", "atype": "slides", "sources": [{"deck": "clase21.pdf", "slides": [49, 50, 51]}], "cat": "Almacenamiento y RAID"}, {"id": "2019_e", "exam": "Junio 2019", "code": "2019-06", "problema": "P1 (e)", "topic": "Seguridad", "q": "Enumere 3 tipos de ataques a la seguridad a nivel de aplicación en el contexto de un SO y explique brevemente mecanismos de mitigación.", "answer": "El control de acceso y sus problemas se aplican no solo al S.O. sino también a las aplicaciones (Seguridad-sistoper-Intro diap. 37). A partir del material, tres tipos de ataques/problemas de seguridad y sus mecanismos de mitigación son:\n\n1) BUFFER OVERFLOW (desbordamiento de buffer): ocurre cuando un programa intenta almacenar más datos en un buffer de los que puede contener, sobrescribiendo ubicaciones de memoria adyacentes; puede ser explotado para ejecutar código malicioso, corromper datos o causar fallos (Intro diap. 26). El caso del código con gets() ilustra la función insegura (diap. 25). Mitigación (diap. 27): en tiempo de compilación/diseño: elección del lenguaje de programación, programación defensiva y funciones seguras, mecanismos de protección de pila (Canarios), Shadow Stack; en tiempo de ejecución: protección de espacio de direcciones ejecutables (NX/DEP) y randomización del espacio de direcciones (ASLR).\n\n2) STACK OVERFLOW (variante del buffer overflow sobre la pila): el buffer atacado reside en la pila, donde se guardan variables locales y la dirección de retorno; al desbordar un buffer local el atacante puede sobrescribir la dirección de retorno con una de su elección y redirigir la ejecución a código malicioso inyectado (Intro diap. 26). Mismas mitigaciones que buffer overflow: Canarios, Shadow Stack, NX/DEP, ASLR (diap. 27).\n\n3) MALWARE (código malicioso insertado en aplicaciones): programa insertado de forma encubierta dentro de otro programa que compromete la confidencialidad, integridad o disponibilidad; formas: virus, worms, ransomware (Intro diap. 28). Mitigación general: uso de técnicas de mitigación como cifrado, firewalls y parches de seguridad (diap. 7), protección de la integridad del sistema operativo y de los procesos frente a malware (diap. 31), y control de la integridad de programas (p. ej. con herramientas como Tripwire, AIDE, Yafic en el contexto de programas SUID root, Seguridad-sistoper-UNIX diap. 35).\n\nComplemento a nivel de aplicación: como el control de acceso clásico de UNIX solo controla lectura/escritura/ejecución con un único owner y grupo, muchas operaciones de control de acceso deben implementarse a nivel de aplicaciones (UNIX diap. 30), y se usan extensiones como ACLs para un control más granular (UNIX diap. 31, 32).", "atype": "slides", "sources": [{"deck": "Seguridad-sistoper-Intro.pdf", "slides": [7, 25, 26, 27, 28, 31, 37]}, {"deck": "Seguridad-sistoper-UNIX.pdf", "slides": [30, 35]}], "note": "Cobertura parcial: las slides desarrollan bien Buffer Overflow / Stack Overflow y sus mitigaciones (Intro 25-27) y mencionan malware (Intro 28). El curso trata la seguridad de aplicaciones sobre todo a nivel de control de acceso y buffer overflow; NO enumera un catálogo clásico de ataques de aplicación web (p. ej. inyección SQL, XSS), por lo que las respuestas se ciñen a lo que aparece en las diapositivas.", "cat": "Seguridad"}, {"id": "2019_p2f", "exam": "Junio 2019", "code": "2019-06", "problema": "P2 (f)", "topic": "Memoria virtual", "q": "Describa las técnicas de reemplazo NRU (Not Recently Used) y Óptima, especifique las fortalezas y la utilidad de cada una.", "answer": "NRU (Not Recently Used, No Recientemente Usada) es un algoritmo de segunda oportunidad mejorado: asocia a cada pagina un bit de referencia (que se activa en cada lectura o escritura) y un bit de modificacion (que se activa al escribir); cada cierto tiempo se limpia el bit de referencia. Con estos bits las paginas se dividen en cuatro clases: clase 0 (0,0) no referenciada ni modificada, clase 1 (0,1) no referenciada pero modificada, clase 2 (1,0) referenciada no modificada y clase 3 (1,1) referenciada y modificada; se reemplaza una pagina de la clase mas baja no vacia. Su fortaleza es que es sencillo de implementar y, al distinguir paginas modificadas de no modificadas, tiende a elegir buenas victimas (favorece reemplazar las no referenciadas y no modificadas, evitando escrituras innecesarias); para ser eficiente requiere soporte de hardware ya que en cada referencia deben actualizarse los bits, y sufre la anomalia de Belady. El algoritmo Optimo reemplaza la pagina que no se utilizara durante mas tiempo; su fortaleza es que tiene la tasa de fallos de pagina mas baja de todos los algoritmos posibles y nunca sufre la anomalia de Belady, pero no es implementable en la practica porque requiere conocer el futuro (saber de antemano a que paginas accedera el proceso). Su utilidad es servir como referencia para analisis comparativos (por ejemplo, saber que un algoritmo no optimo esta a 12% del optimo en el peor caso y 5% en promedio).", "atype": "slides", "sources": [{"deck": "memoria3_2026.pdf", "slides": [34, 36, 37]}], "cat": "Memoria"}, {"id": "2019_p2g", "exam": "Junio 2019", "code": "2019-06", "problema": "P2 (g)", "topic": "Memoria virtual", "q": "Compare las técnicas de reemplazo globales y las locales.", "answer": "Los algoritmos de reemplazo de paginas se clasifican en globales y locales. En el reemplazo global un proceso puede reemplazar un frame cualquiera, inclusive uno utilizado por otro proceso, por lo que la cantidad de frames asignados a cada proceso puede variar; su desventaja es que los fallos de pagina de un proceso afectan la eficiencia de ejecucion de otros. En el reemplazo local un proceso reemplaza unicamente los frames que tiene asignados, por lo que la cantidad de frames asignados no varia; su desventaja es que se ocupan frames que pueden ser poco usados y no son reemplazados (uso menos eficiente de la memoria disponible por otros procesos). El reemplazo global es la estrategia mas utilizada.", "atype": "slides", "sources": [{"deck": "memoria3_2026.pdf", "slides": [43]}], "cat": "Memoria"}, {"id": "2022_a", "exam": "Julio 2022", "code": "2022-07", "problema": "P1 (a)", "topic": "Memoria virtual", "q": "Explique el algoritmo de reemplazo de páginas Segunda oportunidad (Second chance).", "answer": "El algoritmo de segunda oportunidad (second chance) es una mejora del FIFO. En FIFO una pagina se reemplaza sin tener en cuenta las referencias que tuvo; segunda oportunidad incorpora una marca por pagina (bit de referencia) que se activa cuando la pagina se accede luego de ser cargada. Funcionamiento: se verifica el bit de referencia del frame victima (el mas antiguo, al frente de la cola FIFO); si el bit de referencia es 1, se le da una segunda oportunidad a la pagina, se la mueve al final de la cola y se resetea su bit de referencia a 0, continuando con la siguiente pagina de la cola; si el bit de referencia es 0, la pagina se selecciona para ser reemplazada. Su implementacion es menos eficiente que FIFO, pero permite reducir la cantidad de fallos de pagina; al igual que FIFO, sufre la anomalia de Belady.", "atype": "slides", "sources": [{"deck": "memoria3_2026.pdf", "slides": [31, 35]}], "cat": "Memoria"}, {"id": "2022_c", "exam": "Julio 2022", "code": "2022-07", "problema": "P1 (c)", "topic": "Almacenamiento / RAID", "q": "Describa brevemente la estructura RAID 5 y explique la diferencia con RAID 4.", "answer": "RAID 5 es similar a RAID 4, pero los datos de paridad se distribuyen entre todos los discos miembros del arreglo, en lugar de concentrarse en un único disco dedicado; es muy popular por su bajo costo de redundancia (p. ej., 4 unidades de 1 TiB forman un arreglo de 3 TiB) y puede seguir funcionando ante la falla de un disco (diap. 49 y 50). RAID 4 usa división a nivel de bloques con un disco de paridad dedicado, lo que le permite lecturas en paralelo pero no realizar pequeñas escrituras en paralelo, ya que una pequeña escritura implica 2 lecturas y 2 escrituras (diap. 48). La diferencia clave es, entonces, la ubicación de la paridad: en RAID 4 la paridad reside en un disco dedicado (que se convierte en un cuello de botella para las escrituras), mientras que en RAID 5 la paridad se reparte entre todos los discos, evitando ese cuello de botella y permitiendo distribuir mejor la carga (diap. 48 y 49).", "atype": "slides", "sources": [{"deck": "clase21.pdf", "slides": [48, 49, 50]}], "cat": "Almacenamiento y RAID"}, {"id": "2022_d", "exam": "Julio 2022", "code": "2022-07", "problema": "P1 (d)", "topic": "Seguridad", "q": "Explique las diferencias entre los métodos de control de acceso: DAC vs MAC.", "answer": "Las diapositivas definen ambos modelos de control de acceso (Seguridad-sistoper-Intro diap. 41):\n\nDAC (Discretionary Access Control / Control de Acceso Discrecional): \"Si un usuario individual puede gestionar el mecanismo de control de acceso para permitir o denegar acceso a un recurso, ese mecanismo constituye un control de acceso discrecional (DAC), también llamado control de acceso basado en identidad (IBAC)\". Es decir, el propietario o usuario individual tiene la potestad (a su discreción) de otorgar o denegar el acceso al recurso.\n\nMAC (Mandatory Access Control / Control de Acceso Mandatorio): \"Cuando un mecanismo de un sistema controla accesos a un objeto y un individuo (principal o sujeto) no puede alterar ese acceso, entonces el control de acceso es mandatorio (MAC) (ocasionalmente llamado control de acceso basado en reglas)\". Es decir, es el sistema (según reglas centrales) quien decide y hace cumplir el acceso, y el usuario individual NO puede modificarlo.\n\nDIFERENCIA CLAVE: en DAC el control queda a discreción del usuario/propietario, que puede gestionar (permitir o denegar) el acceso al recurso; en MAC el control lo impone el sistema mediante reglas y el individuo no puede alterarlo. DAC = basado en identidad (IBAC); MAC = basado en reglas.\n\nEjemplo/relación con UNIX: el modelo clásico de UNIX (POSIX), donde el dueño de un archivo define los permisos de owner/group/others (Seguridad-sistoper-UNIX diap. 16, 20), es un ejemplo de esquema discrecional (el usuario dueño gestiona los permisos), mientras que variantes \"seguras\" del kernel como SELinux o Trusted Solaris (UNIX diap. 31) incorporan controles de tipo mandatorio.", "atype": "slides", "sources": [{"deck": "Seguridad-sistoper-Intro.pdf", "slides": [41]}, {"deck": "Seguridad-sistoper-UNIX.pdf", "slides": [16, 20, 31]}], "note": "Cobertura buena: la definición y diferencia DAC vs MAC está explícita en Intro 41. La vinculación con UNIX (permisos owner/group/others como DAC; SELinux/Trusted Solaris como ejemplos con MAC) se apoya en UNIX 16, 20 y 31.", "cat": "Seguridad"}, {"id": "2023_ai", "exam": "Julio 2023", "code": "2023-07", "problema": "P1 (a) i", "topic": "Sistemas de archivos", "q": "Describa qué es un hardlink, indique cómo se representa en sistemas de archivos indexados como ext2 para Linux y mencione al menos dos diferencias entre un hardlink y un softlink.", "answer": "Un hard link es una forma de que un mismo archivo pertenezca a varios directorios: en la estructura de directorios en grafo, el enfoque de hard link consiste en duplicar/compartir la información de un archivo en diferentes directorios mediante enlaces (diap. 19). En sistemas indexados que usan inodos (ejemplo UNIX/ext2 de Linux), los hard links se tratan de forma natural, porque la pertenencia de un archivo a un directorio está en los datos del propio directorio, que son entradas con el nombre del archivo y el número de inodo correspondiente; así, varias entradas de directorio pueden apuntar al mismo número de inodo (diap. 43). En cambio, el soft link (enlace simbólico) es un tipo de inodo distinto (diap. 42) que almacena como dato la ruta (path) del archivo al cual referencia (diap. 43). Diferencias: (1) el hard link comparte el mismo inodo y por lo tanto los mismos datos, mientras que el soft link es un archivo/inodo aparte que solo guarda una ruta al archivo destino (diap. 43); (2) el hard link se resuelve de forma natural mediante el número de inodo referenciado en las entradas del directorio, mientras que el soft link requiere resolver la ruta (path) almacenada para llegar al archivo (diap. 42 y 43).", "atype": "slides", "sources": [{"deck": "clase19.pdf", "slides": [19, 42, 43]}], "cat": "Sistemas de archivos"}, {"id": "2023_b", "exam": "Julio 2023", "code": "2023-07", "problema": "P1 (b)", "topic": "Entrada/Salida", "q": "Describa el/los método(s) libre(s) de busy waiting para realizar una E/S. Presente un pseudocódigo y explique el comportamiento esperado de una E/S usando un método con busy waiting.", "answer": "Los metodos LIBRES de busy waiting para realizar una E/S son las Interrupciones (Interrupt-Driven I/O) y el Acceso Directo a Memoria (DMA).\n\n- Interrupciones (Interrupt-Driven I/O): el proceso que ejecuta realiza la solicitud de E/S, se agrega a la cola de espera del dispositivo y finalmente invoca al planificador (scheduler) para que asigne el procesador a otro proceso. El controlador de dispositivo avisara la completitud de la solicitud a traves de una interrupcion; una rutina de atencion de la interrupcion (interrupt handler) sera invocada (salvando el estado del proceso en ejecucion). Una vez registrada la completitud, el proceso que genero la solicitud es desbloqueado y pasado a la lista de listos. La gran ventaja es que el procesador queda disponible para otro proceso; requiere soporte de hardware y codificar los manejadores de interrupciones.\n\n- Acceso Directo a Memoria (DMA): se dispone de un dispositivo/chip especializado que permite transferir datos desde ciertas controladoras a memoria sin que el procesador intervenga en forma continua. El procesador carga ciertos registros en el controlador DMA para realizar el pedido; el controlador DMA se encarga de la transferencia (que se hace en paralelo mientras el procesador realiza otras tareas) e interrumpe al procesador cuando finaliza. Resuelve el problema de que los dispositivos orientados a caracteres interrumpirian en cada transferencia degradando el sistema.\n\nComportamiento de una E/S CON busy waiting (E/S Programada / Programmed I/O): el procesador genera la solicitud de E/S y luego se encarga de controlar la completitud consultando algun registro de estado del controlador en una iteracion continua denominada polling o busy waiting. Esta tecnica consume ciclos de procesador en forma innecesaria (desperdicio de ciclos); si bien permite
