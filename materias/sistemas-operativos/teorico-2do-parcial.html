una programacion simple, esa es su gran desventaja: mientras el dispositivo no esta listo, el procesador queda ocupado en el ciclo de espera en lugar de hacer trabajo util.\n\nPseudocodigo de E/S Programada (con busy waiting), enviando un buffer a una impresora:\n\np = copy_from_user(buffer, k_buffer, count);\nfor (i = 0; i < count; i++) {\n    while (*printer_status_reg != READY);   // busy waiting: se consulta el registro de estado en un ciclo continuo\n    *printer_data.register = p[i];           // cuando el dispositivo esta READY, se escribe el dato\n}\nreturn_to_user();", "atype": "slides", "sources": [{"deck": "clase22.pdf", "slides": [12, 13, 14, 15, 18, 20]}], "cat": "Entrada/Salida"}, {"id": "2023_c", "exam": "Julio 2023", "code": "2023-07", "problema": "P1 (c)", "topic": "Deadlock", "q": "Exponga las condiciones de Coffman para la existencia de deadlocks. Explique la técnica de prevención de deadlocks por espera circular.", "answer": "Condiciones de Coffman (las cuatro deben cumplirse simultáneamente para que exista deadlock):\n\n1) Exclusión mutua: al menos un recurso se usa en modo no compartible (uno a la vez).\n2) Retención y espera (hold and wait): un proceso mantiene recursos asignados mientras espera por otros.\n3) No expropiación (no preemption): un recurso solo lo libera voluntariamente el proceso que lo tiene; no se le puede quitar.\n4) Espera circular (circular wait): existe una cadena circular P0→P1→…→Pn→P0 donde cada proceso espera un recurso retenido por el siguiente.\n\nPrevención por espera circular: se define un orden total (numeración) sobre los tipos de recursos y se obliga a que cada proceso solicite los recursos en orden creciente de esa numeración. Así es imposible que se forme un ciclo, porque no puede haber un proceso esperando un recurso de número menor al que ya retiene.", "atype": "general", "sources": [], "note": "Tema no incluido en las diapositivas que subiste. Respuesta general estándar de SO — conviene verificarla contra el material de tu curso.", "cat": "Deadlock"}, {"id": "2023_d", "exam": "Julio 2023", "code": "2023-07", "problema": "P1 (d)", "topic": "Virtualización", "q": "Explique la principal función de un hipervisor. Describa los hipervisores de tipo 2.", "answer": "La principal funcion de un hipervisor es dar soporte a las maquinas virtuales ejecutando en su nombre las operaciones que requieren privilegios: el hipervisor ejecuta en modo kernel y realiza las operaciones privilegiadas en nombre del SO invitado (Guest OS), que es el sistema operativo que corre dentro de la maquina virtual (Diapositiva 7). Cuando una VM intenta ejecutar una instruccion sensible/privilegiada, esta es atrapada (trap) y procesada por el hipervisor, que emula el comportamiento del hardware real, permitiendo que cada VM se comporte como una maquina independiente (Diapositivas 6, 7, 13).\n\nHipervisores de tipo 2: a diferencia del tipo 1 (que ejecuta en modo kernel), el hipervisor de tipo 2 ejecuta en modo usuario como un proceso mas del sistema operativo anfitrion (host) (Diapositiva 14). Permite la virtualizacion en arquitecturas que NO cumplen con las hipotesis de Popek & Goldberg, y para ello aplica traduccion binaria: analiza el flujo de ejecucion (bloques de codigo) y traduce las instrucciones sensibles por llamadas al hipervisor, mientras que los bloques ya traducidos son ejecutados directamente por la CPU y quedan almacenados en un cache (Diapositivas 14, 15). Respecto de la E/S, los hipervisores de tipo 2 pueden utilizar los drivers del SO anfitrion (Diapositiva 27). En cuanto a la performance, el costo inicial de traducir todo el flujo de instrucciones es alto, pero luego los bloques quedan en cache y no se produce cambio de contexto al ejecutar una instruccion sensible (Diapositiva 16). Ejemplos de tipo 2: VMware Workstation y Oracle VirtualBox (Diapositiva 16).", "atype": "slides", "sources": [{"deck": "virtualizacion.pdf", "slides": [7, 14, 15, 16]}], "cat": "Virtualización"}];
const LS = "teoricoSO.v2";
// ---- state ----
let state = { order:"sec", cat:"__all__", exam:"__all__", hideKnown:false, known:[], listOpen:false };
try{ const s=JSON.parse(localStorage.getItem(LS)); if(s) state=Object.assign(state,s); }catch(e){}
let known = new Set(state.known||[]);
let active = [];      // array of question objects in current order
let idx = 0;          // pointer into active
let revealed = false;
let shuffleMap = {};  // id -> random key (stable per shuffle)

const $ = s=>document.querySelector(s);
const esc = t=>(t||"").replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const examOrderKey = c=>{ const m=(c||"").match(/(\d{4})-(\d{2})/); return m?(m[1]+m[2]):"9999"; };

function save(){ state.known=[...known]; try{localStorage.setItem(LS,JSON.stringify(state));}catch(e){} }

function buildActive(){
  let list = DATA.filter(q =>
     (state.cat==="__all__"   || q.cat===state.cat) &&
     (state.exam==="__all__"  || q.exam===state.exam) &&
     (!state.hideKnown || !known.has(q.id)) );
  if(state.order==="rand"){
     list.forEach(q=>{ if(!(q.id in shuffleMap)) shuffleMap[q.id]=Math.random(); });
     list.sort((a,b)=>shuffleMap[a.id]-shuffleMap[b.id]);
  } else {
     list.sort((a,b)=> examOrderKey(a.code).localeCompare(examOrderKey(b.code)) || a.problema.localeCompare(b.problema,'es') || a.id.localeCompare(b.id));
  }
  active = list;
  if(idx>=active.length) idx=Math.max(0,active.length-1);
}

function fmtAnswer(t){
  return (t||"").split(/\n\n+/).map(p=>"<p>"+esc(p).replace(/\n/g,"<br>")+"</p>").join("");
}
function srcLine(q){
  if(!q.sources||!q.sources.length) return "";
  const parts = q.sources.map(s=>`<b>${esc(s.deck)}</b> · diapositiva${s.slides.length>1?'s':''} ${s.slides.join(', ')}`);
  return `<div class="src">📎 <div>Fuente: ${parts.join(' &nbsp;·&nbsp; ')}</div></div>`;
}
const ATLABEL={oficial:"✔ Solución oficial del parcial",slides:"📘 Respuesta desde las diapositivas",general:"⚠ Respuesta general"};

function renderCard(){
  const card=$("#card");
  if(!active.length){
    card.innerHTML=`<div class="empty"><b>¡Nada por acá! 🎉</b><br><br>
      ${known.size>=DATA.length?'Marcaste todas las preguntas como sabidas.':'Ninguna pregunta coincide con estos filtros'+(state.hideKnown?' (probá destildar «Ocultar las que ya sé»)':'')+'.'}
      <br><br><button class="btn primary" onclick="clearFilters()">Ver todas las preguntas</button></div>`;
    updateChrome(); return;
  }
  const q=active[idx];
  const isK=known.has(q.id);
  card.innerHTML=`
    <div class="meta">
      <span class="pill exam">📄 ${esc(q.exam)}</span>
      <span class="pill prob">Ejercicio ${esc(q.problema)}</span>
      <span class="pill topic">${esc(q.topic)}</span>
      ${isK?'<span class="pill known">✓ ya la sé</span>':''}
    </div>
    <div class="q">${esc(q.q)}</div>
    <div class="qhint">Pensá tu respuesta y después revelala.</div>
    <div class="reveal-wrap" id="rw"></div>`;
  const rw=$("#rw");
  if(!revealed){
    rw.innerHTML=`<button class="btn primary big-reveal" onclick="reveal()">👁 Mostrar respuesta</button>`;
  }else{
    rw.innerHTML=`<div class="answer">
        <span class="atype ${q.atype}">${ATLABEL[q.atype]}</span>
        <div class="txt">${fmtAnswer(q.answer)}</div>
        ${srcLine(q)}
        ${q.note?`<div class="note">⚠ ${esc(q.note)}</div>`:""}
      </div>`;
  }
  // actions row (always)
  const act=document.createElement("div");
  act.className="actions";
  act.innerHTML=`
    <button class="btn ${isK?'ghost':'primary'}" onclick="markKnown()">${isK?'✓ Sabida':'✓ La sabía'}</button>
    <button class="btn ghost" onclick="markReview()">↻ A repasar</button>
    <div class="nav">
      <button class="btn" onclick="go(-1)">← Anterior</button>
      <div class="pos">${idx+1} / ${active.length}</div>
      <button class="btn" onclick="go(1)">Siguiente →</button>
    </div>`;
  card.appendChild(act);
  updateChrome();
}

function updateChrome(){
  $("#knownN").textContent=known.size;
  $("#totalN").textContent=DATA.length;
  $("#pbar").style.width=(100*known.size/DATA.length).toFixed(0)+"%";
  renderList();
}

function renderList(){
  const box=$("#list"); if(!box) return;
  const term=($("#search")?.value||"").toLowerCase().trim();
  let items=active.filter(q=>!term || (q.q.toLowerCase().includes(term)||q.exam.toLowerCase().includes(term)||q.topic.toLowerCase().includes(term)));
  $("#listCount").textContent="("+items.length+")";
  box.innerHTML="";
  items.forEach(q=>{
    const cur=active[idx]&&active[idx].id===q.id, isK=known.has(q.id);
    const el=document.createElement("div");
    el.className="li"+(cur?" cur":"")+(isK?" done":"");
    el.innerHTML=`<span class="dot ${q.atype}"></span>
      <span class="code">${esc(q.code)}</span>
      <span class="qt">${esc(q.q.length>92?q.q.slice(0,92)+'…':q.q)}</span>
      ${isK?'<span class="chk2">✓</span>':''}`;
    el.onclick=()=>{ idx=active.indexOf(q); revealed=false; renderCard(); };
    box.appendChild(el);
  });
}

// ---- actions ----
window.reveal=()=>{ revealed=true; renderCard(); };
window.go=d=>{ if(!active.length)return; idx=(idx+d+active.length)%active.length; revealed=false; renderCard(); };
window.markKnown=()=>{ const q=active[idx]; if(!q)return; known.add(q.id); save();
   if(state.hideKnown){ buildActive(); revealed=false; } renderCard(); };
window.markReview=()=>{ const q=active[idx]; if(!q)return; known.delete(q.id); save(); renderCard(); };
window.clearFilters=()=>{ state.cat="__all__";state.exam="__all__";state.hideKnown=false;
   $("#fCat").value="__all__";$("#fExam").value="__all__";$("#hideKnown").checked=false;
   idx=0;revealed=false;buildActive();renderCard();save(); };

// ---- init controls ----
function initControls(){
  const cats=[...new Set(DATA.map(q=>q.cat))].sort((a,b)=>a.localeCompare(b,'es'));
  $("#fCat").innerHTML=`<option value="__all__">Todos los temas (${DATA.length})</option>`+
     cats.map(c=>`<option value="${esc(c)}">${esc(c)} (${DATA.filter(q=>q.cat===c).length})</option>`).join("");
  const exams=[...new Set(DATA.map(q=>q.exam))].sort((a,b)=>examOrderKey(DATA.find(q=>q.exam===b).code).localeCompare(examOrderKey(DATA.find(q=>q.exam===a).code)));
  $("#fExam").innerHTML=`<option value="__all__">Todos los parciales</option>`+
     exams.map(e=>`<option value="${esc(e)}">${esc(e)} (${DATA.filter(q=>q.exam===e).length})</option>`).join("");
  $("#fCat").value=state.cat; $("#fExam").value=state.exam; $("#hideKnown").checked=!!state.hideKnown;
  document.querySelectorAll("#orderSeg button").forEach(b=>{
    b.classList.toggle("on",b.dataset.o===state.order);
    b.onclick=()=>{ state.order=b.dataset.o; if(b.dataset.o==="rand")shuffleMap={};
      document.querySelectorAll("#orderSeg button").forEach(x=>x.classList.toggle("on",x===b));
      idx=0;revealed=false;buildActive();renderCard();save(); };
  });
  $("#fCat").onchange=e=>{state.cat=e.target.value;idx=0;revealed=false;buildActive();renderCard();save();};
  $("#fExam").onchange=e=>{state.exam=e.target.value;idx=0;revealed=false;buildActive();renderCard();save();};
  $("#hideKnown").onchange=e=>{state.hideKnown=e.target.checked;idx=0;revealed=false;buildActive();renderCard();save();};
  $("#toggleList").onclick=()=>{ state.listOpen=!state.listOpen; applyList(); save(); };
  $("#search")&&($("#search").oninput=renderList);
  $("#resetBtn").onclick=()=>{ if(confirm("¿Borrar el progreso (las marcadas como sabidas)?")){ known=new Set(); save(); buildActive(); renderCard(); } };
  applyList();
}
function applyList(){
  $("#listpanel").style.display=state.listOpen?"flex":"none";
  $("#layout").classList.toggle("withlist",state.listOpen);
  $("#toggleList").classList.toggle("primary",state.listOpen);
  if(state.listOpen)renderList();
}
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT"||e.target.tagName==="SELECT")return;
  if(e.key==="ArrowLeft")go(-1);
  else if(e.key==="ArrowRight")go(1);
  else if(e.key===" "||e.key==="Enter"){e.preventDefault(); if(!revealed)reveal();}
  else if(e.key.toLowerCase()==="s")markKnown();
  else if(e.key.toLowerCase()==="r")markReview();
  else if(e.key.toLowerCase()==="l"){state.listOpen=!state.listOpen;applyList();save();}
});
initControls(); buildActive(); renderCard();
</script>
</body>
</html>
